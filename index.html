<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NoddyTales — Silly Stories Just For You</title>

<!-- Brand icons — v0.9.3 · b19 — paths now absolute so Chrome's favicon
     re-indexer doesn't fall back to its stale history cache after a brand
     refresh. Root /favicon.ico added so Chrome's auto-probe of
     https://noddytales.app/favicon.ico returns 200 BN4c instead of 404
     (the 404 was making Chrome keep its cached pre-b5 icon for bookmarks +
     URL autocomplete on returning visitors). -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="icon" href="/public/brand/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="48x48" href="/public/brand/favicon-48.png">
<link rel="icon" type="image/png" sizes="32x32" href="/public/brand/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/public/brand/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/public/brand/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NoddyTales">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#A8D5A2">
<meta property="og:image" content="/public/brand/banner-og.svg">
<meta property="og:title" content="NoddyTales — Silly Stories Just For You">
<meta property="og:description" content="Make a silly personalised story in under 2 minutes.">

<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:        #A8D5A2;
    --sage-dark:   #7CB876;
    --orange:      #F4A261;
    --orange-dark: #E08A45;
    --cream:       #FFF8EE;
    --cream-deep:  #FDEFD4;
    --yellow:      #FFD166;
    --yellow-dark: #F2B838;
    --ink:         #3D3528;
    --ink-soft:    #6B5E48;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    background: var(--sage);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.45) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,209,102,0.35) 0, transparent 42%),
      radial-gradient(circle at 50% 50%, rgba(168,213,162,1) 0, var(--sage) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .app {
    position: relative;
    width: 100%;
    max-width: 440px;
    height: 100vh;
    min-height: 600px;
    background: var(--sage);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 480px) {
    body { padding: 24px; }
    .app {
      height: min(900px, calc(100vh - 48px));
      border-radius: 44px;
      box-shadow:
        0 30px 60px rgba(61,53,40,0.25),
        0 0 0 12px rgba(255,255,255,0.6),
        0 0 0 14px rgba(61,53,40,0.08);
    }
  }

  /* ---- Screens ---- */
  .screen-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 32px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    transition: transform 0.55s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.4s ease;
    background: var(--sage);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.45) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,209,102,0.35) 0, transparent 42%);
  }
  .screen.is-hidden  { transform: translateX(110%);  opacity: 0; pointer-events: none; }
  .screen.is-exiting { transform: translateX(-12%);  opacity: 0; pointer-events: none; }

  .screen--cream {
    background: var(--cream);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(244,162,97,0.12) 0, transparent 32%),
      radial-gradient(circle at 92% 88%, rgba(168,213,162,0.18) 0, transparent 36%);
  }

  /* ---- Type ---- */
  h1, h2, h3 { font-family: 'Fredoka', sans-serif; font-weight: 600; margin: 0; }
  .display {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-wrap: balance;
  }
  .display--mega { font-size: 48px; }
  /* v0.9.3 · b11 — compact step header for screens that need tight vertical
     budgets (e.g. the Setting 2.0 flavor picker on iPhone SE). 28px so a
     short title sits on a single line without forcing a <br>. */
  .display--compact { font-size: 28px; letter-spacing: -0.3px; }
  .lede { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 18px; color: var(--ink-soft); }
  .lede--compact { font-size: 14px; }

  /* ---- Logo ---- */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  /* v0.9.3 · b5 — logo-mark wrapper now lets the BN4d brand icon render with its
     own designed rounded-square corners + sage gradient. Previously this was a
     yellow circular "plate" wrapping a circle-clipped glyph-style favicon; that
     framing didn't suit a full app-icon-style mark. Drop the yellow background,
     shadow, and forced corner-radius — the SVG provides its own visual shell. */
  .logo-mark {
    width: 36px; height: 36px;
    background: transparent;
    display: block;
    overflow: hidden;
    box-shadow: none;
  }
  .logo-mark img {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ---- Buttons ---- */
  .btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    border: none;
    cursor: pointer;
    background: var(--orange);
    color: white;
    border-radius: 28px;
    padding: 20px 28px;
    min-height: 68px;
    width: 100%;
    box-shadow: 0 6px 0 var(--orange-dark), 0 10px 20px rgba(224,138,69,0.25);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    letter-spacing: 0.2px;
  }
  .btn:active:not(:disabled) {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--orange-dark), 0 4px 10px rgba(224,138,69,0.25);
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn--yellow {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.25);
  }
  .btn--yellow:active:not(:disabled) {
    box-shadow: 0 2px 0 var(--yellow-dark), 0 4px 10px rgba(242,184,56,0.25);
  }
  .btn--ghost {
    background: white;
    color: var(--ink);
    box-shadow: 0 6px 0 rgba(61,53,40,0.12), 0 10px 20px rgba(0,0,0,0.06);
  }
  .btn--ghost:active:not(:disabled) {
    box-shadow: 0 2px 0 rgba(61,53,40,0.12), 0 4px 10px rgba(0,0,0,0.06);
  }
  .btn--small { font-size: 17px; padding: 14px 20px; min-height: 52px; border-radius: 22px; }

  /* ---- Name input ---- */
  .name-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 34px;
    text-align: center;
    background: var(--cream);
    border: 4px solid white;
    border-radius: 28px;
    padding: 22px 16px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 6px 0 rgba(61,53,40,0.08), inset 0 2px 4px rgba(0,0,0,0.04);
    letter-spacing: 1px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .name-input::placeholder { color: rgba(107,94,72,0.4); font-weight: 600; }
  .name-input:focus { border-color: var(--yellow); transform: translateY(-2px); }

  /* ---- Age grid ----
     v2.1.1 — tiles shortened from aspect-ratio 1 to 1.18 and gap tightened from 12 to 10px.
     On smaller mobile viewports the 4-row × 3-col square grid was pushing the Next button
     below the fold. Total vertical saved: ~75px, button now visible without scroll. Tiles
     still read as large, friendly chunks; tap targets remain comfortable. */
  .age-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .age-tile {
    aspect-ratio: 1.18;
    border: none;
    border-radius: 24px;
    background: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 34px;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 0 rgba(61,53,40,0.10), 0 10px 20px rgba(0,0,0,0.05);
    transition: transform 0.15s ease, background 0.2s, color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .age-tile::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 16px;
    background: var(--tile-accent, var(--cream-deep));
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .age-tile > span { position: relative; z-index: 1; }
  .age-tile:active { transform: translateY(3px) scale(0.97); }
  .age-tile.is-selected {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.35);
    transform: translateY(-2px) rotate(-2deg);
  }
  .age-tile.is-selected::before { background: white; opacity: 0.35; }
  .age-tile.is-locked { opacity: 0.8; }
  .tile-lock {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 13px;
    z-index: 2;
    opacity: 0.7;
  }

  /* v2.1.0 — Setting tiles (Story Setting Modes). Reuses age-tile chassis but adds
     emoji + label + short note layout instead of just a number. 3-up grid. */
  .setting-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .setting-tile {
    aspect-ratio: 1;
    border: none;
    border-radius: 24px;
    background: white;
    font-family: 'Fredoka', sans-serif;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    box-shadow: 0 6px 0 rgba(61,53,40,0.10), 0 10px 20px rgba(0,0,0,0.05);
    transition: transform 0.15s ease, background 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .setting-tile::before {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 18px;
    background: var(--cream-deep);
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .setting-tile > * { position: relative; z-index: 1; }
  .setting-tile .setting-emoji {
    font-size: 30px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .setting-tile .setting-label {
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    line-height: 1.15;
  }
  .setting-tile:active { transform: translateY(3px) scale(0.97); }
  .setting-tile.is-selected {
    background: var(--yellow);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.35);
    transform: translateY(-2px) rotate(-1.5deg);
  }
  .setting-tile.is-selected::before { background: white; opacity: 0.4; }
  .setting-note {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 4px;
    min-height: 14px;
    line-height: 1.3;
  }
  /* v0.9.3 · b14 — extra-tight breakpoint for iPhone SE 1st gen (320×568)
     and similar very-short viewports. b12 fit 375×667, 390×844, 430×932 but
     320×568 still needed a slight scroll. This @media only kicks in below
     600px viewport height — modern phones (667-932px) are unaffected. */
  @media (max-height: 600px) {
    .setting-grid--flavors { gap: 6px; margin-top: 2px; }
    .setting-grid--flavors .setting-tile { min-height: 50px; padding: 4px 10px; gap: 8px; }
    .setting-grid--flavors .setting-tile .setting-emoji { font-size: 22px; }
    .setting-grid--flavors .setting-tile .setting-label { font-size: 12px; }
    .setting-grid--flavors .setting-tile--surprise { min-height: 54px; padding: 6px 14px; gap: 10px; }
    .setting-grid--flavors .setting-tile--surprise .setting-emoji { font-size: 26px; }
    .setting-grid--flavors .setting-tile--surprise .setting-label { font-size: 14px; }
    .display--compact { font-size: 24px; }
    .lede--compact { font-size: 12px; }
    .setting-note { font-size: 11px; min-height: 12px; margin-top: 2px; }
  }

  /* v0.9.3 · b9 + b11 — Setting 2.0 mobile-compact layout.
     b9 introduced 8 flavor tiles in a 2-col grid. b9 inherited the legacy
     `.setting-tile { aspect-ratio: 1 }` which made each tile ~165px tall at
     375px viewport; total grid ~800px → users had to scroll to reach Next on
     iPhone SE. b11 (this rule set) flattens the flavor tiles to a compact
     row-style: emoji-left, label-right, fixed ~68px min-height. Tap target
     stays well above Apple HIG's 44px minimum. Whole step now fits without
     scrolling on iPhone SE (375×667). Switches to 4-column on viewports
     ≥ 540px so iPad / tablets get the airier original layout. */
  .setting-grid--flavors {
    grid-template-columns: repeat(2, 1fr);
    /* v0.9.3 · b12 — 8 → 10 for breathing room on roomier viewports. */
    gap: 10px;
    margin-top: 4px;
  }
  /* v0.9.3 · b12 — wraps header + grid + note on the setting step so the
     cluster vertically centers in any leftover space (auto margins absorb
     it). On iPhone SE where content fills the canvas, the auto margins
     collapse to 0 — no layout shift. On Pro Max-class viewports (430×932)
     the cluster centers within the available canvas above the footer. */
  .setting-step-inner {
    margin: auto 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .setting-grid--flavors .setting-tile {
    aspect-ratio: auto;
    /* v0.9.3 · b12 — bumped 52 → 60 for a chunkier tap target on Pro Max-class
       viewports while still well under iPhone SE's vertical budget. */
    min-height: 60px;
    padding: 6px 14px;
    border-radius: 16px;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    text-align: left;
  }
  .setting-grid--flavors .setting-tile::before {
    inset: 4px;
    border-radius: 12px;
  }
  .setting-grid--flavors .setting-tile .setting-emoji {
    font-size: 26px;
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .setting-grid--flavors .setting-tile .setting-label {
    font-size: 13px;
    line-height: 1.2;
    text-align: left;
  }
  .setting-grid--flavors .setting-tile--surprise {
    grid-column: 1 / -1;
    /* v0.9.3 · b12 — Surprise was disproportionately tiny vs the rest; 56 → 68
       restores its visual hierarchy as the default + recommended option. */
    min-height: 68px;
    padding: 8px 18px;
    gap: 14px;
  }
  .setting-grid--flavors .setting-tile--surprise .setting-emoji { font-size: 32px; }
  .setting-grid--flavors .setting-tile--surprise .setting-label { font-size: 16px; }
  @media (min-width: 540px) {
    .setting-grid--flavors {
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .setting-grid--flavors .setting-tile--surprise { grid-column: 1 / -1; }
  }

  /* Potty mode toggle (age-select screen) */
  .potty-toggle {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 16px;
    background: rgba(255,255,255,0.55);
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .potty-toggle:active { background: rgba(255,255,255,0.7); }
  .potty-toggle input { position: absolute; opacity: 0; pointer-events: none; }
  .potty-track {
    flex-shrink: 0;
    width: 46px; height: 26px;
    background: rgba(61,53,40,0.18);
    border-radius: 13px;
    position: relative;
    transition: background 0.2s;
  }
  .potty-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 4px rgba(61,53,40,0.25);
    transition: transform 0.2s cubic-bezier(0.4, 1.5, 0.6, 1);
  }
  .potty-toggle input:checked ~ .potty-track { background: var(--orange); }
  .potty-toggle input:checked ~ .potty-track .potty-thumb { transform: translateX(20px); }
  .potty-label {
    font-size: 15px; font-weight: 700; color: var(--ink);
    line-height: 1.2;
  }
  .potty-hint {
    display: block;
    font-size: 12px; font-weight: 600; color: var(--ink-soft);
    margin-top: 2px;
  }

  /* Sidekick step — friends/siblings picker */
  .sidekick-input-row {
    display: flex; gap: 10px; align-items: stretch;
  }
  .sidekick-input {
    flex: 1;
    font-family: 'Fredoka', sans-serif;
    font-size: 18px; font-weight: 500;
    padding: 14px 18px;
    border-radius: 18px;
    border: 3px solid rgba(61,53,40,0.12);
    background: white;
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .sidekick-input:focus { border-color: var(--orange); }
  .sidekick-input:disabled { opacity: 0.5; }
  .sidekick-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 48px;
    padding: 12px;
    background: rgba(255,255,255,0.45);
    border-radius: 14px;
  }
  .sidekick-empty {
    width: 100%; text-align: center;
    font-size: 14px; color: var(--ink-soft);
    font-style: italic;
    padding: 6px 0;
  }
  .sidekick-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 6px 6px 6px 14px;
    border-radius: 999px;
    box-shadow: 0 2px 4px rgba(61,53,40,0.12);
  }
  .sidekick-chip-x {
    width: 22px; height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    color: white;
    font-size: 16px; font-weight: 700;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .sidekick-chip-x:hover { background: rgba(255,255,255,0.6); }

  /* PIN modal overlay */
  .pin-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pin-modal {
    background: var(--cream);
    border-radius: 28px;
    padding: 32px 24px 28px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 24px 48px rgba(61,53,40,0.28);
  }
  .pin-modal h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--ink);
  }
  .pin-modal p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    line-height: 1.5;
  }
  .pin-input {
    width: 100%;
    font-size: 28px;
    font-family: 'Fredoka', sans-serif;
    text-align: center;
    letter-spacing: 10px;
    border: 3px solid var(--cream-deep);
    border-radius: 16px;
    padding: 10px 12px;
    background: white;
    color: var(--ink);
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .pin-input:focus { border-color: var(--orange); }
  .pin-error { color: #d04040; font-size: 13px; min-height: 18px; margin-bottom: 10px; }
  .pin-actions { display: flex; gap: 10px; }
  .pin-actions .btn { flex: 1; }

  /* Version badge — tap to open the What's New panel */
  #version-badge {
    position: absolute;
    bottom: 7px;
    /* v1.18.3: nudged left from 12px → 24px so the badge clears the
       corner cutoff on small mobile devices (notch + rounded corners). */
    right: 24px;
    font-size: 10px;
    color: rgba(61,53,40,0.28);
    font-family: 'Nunito', sans-serif;
    z-index: 50;
    letter-spacing: 0.4px;
    user-select: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #version-badge:hover { color: rgba(61,53,40,0.6); background: rgba(255,255,255,0.4); }

  /* v2.2.1 — Parent Settings gear: relocated from bottom-left to TOP-RIGHT header position.
     Larger (44x44 min tap target), high-contrast circular button so parents can find it.
     iOS safe-area aware: `top` uses env(safe-area-inset-top) so it clears the notch. */
  #settings-gear {
    position: absolute;
    /* v2.2.2 — top-aligned with the back button. The .screen has padding-top: 28px and the
       back button (.pill, ~36px tall) sits at that y. The gear (44px tall) is anchored 4px
       lower so its visual center matches the pill's. Safe-area math keeps it clear of the
       iPhone notch when it applies. */
    top: max(28px, calc(env(safe-area-inset-top, 0px) + 22px));
    right: max(14px, calc(env(safe-area-inset-right, 0px) + 14px));
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.85);
    color: var(--ink);
    border: none;
    border-radius: 50%;
    z-index: 80;
    font-size: 22px;
    line-height: 1;
    font-family: 'Fredoka', sans-serif;
    user-select: none;
    cursor: pointer;
    padding: 0;
    box-shadow: 0 4px 0 rgba(61,53,40,0.10), 0 6px 14px rgba(0,0,0,0.08);
    transition: background 0.15s, color 0.15s, transform 0.2s, box-shadow 0.15s;
  }
  #settings-gear:hover  { background: var(--yellow); color: var(--ink); }
  #settings-gear:active { transform: rotate(60deg) scale(0.95); box-shadow: 0 2px 0 rgba(61,53,40,0.12); }

  /* Parent settings overlay — same chassis as the What's New panel for visual consistency. */
  .settings-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .settings-card {
    background: var(--cream);
    border-radius: 24px;
    padding: 24px;
    max-width: 380px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    -webkit-overflow-scrolling: touch;
  }
  .settings-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .settings-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  .settings-section {
    margin-bottom: 18px;
  }
  .settings-section-label {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--ink);
  }
  .settings-row .label { font-weight: 600; }
  .settings-row .value { color: var(--ink-soft); }
  .settings-disabled {
    opacity: 0.4;
    pointer-events: none;
  }
  .settings-tag {
    font-size: 10px;
    background: rgba(61,53,40,0.1);
    color: var(--ink-soft);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  /* v0.9.3 · b8 — Narrator Voice Selector. 2-column grid of preset cards inside
     Parent Settings. Tap one to set the active narrator preset; instant visual
     selection, applies on the next "Read it to me." Keyboard-accessible via the
     role="radio" semantics on each button. */
  .voice-preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .voice-preset {
    text-align: left;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(61,53,40,0.12);
    border-radius: 12px;
    padding: 10px 12px;
    cursor: pointer;
    font-family: 'Fredoka', sans-serif;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
  }
  .voice-preset:hover { background: rgba(255,255,255,0.8); }
  .voice-preset:active { transform: translateY(1px); }
  .voice-preset.is-selected {
    background: var(--yellow);
    border-color: var(--yellow-dark);
    box-shadow: inset 0 -2px 0 var(--yellow-dark);
  }
  .voice-preset-label {
    display: block;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
  }
  .voice-preset-tagline {
    display: block;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
    line-height: 1.3;
  }
  /* v0.9.3 · b10 — preview ▶ button in the top-right of each preset card.
     Small circular tap target; sits ABOVE the card's selection click so
     tapping ▶ doesn't accidentally pick the voice. */
  .voice-preset { position: relative; padding-right: 40px; }
  .voice-preset-preview {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(61,53,40,0.18);
    background: rgba(255,255,255,0.85);
    color: var(--ink);
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    transition: background 0.12s, transform 0.12s;
  }
  .voice-preset-preview:hover  { background: var(--cream-deep); }
  .voice-preset-preview:active { transform: scale(0.93); }
  .voice-preset-preview.is-loading { opacity: 0.6; cursor: progress; }
  .voice-preset-preview.is-playing { background: var(--yellow); border-color: var(--yellow-dark); }
  /* On selected card, keep the preview button readable. */
  .voice-preset.is-selected .voice-preset-preview {
    background: rgba(255,255,255,0.95);
  }

  /* v0.9.3 · b10 — Compact narrator row above the Read-it-to-me controls.
     Discoverable but lightweight. The Change tap target is big enough for
     a kid finger (40px tall) so the spec's bottom-sheet flow is easy. */
  .narrator-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(61,53,40,0.10);
    border-radius: 14px;
    padding: 8px 12px;
    margin-bottom: 8px;
    font-family: 'Fredoka', sans-serif;
  }
  .narrator-row-label { font-size: 14px; color: var(--ink-soft); }
  .narrator-row-label strong { color: var(--ink); font-weight: 700; margin-left: 4px; }
  .narrator-row-change {
    border: none;
    background: var(--yellow);
    color: var(--ink);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 2px 0 var(--yellow-dark);
    transition: background 0.12s, transform 0.12s;
  }
  .narrator-row-change:hover { background: #FFE08A; }
  .narrator-row-change:active { transform: translateY(2px); box-shadow: 0 0 0 var(--yellow-dark); }

  /* Narrator bottom-sheet modal (story-screen "Change" target). On wider
     viewports it centers; on mobile it slides up from the bottom. Reuses the
     overlay pattern from Parent Settings + What's New so dismiss behavior is
     identical (tap-outside or × button). */
  .narrator-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20, 14, 6, 0.45);
    z-index: 80;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .narrator-modal {
    width: 100%;
    max-width: 480px;
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    padding: 20px 18px 28px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.18);
    animation: narratorSlideUp 0.22s ease-out;
  }
  @keyframes narratorSlideUp {
    0%   { transform: translateY(40px); opacity: 0; }
    100% { transform: translateY(0);    opacity: 1; }
  }
  @media (min-width: 540px) {
    .narrator-modal-overlay { align-items: center; padding: 24px; }
    .narrator-modal { border-radius: 24px; }
  }
  .narrator-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .narrator-modal-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--ink);
    margin: 0;
  }
  .settings-btn-danger {
    width: 100%;
    background: rgba(229, 90, 90, 0.12);
    color: #B33A3A;
    border: 1px solid rgba(229, 90, 90, 0.35);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .settings-btn-danger:hover { background: rgba(229, 90, 90, 0.2); }
  .settings-footnote {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 14px;
    line-height: 1.4;
  }

  /* What's New overlay */
  .whatsnew-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease-out;
  }
  .whatsnew-card {
    background: var(--cream);
    border-radius: 24px;
    max-width: 380px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    padding: 24px 24px 20px;
    box-shadow: 0 20px 60px rgba(61,53,40,0.35);
  }
  .whatsnew-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .whatsnew-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--ink);
    margin: 0;
  }
  .whatsnew-close {
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    background: rgba(61,53,40,0.1);
    color: var(--ink);
    font-size: 18px; font-weight: 700;
    cursor: pointer;
    line-height: 1;
  }
  .whatsnew-entry { margin-bottom: 18px; }
  .whatsnew-entry:last-child { margin-bottom: 0; }
  .whatsnew-version {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--orange-dark);
    margin-bottom: 4px;
  }
  .whatsnew-summary {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; color: var(--ink);
    line-height: 1.5;
    margin: 0 0 6px 0;
    font-weight: 600;
  }
  .whatsnew-detail {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.45;
    margin: 0;
  }
  .whatsnew-link {
    display: inline-block;
    font-size: 12px; color: var(--ink-soft);
    text-decoration: none;
    border-top: 1px solid rgba(61,53,40,0.1);
    padding-top: 12px;
    margin-top: 12px;
    width: 100%;
    text-align: center;
  }
  .whatsnew-link:hover { color: var(--orange-dark); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ---- Word cards ---- */
  .pair-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1;
    max-height: 480px;
  }
  .word-card {
    border: none;
    border-radius: 32px;
    background: var(--orange);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px 12px;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--orange-dark), 0 16px 32px rgba(224,138,69,0.3);
    position: relative;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s;
    animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .word-card:nth-child(2) {
    animation-delay: 0.1s;
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 8px 0 var(--yellow-dark), 0 16px 32px rgba(242,184,56,0.3);
  }
  .word-card::before {
    content: "";
    position: absolute;
    top: -30%; left: -30%;
    width: 160%; height: 60%;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    pointer-events: none;
  }
  .word-card.is-bouncing { animation: cardBounce 1.4s ease-in-out infinite; }
  .word-card:nth-child(2).is-bouncing { animation-delay: 0.2s; }
  .word-card:active { transform: translateY(4px) scale(0.97); }
  .word-card.is-picked { animation: pickedPop 0.5s ease-out forwards; }
  .word-card.is-faded { opacity: 0.3; transform: scale(0.92); }

  .word-emoji { font-size: 72px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
  .word-emoji--sm { font-size: 56px; opacity: 0.85; }
  .word-text { font-size: 28px; line-height: 1; text-align: center; letter-spacing: 0.3px; }
  .word-text--lg { font-size: 32px; }
  .word-text--sm { font-size: 22px; }

  @keyframes cardEnter {
    from { transform: translateY(40px) scale(0.85); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes cardBounce {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%       { transform: translateY(-8px) rotate(1deg); }
  }
  @keyframes pickedPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12) rotate(-3deg); }
    100% { transform: scale(1.05) rotate(0); }
  }

  /* ---- Free-text round ---- */
  .freetext-wrap {
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex: 1;
    animation: cardEnter 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }
  .freetext-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 36px;
    text-align: center;
    background: white;
    border: 4px solid rgba(255,255,255,0.6);
    border-radius: 28px;
    padding: 24px 16px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 8px 0 rgba(61,53,40,0.08), inset 0 2px 4px rgba(0,0,0,0.03);
    letter-spacing: 1px;
    transition: border-color 0.2s, transform 0.2s;
    caret-color: var(--orange-dark);
  }
  .freetext-input::placeholder { color: rgba(107,94,72,0.35); font-size: 28px; }
  .freetext-input:focus { border-color: var(--yellow); transform: translateY(-2px); }
  .freetext-hints {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .hint-label {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    opacity: 0.7;
    letter-spacing: 0.3px;
  }
  .hint-chip {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    background: rgba(255,255,255,0.55);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    border: none;
    transition: background 0.15s, transform 0.12s;
    box-shadow: 0 2px 0 rgba(61,53,40,0.08);
  }
  .hint-chip:active { transform: translateY(2px); }
  .hint-chip:hover { background: rgba(255,255,255,0.8); }

  /* v0.9.3 · b2 — escape hatch on the kid sound round. Lets a kid who DOES want
     to type swap the tap round for a freetext round. Default is tap (no friction);
     this button is small, subtle, sits below the cards. Tapping it re-renders the
     same round slot as a freetext input. */
  .escape-hatch-btn {
    display: block;
    margin: 18px auto 0;
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--ink-soft);
    background: transparent;
    border: 1px dashed rgba(61,53,40,0.25);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.15s, transform 0.12s, background 0.15s;
  }
  .escape-hatch-btn:hover {
    opacity: 1;
    background: rgba(255,255,255,0.4);
  }
  .escape-hatch-btn:active { transform: translateY(1px); }

  /* v0.9.3 · b3 — Selection Joy Pass Phase 4: shuffle 🎲 button. Lets a kid
     re-roll the 2 cards if neither feels right. Limited to MAX_SHUFFLES per
     session (currently 2) so it stays a special move, not a re-roll-forever
     escape hatch. Counter badge shows remaining uses. */
  .shuffle-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 16px auto 0;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-soft);
    background: rgba(255,255,255,0.55);
    border: none;
    border-radius: 999px;
    padding: 8px 16px 8px 14px;
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(61,53,40,0.08);
    transition: background 0.15s, transform 0.12s, opacity 0.15s;
  }
  .shuffle-btn:hover:not(:disabled) { background: rgba(255,255,255,0.85); }
  .shuffle-btn:active:not(:disabled) { transform: translateY(2px); }
  .shuffle-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .shuffle-btn .shuffle-emoji {
    font-size: 18px;
    display: inline-block;
    transition: transform 0.35s ease-out;
  }
  .shuffle-btn:active:not(:disabled) .shuffle-emoji { transform: rotate(-180deg); }
  .shuffle-btn .shuffle-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    background: rgba(61,53,40,0.12);
    border-radius: 999px;
    padding: 1px 7px;
    line-height: 1.4;
  }
  .shuffle-wrap {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }
  /* Soft fade on the pair-wrap during a re-roll for tactile feedback. */
  .pair-wrap.is-rerolling { animation: rerollFade 0.32s ease-out; }
  @keyframes rerollFade {
    0%   { opacity: 1; transform: translateY(0); }
    45%  { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ---- Progress dots ---- */
  .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .progress-dot {
    height: 10px;
    flex: 1;
    border-radius: 5px;
    background: rgba(255,255,255,0.5);
    transition: background 0.4s, transform 0.4s;
  }
  .progress-dot.is-done    { background: var(--yellow); }
  .progress-dot.is-current { background: white; transform: scaleY(1.6); }

  /* ---- Story screen ---- */
  .story-stack { display: flex; flex-direction: column; flex: 1; gap: 18px; position: relative; z-index: 1; }
  .story-paper {
    background: white;
    border-radius: 32px;
    padding: 28px 24px;
    flex: 1;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(61,53,40,0.10), inset 0 0 0 4px var(--cream-deep);
    background-image:
      linear-gradient(white 0 100%),
      repeating-linear-gradient(to bottom, transparent 0 35px, rgba(244,162,97,0.08) 35px 36px);
    background-blend-mode: normal, normal;
  }
  .story-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.1;
    margin: 0 0 16px 0;
    color: var(--ink);
    text-wrap: balance;
  }
  .story-body {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.55;
    color: var(--ink);
    margin: 0;
    text-wrap: pretty;
  }
  .story-body p { margin: 0 0 14px 0; }
  .story-body .pop          { color: var(--orange-dark); font-family: 'Fredoka', sans-serif; font-weight: 600; }
  .story-body .pop--name    { color: var(--orange-dark); font-family: 'Fredoka', sans-serif; font-weight: 700; }
  /* v0.9.3 · b4 — .pop--yellow retired (parseStoryLine collapses [y:X] → .pop).
     Keeping the rule commented so a future "single-most-important-word" treatment
     (Phase 6B / story-visual polish) can revive it without rewriting renderers.
     .story-body .pop--yellow { background: var(--yellow); color: var(--ink); padding: 0 8px; border-radius: 8px; font-family: 'Fredoka', sans-serif; font-weight: 600; } */
  /* Karaoke word highlighting — visible "this is the word being read" indicator with bounce. */
  .kw {
    display: inline-block;
    border-radius: 5px;
    padding: 0 4px;
    margin: 0 -2px;
    transition: background 0.12s ease, color 0.12s ease, box-shadow 0.18s ease;
  }
  .kw.is-lit {
    background: var(--orange);
    color: white;
    font-weight: 800;
    box-shadow: 0 3px 10px rgba(244, 162, 97, 0.55);
    animation: kwBounce 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes kwBounce {
    0%   { transform: scale(1)    translateY(0); }
    45%  { transform: scale(1.14) translateY(-2px); }
    100% { transform: scale(1)    translateY(0); }
  }
  .story-end { text-align: center; font-size: 18px; color: var(--ink-soft); margin-top: 8px; }
  .story-toolbar { display: flex; flex-direction: column; gap: 12px; }
  .story-toolbar-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ---- Speak pill ---- */
  .speak-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    background: var(--orange);
    color: white;
    border-radius: 999px;
    padding: 10px 16px 10px 12px;
    min-height: 44px;
    box-shadow: 0 4px 0 var(--orange-dark), 0 8px 16px rgba(224,138,69,0.25);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s;
  }
  .speak-pill:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--orange-dark), 0 3px 8px rgba(224,138,69,0.25);
  }
  .speak-pill-icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: grid; place-items: center;
    font-size: 15px;
  }
  .speak-pill.is-speaking {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 4px 0 var(--yellow-dark), 0 8px 16px rgba(242,184,56,0.3);
    animation: speakPulse 1.6s ease-in-out infinite;
  }
  .speak-pill.is-speaking .speak-pill-icon { background: rgba(61,53,40,0.12); }
  @keyframes speakPulse {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-2px); }
  }
  .speak-waves {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
    margin-left: 2px;
  }
  .speak-waves span {
    width: 3px;
    background: var(--ink);
    border-radius: 2px;
    animation: waveBars 0.9s ease-in-out infinite;
  }
  .speak-waves span:nth-child(1) { height: 8px;  animation-delay: 0.00s; }
  .speak-waves span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .speak-waves span:nth-child(3) { height: 10px; animation-delay: 0.30s; }
  .speak-waves span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
  @keyframes waveBars {
    0%, 100% { transform: scaleY(0.4); }
    50%       { transform: scaleY(1); }
  }

  /* ---- Header ---- */
  /* v2.2.1 — added right padding so the in-header back button doesn't collide with the
     absolute-positioned gear at top-right. */
  .screen-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-right: 52px; }
  .pill {
    background: white;
    color: var(--ink);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border-radius: 999px;
    padding: 8px 14px;
    box-shadow: 0 3px 0 rgba(61,53,40,0.08);
    border: none;
    cursor: pointer;
  }

  /* ---- Decorations ---- */
  .deco {
    position: absolute;
    font-size: 32px;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
    opacity: 0.85;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.1));
  }
  .deco--1 { top: 12%; right: 8%; font-size: 38px; animation-delay: 0s; }
  /* v0.9.3 · b12 — bumped left from 6% to 10% so the 🌈 deco isn't clipped by
     the screen's overflow-x: hidden on the leftmost edge during its rotate
     animation.
     v0.9.3 · b21 — moved from {top:18%, left:10%} to {top:5%, right:38%}.
     The b12 position landed the rainbow in the welcome-back lede-text band
     ("🌈still age 6? Same crew?") which clipped the leading "s" on real
     iPhones. New position sits in the empty top-center area between the
     brand mark (left) and the back/gear buttons (right) — verified clear
     of all text on 320/375/430 px widths. `right: 38%` anchors from the
     right edge so the rainbow tracks consistently across phone sizes
     instead of drifting toward the brand mark on narrow viewports. */
  .deco--2 { top: 5%; right: 38%; animation-delay: 1.2s; }
  .deco--3 { bottom: 22%; right: 10%; animation-delay: 2.4s; }
  .deco--4 { bottom: 30%; left: 8%; font-size: 28px; animation-delay: 0.6s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%       { transform: translateY(-14px) rotate(4deg); }
  }

  /* ---- Burst ---- */
  .burst {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    animation: burst 0.8s ease-out forwards;
    left: 50%; top: 50%;
  }
  @keyframes burst {
    0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    100% { transform: translate(var(--bx, 30px), var(--by, -50px)) scale(1.2); opacity: 0; }
  }

  /* ---- Helpers ---- */
  .stack { display: flex; flex-direction: column; }
  .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-20 { gap: 20px; } .gap-28 { gap: 28px; }
  .grow { flex: 1; }
  .footer { margin-top: auto; padding-top: 18px; }
  .step-label { font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 15px; color: var(--ink-soft); text-align: center; margin-bottom: 14px; }
  .step-label strong { color: var(--ink); font-weight: 600; }
  .q-label { font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 22px; color: var(--ink); text-align: center; margin: 0 0 22px 0; line-height: 1.25; text-wrap: balance; }
  .q-label strong { font-weight: 600; color: var(--orange-dark); }

  .screen::-webkit-scrollbar, .story-paper::-webkit-scrollbar { width: 6px; }
  .screen::-webkit-scrollbar-thumb, .story-paper::-webkit-scrollbar-thumb { background: rgba(61,53,40,0.15); border-radius: 3px; }

<body>
<div id="root" class="app">
  <div class="screen-wrap" id="screen-wrap"></div>
  <button id="settings-gear" aria-label="Parent settings" title="Parent settings" type="button">⚙</button>
  <div id="version-badge"></div>
</div>

<script src="src/content.js"></script>
<script src="src/engine-v2.js"></script>
<script>
/* ================================================================
   NODDYTALES — Vanilla JS app
   ================================================================ */

if (typeof WORD_BANK === 'undefined') throw new Error('content.js must load before index.html script');

/* v1.20.0 → v2.0.0 — engine flag.
   v1.20.0–v1.23.0: v2 was OPT-IN via ?engine=v2 while we built it tier by tier.
   v2.0.0: v2 is the DEFAULT. ?engine=v1 is the escape hatch if v2 ever misbehaves.
   v1 templates stay in the codebase as a runtime fallback when generateStoryV2 returns
   null or throws — silent fallback ensures the user never sees a broken story screen. */
(function initEngineFlag() {
  try {
    const params = new URLSearchParams(window.location.search);
    const urlEngine = params.get('engine');
    if (urlEngine === 'v2') localStorage.setItem('nt_engine_v2', '1');
    if (urlEngine === 'v1') localStorage.setItem('nt_engine_v2', '0');
    /* v2.5.0 — experimental v3 flag. ?engine=v3 persists nt_engine_v3=1;
       ?engine=v2 (or v1) clears it. window.NODDY_ENGINE is read by the engine
       router; absent or unrecognised values fall back to v2 silently. */
    if (urlEngine === 'v3') localStorage.setItem('nt_engine_v3', '1');
    if (urlEngine === 'v2' || urlEngine === 'v1') localStorage.setItem('nt_engine_v3', '0');
    if (localStorage.getItem('nt_engine_v3') === '1') window.NODDY_ENGINE = 'v3';
  } catch {}
})();
function isEngineV2Enabled() {
  // Default: v2 enabled. Only opt-out via explicit `?engine=v1` (sets localStorage to '0').
  try { return localStorage.getItem('nt_engine_v2') !== '0'; } catch { return true; }
}
function isEngineV3Enabled() {
  // v2.9.0: v3 is default for ages 6+ (handled in buildStory). This function still
  // reads the URL flag for "force v3 even at tot/little for testing" — when truthy,
  // buildStory tries v3 at every age. When falsy, buildStory still tries v3 for
  // ages 6+ by default. The flag is now an override, not a gate.
  try { return localStorage.getItem('nt_engine_v3') === '1'; } catch { return false; }
}
/* v2.9.0 — one-time console.warn deprecation notice for v1 template fallback.
   v1 is the legacy template-substitution engine retired as a default in v2.0.0
   and kept only as a hard fallback. Any production fire after v2.9.0 should be
   visible to operators; module-scope flag ensures we don't spam the console. */
let __ntV1DeprecationLogged = false;
function warnV1DeprecationOnce(reason) {
  if (__ntV1DeprecationLogged) return;
  __ntV1DeprecationLogged = true;
  try {
    console.warn(
      '[NoddyTales] v1 template fallback engaged (' + (reason || 'reason unknown') + '). ' +
      'v1 is deprecated and scheduled for removal in v3.0.0. ' +
      'This fire should not happen in normal operation — v2 (and v3 for ages 6+) cover all picker combinations. ' +
      'If you see this, capture the picks + age and file a defect.'
    );
  } catch {}
}

/* ---- HTML escape (prevent XSS from name input) ---- */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ================================================================
   v2.2.0 — Local Profile (Notion Build Idea: "Local Profile, account-less personalization")
   ================================================================
   Single source of truth for everything that survives a page reload.
   ALL persistence is localStorage-only. Profile data is never sent to
   the TTS API or any server. COPPA-safe by design — no account, no
   network, no analytics, no cross-device sync.

   Keys (all prefixed nt_):
     nt_name        string, child's first name (max 14, HTML-stripped)
     nt_age         integer 2-13
     nt_sidekicks   JSON array of strings (max 3, each max 14)
     nt_setting     string id from V2_SETTINGS (default "surprise")
     nt_potty_mode  '1' | '0'
     nt_engine_v2   '1' | '0' (engine flag — kept separate from profile)
     nt_pin         string (parental PIN for tween unlock — kept separate)

   Future toggles plumb into Profile by adding a new key + getter/setter.
   The parent settings overlay (gear icon) calls Profile.clear() to wipe.
   ================================================================ */
const Profile = {
  KEYS: {
    name: 'nt_name', age: 'nt_age', sidekicks: 'nt_sidekicks',
    setting: 'nt_setting', pottyMode: 'nt_potty_mode',
    /* v2.6.2 — storyMode: 'bedtime' (default, current behavior) or 'anytime'. Controls
       whether the engine's cozy-end / landing beats use sleep imagery or a daytime
       walk-home close. Asked once in the welcome flow; persisted per device. */
    storyMode: 'nt_story_mode',
    /* v0.9.3 · b8 — voicePreset: one of VOICE_PRESET_KEYS (sunny/cozy/adventure/silly).
       Selects which ElevenLabs narrator voice the TTS proxy uses. Default = 'sunny'.
       Unknown values fall back to default on load. Server allowlists the same keys. */
    voicePreset: 'nt_voice_preset',
  },
  _get(key, fallback, transform) {
    try {
      const raw = localStorage.getItem(this.KEYS[key]);
      return raw == null ? fallback : transform(raw);
    } catch { return fallback; }
  },
  _set(key, value) { try { localStorage.setItem(this.KEYS[key], value); } catch {} },
  _rm(key)         { try { localStorage.removeItem(this.KEYS[key]); } catch {} },

  load() {
    return {
      name:      this._get('name', '', v => String(v).slice(0, 14).replace(/[<>&"]/g, '')),
      age:       this._get('age', null, v => {
        const n = parseInt(v, 10);
        return (Number.isInteger(n) && n >= 2 && n <= 13) ? n : null;
      }),
      sidekicks: this._get('sidekicks', [], v => {
        try { return JSON.parse(v).slice(0, 3).map(s => String(s).slice(0, 14)); }
        catch { return []; }
      }),
      // v0.9.3 · b9 — Setting 2.0 migration: pre-b9 stored exact-setting keys
      // (diner / mall / zoo / football_game / etc.) are remapped to the closest
      // new flavor key. Already-flavor keys pass through. Unknown → surprise.
      setting:   this._get('setting', SETTING_FLAVOR_DEFAULT, v => migrateLegacySetting(String(v).slice(0, 32))),
      pottyMode: this._get('pottyMode', false, v => v === '1' || v === 'true'),
      storyMode: this._get('storyMode', 'bedtime', v => (v === 'anytime' ? 'anytime' : 'bedtime')),
      // v0.9.3 · b8 — validate against the client-side allowlist. Unknown values
      // (corrupted localStorage, removed preset) fall back to the default 'sunny'.
      voicePreset: this._get('voicePreset', VOICE_PRESET_DEFAULT, v => VOICE_PRESET_KEYS.includes(v) ? v : VOICE_PRESET_DEFAULT),
    };
  },
  // Each setter is a no-op when given the same value, but values must be supplied explicitly.
  saveName(v)      { v ? this._set('name', String(v).slice(0, 14).replace(/[<>&"]/g, '')) : this._rm('name'); },
  saveAge(v)       { (Number.isInteger(v) && v >= 2 && v <= 13) ? this._set('age', String(v)) : this._rm('age'); },
  saveSidekicks(a) { Array.isArray(a) && a.length ? this._set('sidekicks', JSON.stringify(a.slice(0, 3))) : this._rm('sidekicks'); },
  // v0.9.3 · b9 — only save valid flavor keys; default ('surprise') clears storage to keep it tidy.
  saveSetting(v)   {
    const safe = (typeof SETTING_FLAVOR_KEYS !== 'undefined' && SETTING_FLAVOR_KEYS.includes(v)) ? v : SETTING_FLAVOR_DEFAULT;
    if (safe === SETTING_FLAVOR_DEFAULT) this._rm('setting');
    else this._set('setting', safe);
  },
  savePotty(b)     { this._set('pottyMode', b ? '1' : '0'); },
  saveStoryMode(v) { v === 'anytime' ? this._set('storyMode', 'anytime') : this._rm('storyMode'); },
  // v0.9.3 · b8 — only accept known preset keys; 'sunny' is the default so we remove
  // the localStorage entry when it's the default (keeps localStorage clean).
  saveVoicePreset(v) {
    if (!VOICE_PRESET_KEYS.includes(v) || v === VOICE_PRESET_DEFAULT) this._rm('voicePreset');
    else this._set('voicePreset', v);
  },

  // Clear everything Profile manages. Engine flag (nt_engine_v2) and PIN (nt_pin) are intentionally
  // NOT cleared — those are device-level / parent-controlled, not child profile data.
  clear() { Object.keys(this.KEYS).forEach(k => this._rm(k)); },
};

const _initialProfile = Profile.load();
const state = {
  screen: 'welcome',         // welcome | words | story
  // welcomeStep machinery:
  //   name only       → start at 'name'
  //   name + age      → start at 'sidekicks' (skip name AND age — true returning user)
  //   name no age     → start at 'age'
  // The "← back" button walks the chain in reverse so the user can edit anything.
  welcomeStep: !_initialProfile.name ? 'name'
              : _initialProfile.age   ? 'sidekicks'
              : 'age',
  name: _initialProfile.name,
  age:  _initialProfile.age,
  teenUnlocked: false,       // never persisted — resets to false on every page load
  picks: {},                 // category => { w, e }
  rounds: [],
  roundIdx: 0,
  shufflesUsed: 0,           // v0.9.3 · b3 — Selection Joy Pass Phase 4: shuffle 🎲 button counter (max 2 per session)
  wordAdvancing: false,      // v0.9.3 · b14 — guard: prevents rapid double-tap on word cards from advancing two rounds
  speaking: false,
  story: null,               // cached buildStory() result — set once on goTo('story'), reused on rerender
  pottyMode: _initialProfile.pottyMode,
  sidekicks: _initialProfile.sidekicks, // siblings / friends — persist across sessions, max 3
  setting: _initialProfile.setting,     // story setting mode id (default "surprise")
  storyMode: _initialProfile.storyMode, // 'bedtime' | 'anytime' — v2.6.2
  voicePreset: _initialProfile.voicePreset, // 'sunny' | 'cozy' | 'adventure' | 'silly' — v0.9.3 · b8
};

// v0.9.3 · b3 — Selection Joy Pass Phase 4: shuffle 🎲 button max-uses per session.
// Tunable. 2 keeps shuffle feeling like a special move; raising to 3 would let kids
// re-roll a 3rd round but starts to dilute the "this matters" feel of the cards.
const MAX_SHUFFLES = 2;

// Wire version badge — tap to surface the What's New panel
/* v0.9.3 — versioning policy: show product version + build number in the badge.
   Engine version (ENGINE_V2_VERSION) stays out of the badge — DevTools / CHANGELOG only.
   See docs/versioning.md for the full policy. */
(function renderVersionBadge() {
  const product = typeof APP_VERSION !== 'undefined' ? APP_VERSION : '';
  const build   = typeof BUILD_NUMBER !== 'undefined' ? BUILD_NUMBER : null;
  const label   = build != null ? `${product} · b${build}` : product;
  document.getElementById('version-badge').textContent = label;
})();

/* In-app release notes — kept in sync with CHANGELOG.md.
   Showing the latest 5 entries keeps the modal scannable; full history lives on GitHub. */
const RELEASE_NOTES = [
  { v: 'v0.9.3 · b23', title: 'Absurd Word Bank + HIGH_IMPACT slots + Cheerful narrator rebrand',
    detail: 'Two coordinated content changes: (A) HIGH_IMPACT punchline slots now pull from a dedicated Absurd Word Bank so the kid\'s shouted/announced/revealed word lands funny, not flat; (B) the "Silly" narrator preset is rebranded to "Cheerful" so the label honestly describes the voice (Mimi reads as bright + warm, not high-pitched cartoon). PART A — ABSURD WORD BANK. Notion Build Idea 36813aa1-d4db-8147-84a8-eb888c5c6900 ("High-impact word slots: force funnier, more absurd choices"). Live testing flagged template lines like "shouted whatever came to mind: [WORD]" rendering as "shouted whatever came to mind: Zap" — technically correct, not funny. Root cause: the freetext example hints suggested neutral words. b23 ships ABSURD_WORD_BANK in src/content.js: 56 tier-tagged entries across 4 categories (sillySounds: glorp/blorp/squonk/fwoosh/kabloom/...; grossButSafe: stinky bananas/booger cloud/burp bubble/sneezy sandwich/...; randomObjects: cheese hat/rubber duck/underpants helmet/Captain Noodle/...; nonsenseCompound: wobble-flop/sneezy-pants/jiggly blorp/flumpy/...). tot has 15 eligible entries; little/kid/big/tween each have 30+. Tier eligibility excludes tot from grossButSafe + nonsenseCompound per design (ages 2-3 don\'t need bathroom humor primed and compound silliness is harder to grok). New absurdWordsForTier(tier, n) + absurdHintsForTier(tier) helpers. PART A — HIGH_IMPACT WIRING. New HIGH_IMPACT_ROLES = [chant, payoff_word] + HIGH_IMPACT_PICKER_CATEGORIES = [sound, freeword, freeword2] declarative constants in engine-v2.js. New applyHighImpact(round, tier) helper in index.html buildRounds(): when a freetext freeword/freeword2 round is selected, its `examples` array is replaced with 3 fresh absurd-bank hints tier-appropriate. Sound tap round (already SOUND_HOT_OPTS-sourced, already absurd by construction) gets the highImpact tag for QA-side verification. Kid escape-hatch freetext also wrapped. Static FREE_TEXT_ROUNDS arrays in src/content.js stay untouched — verride). HONEST CALLOUT (deferred): tot/little v3 blueprints have no chant/payoff_word roles — they use protagonist/ally/wonder_object only. So tot/little kids see absurd hints in the picker but their picked word doesn\'t land in a [y:...] punchline. Adding HIGH_IMPACT slots to tot/little blueprints is a candidate follow-up build. ACCEPTANCE: scripts/qa-current.js all 24 gates green; Section 14 voice resolver 21/21 (celebrity blocklist clean on "Cheerful"); Section 17 HIGH_IMPACT audit 18/18; node --check on src/content.js + api/tts.js + src/engine-v2.js + scripts/qa-current.js — clean. Sample stories across all 5 tiers eyeballed + approved by John before merge. APP_VERSION stays v0.9.3; BUILD_NUMBER 22 → 23; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b23.' },
  { v: 'v0.9.3 · b22', title: 'Voice cache versioning + signature observability + same-voice collapse detection — fixes "all previews are George" at the cache layer',
    detail: 'Production-blocking defect. Parents report all 4 voice preview buttons play the same male British narrator (George). The resolver chain has been fixed 4 times since b8 (b16/b17/b18/b20) and Section 14 has been 14/14 green every time — but the bug kept recurring. ROOT CAUSE: stale IndexedDB preview blobs. The b8-b21 preview cache key was unversioned (`preview:sunny`, `preview:cozy`, etc.) so any user who EVER previewed during a deploy where production env vars collapsed all 4 presets to George has 4 IndexedDB entries containing George audio. Every subsequent tap returns CACHE HIT → replays George → never reaches the fixed resolver. Section 14 tests resolveVoice as a pure function with mock env; the cache layer is browser-side and was untested. FIX (4 parts): (1) VOICE_CACHE_VERSION constant in src/content.js (currently `v2`). New cache keys: `preview:v2:<preset>` + `v2:<preset>|<sha>`. Bumping this constant orphans pre-b22 blobs without forcing users to manually clear browser storage; orphans get GC\'d by the browser\'s IndexedDB quota policy. (2) /api/tts JSON response now carries voicePreset, voiceSource, voiceConfigVersion, and voiceSignature (first 8 hex chars of SHA-256(voiceId) — irreversible fingerprint). Lets DevTools verify 4 distinct voices without manual audio A/B. Raw ElevenLabs voice IDs stay server-side. (3) detectVoiceCollapse(env) helper in api/tts.js: runs resolveVoice for all 4 presets, returns collision groups. Per-request console.warn fires when any 2+ presets share a voiceSignature, naming the specific preset keys. Catches the b16 production failure mode (operator pointed all 4 env vars at George) at request time. (4) window.qaVoicePreviews() browser dev helper: fetches metadata for all 4 previews, prints a console.table with preset/cacheKey/cacheHit/voiceSignature, flags any signature collisions. Uses cache-aware probePreviewMeta that returns from cache when meta is present, otherwise hits /api/tts. Doesn\'t auto-play audio. NEW QA:   { v: 'v0.9.3 · b21', title: 'Rainbow decoration no longer clips the welcome-back lede — moved to empty top-center band',
    detail: 'Tiny CSS hotfix. User screenshot on iPhone (welcome-back substep) showed the decorative 🌈 emoji clipping the leading "s" of the lede paragraph "still age 6? Same crew? Add or remove anyone." Root cause: `.deco--2 { top: 18%; left: 10%; }` from b12 anchored the rainbow inside the lede-text band on most viewport sizes. b12 had moved it from `left: 6%` to `left: 10%` to fix a left-edge clipping issue during the float-rotate animation, but didn\'t consider the vertical overlap with the lede paragraph below the heading. FIX: moved rainbow to `top: 5%; right: 38%`. Now sits in the empty top-center band between the brand mark (top-left) and the back/gear buttons (top-right). Anchoring from `right` instead of `left` ensures the position tracks consistently across phone widths (320 / 375 / 430 px) instead of drifting toward the brand mark on narrow viewports. Verified visually clear of all text + buttons across iPhone SE / iPhone / iPhone Pro Max. NO ENGINE / PICKER / STORY-DATA / VOICE CHANGES. ACCEPTANCE: scripts/qa-current.js all 24 gates green (asset position is non-functional from the engine\'s perspective). APP_VERSION stays v0.9.3; BUILD_NUMBER 20 → 21; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b21.' },
  { v: 'v0.9.3 · b20', title: 'Narrator labels simplified (no more "American"/"British") + Silly override-required + Section 10 measures V3 + structural kid 6→5 paragraphs',
    detail: 'Combined voice/UI cleanup + QA accuracy fix + first structural story-length pass. PART A — NARRATOR UI LABELS: user feedback after b16/b18 said accent/geography labels ("Sunny American" / "Storybook British" / "Adventure American" / "Silly Cartoon") felt off for a kid app, and the foreign-accented Mimi (b18 Silly default) made the "Silly Cartoon" label read as confusing rather than playful. New labels describe PERFORMANCE STYLE only: Sunny (Warm, clear, everyday reader), Storybook (Classic bedtime narrator), Adventure (Bold, energetic, exciting), Silly (High-pitched, goofy, extra expressive). previewText updated to match. Preset keys (sunny/cozy/adventure/silly) unchanged — saved nt_voice_preset + IndexedDB cache survive. PART B — SILLY OVERRIDE-REQUIRED: two stock-voice attempts at Silly have now failed in user testing (b17 Gigi too calm-American; b18 Mimi foreign/Australian-accented). Claude has no audio playback — every stock candidate is metadata-only, same blind-pick category that produced Gigi + Mimi. Rather than gamble a third blind pick, b20 documents that operators MUST set ELEVENLABS_VOICE_SILLY in Vercel to a custom high-pitched cartoon voice (ElevenLabs Voice Library find — "cartoon" / "kids" / "high pitch" / "character" — or a cloned voice) for the intended Silly performance. Mimi stays as the hardcoded backstop so the app doesn\'t 500 if the env var is unset. A new per-request console.warn fires every time Silly resolves on the Mimi backstop, surfacing the recommendation in Vercel logs. README + api/tts.js header + the silly defaultId comment all list the rejected candidates so future builds don\'t re-try them blindly. PART C — SECTION 10 FIXED: scripts/qa-current.js Section 10 measured generateStoryV2 directly, but buildStory() routes V3 first for ALL ages since v3.0.0 — the old advisory numbers described a fallback engine real users never hit. b20 splits Section 10: V3 PRIMARY (the production-default engine — what real users hit) + V2 SECONDARY (labeled diagnostic). PART D — STRUCTURAL KID 6→5: b18\'s flourish-trim pass dropped tot/little median 19→15 / 18→14 (-22%) but barely moved kid (27→26, -4%). Further density wins required a structural change. b20 adds skipStagesForKid to each kid+big+tween blueprint so kid drops one stage per blueprint (lost_snack_v3 drops "attempt" — keeps ally-twist; goal_spine_v3 / show_wrong_v3 / rule_loophole_v3 drop "escalation" — keep "attempt" which IS the kid-agency beat). New resolveStagesForTier logic in generateStoryV3. Section 3 paragraph-count gate split tier-aware: 5 for kid, 6 for big+tween. RESULTS (V3 default engine, 120 stories/tier): kid median 27 → 23 (-15%). Tot/little/big/tween unchanged. Kid p90 31 → 28; kid max 37 → 33. Still 3x over the defect-proposed 7-8 cap; per-beat density pass for the remaining 5 kid stages queued for b21. ACCEPTANCE: scripts/qa-current.js 24 gates green (Section 3 split). Section 14 voice 14/14, Section 16 preview 12/12. Inline <script> syntax clean. APP_VERSION stays v0.9.3; BUILD_NUMBER 19 → 20; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b20. NOTE: spec asked for b19 but b19 was already taken by the favicon stale-cache hardening fix shipped earlier today (PR #30 → main 5402fcd); shipped as b20 instead.' },
  { v: 'v0.9.3 · b19', title: 'Favicon stale-cache hardening — root /favicon.ico + absolute icon paths so the BN4c mark survives Chrome\'s favicon cache',
    detail: 'Small hardening fix triggered by a real-Chrome-on-Mac screenshot: tab + bookmark bar still showed a pre-b5 stale favicon despite the deployed asset being correct BN4c. Diagnosis: (a) the deployed `noddytales.app/public/brand/favicon.svg` IS the correct BN4c orange book mark (byte-identical to repo, md5 585527ce...), (b) the bug is Chrome\'s history + bookmark icon cache holding a pre-b5 snapshot, (c) two server-side factors made it worse than necessary: (1) `noddytales.app/favicon.ico` was returning 404 — Chrome ALWAYS probes /favicon.ico regardless of <link rel="icon"> tags, and when it 404s Chrome\'s bookmark icon cache stays pinned to its last successful indexing; (2) the index.html link tags used RELATIVE hrefs (`public/brand/favicon.svg`) which Chrome\'s favicon re-indexer treats as less authoritative than absolute paths after a brand swap. FIX (3 changes, all under 10 lines): (1) NEW root file `/favicon.ico` (copy of public/brand/favicon-32.png — PNG-as-ICO is universally accepted by Chrome/Firefox/Safari/Edge for the favicon probe; macOS lacks ImageMagick so we used the existing 32×32 PNG as the artwork). (2) All 6 icon <link> tags in index.html switched from relative `public/brand/...` to absolute `/public/brand/...` paths. (3) Added `<link rel="shortcut icon" href="/favicon.ico">` for the legacy / Chrome-classic favicon channel + sized="any" on the primary icon link. Also opportunistically fixed the og:image meta + renderLogo() src to use absolute paths (same root-cause class). DOES NOT clear an individual user\'s existing stale Chrome cache — Chrome\'s local favicon DB has its own TTL — but stops the bug class for any NEW visitor or any returning visitor who triggers a force-reload / re-bookmark. ACCEPTANCE: `curl -sI https://noddytales.app/favicon.ico` returns 200 + image/png after deploy. scripts/qa-current.js all 23 gates green (asset move + HTML head edits are non-functional from the engine\'s perspective). APP_VERSION stays v0.9.3; BUILD_NUMBER 18 → 19; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b19.' },
  { v: 'v0.9.3 · b18', title: 'Silly Cartoon distinctiveness fix + voice-docs cleanup + first story-length pass (tot/little −22%)',
    detail: 'Two-part build: (A) voice fidelity + docs and (B) first scoped story-length pass for ages 2-7. PART A — SILLY CARTOON DISTINCTIVENESS: production user feedback after b17 — "Silly Cartoon still sounds too similar to another voice." Root cause: the b17 default for the silly preset (Gigi, jBpfuIE2acCO8z3wKNLl) is labeled "American childish character" but its timbre reads too close to Rachel (the Sunny default — also American female, calm) when parents A/B-compare the 4 previews back-to-back. Fix: swapped the silly defaultId to Mimi (zrHiDhphv9ZnVXBqCLjz), an ElevenLabs first-party stock voice explicitly labeled "childish character" with a noticeably higher pitch and Swedish-tinged cadence — markedly more cartoon-feeling than Gigi. Tuned silly voice_settings for max playful expressiveness: stability 0.55 → 0.40, similarity_boost 0.80 → 0.75, style 0.70 → 0.85. Label "Silly Cartoon" unchanged so saved nt_voice_preset + IndexedDB cache (preview:silly + silly|<sha256>) survive across the swap. Tagline updated "Goofy, bouncy, kid-favorite" → "High-pitched, goofy, completely ridiculous". previewText "I make stories sound ridiculous." → "I make stories sound completely ridiculous!" so the contrast with the three steadier voices is obvious in the 1-second preview clip. Operator can still override via ELEVENLABS_VOICE_SILLY if Mimi is not silly enough — Vercel env var beats the hardcoded default. PART A — VOICE DOCS CLEANUP: api/tts.js header still described preset-without-env-var as "falls back to ELEVENLABS_VOICE_ID" — that stopped being true at b17 when per-preset defaultIds shipped. Rewrote the header to accurately describe the b17/b18 priority chain (envPerPreset → hardcodedPerPreset → envUniversal → hardcodedFinal). Fallback console.warn copy updated so it no longer suggests setting the per-preset env var is required for distinctness — the legacy chain firing now signals a code bug (missing defaultId) not an operator misconfig. README narrator-lineup table + Setup checklist updated: per-preset env vars are documented as OPTIONAL operator overrides; only ELEVENLABS_API_KEY is required for TTS to work at all (since b17). PART B — FIRST STORY-LENGTH PASS (ages 2-7 priority): defect "Stories too long globally" has been open since the v2.10.2 advisory metric landed. b17 baseline showed v3 medians of tot 19, little 18, kid 27 sentences vs defect-proposed caps of 3-4 / 5-6 / 7-8. b18 starts a conservative trimming pass — 30 surgical edits across the v3 beat library, all targeting trailing flourishes that don\'t carry tokens or selected words. 13 tot beat lines + 13 little beat lines + 4 kid beat lines. Cuts: "Yay!", "Big day!", "Adventure unlocked.", "Treasure confirmed.", "Goodnight.", "Case closed.", "Mostly.", etc. — token-free closers. Protected: every {protagonist}/{ally}/{wonder_object}/{setting}/{mcguffin} token, every call-response and parallel-structure cozy pattern, every punchline beat, and every sentence containing a user-picked word. RESULTS (120 stories/tier/engine snapshot): V3 tot median 19 → 15 (-22%), V3 little 18 → 14 (-22%), V3 kid 27 → 26 (-4%), big 27 → 26 (-4%), tween 26 → 26 (0). Tot/little p90 dropped 20→17 and 19→15 respectively. Tot p90 is still inflated by the call-response + parallel-end beats which intentionally keep their full repetition — those reads ARE the cozy pattern for ages 2-3. Going lower on tot/little requires either dropping a paragraph (breaks Section 3b 4-paragraph gate) or cutting the cozy repetition (breaks the design intent). Going lower on kid requires a structural change — a per-tier paragraph-count override so kid drops to 5 stages while big/tween keep 6 — which requires updating Section 3\'s 6-paragraph gate to be tier-aware. Both queued for b19. NEW DEV HELPER: scripts/sentence-count-snapshot.js outputs the V3+V2 × 5-tier median/p90/max matrix so the next pass has a reproducible baseline. ACCEPTANCE: scripts/qa-current.js all 23 gates green. Section 14 narrator voice selector unit tests still 14/14 green (silly defaultId + voice_settings literals shifted; chain contract held). Section 3 (kid/big/tween 6-paragraph) + Section 3b (tot/little 4-paragraph) unaffected — only beat-line text changed. APP_VERSION stays v0.9.3; BUILD_NUMBER 17 → 18; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b18. NO NEW VERCEL ENV VARS REQUIRED — Mimi ships as the hardcoded silly default; ELEVENLABS_VOICE_SILLY remains an optional override.' },
  { v: 'v0.9.3 · b17', title: 'Voice previews now genuinely distinct out-of-the-box — hardcoded per-preset stock voice IDs',
    detail: 'Direct fix for the user-reported "all previews sound like the same British voice" issue. b16 made the identical-previews trap visible via server console.warn but did not actually fix it — production has ELEVENLABS_VOICE_ID set to George (the British narrator) and no per-preset env vars, so every preset still resolved to George. b17 ships 4 curated ElevenLabs first-party stock voice IDs as per-preset hardcoded `defaultId` values in api/tts.js, and reorders the resolveVoice priority chain so per-preset hardcoded defaults BEAT ELEVENLABS_VOICE_ID. NEW PRIORITY: (1) env[cfg.envVar] per-preset operator override, (2) cfg.defaultId per-preset hardcoded curated voice (NEW), (3) env.ELEVENLABS_VOICE_ID legacy universal fallback, (4) JBFqnCBsd6RMkjVDRZzb final backstop. CURATED DEFAULTS (all ElevenLabs first-party stock voices — NOT celebrity or real-person impersonations): sunny → Rachel 21m00Tcm4TlvDq8ikWAM (American female, calm narration); cozy → George JBFqnCBsd6RMkjVDRZzb (British male, mature narrative — the canonical bedtime narrator); adventure → Antoni ErXwobaYiN019PkySvjV (American male, well-rounded, expressive); silly → Gigi jBpfuIE2acCO8z3wKNLl (American female, childish character voice). 2 female + 2 male, 1 British + 3 American, maximally distinct timbres so previews sound genuinely different. Operator can still override any preset via the existing ELEVENLABS_VOICE_<PRESET> env vars; hardcoded defaults only fill in when the env var is unset. ELEVENLABS_VOICE_ID becomes effectively unreachable for the 4 known presets (still in the chain for safety / future presets that might lack a hardcoded default). QA Section 14 updated: case 2 now asserts "cozy with no per-preset env → uses cozy hardcoded George (not the mocked ELEVENLABS_VOICE_ID)" + new case asserts "no env vars set → 4 presets STILL resolve to 4 distinct voice IDs via hardcodedPerPreset source". Section 14 went 13 → 14 cases (all pass). README updated to reflect the new behavior: env vars are now strictly OPTIONAL (operator override) rather than required for distinct voices. ACCEPTANCE: scripts/qa-current.js all 23 gates green. APP_VERSION stays v0.9.3; BUILD_NUMBER 16 → 17; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b17. ZERO REMAINING MANUAL STEPS — first deploy will produce 4 distinct preview voices automatically.' },
  { v: 'v0.9.3 · b16', title: 'Narrator voice lineup refresh — 1 British + 3 American; identical-previews trap now logged',
    detail: 'Refreshes the b8 narrator selector with clearer labels + a configuration safety net. LINEUP: sunny → "Sunny American" (warm, clear, everyday read-aloud); cozy → "Storybook British" (classic storybook narrator — the lone British voice); adventure → "Adventure American" (energetic + expressive); silly → "Silly Cartoon" (goofy, bouncy, kid-favorite). Same 4 preset keys so saved nt_voice_preset + IndexedDB cache (story `<preset>|<sha256>` + preview `preview:<preset>`) survive across the rename. Same 4 env var names. CONFIGURATION TRAP FIXED: the b8 MVP shipped with all 4 preset env vars optional, each falling back to ELEVENLABS_VOICE_ID. If the operator never provisioned distinct ElevenLabs voice IDs (which had not happened in production through b15), all 4 previews would sound identical to a parent — worse than offering one voice transparently. Two fixes in this release: (1) api/tts.js now emits a console.warn per request when a preset falls back, so the misconfig is visible in Vercel logs; (2) QA Section 14 adds 3 new tests: production-like env with 4 distinct preset env vars MUST resolve to 4 distinct voice IDs; missing preset env vars MUST flag usedFallback=true on every preset (detectable from server logs); voice labels + taglines + previewText scanned against a celebrity / licensed-character / real-person blocklist (Disney, Pixar, Sesame, Elmo, Mickey, Elsa, public figures like Morgan Freeman / David Attenborough / James Earl Jones, etc.) and confirmed clean. NO ENGINE / PICKER / STORY-DATA CHANGES. README updated with a 6-step Vercel setup checklist + an "Identical-previews diagnostic" section that names the failure mode + how to fix it. ACCEPTANCE: scripts/qa-current.js all 23 gates green; Section 14 went 10 → 13 cases (all pass). APP_VERSION stays v0.9.3; BUILD_NUMBER 15 → 16; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b16. REMAINING MANUAL STEP: operator must paste four distinct ElevenLabs voice IDs into Vercel env vars (ELEVENLABS_VOICE_SUNNY / COZY / ADVENTURE / SILLY) for the lineup to sound genuinely distinct in production. Until then, server logs will show the fallback warnings on every TTS request and all 4 previews will use the same underlying voice with different stability/style tunings.' },
  { v: 'v0.9.3 · b15', title: 'Picker Library Polish — image/word matching + replay variety; v2 fallback now respects new picker words',
