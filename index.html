<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NoddyTales — Silly Stories Just For You</title>

<!-- Brand icons -->
<link rel="icon" href="public/brand/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="48x48" href="public/brand/favicon-48.png">
<link rel="icon" type="image/png" sizes="32x32" href="public/brand/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="public/brand/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="public/brand/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NoddyTales">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#A8D5A2">
<meta property="og:image" content="public/brand/banner-og.svg">
<meta property="og:title" content="NoddyTales — Silly Stories Just For You">
<meta property="og:description" content="Make a silly personalised story in under 2 minutes.">

<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:        #A8D5A2;
    --sage-dark:   #7CB876;
    --orange:      #F4A261;
    --orange-dark: #E08A45;
    --cream:       #FFF8EE;
    --cream-deep:  #FDEFD4;
    --yellow:      #FFD166;
    --yellow-dark: #F2B838;
    --ink:         #3D3528;
    --ink-soft:    #6B5E48;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    background: var(--sage);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.45) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,209,102,0.35) 0, transparent 42%),
      radial-gradient(circle at 50% 50%, rgba(168,213,162,1) 0, var(--sage) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .app {
    position: relative;
    width: 100%;
    max-width: 440px;
    height: 100vh;
    min-height: 600px;
    background: var(--sage);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 480px) {
    body { padding: 24px; }
    .app {
      height: min(900px, calc(100vh - 48px));
      border-radius: 44px;
      box-shadow:
        0 30px 60px rgba(61,53,40,0.25),
        0 0 0 12px rgba(255,255,255,0.6),
        0 0 0 14px rgba(61,53,40,0.08);
    }
  }

  /* ---- Screens ---- */
  .screen-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 32px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    transition: transform 0.55s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.4s ease;
    background: var(--sage);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.45) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,209,102,0.35) 0, transparent 42%);
  }
  .screen.is-hidden  { transform: translateX(110%);  opacity: 0; pointer-events: none; }
  .screen.is-exiting { transform: translateX(-12%);  opacity: 0; pointer-events: none; }

  .screen--cream {
    background: var(--cream);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(244,162,97,0.12) 0, transparent 32%),
      radial-gradient(circle at 92% 88%, rgba(168,213,162,0.18) 0, transparent 36%);
  }

  /* ---- Type ---- */
  h1, h2, h3 { font-family: 'Fredoka', sans-serif; font-weight: 600; margin: 0; }
  .display {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-wrap: balance;
  }
  .display--mega { font-size: 48px; }
  .lede { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 18px; color: var(--ink-soft); }

  /* ---- Logo ---- */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--yellow);
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 22px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08), 0 4px 0 var(--yellow-dark);
  }

  /* ---- Buttons ---- */
  .btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    border: none;
    cursor: pointer;
    background: var(--orange);
    color: white;
    border-radius: 28px;
    padding: 20px 28px;
    min-height: 68px;
    width: 100%;
    box-shadow: 0 6px 0 var(--orange-dark), 0 10px 20px rgba(224,138,69,0.25);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    letter-spacing: 0.2px;
  }
  .btn:active:not(:disabled) {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--orange-dark), 0 4px 10px rgba(224,138,69,0.25);
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn--yellow {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.25);
  }
  .btn--yellow:active:not(:disabled) {
    box-shadow: 0 2px 0 var(--yellow-dark), 0 4px 10px rgba(242,184,56,0.25);
  }
  .btn--ghost {
    background: white;
    color: var(--ink);
    box-shadow: 0 6px 0 rgba(61,53,40,0.12), 0 10px 20px rgba(0,0,0,0.06);
  }
  .btn--ghost:active:not(:disabled) {
    box-shadow: 0 2px 0 rgba(61,53,40,0.12), 0 4px 10px rgba(0,0,0,0.06);
  }
  .btn--small { font-size: 17px; padding: 14px 20px; min-height: 52px; border-radius: 22px; }

  /* ---- Name input ---- */
  .name-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 34px;
    text-align: center;
    background: var(--cream);
    border: 4px solid white;
    border-radius: 28px;
    padding: 22px 16px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 6px 0 rgba(61,53,40,0.08), inset 0 2px 4px rgba(0,0,0,0.04);
    letter-spacing: 1px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .name-input::placeholder { color: rgba(107,94,72,0.4); font-weight: 600; }
  .name-input:focus { border-color: var(--yellow); transform: translateY(-2px); }

  /* ---- Age grid ----
     v2.1.1 — tiles shortened from aspect-ratio 1 to 1.18 and gap tightened from 12 to 10px.
     On smaller mobile viewports the 4-row × 3-col square grid was pushing the Next button
     below the fold. Total vertical saved: ~75px, button now visible without scroll. Tiles
     still read as large, friendly chunks; tap targets remain comfortable. */
  .age-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .age-tile {
    aspect-ratio: 1.18;
    border: none;
    border-radius: 24px;
    background: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 34px;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 0 rgba(61,53,40,0.10), 0 10px 20px rgba(0,0,0,0.05);
    transition: transform 0.15s ease, background 0.2s, color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .age-tile::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 16px;
    background: var(--tile-accent, var(--cream-deep));
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .age-tile > span { position: relative; z-index: 1; }
  .age-tile:active { transform: translateY(3px) scale(0.97); }
  .age-tile.is-selected {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.35);
    transform: translateY(-2px) rotate(-2deg);
  }
  .age-tile.is-selected::before { background: white; opacity: 0.35; }
  .age-tile.is-locked { opacity: 0.8; }
  .tile-lock {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 13px;
    z-index: 2;
    opacity: 0.7;
  }

  /* v2.1.0 — Setting tiles (Story Setting Modes). Reuses age-tile chassis but adds
     emoji + label + short note layout instead of just a number. 3-up grid. */
  .setting-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .setting-tile {
    aspect-ratio: 1;
    border: none;
    border-radius: 24px;
    background: white;
    font-family: 'Fredoka', sans-serif;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    box-shadow: 0 6px 0 rgba(61,53,40,0.10), 0 10px 20px rgba(0,0,0,0.05);
    transition: transform 0.15s ease, background 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .setting-tile::before {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 18px;
    background: var(--cream-deep);
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .setting-tile > * { position: relative; z-index: 1; }
  .setting-tile .setting-emoji {
    font-size: 30px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .setting-tile .setting-label {
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    line-height: 1.15;
  }
  .setting-tile:active { transform: translateY(3px) scale(0.97); }
  .setting-tile.is-selected {
    background: var(--yellow);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.35);
    transform: translateY(-2px) rotate(-1.5deg);
  }
  .setting-tile.is-selected::before { background: white; opacity: 0.4; }
  .setting-note {
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 8px;
    min-height: 18px;
  }

  /* Potty mode toggle (age-select screen) */
  .potty-toggle {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 16px;
    background: rgba(255,255,255,0.55);
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .potty-toggle:active { background: rgba(255,255,255,0.7); }
  .potty-toggle input { position: absolute; opacity: 0; pointer-events: none; }
  .potty-track {
    flex-shrink: 0;
    width: 46px; height: 26px;
    background: rgba(61,53,40,0.18);
    border-radius: 13px;
    position: relative;
    transition: background 0.2s;
  }
  .potty-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 4px rgba(61,53,40,0.25);
    transition: transform 0.2s cubic-bezier(0.4, 1.5, 0.6, 1);
  }
  .potty-toggle input:checked ~ .potty-track { background: var(--orange); }
  .potty-toggle input:checked ~ .potty-track .potty-thumb { transform: translateX(20px); }
  .potty-label {
    font-size: 15px; font-weight: 700; color: var(--ink);
    line-height: 1.2;
  }
  .potty-hint {
    display: block;
    font-size: 12px; font-weight: 600; color: var(--ink-soft);
    margin-top: 2px;
  }

  /* Sidekick step — friends/siblings picker */
  .sidekick-input-row {
    display: flex; gap: 10px; align-items: stretch;
  }
  .sidekick-input {
    flex: 1;
    font-family: 'Fredoka', sans-serif;
    font-size: 18px; font-weight: 500;
    padding: 14px 18px;
    border-radius: 18px;
    border: 3px solid rgba(61,53,40,0.12);
    background: white;
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .sidekick-input:focus { border-color: var(--orange); }
  .sidekick-input:disabled { opacity: 0.5; }
  .sidekick-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 48px;
    padding: 12px;
    background: rgba(255,255,255,0.45);
    border-radius: 14px;
  }
  .sidekick-empty {
    width: 100%; text-align: center;
    font-size: 14px; color: var(--ink-soft);
    font-style: italic;
    padding: 6px 0;
  }
  .sidekick-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 6px 6px 6px 14px;
    border-radius: 999px;
    box-shadow: 0 2px 4px rgba(61,53,40,0.12);
  }
  .sidekick-chip-x {
    width: 22px; height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    color: white;
    font-size: 16px; font-weight: 700;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .sidekick-chip-x:hover { background: rgba(255,255,255,0.6); }

  /* PIN modal overlay */
  .pin-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pin-modal {
    background: var(--cream);
    border-radius: 28px;
    padding: 32px 24px 28px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 24px 48px rgba(61,53,40,0.28);
  }
  .pin-modal h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--ink);
  }
  .pin-modal p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    line-height: 1.5;
  }
  .pin-input {
    width: 100%;
    font-size: 28px;
    font-family: 'Fredoka', sans-serif;
    text-align: center;
    letter-spacing: 10px;
    border: 3px solid var(--cream-deep);
    border-radius: 16px;
    padding: 10px 12px;
    background: white;
    color: var(--ink);
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .pin-input:focus { border-color: var(--orange); }
  .pin-error { color: #d04040; font-size: 13px; min-height: 18px; margin-bottom: 10px; }
  .pin-actions { display: flex; gap: 10px; }
  .pin-actions .btn { flex: 1; }

  /* Version badge — tap to open the What's New panel */
  #version-badge {
    position: absolute;
    bottom: 7px;
    /* v1.18.3: nudged left from 12px → 24px so the badge clears the
       corner cutoff on small mobile devices (notch + rounded corners). */
    right: 24px;
    font-size: 10px;
    color: rgba(61,53,40,0.28);
    font-family: 'Nunito', sans-serif;
    z-index: 50;
    letter-spacing: 0.4px;
    user-select: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #version-badge:hover { color: rgba(61,53,40,0.6); background: rgba(255,255,255,0.4); }

  /* v2.2.1 — Parent Settings gear: relocated from bottom-left to TOP-RIGHT header position.
     Larger (44x44 min tap target), high-contrast circular button so parents can find it.
     iOS safe-area aware: `top` uses env(safe-area-inset-top) so it clears the notch. */
  #settings-gear {
    position: absolute;
    /* v2.2.2 — top-aligned with the back button. The .screen has padding-top: 28px and the
       back button (.pill, ~36px tall) sits at that y. The gear (44px tall) is anchored 4px
       lower so its visual center matches the pill's. Safe-area math keeps it clear of the
       iPhone notch when it applies. */
    top: max(28px, calc(env(safe-area-inset-top, 0px) + 22px));
    right: max(14px, calc(env(safe-area-inset-right, 0px) + 14px));
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.85);
    color: var(--ink);
    border: none;
    border-radius: 50%;
    z-index: 80;
    font-size: 22px;
    line-height: 1;
    font-family: 'Fredoka', sans-serif;
    user-select: none;
    cursor: pointer;
    padding: 0;
    box-shadow: 0 4px 0 rgba(61,53,40,0.10), 0 6px 14px rgba(0,0,0,0.08);
    transition: background 0.15s, color 0.15s, transform 0.2s, box-shadow 0.15s;
  }
  #settings-gear:hover  { background: var(--yellow); color: var(--ink); }
  #settings-gear:active { transform: rotate(60deg) scale(0.95); box-shadow: 0 2px 0 rgba(61,53,40,0.12); }

  /* Parent settings overlay — same chassis as the What's New panel for visual consistency. */
  .settings-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .settings-card {
    background: var(--cream);
    border-radius: 24px;
    padding: 24px;
    max-width: 380px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    -webkit-overflow-scrolling: touch;
  }
  .settings-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .settings-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  .settings-section {
    margin-bottom: 18px;
  }
  .settings-section-label {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--ink);
  }
  .settings-row .label { font-weight: 600; }
  .settings-row .value { color: var(--ink-soft); }
  .settings-disabled {
    opacity: 0.4;
    pointer-events: none;
  }
  .settings-tag {
    font-size: 10px;
    background: rgba(61,53,40,0.1);
    color: var(--ink-soft);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .settings-btn-danger {
    width: 100%;
    background: rgba(229, 90, 90, 0.12);
    color: #B33A3A;
    border: 1px solid rgba(229, 90, 90, 0.35);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .settings-btn-danger:hover { background: rgba(229, 90, 90, 0.2); }
  .settings-footnote {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 14px;
    line-height: 1.4;
  }

  /* What's New overlay */
  .whatsnew-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease-out;
  }
  .whatsnew-card {
    background: var(--cream);
    border-radius: 24px;
    max-width: 380px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    padding: 24px 24px 20px;
    box-shadow: 0 20px 60px rgba(61,53,40,0.35);
  }
  .whatsnew-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .whatsnew-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--ink);
    margin: 0;
  }
  .whatsnew-close {
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    background: rgba(61,53,40,0.1);
    color: var(--ink);
    font-size: 18px; font-weight: 700;
    cursor: pointer;
    line-height: 1;
  }
  .whatsnew-entry { margin-bottom: 18px; }
  .whatsnew-entry:last-child { margin-bottom: 0; }
  .whatsnew-version {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--orange-dark);
    margin-bottom: 4px;
  }
  .whatsnew-summary {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; color: var(--ink);
    line-height: 1.5;
    margin: 0 0 6px 0;
    font-weight: 600;
  }
  .whatsnew-detail {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.45;
    margin: 0;
  }
  .whatsnew-link {
    display: inline-block;
    font-size: 12px; color: var(--ink-soft);
    text-decoration: none;
    border-top: 1px solid rgba(61,53,40,0.1);
    padding-top: 12px;
    margin-top: 12px;
    width: 100%;
    text-align: center;
  }
  .whatsnew-link:hover { color: var(--orange-dark); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ---- Word cards ---- */
  .pair-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1;
    max-height: 480px;
  }
  .word-card {
    border: none;
    border-radius: 32px;
    background: var(--orange);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px 12px;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--orange-dark), 0 16px 32px rgba(224,138,69,0.3);
    position: relative;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s;
    animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .word-card:nth-child(2) {
    animation-delay: 0.1s;
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 8px 0 var(--yellow-dark), 0 16px 32px rgba(242,184,56,0.3);
  }
  .word-card::before {
    content: "";
    position: absolute;
    top: -30%; left: -30%;
    width: 160%; height: 60%;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    pointer-events: none;
  }
  .word-card.is-bouncing { animation: cardBounce 1.4s ease-in-out infinite; }
  .word-card:nth-child(2).is-bouncing { animation-delay: 0.2s; }
  .word-card:active { transform: translateY(4px) scale(0.97); }
  .word-card.is-picked { animation: pickedPop 0.5s ease-out forwards; }
  .word-card.is-faded { opacity: 0.3; transform: scale(0.92); }

  .word-emoji { font-size: 72px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
  .word-emoji--sm { font-size: 56px; opacity: 0.85; }
  .word-text { font-size: 28px; line-height: 1; text-align: center; letter-spacing: 0.3px; }
  .word-text--lg { font-size: 32px; }
  .word-text--sm { font-size: 22px; }

  @keyframes cardEnter {
    from { transform: translateY(40px) scale(0.85); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes cardBounce {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%       { transform: translateY(-8px) rotate(1deg); }
  }
  @keyframes pickedPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12) rotate(-3deg); }
    100% { transform: scale(1.05) rotate(0); }
  }

  /* ---- Free-text round ---- */
  .freetext-wrap {
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex: 1;
    animation: cardEnter 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }
  .freetext-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 36px;
    text-align: center;
    background: white;
    border: 4px solid rgba(255,255,255,0.6);
    border-radius: 28px;
    padding: 24px 16px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 8px 0 rgba(61,53,40,0.08), inset 0 2px 4px rgba(0,0,0,0.03);

  }
  .freetext-input::placeholder { color: rgba(107,94,72,0.35); font-size: 28px; }
  .freetext-input:focus { border-color: var(--yellow); transform: translateY(-2px); }
  .freetext-hints {
    display: flex;
    align-items: center;
    justify-content: center;

  }
  .hint-label {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    opacity: 0.7;
    letter-spacing: 0.3px;
  }
  .hint-chip {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    background: rgba(255,255,255,0.55);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    border: none;
    transition: background 0.15s, transform 0.12s;
    box-shadow: 0 2px 0 rgba(61,53,40,0.08);
  }
  .hint-chip:active { transform: translateY(2px); }
  .hint-chip:hover { background: rgba(255,255,255,0.8); }

  /* ---- Progress dots ---- */
  .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .progress-dot {
    height: 10px;
    flex: 1;
    border-radius: 5px;

    transition: background 0.4s, transform 0.4s;
  }
  .progress-dot.is-done    { background: var(--yellow); }
  .progress-dot.is-current { background: white; transform: scaleY(1.6); }

  /* ---- Story screen ---- */
  .story-stack { display: flex; flex-direction: column; flex: 1; gap: 18px; position: relative; z-index: 1; }
  .story-paper {
    background: white;
    border-radius: 32px;
    padding: 28px 24px;
    flex: 1;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(61,53,40,0.10), inset 0 0 0 4px var(--cream-deep);
    background-image:
      linear-gradient(white 0 100%),
      repeating-linear-gradient(to bottom, transparent 0 35px, rgba(244,162,97,0.08) 35px 36px);
    background-blend-mode: normal, normal;
  }
  .story-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.1;
    margin: 0 0 16px 0;
    color: var(--ink);
    text-wrap: balance;
  }
  .story-body {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.55;
    color: var(--ink);
    margin: 0;
    text-wrap: pretty;
  }
  .story-body p { margin: 0 0 14px 0; }
  .story-body .pop          { color: var(--orange-dark); font-family: 'Fredoka', sans-serif; font-weight: 600; }
  .story-body .pop--yellow  { background: var(--yellow); color: var(--ink); padding: 0 8px; border-radius: 8px; font-family: 'Fredoka', sans-serif; font-weight: 600; }
  .story-body .pop--name    { color: var(--orange-dark); font-family: 'Fredoka', sans-serif; font-weight: 700; }
  /* Karaoke word highlighting — visible "this is the word being read" indicator with bounce. */
  .kw {
    display: inline-block;
    border-radius: 5px;
    padding: 0 4px;
    margin: 0 -2px;
    transition: background 0.12s ease, color 0.12s ease, box-shadow 0.18s ease;
  }
  .kw.is-lit {
    background: var(--orange);
    color: white;
    font-weight: 800;
    box-shadow: 0 3px 10px rgba(244, 162, 97, 0.55);
    animation: kwBounce 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes kwBounce {
    0%   { transform: scale(1)    translateY(0); }
    45%  { transform: scale(1.14) translateY(-2px); }
    100% { transform: scale(1)    translateY(0); }
  }
  .story-end { text-align: center; font-size: 18px; color: var(--ink-soft); margin-top: 8px; }
  .story-toolbar { display: flex; flex-direction: column; gap: 12px; }
  .story-toolbar-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ---- Speak pill ---- */
  .speak-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    background: var(--orange);
    color: white;
    border-radius: 999px;
    padding: 10px 16px 10px 12px;
    min-height: 44px;
    box-shadow: 0 4px 0 var(--orange-dark), 0 8px 16px rgba(224,138,69,0.25);

  }
  .speak-pill:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--orange-dark), 0 3px 8px rgba(224,138,69,0.25);
  }
  .speak-pill-icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: grid; place-items: center;
    font-size: 15px;
  }
  .speak-pill.is-speaking {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 4px 0 var(--yellow-dark), 0 8px 16px rgba(242,184,56,0.3);
    animation: speakPulse 1.6s ease-in-out infinite;
  }
  .speak-pill.is-speaking .speak-pill-icon { background: rgba(61,53,40,0.12); }
  @keyframes speakPulse {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-2px); }
  }
  .speak-waves {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
    margin-left: 2px;
  }
  .speak-waves span {
    width: 3px;
    background: var(--ink);
    border-radius: 2px;
    animation: waveBars 0.9s ease-in-out infinite;
  }
  .speak-waves span:nth-child(1) { height: 8px;  animation-delay: 0.00s; }
  .speak-waves span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .speak-waves span:nth-child(3) { height: 10px; animation-delay: 0.30s; }
  .speak-waves span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
  @keyframes waveBars {
    0%, 100% { transform: scaleY(0.4); }
    50%       { transform: scaleY(1); }
  }

  /* ---- Header ---- */
  /* v2.2.1 — added right padding so the in-header back button doesn't collide with the
     absolute-positioned gear at top-right. */
  .screen-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-right: 52px; }
  .pill {
    background: white;
    color: var(--ink);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border-radius: 999px;
    padding: 8px 14px;
    box-shadow: 0 3px 0 rgba(61,53,40,0.08);
    border: none;
    cursor: pointer;
  }

  /* ---- Decorations ---- */
  .deco {
    position: absolute;
    font-size: 32px;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
    opacity: 0.85;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.1));
  }
  .deco--1 { top: 12%; right: 8%; font-size: 38px; animation-delay: 0s; }
  .deco--2 { top: 18%; left: 6%; animation-delay: 1.2s; }
  .deco--3 { bottom: 22%; right: 10%; animation-delay: 2.4s; }
  .deco--4 { bottom: 30%; left: 8%; font-size: 28px; animation-delay: 0.6s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%       { transform: translateY(-14px) rotate(4deg); }
  }

  /* ---- Burst ---- */
  .burst {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    animation: burst 0.8s ease-out forwards;
    left: 50%; top: 50%;
  }
  @keyframes burst {
    0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    100% { transform: translate(var(--bx, 30px), var(--by, -50px)) scale(1.2); opacity: 0; }
  }

  /* ---- Helpers ---- */
  .stack { display: flex; flex-direction: column; }
  .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-20 { gap: 20px; } .gap-28 { gap: 28px; }
  .grow { flex: 1; }
  .footer { margin-top: auto; padding-top: 18px; }
  .step-label { font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 15px; color: var(--ink-soft); text-align: center; margin-bottom: 14px; }
  .step-label strong { color: var(--ink); font-weight: 600; }
  .q-label { font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 22px; color: var(--ink); text-align: center; margin: 0 0 22px 0; line-height: 1.25; text-wrap: balance; }
  .q-label strong { font-weight: 600; color: var(--orange-dark); }

  .screen::-webkit-scrollbar, .story-paper::-webkit-scrollbar { width: 6px; }
  .screen::-webkit-scrollbar-thumb, .story-paper::-webkit-scrollbar-thumb { background: rgba(61,53,40,0.15); border-radius: 3px; }
</style>

<body>
<div id="root" class="app">
  <div class="screen-wrap" id="screen-wrap"></div>
  <button id="settings-gear" aria-label="Parent settings" title="Parent settings" type="button">⚙</button>
  <div id="version-badge"></div>
</div>

<script src="src/content.js"></script>
<script src="src/engine-v2.js"></script>
<script>
/* ================================================================
   NODDYTALES — Vanilla JS app
   ================================================================ */

if (typeof WORD_BANK === 'undefined') throw new Error('content.js must load before index.html script');

/* v1.20.0 → v2.0.0 — engine flag.
   v1.20.0–v1.23.0: v2 was OPT-IN via ?engine=v2 while we built it tier by tier.
   v2.0.0: v2 is the DEFAULT. ?engine=v1 is the escape hatch if v2 ever misbehaves.
   v1 templates stay in the codebase as a runtime fallback when generateStoryV2 returns
   null or throws — silent fallback ensures the user never sees a broken story screen. */
(function initEngineFlag() {
  try {
    const params = new URLSearchParams(window.location.search);
    const urlEngine = params.get('engine');
    if (urlEngine === 'v2') localStorage.setItem('nt_engine_v2', '1');
    if (urlEngine === 'v1') localStorage.setItem('nt_engine_v2', '0');
  } catch {}
})();
function isEngineV2Enabled() {
  // Default: v2 enabled. Only opt-out via explicit `?engine=v1` (sets localStorage to '0').
  try { return localStorage.getItem('nt_engine_v2') !== '0'; } catch { return true; }
}

/* ---- HTML escape (prevent XSS from name input) ---- */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ================================================================
   v2.2.0 — Local Profile (Notion Build Idea: "Local Profile, account-less personalization")
   ================================================================
   Single source of truth for everything that survives a page reload.
   ALL persistence is localStorage-only. Profile data is never sent to
   the TTS API or any server. COPPA-safe by design — no account, no
   network, no analytics, no cross-device sync.

   Keys (all prefixed nt_):
     nt_name        string, child's first name (max 14, HTML-stripped)
     nt_age         integer 2-13
     nt_sidekicks   JSON array of strings (max 3, each max 14)
     nt_setting     string id from V2_SETTINGS (default "surprise")
     nt_potty_mode  '1' | '0'
     nt_engine_v2   '1' | '0' (engine flag — kept separate from profile)
     nt_pin         string (parental PIN for tween unlock — kept separate)

   Future toggles plumb into Profile by adding a new key + getter/setter.
   The parent settings overlay (gear icon) calls Profile.clear() to wipe.
   ================================================================ */
const Profile = {
  KEYS: {
    name: 'nt_name', age: 'nt_age', sidekicks: 'nt_sidekicks',
    setting: 'nt_setting', pottyMode: 'nt_potty_mode',
  },
  _get(key, fallback, transform) {
    try {
      const raw = localStorage.getItem(this.KEYS[key]);
      return raw == null ? fallback : transform(raw);
    } catch { return fallback; }
  },
  _set(key, value) { try { localStorage.setItem(this.KEYS[key], value); } catch {} },
  _rm(key)         { try { localStorage.removeItem(this.KEYS[key]); } catch {} },

  load() {
    return {
      name:      this._get('name', '', v => String(v).slice(0, 14).replace(/[<>&"]/g, '')),
      age:       this._get('age', null, v => {
        const n = parseInt(v, 10);
        return (Number.isInteger(n) && n >= 2 && n <= 13) ? n : null;
      }),
      sidekicks: this._get('sidekicks', [], v => {
        try { return JSON.parse(v).slice(0, 3).map(s => String(s).slice(0, 14)); }
        catch { return []; }
      }),
      setting:   this._get('setting', 'surprise', v => String(v).slice(0, 32)),
      pottyMode: this._get('pottyMode', false, v => v === '1' || v === 'true'),
    };
  },
  // Each setter is a no-op when given the same value, but values must be supplied explicitly.
  saveName(v)      { v ? this._set('name', String(v).slice(0, 14).replace(/[<>&"]/g, '')) : this._rm('name'); },
  saveAge(v)       { (Number.isInteger(v) && v >= 2 && v <= 13) ? this._set('age', String(v)) : this._rm('age'); },
  saveSidekicks(a) { Array.isArray(a) && a.length ? this._set('sidekicks', JSON.stringify(a.slice(0, 3))) : this._rm('sidekicks'); },
  saveSetting(v)   { v && v !== 'surprise' ? this._set('setting', String(v).slice(0, 32)) : this._rm('setting'); },
  savePotty(b)     { this._set('pottyMode', b ? '1' : '0'); },

  // Clear everything Profile manages. Engine flag (nt_engine_v2) and PIN (nt_pin) are intentionally
  // NOT cleared — those are device-level / parent-controlled, not child profile data.
  clear() { Object.keys(this.KEYS).forEach(k => this._rm(k)); },
};

const _initialProfile = Profile.load();
const state = {
  screen: 'welcome',         // welcome | words | story
  // welcomeStep machinery:
  //   name only       → start at 'name'
  //   name + age      → start at 'sidekicks' (skip name AND age — true returning user)
  //   name no age     → start at 'age'
  // The "← back" button walks the chain in reverse so the user can edit anything.
  welcomeStep: !_initialProfile.name ? 'name'
              : _initialProfile.age   ? 'sidekicks'
              : 'age',
  name: _initialProfile.name,
  age:  _initialProfile.age,
  teenUnlocked: false,       // never persisted — resets to false on every page load
  picks: {},                 // category => { w, e }
  rounds: [],
  roundIdx: 0,
  speaking: false,
  story: null,               // cached buildStory() result — set once on goTo('story'), reused on rerender
  pottyMode: _initialProfile.pottyMode,
  sidekicks: _initialProfile.sidekicks, // siblings / friends — persist across sessions, max 3
  setting: _initialProfile.setting,     // story setting mode id (default "surprise")
};

// Wire version badge — tap to surface the What's New panel
document.getElementById('version-badge').textContent = typeof APP_VERSION !== 'undefined' ? APP_VERSION : '';

/* In-app release notes — kept in sync with CHANGELOG.md.
   Showing the latest 5 entries keeps the modal scannable; full history lives on GitHub. */
const RELEASE_NOTES = [
  { v: 'v2.3.1', title: 'Blueprint variety — same picks now produce different story shapes',
    detail: 'Integrates the user\'s v3 overhaul plan into the v2.3.0 causality engine without scrapping it. v2.3.0 made every kid/big/tween story follow ONE shape (goal_spine). v2.3.1 adds 3 new authored blueprints alongside it: LOST SNACK RESCUE (food disappears → wrong suspect → kid investigates → companion is the true culprit), SHOW GOES WRONG (kid prepares show → prop breaks → kid improvises with freeword/move → triumph), and RULE LOOPHOLE (visitor imposes absurd rule → blocks kid → kid finds object-based loophole → wins). Each blueprint has 12 new tier-aware beat cards (36 total new beats). Engine picks one of the 4 blueprints uniformly per story, so replaying the same picks produces visibly different story shapes. Each blueprint carries the causality DNA from v2.3.0: chosen picks are load-bearing (food is the missing thing, visitor is the rule-imposer, object is the loophole). Smoke test (100 generations, same picks): 25/25 ish blueprint distribution, 0 nulls, 100% pet/food coverage, 94% place-in-P1. New blueprint-aware titles: "Who Took the Donuts?", "Cole Saves the Show", "Cole Finds a Loophole". Structural refactor to typed story parts (the bigger v3 plan ambition) is deferred to v2.4.0 — it would replace the regex highlight layer with structured rendering, but ships better as its own focused build.' },
  { v: 'v2.3.0', title: 'Causality engine — chosen words drive the plot now',
    detail: 'The LLM Council\'s root-cause fix shipped. Earlier stories were "sentence sprinklers" — each beat was a non-sequitur, chosen words were decoration, and the kid was a witness not a protagonist. v2.3.0 introduces a real causality spine for kid/big/tween tiers (tot + little keep their simpler recipes). Every story now has an explicit GOAL declared by the kid in paragraph 1 (find the missing thing, win the silly race, wake up the moon, etc. — 30 entries). One chosen pick BLOCKS the goal (pet/visitor creates the obstacle). The kid uses ANOTHER chosen pick as a TOOL (food/object/move/color resolves it). The goal is referenced across 4 of 5 paragraphs — the causal glue the audit was missing. Smoke test (50 same-pick generations): goal in 50/50 bodies, chosen food/object as tool in 46/50, kid is the active subject. New title patterns reference the actual goal so the title sells the story: "The Day Cole Tried to Build the Perfect Hideout," "How Livi Found the Way Home."' },
  { v: 'v2.2.4', title: 'Hot-fix: title now renders chips correctly + muffin→cupcakes',
    detail: 'Two visible bugs from real-kid playtest. (1) Story TITLE was rendering [name:Livi] as literal text — renderStory had a homemade alternating-color word-splitter that escaped each word and never called parseStoryLine. Body paragraphs worked because they DID go through parseStoryLine. Fixed by running the title through the same parseStoryLine path as the body. (2) Little tier picker had "muffins" labeled with the cupcake emoji 🧁. Renamed to "cupcakes" so the word matches the icon. A bigger causality-engine overhaul (the LLM Council recommendation) follows in v2.3.0.' },
  { v: 'v2.2.3', title: 'Bug-fix triage: name, highlights, TTS audio mismatch',
    detail: 'Three confirmed bugs from the 60-story audit + user playtest. (1) NAME REGRESSION: {kid.cap} resolved to empty string when slot.text was absent (kid slot uses .name) — caused "  had a plan" empty-subject sentences in 23/60 stories. Fixed in resolveSlot. (2) HIGHLIGHTS: v2 paragraphs never produced [name:X]/[c:X]/[y:X] tokens that parseStoryLine wraps in chip styling. 60/60 stories had no highlights. Added a post-processing pass in generateStoryV2 that wraps kid name + sidekick names + user-picked pet/food/creature/color/move/mood + setting place + freeword in the right tokens. Selected words are now visibly highlighted again. (3) TTS NAME MATCH: removed the v2.2.1 TTS request-body scrub that replaced Cole→Friend before sending to ElevenLabs. The audio narrator now speaks the child\'s real name, matching the visible story. Also added window.qaStoryMatrix() DevTools helper (5 stories per age across 12 ages = 60) for ongoing audits.' },
  { v: 'v2.2.2', title: 'Align Parent Settings gear with back button',
    detail: 'In v2.2.1 the gear floated ~14px from the top while the back button sat at 28px (screen padding-top), so the gear visually drifted above the back button. Repositioned gear to top: 28px (with safe-area math) so its top aligns with the screen-head row. Both header controls now share the same y position.' },
  { v: 'v2.2.1', title: 'QA repair: choice coverage, library expansion, TTS privacy, header gear',

  { v: 'v2.2.0', title: 'Local Profile + Parent Settings foundation',

  { v: 'v2.1.0', title: 'Story Setting Modes — pick where the story happens',

  { v: 'v2.0.0', title: 'v2 engine is now the default — authored comedy engine across all 5 tiers',

  { v: 'v1.23.0', title: 'v2 engine — Phase 4 (Segment D): tot + little tiers — v2 covers all 5 tiers',
    detail: 'v2 engine now generates stories for every age tier behind the ?engine=v2 flag. Added 2 new recipes tuned for the youngest audiences: tot_loop (4 beats: tot_intro → tot_silly_meet → tot_silly_repeat → tot_cozy_end, heavy repetition, very short sentences) and gentle_quest (4 beats: little_intro → little_companion → little_silly_event → little_cozy_end, no irony, tiny-jobs/confused-animals/weather-nonsense register). 6 new tot+little seeds, 18 new restraint-tuned beat cards. Tot stories produce 4 paragraphs of "Hi! Cole met a dragon. The dragon said hi. Cole said hi back."; little stories produce 4 paragraphs of "The dragon had a tiny hat on. The hat was a little too big." Smoke test: 50/50 across all 5 tiers, 0 grammar errors, 0 unresolved tokens. Recipe count 6→8, seeds 17→23, beats 74→91. Next: v2.0.0 flips v2 to default and removes v1 fallback.' },
  { v: 'v1.22.0', title: 'v2 engine — Phase 3 (Segment C): big + tween tiers',

  { v: 'v1.21.0', title: 'v2 engine — Phase 2 (Segment B): kid library expansion + 5 recipes',

  { v: 'v1.20.0', title: 'v2 engine — Phase 1 (Segment A): authored comedy prototype',

  { v: 'v1.19.3', title: '"The End" warmth + mid-sentence "Their pal" fix',

  { v: 'v1.19.0', title: 'Goofy Shorts: Little Edition (ages 4–5)',

  { v: 'v1.18.2', title: 'Fix: duplicate "The End" at story close',

function showWhatsNew() {
  if (document.querySelector('.whatsnew-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'whatsnew-overlay';
  overlay.innerHTML = `
    <div class="whatsnew-card">
      <div class="whatsnew-head">
        <h2 class="whatsnew-title">What's New ✨</h2>
        <button class="whatsnew-close" id="whatsnew-close" aria-label="Close">×</button>
      </div>
      ${RELEASE_NOTES.map(n => `
        <div class="whatsnew-entry">
          <div class="whatsnew-version">${n.v}</div>
          <p class="whatsnew-summary">${n.title}</p>
          <p class="whatsnew-detail">${n.detail}</p>
        </div>
      `).join('')}
      <a class="whatsnew-link" href="https://github.com/th1seffinguy/noddytales/blob/main/CHANGELOG.md" target="_blank" rel="noopener">
        Full changelog on GitHub →
      </a>
    </div>
  `;
  document.querySelector('.app').appendChild(overlay);
  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#whatsnew-close').addEventListener('click', close);
}

document.getElementById('version-badge').addEventListener('click', showWhatsNew);

/* ================================================================
   v2.2.0 — Parent settings overlay
   ================================================================
   Triggered by the ⚙︎ gear icon in the bottom-left corner. Shows:

     - "Clear saved profile" button (with confirmation)

   land in subsequent builds.

function showParentSettings() {
  if (document.querySelector('.settings-overlay')) return;

  const profile = Profile.load();
  const overlay = document.createElement('div');

        <div class="settings-row">
          <span class="label">Name</span>
          <span class="value">${profile.name ? esc(profile.name) : '— not set —'}</span>
        </div>
        <div class="settings-row">
          <span class="label">Age</span>
          <span class="value">${profile.age != null ? profile.age : '— not set —'}</span>
        </div>
        <div class="settings-row">
          <span class="label">Sidekicks</span>
          <span class="value">${profile.sidekicks.length ? esc(profile.sidekicks.join(', ')) : '— none —'}</span>
        </div>
        <div class="settings-row">
          <span class="label">Setting</span>
          <span class="value">${esc(profile.setting || 'surprise')}</span>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Future controls</div>
        <div class="settings-row settings-disabled">
          <span class="label">Potty word mode <span class="settings-tag">soon</span></span>
          <span class="value">off</span>
        </div>
        <div class="settings-row settings-disabled">
          <span class="label">Save story <span class="settings-tag">soon</span></span>
          <span class="value">—</span>
        </div>
        <div class="settings-row settings-disabled">
          <span class="label">Story history <span class="settings-tag">soon</span></span>
          <span class="value">—</span>
        </div>
      </div>

      <div class="settings-section">
        <button class="settings-btn-danger" id="btn-clear-profile">
          Clear saved profile
        </button>
        <p class="settings-footnote">
          Name, age, sidekicks, setting, and potty mode are stored only on this device.
          Clearing them returns the app to first-time mode. No data leaves your device.
        </p>
      </div>
    </div>
  `;
  document.querySelector('.app').appendChild(overlay);

  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#settings-close').addEventListener('click', close);

  overlay.querySelector('#btn-clear-profile').addEventListener('click', () => {
    if (!confirm('Clear all saved profile data?\n\nThis removes the saved name, age, sidekicks, and setting from this device. The current story (if any) stays on screen until you start a new one.')) return;
    Profile.clear();
    // Mirror in-memory state so the next render reflects the cleared profile.
    state.name = '';
    state.age = null;
    state.sidekicks = [];
    state.setting = 'surprise';
    state.pottyMode = false;
    state.welcomeStep = 'name';
    close();
    goTo('welcome');
  });
}

document.getElementById('settings-gear').addEventListener('click', showParentSettings);

/* ================================================================
   AGE TIERS
   ================================================================ */
function tierFor(age) {
  if (age <= 3)  return 'tot';
  if (age <= 5)  return 'little';
  if (age <= 7)  return 'kid';
  if (age <= 10) return 'big';
  return 'tween';
}


function buildRounds(age) {
  const tier = tierFor(age);
  const plan = ROUND_PLAN[tier];

  // Randomly pick 2 options from each round's pool of 6
  const binaryRounds = plan
    .map(cat => WORD_BANK[tier].find(r => r.cat === cat))
    .filter(Boolean)
    .map(round => {
      const shuffled = [...round.options].sort(() => Math.random() - 0.5);
      return { ...round, options: shuffled.slice(0, 2) };
    });

  // v1.19.2 — little tier gets one freetext round (Codex QA finding #2). Goofy Shorts: Little
  // Edition templates repeat the freeword as a shoutable spell — without this round, FW_SAFE
  // was falling back to FLABBADOO/KAPOW/etc. and the kid's own word was never invited.
  if (tier === 'little') {
    const pool = FREE_TEXT_ROUNDS.little;
    const ft = [pool[Math.floor(Math.random() * pool.length)]];
    // Insert freetext after the first 3 binary rounds so it lands mid-flow rather than at the start.
    return [...binaryRounds.slice(0, 3), ...ft, ...binaryRounds.slice(3)];
  }
  if (tier === 'kid') {
    const pool = FREE_TEXT_ROUNDS.kid;
    const ft = [pool[Math.floor(Math.random() * pool.length)]];
    // When potty mode is ON, surface 2 extra picker rounds so the toggle has a visible effect
    // on the selection flow — pick a body word + pick a silly sound, drawn from the HOT pools.
    if (state.pottyMode) {
      const bodyShuffled  = [...BODY_HOT_OPTS].sort(() => Math.random() - 0.5).slice(0, 2);
      const soundShuffled = [...SOUND_HOT_OPTS].sort(() => Math.random() - 0.5).slice(0, 2);
      const bodyRound  = { cat: 'body',  label: 'Pick a silly body word', options: bodyShuffled };
      const soundRound = { cat: 'sound', label: 'Pick a chaotic sound',   options: soundShuffled };
      return [...binaryRounds.slice(0, 4), ...ft, bodyRound, ...binaryRounds.slice(4), soundRound];
    }
    return [...binaryRounds.slice(0, 4), ...ft, ...binaryRounds.slice(4)];
  }
  if (tier === 'big') {
    const pool = [...FREE_TEXT_ROUNDS.big].sort(() => Math.random() - 0.5);
    const ft1 = pool.find(p => p.cat === 'freeword') || pool[0];
    const ft2 = pool.find(p => p.cat === 'freeword2' && p !== ft1) || pool[1];
    return [
      ...binaryRounds.slice(0, 4),
      ft1,
      ...binaryRounds.slice(4, 5),
      ft2,
      ...binaryRounds.slice(5),
    ];
  }
  if (tier === 'tween') {
    const pool = [...FREE_TEXT_ROUNDS.tween].sort(() => Math.random() - 0.5);
    const ft1 = pool.find(p => p.cat === 'freeword') || pool[0];
    const ft2 = pool.find(p => p.cat === 'freeword2' && p !== ft1) || pool[1];
    return [
      ...binaryRounds.slice(0, 4),
      ft1,
      ...binaryRounds.slice(4, 5),
      ft2,
      ...binaryRounds.slice(5),
    ];
  }
  return binaryRounds;
}

   ================================================================ */
function capitalize(s) {
  if (!s) return '';
  return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

/* Tokens: [name:X] [c:X] [y:X] — rendered as highlighted spans */
function buildStory(name, picks, age) {
  // v1.20.0 — v2 engine entry point (behind feature flag).
  // v1.22.0 extended to kid/big/tween. v1.23.0 added tot + little — v2 now covers all 5 tiers.
  // v2.0.0 made v2 the default.
  // v2.1.0 — inject state.setting into picks so the v2 engine can lock the place slot.
  // Silent fallback to v1 if generateStoryV2 returns null/throws for any reason.
  if (isEngineV2Enabled() && typeof generateStoryV2 === 'function') {
    try {
      const picksWithSetting = { ...picks, setting: { id: (state.setting || 'surprise') } };
      const v2Result = generateStoryV2(name, picksWithSetting, age);
      if (v2Result && v2Result.title && Array.isArray(v2Result.paragraphs) && v2Result.paragraphs.length > 0) {
        return v2Result;
      }
    } catch (err) {
      // Log but don't surface to user — fall through to v1.
      try { console.warn('[engine-v2] fallback to v1:', err); } catch {}
    }
  }

  const t   = tierFor(age);
  const N   = name || 'Friend';
  const get = (k, fb = '') => (picks[k] && picks[k].w) || fb;

  const PET  = get('pet', 'puppy');
  const COL  = get('color', 'blue');
  const FOOD = get('food', 'cake');
  const PLC  = get('place', 'park');
  const SKY  = get('sky', 'sun');
  const CRE  = get('creature', 'frog');
  const MOV  = get('move', 'hopped');
  // Verb forms — used by templates that need base ("loved to hop") or gerund ("set off hopping")
  // instead of the default past tense ("they hopped").
  const moveBase   = past => (VERB_FORMS[past] && VERB_FORMS[past].base)   || past;
  const moveGerund = past => (VERB_FORMS[past] && VERB_FORMS[past].gerund) || past;
  const MOV_BASE   = moveBase(MOV);
  const MOV_GERUND = moveGerund(MOV);
  const MOD  = get('mood', 'silly');
  const WX   = get('weather', 'sunny');
  const FW   = get('freeword', '');
  const FW2  = get('freeword2', '');
  // Subtype tells templates how to route the freeword: shout (default), smell, name, dance, word.
  // Falls back to 'shout' for legacy picks that didn't carry a subtype.
  const FW_SUBTYPE = (picks.freeword && picks.freeword.subtype) || 'shout';

  // Fix article agreement in templated noun phrases. One pass that handles BOTH
  // single-token ("a [c:tacos]") and multi-token ("a [c:electric blue] [c:tacos]") cases.
  //
  // Algorithm per matched "[Aa] [token1] [token2] ... [tokenN]":
  //   1. If LAST token is plural-looking (ends in -s, not a singular-s exception) → "some"
  //      Plural overrides vowel because "some" works regardless of the next sound.
  //   2. Else if FIRST token starts with a vowel → "an"
  //   3. Else leave "a"/"A" alone.
  //
  // NOT_PLURAL_RE catches singular nouns ending in -s (octopus, bus) and adjectives ending
  // in -ous (mysterious, curious, ridiculous). Mass nouns ending in -s (cheese? no — gas, etc.)
  // are explicitly whitelisted. Whitelist "bonkers" because it's an adj that ends in -ers.
  const NOT_PLURAL_RE = /\b(?:cheese|sushi|broth|juice|tea|jelly|jam|soup|stew|cereal|granola|sauce|honey|gas|ice|rice|bread|toast|bonkers)\b|(?:ous|us|ss)$/i;
  const TOKEN_RE      = /\[(?:name|c|y):([^\]]+)\]/g;
  const fixArticles = s => s.replace(
    /\b([Aa])((?:\s+\[(?:name|c|y):[^\]]+\])+)/g,
    (match, art, tokensRaw) => {
      const tokens = [];
      let m;
      TOKEN_RE.lastIndex = 0;
      while ((m = TOKEN_RE.exec(tokensRaw)) !== null) tokens.push(m[1]);
      if (tokens.length === 0) return match;
      const lastWord  = tokens[tokens.length - 1];
      const firstWord = tokens[0];
      // Plural test first (highest priority).
      if (/s$/i.test(lastWord) && !NOT_PLURAL_RE.test(lastWord)) {
        return (art === 'A' ? 'Some' : 'some') + tokensRaw;
      }
      // Vowel test on first word in the phrase.
      if (/^[aeiouAEIOU]/.test(firstWord)) {
        return (art === 'A' ? 'An' : 'an') + tokensRaw;
      }
      return match;
    }
  );

  const rawPick = arr => arr[Math.floor(Math.random() * arr.length)];
  // Per-tier paragraph caps — long templates get trimmed so bedtime stories stay short.
  // Keep first 2 (setup) + last (LIMIT-2) (climax → resolution → closer). The previous formula
  // (first 4 + last 1) cut load-bearing climax paragraphs and left dangling references.
  // v1.18.0 — kid tier dropped to 4 paragraphs (Goofy Shorts: punchy, bedtime-friendly,
  // sidekick-driven). v1.19.0 — little tier joined kid at 4 paragraphs (Goofy Shorts Phase 2
  // after Story Test Log Entry 001 revealed little templates were failing on humor + substance).
  const PARAGRAPH_LIMIT = { tot: 5, little: 4, kid: 4, big: 6, tween: 6 }[t];
  const trimToLimit = (story) => {
    if (!PARAGRAPH_LIMIT || story.paragraphs.length <= PARAGRAPH_LIMIT) return story;
    const ps = story.paragraphs;
    const keepEnd = PARAGRAPH_LIMIT - 2;
    const trimmed = [...ps.slice(0, 2), ...ps.slice(-keepEnd)];
    return { title: story.title, paragraphs: trimmed };
  };

  // Body / sound vocabulary — user-picked rounds (potty mode) take precedence; otherwise auto-pick.
  // Computed up front so tier asides can reference them.
  const pickedBody  = get('body',  '');
  const pickedSound = get('sound', '');
  const BODY  = pickedBody  || rawPick(state.pottyMode ? BODY_HOT  : BODY_PG);
  const BODY2 = rawPick(state.pottyMode ? BODY_HOT  : BODY_PG);
  const SOUND = pickedSound || rawPick(state.pottyMode ? SOUND_HOT : SOUND_PG);

  // Mad Libs-style auto-injected vocabulary (Codex peer review #15). Picked once per story
  // for use in kid-tier templates AND in the tier-aware aside bank.
  const OBJ = rawPick(OBJECTS);
  const ADV = rawPick(ADVERBS);
  const NUM = rawPick(NUMBERS);
  const LIQ = rawPick(LIQUIDS);
  const JOB = rawPick(JOBS);
  // Story-specific motif — Codex callback system. Picked once per story and referenced
  // across multiple paragraphs in escalating contexts (setup → violation → payoff).
  const RULE = rawPick(RULES);

  // v1.18.0 Goofy Shorts vocabulary — kid-tier silly adjective + silly noun combos.
  // v1.19.1 — SK is no longer a fabricated name fallback. If the user added sidekicks, SK_OPEN
  // and SK_MID both resolve to a [name:Real] token (auto-capitalized chip). If not, they fall
  // back to a common-noun phrase ("Their pal" sentence-start, "their pal" mid-sentence) via the
  // [c:...] chip styling. NO INVENTED NAMES — Defect Log "Phantom character name" fix.
  // FW_SAFE coerces the freeword to a non-empty shoutable string so kid/little templates can
  // repeat it as a spell/chant without a guard.
  const SADJ   = rawPick(SILLY_ADJ);
  const STHING = rawPick(SILLY_NOUN);
  const hasUserSK = Array.isArray(state.sidekicks) && state.sidekicks.length > 0;
  const SK_NAME   = hasUserSK ? rawPick(state.sidekicks) : null;
  // SK_OPEN — sentence-start form (capitalized).
  // SK_MID  — mid-sentence form (lowercase when fallback).
  // Title-position form uses SK_TITLE (capitalized fallback "Their Pal").
  const SK_OPEN  = SK_NAME ? `[name:${SK_NAME}]` : `[c:Their pal]`;
  const SK_MID   = SK_NAME ? `[name:${SK_NAME}]` : `[c:their pal]`;
  const SK_TITLE = SK_NAME ? SK_NAME : `Their Pal`;
  const FW_SAFE = FW || rawPick(['KAPOW', 'ZINGO', 'WOMBO', 'FLABBADOO', 'BAZINKLE', 'YOINKO', 'SNORBLE', 'FLOOBA']);

  // pick auto-corrects articles, trims to length, injects a tier-appropriate aside,
  // and adds a sidekick cameo (60% of the time when sidekicks exist).
  // v1.18.0: kid tier skips both aside + cameo injection. v1.19.0: little tier joins kid
  // in skipping — Story Test Log Entry 001 traced the failing register directly to the
  // little aside bank ("the wind agreed politely") and the throwaway cameo style.
  // Goofy Shorts templates handle sidekick + closer inline.
  const SKIP_INJECTIONS = t === 'kid' || t === 'little';
  const pick = arr => {
    const r = rawPick(arr);
    if (r && typeof r === 'object' && Array.isArray(r.paragraphs)) {
      let story = { title: fixArticles(r.title), paragraphs: r.paragraphs.map(fixArticles) };
      story = trimToLimit(story);
      if (!SKIP_INJECTIONS) {
        story = injectTierAside(story);
        story = injectSidekick(story);
      }
      return story;
    }
    return r;
  };

  // Tier-aware aside injection — Codex review #12. Different joke logic per age tier.
  // Tot: gentle/repetition. Little: tiny-world whimsy. Kid: Mad Libs token mix. Big: bureaucratic
  // mock-serious. Tween: deadpan internet-voice. Adds one aside to a middle paragraph.
  const TIER_ASIDES = {
    tot: [
      ` Boop!`,
      ` Heehee.`,
      ` That was silly.`,
      ` Everybody blinked twice.`,
      ` Even the sun smiled.`,
    ],
    little: [
      ` Heehee.`,
      ` Nobody knew why!`,
      ` Everybody clapped, just because.`,
      ` The wind agreed politely.`,
      ` A small flower nodded along.`,
    ],
    kid: [
      ` (Nearby: ${rawPick(SILLY_THINGS)}.)`,
      ` (Plus ${OBJ}, obviously.)`,
      ` (Carrying ${NUM} of them, somehow.)`,
      ` (Smelled distinctly of ${LIQ}.)`,
      ` (${JOB.charAt(0).toUpperCase() + JOB.slice(1)} took notes.)`,
      ` (Everyone agreed: ${ADV}.)`,
    ],
    big: [
      ` A stamp appeared. Nobody had requested one.`,
      ` This was technically against policy.`,
      ` There was a form for this, which made it worse.`,
      ` The hallway filed a complaint.`,
      ` Procedurally, this was incorrect.`,
    ],
    tween: [
      ` Nobody had asked.`,
      ` The vending machine had feedback. None of it constructive.`,
      ` This was, somehow, a vibe.`,
      ` Iconic.`,
      ` Plus, like, seventeen group chats lost it.`,
    ],
  };
  const injectTierAside = (story) => {
    const bank = TIER_ASIDES[t];
    if (!bank || bank.length === 0) return story;
    const aside = rawPick(bank);
    const targetIdx = 1 + Math.floor(Math.random() * 2);
    const updated = story.paragraphs.slice();
    updated[targetIdx] = updated[targetIdx] + aside;
    return { title: story.title, paragraphs: updated };
  };

  // Sidekick cameo — one random sibling/friend lands a brief cameo line. ~60% frequency so it
  // feels earned rather than canned (Codex #5 feedback: was 100%, felt grafted on).
  const injectSidekick = (story) => {
    const sks = Array.isArray(state.sidekicks) ? state.sidekicks : [];
    if (sks.length === 0) return story;
    if (Math.random() > 0.6) return story;
    const sk = rawPick(sks);
    const cameos = [
      ` (Plus [name:${sk}].)`,
      ` [name:${sk}] showed up too.`,
      ` [name:${sk}] called dibs on leftovers.`,
      ` "I called it," said [name:${sk}].`,
      ` [name:${sk}] was right there too.`,
    ];
    const cameo = rawPick(cameos);
    const targetIdx = Math.min(4, Math.max(2, Math.floor(story.paragraphs.length / 2)));
    const updated = story.paragraphs.slice();
    updated[targetIdx] = updated[targetIdx] + cameo;
    return { title: story.title, paragraphs: updated };
  };

  if (t === 'tot') {
    return pick([
      {
        title: `${N} and the ${capitalize(COL)} ${capitalize(PET)}`,
        paragraphs: [
          `One day, [name:${N}] went to the [y:${PLC}].`,
          `A little [c:${COL}] [c:${PET}] said HI! Then it said HI again!`,
          `It hid behind a bush and yelled BOO! They both giggled.`,
          `They sat under the big [c:${SKY}] and ate [y:${FOOD}]. The ${PET} ate it BACKWARD.`,
          `Then they went [c:${MOV}], [c:${MOV}], and one more time [c:${MOV}]!`,
        ],
      },
      {
        title: `${N}'s ${capitalize(PET)} Day`,
        paragraphs: [
          `[name:${N}] found a [c:${PET}] at the [y:${PLC}]. It was wearing a tiny [c:${COL}] hat!`,
          `The [c:${PET}] loved to [c:${MOV_BASE}]. And to [c:${MOV_BASE}] AGAIN. And SOMETIMES it [c:${MOV}] sideways!`,
          `They shared [y:${FOOD}] under the [c:${SKY}]. The [c:${PET}] tried to share with the [c:${SKY}] too. The [c:${SKY}] was confused.`,
          `Then the [c:${PET}] did a silly little dance. [name:${N}] joined in. So did a passing bug!`,
          `"Again!" said [name:${N}]. So they did. And again. And one more time.`,
        ],
      },
      {
        title: `The Day the ${capitalize(FOOD)} Got Loud`,
        paragraphs: [
          `One day at the [y:${PLC}], [name:${N}] heard a tiny noise.`,
          `It was the [c:${FOOD}]! It said "BOOP!" Then "BOOP!" again, but LOUDER!`,
          `A [c:${PET}] heard the BOOPs and ran over very fast.`,
          `"BOOP!" said the [c:${FOOD}]. "BOOP!" said the [c:${PET}]. "BOOP!" said [name:${N}].`,
          `Even the [c:${SKY}] tried to BOOP. But it was too high up. Hee hee!`,
        ],
      },
      {
        title: `${N} and the Upside-Down ${capitalize(PET)}`,
        paragraphs: [
          `[name:${N}] saw a [c:${PET}] standing upside down at the [y:${PLC}]!`,
          `"Are you okay?" asked [name:${N}]. The [c:${PET}] said, "YES! The world is more interesting this way!"`,
          `So [name:${N}] tried it. WHOOPS. The [c:${SKY}] was on the bottom! The grass was on top!`,
          `They shared a piece of [y:${FOOD}] from upside down. The crumbs fell UP!`,
          `When they stood right-side-up again, everything felt extra wiggly. They [c:${MOV}] home laughing. 🌟`,
        ],
      },
      {
        title: `The Bouncing ${capitalize(SKY)}`,
        paragraphs: [
          `The [c:${SKY}] went BOING! Then BOING! BOING! BOING!`,
          `[name:${N}] looked up and said, "WHOA! Skies don't usually do that!"`,
          `A [c:${PET}] came over and started to [c:${MOV_BASE}] in time with the boings.`,
          `BOING — [c:${MOV}] — BOING — [c:${MOV}] — BOING — clap!`,
          `They ate [y:${FOOD}] between bounces, even though it kept floating up. Yum and BOING! 🌟`,
        ],
      },
      {
        title: `${N}'s ${capitalize(PET)} Says Everything Wrong`,
        paragraphs: [
          `[name:${N}]'s [c:${PET}] said "HELLO" when it meant "GOODBYE."`,
          `It said "YUM" when it meant "PHEW!" And it called shoes "snacks." Uh oh.`,
          `They went to the [y:${PLC}] together, all mixed up and very silly.`,
          `The [c:${PET}] pointed at the [c:${SKY}] and said "FLOOR." It pointed at the [c:${FOOD}] and said "[c:${COL}]." Nothing matched!`,
          `[name:${N}] laughed so hard they got the hiccups. Hic! Hic! Hic! Even the [c:${PET}] got the hiccups.`,
        ],
      },
      {
        title: `The Big Silly Sneeze`,
        paragraphs: [
          `Something tickled [name:${N}]'s nose. Uh oh!`,
          `"AH... AH... AH-CHOO!" A huge sneeze! It blew the [c:${COL}] hat right off!`,
          `The hat zoomed all the way to the [y:${PLC}]. A [c:${PET}] caught it on its head and looked very fancy.`,
          `"BLESS YOU!" said the [c:${PET}] — even though it was a [c:${PET}]. They walked back together to find the [c:${SKY}].`,
          `They ate [y:${FOOD}] and tried not to sneeze. Mostly. The [c:${PET}] sneezed twice. So did [name:${N}]. Best sneeze day ever. 🌟`,
        ],
      },
      {
        title: `${N} and the Mystery Bonk`,
        paragraphs: [
          `BONK! Something bonked [name:${N}] right on the head!`,
          `[name:${N}] looked up. It was a [c:${COL}] [c:${FOOD}]! How did it get up there?`,
          `A very silly [c:${PET}] giggled from behind a tree. "I throw [c:${FOOD}]!" it said. "It's my hobby!"`,
          `They all played catch at the [y:${PLC}], tossing the [y:${FOOD}] back and forth under the [c:${SKY}].`,
          `Nobody bonked anybody else again. Well, the [c:${SKY}] got bonked once. Sorry, ${SKY}!`,
        ],
      },
    ]);
  }

  if (t === 'little') {
    // v1.19.0 Goofy Shorts: Little Edition — full little-tier rewrite after Story Test Log
    // Entry 001 ("The Sunny Island Adventure") failed on humor (2), substance (1), and
    // replayability (1). Same structural rules as kid Goofy Shorts (sidekick drives, SADJ+STHING
    // is the central absurd thing, freeword 2-3x as shoutable spell, 4 paragraphs) but with
    // simpler vocab and heavier repetition for 4-5 year olds.
    const fwTok = `[y:${FW_SAFE}]`;
    return pick([
      // 1. The Thing Under the Bed — direct mirror of kid #1, simpler sentences
      {
        title: `${capitalize(N)} and the ${capitalize(SADJ)} ${capitalize(STHING)}`,
        paragraphs: [
          `[name:${N}] found a [c:${SADJ}] [c:${STHING}] under the bed. It had a little face. It had two tiny feet. "${fwTok}!" it said.`,
          `${SK_OPEN} came to look. ${SK_OPEN} poked it. UH OH. The [c:${STHING}] went BOING! Right up to the ceiling!`,
          `[name:${N}] yelled, "${fwTok}!" ${SK_OPEN} yelled, "${fwTok}!" And the [c:${STHING}] came BOING right back down. PLOP! On Dad's head.`,
          `Dad said, "I have a [c:${STHING}] hat now." Everybody clapped. The [c:${STHING}] giggled. So did Dad.`,
        ],
      },
      // 2. The Sneaky Snack — sidekick + kid hunt for the missing food
      {
        title: `Where Did All the ${capitalize(FOOD)} Go?`,
        paragraphs: [
          `The [c:${FOOD}] had vanished. ALL of it! [name:${N}] looked everywhere. ${SK_OPEN} looked everywhere. No [c:${FOOD}] anywhere.`,
          `"Maybe we should say the magic word," whispered ${SK_MID}. "What magic word?" said [name:${N}]. "${fwTok}!" said ${SK_MID}, like it was obvious.`,
          `They both yelled, "${fwTok}!" A drawer popped open. Inside the drawer: the [c:${FOOD}]! AND one [c:${SADJ}] [c:${STHING}] who said, "Hi!"`,
          `The [c:${STHING}] had hidden the [c:${FOOD}] for a tea party. There was no tea. Just [c:${FOOD}] everywhere. It was the best tea party ever.`,
        ],
      },
      // 3. The Magic Word That Went WHOOPS — direct mirror of kid #3 (the playtest benchmark)
      {
        title: `${capitalize(N)} Says "${FW_SAFE.toUpperCase()}" Too Many Times`,
        paragraphs: [
          `${SK_OPEN} taught [name:${N}] a magic word. The word was ${fwTok}. "Only say it ONE TIME," said ${SK_MID}. [name:${N}] nodded.`,
          `[name:${N}] said it one time. A [c:${SADJ}] [c:${STHING}] popped up! Cool! [name:${N}] said it AGAIN. Another one popped up. Even more [c:${SADJ}].`,
          `[name:${N}] said it FOUR MORE TIMES. The whole room was FULL of [c:${SADJ}] [c:${STHING}]s. "I TOLD YOU!" yelled ${SK_MID}. The [c:${STHING}]s started to sing!`,
          `[name:${N}] said "${fwTok}" one tiny last time. POP POP POP! All gone. ${SK_OPEN} said, "Let's not tell Mom." [name:${N}] agreed.`,
        ],
      },
      // 4. The Loud, LOUD Pet — heavy repetition for emergent tier
      {
        title: `${capitalize(N)}'s ${capitalize(PET)} Is SO Loud`,
        paragraphs: [
          `[name:${N}]'s [c:${PET}] would NOT stop yelling. "${fwTok}! ${fwTok}! ${fwTok}!" Loud. LOUDER. LOUDEST.`,
          `${SK_OPEN} ran over with an idea. The idea was: feed it one [c:${SADJ}] [c:${STHING}]. "Will that work?" asked [name:${N}]. "We will see," said ${SK_MID}.`,
          `The [c:${PET}] ate the [c:${SADJ}] [c:${STHING}] in one big chomp. CHOMP! Then it burped. Then it said, very quietly, "${fwTok}." And fell asleep!`,
          `It slept on [name:${N}]'s lap. It snored. The snore sounded like "${fwTok}". ${SK_OPEN} said, "Shhh." They all took a nap.`,
        ],
      },
      // 5. The Bouncy Disaster — central object goes on adventure, sidekick saves the day
      {
        title: `The Day the ${capitalize(SADJ)} ${capitalize(STHING)} Got Loose`,
        paragraphs: [
          `[name:${N}] brought a [c:${SADJ}] [c:${STHING}] to the [y:${PLC}]. BOING! It bounced. BOING! Higher! BOING! Over a tree!`,
          `"OH NO!" yelled [name:${N}]. ${SK_OPEN} yelled, "${fwTok}! ${fwTok}!" That was the magic word for the [c:${STHING}]! Down it came! WHOOSH!`,
          `It landed right on [name:${N}]'s hat. A [c:${CRE}] walked by. It said, "Is that a [c:${SADJ}] [c:${STHING}]? I want one!" And ran off with it!`,
          `${SK_OPEN} and [name:${N}] chased the [c:${CRE}]. They got the [c:${STHING}] back. The [c:${CRE}] said sorry and gave them all some [y:${FOOD}].`,
        ],
      },
      // 6. The Funny Sandwich — Captain-Underpants tier physical comedy, but bedtime-friendly
      {
        title: `${SK_TITLE} Makes a ${capitalize(SADJ)} Sandwich`,
        paragraphs: [
          `${SK_OPEN} made a sandwich. Inside the sandwich: [y:${FOOD}], one [c:${SADJ}] [c:${STHING}], and a [c:${COL}] crayon. "Want a bite?" asked ${SK_MID}. [name:${N}] said NO WAY.`,
          `So ${SK_MID} ate the whole thing. Chomp chomp chomp! "${fwTok}!" said ${SK_MID}. Then BURP. A tiny [c:${COL}] bubble came out!`,
          `The bubble floated up. POP! Glitter everywhere! [name:${N}] laughed so hard. "Okay, ONE bite," said [name:${N}]. CHOMP. "${fwTok}!" yelled [name:${N}].`,
          `Now they both had glitter burps. They burped a glitter rainbow all afternoon. Mom said, "What did you eat?" They did not tell.`,
        ],
      },
      // 7. The Hat That Spoke — small mystery with sidekick + payoff, mirror of kid #8
      {
        title: `The Hat That Said "${FW_SAFE.toUpperCase()}"`,
        paragraphs: [
          `[name:${N}] put on a hat. The hat said, "${fwTok}!" [name:${N}] said, "Whoa." Hats do NOT usually talk.`,
          `${SK_OPEN} tried the hat. The hat said, "${fwTok}!" again! Every time anybody put it on, it said the same thing. "${fwTok}!"`,
          `They put it on a [c:${PET}]. "${fwTok}!" said the hat. They put it on a [c:${SADJ}] [c:${STHING}]. "${fwTok}!" the hat said happily!`,
          `By dinner the hat was tired. It said one last quiet "${fwTok}" and fell asleep on the table. [name:${N}] gave it a tiny blanket.`,
        ],
      },
      // 8. The Big Tickle — physical comedy, the rescue, kid + sidekick co-star
      {
        title: `${capitalize(N)} and the Stuck ${capitalize(CRE)}`,
        paragraphs: [
          `A [c:${CRE}] got STUCK in the [y:${PLC}]. Wedged tight. Couldn't move. Looking grumpy.`,
          `[name:${N}] had an idea. "Let's tickle it!" said [name:${N}]. "${fwTok}!" agreed ${SK_MID}, which wasn't really an answer but felt right.`,
          `They tickled the [c:${CRE}]. Tickle tickle tickle! It giggled. It snorted. It POPPED right out! "${fwTok}!" it yelled. "I'M FREE!"`,
          `The [c:${CRE}] gave them a [c:${SADJ}] [c:${STHING}] as a thank-you gift. They took it home. It snored. Quietly. Happily.`,
        ],
      },
    ]);
  }

  if (t === 'kid') {
    // v1.18.0 Goofy Shorts — total kid-tier rewrite after playtest feedback that prior templates
    // read as adult-ironic. New rules: short (3-4 paragraphs), sidekick DRIVES action,
    // freeword [y:${FW_SAFE}] appears 2-3x as a shoutable spell/chant/name, [c:${SADJ}] [c:${STHING}]
    // is the central absurd thing, physical-not-witty humor, every story has a CAPS-SHOUT line.
    const fwTok = `[y:${FW_SAFE}]`;

    return pick([
      // 1. The Talking Thing Under the Bed — the user-locked example template
      {
        title: `${capitalize(N)} and the ${capitalize(SADJ)} ${capitalize(STHING)}`,
        paragraphs: [
          `[name:${N}] found a [c:${SADJ}] [c:${STHING}] under the bed. It had eyes. It had feet. It had a tiny hat. "${fwTok}!" said the [c:${STHING}].`,
          `${SK_OPEN} poked it with a spoon. BAD IDEA. The [c:${STHING}] went BOING BOING BOING and stuck to the ceiling.`,
          `[name:${N}] yelled, "${fwTok}!" ${SK_OPEN} yelled, "${fwTok} BUT LOUDER!" The [c:${STHING}] fell down and landed on Dad's head.`,
          `Dad said, "I am the [c:${STHING}] king now." Everybody clapped. The [c:${STHING}] burped.`,
        ],
      },
      // 2. The Snack Heist — sidekick orchestrates, freeword is the codeword
      {
        title: `${capitalize(N)} and the ${capitalize(FOOD)} Heist`,

        `"I'll need to see your paperwork," it announced to [name:${N}] at eight in the morning, in [name:${N}]'s own kitchen, before coffee.`,
        `[name:${N}] did not have paperwork. The ${PET} sighed in the manner of someone deeply familiar with this exact disappointment.`,
        `They [c:${MOV}] to the [y:${PLC}], where a [c:${CRE}] was running an officially unauthorised office out of a wheelbarrow.`,
        fwLine2,
        `The ${CRE} stamped one form, lost another, produced a third nobody had filled out, and demanded a signature from someone not present.`,
        fw2Line2,
        `The [c:${PET}] reviewed everything for [c:${MOD}] minutes, then declared [name:${N}] "essentially compliant." Nobody knew what they had been compliant about.`,
        `The [c:${PET}] put its clipboard away and finally ate some [y:${FOOD}], which apparently had been the goal all along.`,
      ].filter(Boolean),
    },
  ]);
}

/* Parse token markup to HTML.
   v1.19.2 — every token's captured text now goes through esc() at render time. Previously the
   renderer trusted callers to pre-escape user input ("user input is already escaped before
   going into tokens"). That contract was violated for state.name in body paragraphs (only the
   title path called esc()), which let an attacker inject HTML via the name field (Codex QA
   finding #1, High severity). Escaping inside the renderer makes parseStoryLine safe regardless
   of what reaches the token — input strip, future call sites, or legacy localStorage values. */
function parseStoryLine(line) {
  return line.replace(/\[(name|c|y):([^\]]+)\]/g, (_, kind, text) => {
    const safe = esc(text);
    if (kind === 'name') return `<span class="pop pop--name">${safe}</span>`;
    if (kind === 'c')    return `<span class="pop">${safe}</span>`;
    if (kind === 'y')    return `<span class="pop pop--yellow">${safe}</span>`;
    return safe;
  });
}

function storyToPlainText(story) {
  const strip = s => s.replace(/\[(?:name|c|y):([^\]]+)\]/g, '$1');
  return story.title + '. ' + story.paragraphs.map(strip).join(' ');
}
