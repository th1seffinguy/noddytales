    detail: 'Playtest feedback from a 10-year-old: "the content is too mature for their reading level. Words are high vocabulary." A vocabulary audit of 200 big-tier stories flagged 32 distinct advanced words appearing 690 times — including "subsection," "stalemate," "wholeheartedly," "alibi," "plot twist," "ovation," "technically," "consecutive," "improvised." This was tween-level (11-13) language leaking into the shared kid+big content. v2.4.3 rewrites ~30 beats across all 4 blueprints and the punchline pool to use plain language while preserving the comedy structure. Examples: "stalemate" → "Now what?"; "Subsection seven mentions X, doesn\'t it?" → "Rule number seven says I can use X, right?"; "narrowed their eyes" → "stared hard"; "Plot twist:" → "Wait, WHAT?"; "standing ovation" → "huge clap"; "produced an enormous donut" → "pulled out one HUGE donut"; "fully intact" → "all in one piece"; "from absolutely nowhere" → "out of nowhere"; "satisfied" → "like nothing had happened". Tween-only beats (ages 11-13) are untouched — they keep their richer vocabulary by design. Result: 690 → 45 advanced-word occurrences (-93.5%). Eliminated entirely: subsection, stalemate, effective immediately, wholeheartedly, alibi, ovation, plot twist, technically, consecutive, improvised, satisfied, enormous, unstoppable, thorough, demanded, audience, rehearsed, venue. Regression test (400 stories ages 2-13): zero nulls, zero unresolved tokens.' },
  { v: 'v2.4.2', title: 'Cast introductions — the hamster no longer appears out of nowhere',
    detail: 'Real-kid playtest with a 4-year-old flagged a structural narrative bug: stories opened with "{kid} headed to the {place}" and then the companion suddenly *talked* in P2 with no introduction. ("The hamster" just appeared mid-story with no setup.) The user diagnosed the fix exactly: P1 should be "Livi headed to the volcano with her pet hamster." That is now the default for every little-tier opener. Two patterns fixed: (A) Little tier P1 beats rewritten to require companion in the opener — "One sunny morning, Livi and a hamster headed to the volcano." Removed the place-only fallback since companion is always populated. (B) Coverage callbacks were the OTHER phantom problem — "The ninja took notes. Probably." dropped the visitor cold mid-paragraph. Now: "Then a ninja appeared and started taking notes. Probably." Same fix for the move callback: "they danced" became "Livi danced" with a real subject. Kid/big P1 beats also tightened (gs_kid_2, ls_miss_1, sw_set_2, ls_susp_2). Smoke test: little tier companion-in-P1 went from ~50% to 100%, zero phantom visitor intros, zero stranded "they" subjects. Kid tier 78% is correct-by-design — rule_loophole stories star the visitor in P1, not the companion.' },
  { v: 'v2.4.1', title: 'Recent-beat memory — same picks now produce 10 different stories',
    detail: 'After v2.4.0 added 28 punchline beats, the engine\'s pure-random pick over both beat cards and line variants meant a kid hitting "again" with the same dragon + cookies could hear the same punchline 2-3 stories in a row. v2.4.1 adds a module-scoped FIFO that tracks recently-fired beat IDs (cap 30) and recently-rendered line keys (cap 80). When picking from candidates the engine prefers entries not in the recent set; falls back to the full pool if every candidate is recent so small pools never stall. Memory is page-lifetime / in-memory only — a fresh app open still feels fresh. New DevTools helpers: qaBeatMemoryStats() returns the FIFO contents, qaResetMemory() clears them between playtests. Smoke test (10 same-pick replays, age 6): 0/54 consecutive-paragraph exact-text repeats, 8-10 unique variants per paragraph slot out of 10 stories, every P5 punchline unique. Regression test (200 stories, ages 2-13): zero nulls, zero unresolved tokens, zero wrong paragraph counts. Story 1 fires goal_spine; Story 2 with identical picks fires show_wrong — completely different shapes from the same selections.' },
  { v: 'v2.4.0', title: 'Physical-absurd punchlines — the joke finally fires its second beat',
    detail: 'After v2.3.1 landed 4 blueprints, the LLM Council\'s remaining diagnosis still stood: stories arrived at a satisfying resolution and then went straight to bedtime — the joke never got its punchline. This release adds a dedicated PUNCHLINE beat between the climax and bedtime in every kid/big/tween story. 28 new punchline beat cards, all tier-tagged, all built around physical absurdity (NOT deadpan): the companion sneezes and {number} of the chosen food fly out of its nose; the chosen object splits into N smaller offended versions of itself; everyone in the room yells the chosen freeword at exactly the same time; the chosen object does one tiny "{sound}," then a bigger one, then the biggest ever recorded, then just sits there satisfied. Every punchline references chosen picks so the comedy carries causality — the joke is built out of THIS story\'s selections. Stories are now 6 paragraphs (was 5). Smoke test (300 stories across kid/big/tween): 0 nulls, 300/300 are 6 paragraphs, 0 unresolved {slot} tokens, 87% punchline-in-P5 for kid/big tiers, 78–95% per-blueprint coverage. Sample (rule_loophole, P5): "Then the umbrella did one tiny KABLAM. Then a much bigger KABLAM. Then the biggest KABLAM ever recorded. Then it just sat there, satisfied." This is the comedy beat that was missing in v2.3.x.' },
  { v: 'v2.3.1', title: 'Blueprint variety — same picks now produce different story shapes',
    detail: 'Integrates the user\'s v3 overhaul plan into the v2.3.0 causality engine without scrapping it. v2.3.0 made every kid/big/tween story follow ONE shape (goal_spine). v2.3.1 adds 3 new authored blueprints alongside it: LOST SNACK RESCUE (food disappears → wrong suspect → kid investigates → companion is the true culprit), SHOW GOES WRONG (kid prepares show → prop breaks → kid improvises with freeword/move → triumph), and RULE LOOPHOLE (visitor imposes absurd rule → blocks kid → kid finds object-based loophole → wins). Each blueprint has 12 new tier-aware beat cards (36 total new beats). Engine picks one of the 4 blueprints uniformly per story, so replaying the same picks produces visibly different story shapes. Each blueprint carries the causality DNA from v2.3.0: chosen picks are load-bearing (food is the missing thing, visitor is the rule-imposer, object is the loophole). Smoke test (100 generations, same picks): 25/25 ish blueprint distribution, 0 nulls, 100% pet/food coverage, 94% place-in-P1. New blueprint-aware titles: "Who Took the Donuts?", "Cole Saves the Show", "Cole Finds a Loophole". Structural refactor to typed story parts (the bigger v3 plan ambition) is deferred to v2.4.0 — it would replace the regex highlight layer with structured rendering, but ships better as its own focused build.' },
  { v: 'v2.3.0', title: 'Causality engine — chosen words drive the plot now',
    detail: 'The LLM Council\'s root-cause fix shipped. Earlier stories were "sentence sprinklers" — each beat was a non-sequitur, chosen words were decoration, and the kid was a witness not a protagonist. v2.3.0 introduces a real causality spine for kid/big/tween tiers (tot + little keep their simpler recipes). Every story now has an explicit GOAL declared by the kid in paragraph 1 (find the missing thing, win the silly race, wake up the moon, etc. — 30 entries). One chosen pick BLOCKS the goal (pet/visitor creates the obstacle). The kid uses ANOTHER chosen pick as a TOOL (food/object/move/color resolves it). The goal is referenced across 4 of 5 paragraphs — the causal glue the audit was missing. Smoke test (50 same-pick generations): goal in 50/50 bodies, chosen food/object as tool in 46/50, kid is the active subject. New title patterns reference the actual goal so the title sells the story: "The Day Cole Tried to Build the Perfect Hideout," "How Livi Found the Way Home."' },
  { v: 'v2.2.4', title: 'Hot-fix: title now renders chips correctly + muffin→cupcakes',
    detail: 'Two visible bugs from real-kid playtest. (1) Story TITLE was rendering [name:Livi] as literal text — renderStory had a homemade alternating-color word-splitter that escaped each word and never called parseStoryLine. Body paragraphs worked because they DID go through parseStoryLine. Fixed by running the title through the same parseStoryLine path as the body. (2) Little tier picker had "muffins" labeled with the cupcake emoji 🧁. Renamed to "cupcakes" so the word matches the icon. A bigger causality-engine overhaul (the LLM Council recommendation) follows in v2.3.0.' },
  { v: 'v2.2.3', title: 'Bug-fix triage: name, highlights, TTS audio mismatch',
    detail: 'Three confirmed bugs from the 60-story audit + user playtest. (1) NAME REGRESSION: {kid.cap} resolved to empty string when slot.text was absent (kid slot uses .name) — caused "  had a plan" empty-subject sentences in 23/60 stories. Fixed in resolveSlot. (2) HIGHLIGHTS: v2 paragraphs never produced [name:X]/[c:X]/[y:X] tokens that parseStoryLine wraps in chip styling. 60/60 stories had no highlights. Added a post-processing pass in generateStoryV2 that wraps kid name + sidekick names + user-picked pet/food/creature/color/move/mood + setting place + freeword in the right tokens. Selected words are now visibly highlighted again. (3) TTS NAME MATCH: removed the v2.2.1 TTS request-body scrub that replaced Cole→Friend before sending to ElevenLabs. The audio narrator now speaks the child\'s real name, matching the visible story. Also added window.qaStoryMatrix() DevTools helper (5 stories per age across 12 ages = 60) for ongoing audits.' },
  { v: 'v2.2.2', title: 'Align Parent Settings gear with back button',
    detail: 'In v2.2.1 the gear floated ~14px from the top while the back button sat at 28px (screen padding-top), so the gear visually drifted above the back button. Repositioned gear to top: 28px (with safe-area math) so its top aligns with the screen-head row. Both header controls now share the same y position.' },
  { v: 'v2.2.1', title: 'QA repair: choice coverage, library expansion, TTS privacy, header gear',
    detail: 'Five-part repair pass. (1) CHOICE COVERAGE CONTRACT: the v2 engine now reads color/move/mood/freeword2 from picks (previously ignored) and a new validator+repair step at the end of generateStoryV2 guarantees every selected pet/food/place/setting/creature appears in the body. Verified 0/50 missing across all required slots with parrot/donuts/jungle/dinosaur acceptance picks. New window.qaChoiceCoverage() helper for DevTools. (2) SUBSTANCE: 14 new child-agency beats — kid decides, refuses, trades, notices, asks instead of being a passive observer. Each new beat requires a user-picked slot so it doubles as coverage. (3) LIBRARY EXPANSION: free-text prompts little 12→30, kid 16→40, big 16→40, tween 16→40 with subtype variety (spell/rule/excuse/job/warning/password/announcement/dance/snack/secret). Rich words foods 20→35, objects 25→45, sounds 24→40, rules 14→30, jobs 16→30. Setting object-biases rewritten per Diner/Mall/Football/School/Backyard/Grocery/Zoo/Bus briefs. (4) HEADER GEAR: Parent Settings gear moved from bottom-left to top-right, 44×44 tap target, circular, safe-area-aware. Back button shifted left to avoid collision. (5) TTS PRIVACY: child name and sidekick names were scrubbed from the /api/tts request body (replaced with "Friend"/"Pal" — same word count, karaoke alignment preserved). Visible story still showed the real names. **(Note: this scrub was REMOVED in v2.2.3 — the audio narrator now speaks the real name, matching the visible story.)**' },
  { v: 'v2.2.0', title: 'Local Profile + Parent Settings foundation',
    detail: 'Centralized all persistent state into a single Profile module (name, age, sidekicks, setting, potty mode). Returning users with name + age remembered now skip both steps and land on the sidekick page with a "Welcome back, Cole!" treatment that confirms "Still age 6? Same crew?" — saves several taps per session. New ⚙︎ gear icon in the bottom-left opens a Parent Settings overlay showing what is saved on the device and offering a "Clear saved profile" button. Future parent-only toggles (Potty Mode relocation, Save Story, Story History) are shown as disabled placeholders so the surface exists for upcoming builds. 100% local-only — no accounts, no server sync, no analytics. Engine flag and parental PIN are intentionally NOT touched by Clear Profile.' },
  { v: 'v2.1.1', title: 'Mobile fix: Next button visible on age screen without scroll',
    detail: 'The age-select screen had 4 rows of square tiles plus the Extra-silly-mode toggle pushing the Next button below the mobile viewport. Tightened the layout: tile aspect-ratio 1.0 → 1.18 (slightly shorter), grid gap 12px → 10px, tile font 38px → 34px. Saves ~75px vertical. Tiles still read as large, comfortable tap targets; Next button now reaches without scrolling on standard mobile heights.' },
  { v: 'v2.1.0', title: 'Story Setting Modes — pick where the story happens',
    detail: 'Eight relatable settings + Surprise: Diner, Mall, Football Game, School, Backyard, Grocery Store, Zoo, On the Bus. Settings appear as a tile grid after the sidekick step. Each setting locks the story\'s place ("The diner", "the mall") AND biases the visitor + object pools so a Diner story leans toward stressed-barista-style visitors and diner-flavored objects, while a Football Game story leans toward whistles and dramatic capes. New "setting-anchor" beats guarantee the first paragraph mentions the chosen location: 30/30 stories per setting reference the place (verified across 240 generated stories). Surprise mode is the default and behaves exactly like before. Defect Log re-audit: 4 of 5 open defects were resolved automatically by the v2.0 architecture (template recycling, plural foods, double-verb, hardcoded bouncy-castle-smell phrase). The 5th (sound repeated 7+ times in pre-reader) is now fixed by trimming tot beat sound usage to cap at 3 per story.' },
  { v: 'v2.0.0', title: 'v2 engine is now the default — authored comedy engine across all 5 tiers',
    detail: 'Five segments later, NoddyTales is now an authored comedy engine instead of a template-substitution app. Every story is assembled from rich word objects + beat cards + story-shape recipes. The architecture supports 8 recipes (Quest, Mystery, Trial, Performance, Bureaucracy, Social Embarrassment, Tot Loop, Gentle Quest), 23 seeds, 91 beats, and 250+ rich word objects across all 5 age tiers. Tier-specific voice: tot gets gentle repetition, little gets confused-animals whimsy, kid gets Goofy-Shorts spell-chants, big gets dry mock-bureaucracy, tween gets internet deadpan. The v1 templates remain in the codebase as a runtime fallback — if v2 ever returns null or throws, v1 quietly takes over so users never see a broken screen. Opt back to v1 anytime with ?engine=v1.' },
  { v: 'v1.23.0', title: 'v2 engine — Phase 4 (Segment D): tot + little tiers — v2 covers all 5 tiers',
    detail: 'v2 engine now generates stories for every age tier behind the ?engine=v2 flag. Added 2 new recipes tuned for the youngest audiences: tot_loop (4 beats: tot_intro → tot_silly_meet → tot_silly_repeat → tot_cozy_end, heavy repetition, very short sentences) and gentle_quest (4 beats: little_intro → little_companion → little_silly_event → little_cozy_end, no irony, tiny-jobs/confused-animals/weather-nonsense register). 6 new tot+little seeds, 18 new restraint-tuned beat cards. Tot stories produce 4 paragraphs of "Hi! Cole met a dragon. The dragon said hi. Cole said hi back."; little stories produce 4 paragraphs of "The dragon had a tiny hat on. The hat was a little too big." Smoke test: 50/50 across all 5 tiers, 0 grammar errors, 0 unresolved tokens. Recipe count 6→8, seeds 17→23, beats 74→91. Next: v2.0.0 flips v2 to default and removes v1 fallback.' },
  { v: 'v1.22.0', title: 'v2 engine — Phase 3 (Segment C): big + tween tiers',
    detail: 'Extended the v2 engine from kid-only to kid + big (8–10) + tween (11–13). Tot and little still run v1 (Segment D adds them). Added 5 tween-flavored companions (crow, hamster, chameleon, raccoon, red panda), 7 tween visitors (stressed barista, feral librarian, wifi ghost, cryptid, sentient vending machine, mysterious substitute teacher, group chat), and 10 tween places (abandoned mall, skatepark, parking garage, arcade, etc.). New recipe: social_embarrassment (ordinary_setup → public_mistake → witnesses → spiral → bedtime_landing) — captures the deadpan internet-flavored register the spec specifies for tween. 7 new big-tier seeds and 18 new tween-specific beat cards bring totals to 6 recipes / 17 seeds / 74 beats. Smoke test: 50/50 generation across all 3 supported tiers with 0 grammar errors. Big tier nails dry mock-bureaucratic voice; tween nails "Nobody had asked" / "It was, somehow, a vibe" register.' },
  { v: 'v1.21.0', title: 'v2 engine — Phase 2 (Segment B): kid library expansion + 5 recipes',
    detail: 'Expanded the kid-tier v2 library from ~10 to 20+ entries per category (companions 20, visitors 20, places 20, foods 20, objects 25, sounds 24, adverbs 16, numbers 14, liquids 14, jobs 16, rules 14 — totaling 189 rich word objects). Added 4 new recipes (Mystery, Trial, Performance, Bureaucracy) bringing total to 5. Added 5 new story seeds spanning the new recipes (10 total). Added 34 new beat cards across 16 new beat types (49 total). Each recipe now has a distinct shape: Mystery (clue→suspect→false solution→culprit→bedtime), Trial (rule→judge→evidence→verdict→bedtime), Performance (practice→disaster→improvisation→applause→bedtime), Bureaucracy (paperwork→impossible rule→loophole→stamp→bedtime). Title pool grew from 6 to 14 universal + 3 recipe-specific patterns. Smoke test (100 generations): 0 grammar errors, 0 unresolved tokens, 26/100 unique titles. Still kid-tier only — Segment C adds big + tween next.' },
  { v: 'v1.20.0', title: 'v2 engine — Phase 1 (Segment A): authored comedy prototype',
    detail: 'First segment of the v2.0 architecture rebuild. The v2 engine generates kid-tier stories from rich word objects + beat cards + story-shape recipes instead of v1\'s template-substitution model. Phase 1 ships: 10 of each rich word type (companions, visitors, places, foods, objects, sounds, adverbs, numbers, liquids, jobs, rules), grammar renderer (articleText/theText/TheText/titleCase/plural/possessive), 1 recipe (Quest, 5 beats), 5 story seeds, 15 beat cards, and generateStoryV2(). Enabled with ?engine=v2 (persists to localStorage). Default is still v1. Kid tier only — other ages run v1 unchanged. Falls back to v1 silently on any v2 failure. Smoke test: 50/50 stories generated cleanly, 0 grammar errors (including hostile combos like octopus+tacos+alien), proper articles ("an octopus" / "some tacos"), proper subject-position articles ("the dragon nodded" / "said the dragon"). Subsequent segments expand the library, add recipes, add tiers, eventually flip v2 to default in v2.0.0.' },
  { v: 'v1.19.3', title: '"The End" warmth + mid-sentence "Their pal" fix',
    detail: '"End" was reading with mid-sentence intonation instead of sentence-final closing. Redesigned the TTS end-marker from "Theeeeeee.. End." (2-dot near-ellipsis, capitalized "End") to "Theeee... end." (standard 3-dot ellipsis, lowercase "end" with period). Lowercase "end" tells the model it\'s a common noun in a sentence, not a heading — gets the natural falling cadence audiobook narrators use for warm story closings. Also fixed a Codex-flagged residue: one kid template had `[name:Cole] and ${SK_OPEN} chased...` which read as "Cole and Their pal chased" (mid-sentence capital). Now uses the lowercase mid-sentence form.' },
  { v: 'v1.19.2', title: 'Codex QA sweep — XSS, little freeword, plural grammar, FW routing',
    detail: 'Five Codex QA findings closed. (1) Name field could inject raw HTML into story body — added input strip plus defense-in-depth esc() inside parseStoryLine() so the renderer is safe regardless of source. (2) Little tier (4–5) was using FW_SAFE heavily but never asking for a freeword — added FREE_TEXT_ROUNDS.little pool with 12 age-appropriate prompts and a buildRounds little branch. Kids now get their own silly word, not FLABBADOO. (3) Restored v1.15 semantic freetext routing for kid tier: added 3 specialized templates tagged ["smell"], ["name"], ["dance"] that fire only on matching subtype. (4) Plural food grammar: "The cookies was gone" rewritten as "The cookies had vanished" + "Just cookies everywhere" — works for sg + pl. (5) Added .claude/worktrees/ to .gitignore.' },
  { v: 'v1.19.1', title: 'Defect log sweep — phantom name, end-marker, karaoke',
    detail: 'Three defects closed. (1) Critical: a fabricated sidekick name (Maya) was appearing in stories when the user hadn\'t entered any sidekicks. Removed the DEFAULT_SIDEKICKS pool entirely — no invented names are ever generated. When no user sidekick exists, kid/little templates fall back to "their pal" (with chip styling) instead. (2) Trimmed the dramatic "The End" TTS closer from 14 elongated e\'s to 7 — closer should be ~1.5-2s instead of the previous ~3s. (3) Karaoke alignment: pre-cached .kw[data-wi] node lookups (O(1) per frame instead of querySelector each tick) and added inter-word continuity so the highlight stays lit during inter-word gaps instead of blanking — the perceived "audio is ahead of text" comes from those blank flashes.' },
  { v: 'v1.19.0', title: 'Goofy Shorts: Little Edition (ages 4–5)',
    detail: 'Story Test Log Entry 001 ("The Sunny Island Adventure", age 5) scored 2/1/3/2/1 across humor / substance / age-fit / name-integration / replayability — failing on the core promise. The Goofy Shorts voice from v1.18.0 (which scored 5/4/5/5/5 in Entry 002) was rolled out to the little tier. 7 old little templates replaced with 8 new Goofy Shorts: Little Edition. Same structural rules as kid (sidekick drives action, silly adjective + silly noun, freeword 2–3× as shoutable spell, 4 paragraphs, punchline ending) tuned for 4–5 year olds with simpler vocab and heavier repetition. Little PARAGRAPH_LIMIT dropped 5→4. Adult-ironic asides + 60% cameo injection now skipped for both kid and little tiers.' },
  { v: 'v1.18.2', title: 'Fix: duplicate "The End" at story close',
    detail: 'Every story was ending twice — last paragraph said "THE END." (kid) or "The end! 🌟" (tot), and the renderer added "✦ The End ✦" right below it. The narrator was reading both. Stripped the in-paragraph markers from 8 kid + 5 tot templates. The renderer\'s "✦ The End ✦" is now the single source of truth, paired with the dramatic elongated TTS closer from v1.16.2. Karaoke word-counts stay in sync (both DOM and TTS lose the same words). Logged as defect log entry "Duplicate \'The End\' rendering".' },
  { v: 'v1.18.1', title: 'Name remembered between stories',
    detail: 'Tap "Start over" and the kid\'s name is still there — no more re-typing "Cole" every time. The name persists to local storage (same way sidekicks already do) and the welcome flow jumps straight to age selection. To change the name, tap "← back" from the age screen and use the × on the name chip. Built for back-to-back bedtime stories without UX friction.' },
  { v: 'v1.18.0', title: 'Goofy Shorts — kid tier rewrite',

  { v: 'v1.17.0', title: 'Five new kid templates — more variety',

  { v: 'v1.16.2', title: 'Dramatic "The End" closer',

  { v: 'v1.16.0', title: 'Callback motif tracking',

function showWhatsNew() {
  if (document.querySelector('.whatsnew-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'whatsnew-overlay';
  overlay.innerHTML = `
    <div class="whatsnew-card">
      <div class="whatsnew-head">
        <h2 class="whatsnew-title">What's New ✨</h2>
        <button class="whatsnew-close" id="whatsnew-close" aria-label="Close">×</button>
      </div>
      ${RELEASE_NOTES.map(n => `
        <div class="whatsnew-entry">
          <div class="whatsnew-version">${n.v}</div>
          <p class="whatsnew-summary">${n.title}</p>
          <p class="whatsnew-detail">${n.detail}</p>
        </div>
      `).join('')}
      <a class="whatsnew-link" href="https://github.com/th1seffinguy/noddytales/blob/main/CHANGELOG.md" target="_blank" rel="noopener">
        Full changelog on GitHub →
      </a>
    </div>
  `;
  document.querySelector('.app').appendChild(overlay);
  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#whatsnew-close').addEventListener('click', close);
}

document.getElementById('version-badge').addEventListener('click', showWhatsNew);

/* ================================================================
   v2.2.0 — Parent settings overlay
   ================================================================
   Triggered by the ⚙︎ gear icon in the bottom-left corner. Shows:
     - A read-only summary of the local profile (what's been saved)
     - "Clear saved profile" button (with confirmation)
     - Placeholder rows for future parent-only toggles (currently disabled)

   The future toggles section signals the architecture without
   committing copy/behavior — they show as DISABLED with "soon" tags
   so the surface exists when Potty-Mode-relocation, Save Story, etc.
   land in subsequent builds.

   No network. No analytics. No accounts. localStorage-only.
   ================================================================ */
function showParentSettings() {
  if (document.querySelector('.settings-overlay')) return;
  if (document.querySelector('.whatsnew-overlay')) return; // don't stack overlays

  const profile = Profile.load();
  const overlay = document.createElement('div');
  overlay.className = 'settings-overlay';
  overlay.innerHTML = `
    <div class="settings-card">
      <div class="settings-head">
        <h2 class="settings-title">Parent Settings</h2>
        <button class="whatsnew-close" id="settings-close" aria-label="Close">×</button>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Saved on this device</div>
        <div class="settings-row">
          <span class="label">Name</span>
          <span class="value">${profile.name ? esc(profile.name) : '— not set —'}</span>
        </div>
        <div class="settings-row">
          <span class="label">Age</span>
          <span class="value">${profile.age != null ? profile.age : '— not set —'}</span>
        </div>
        <div class="settings-row">
          <span class="label">Sidekicks</span>
          <span class="value">${profile.sidekicks.length ? esc(profile.sidekicks.join(', ')) : '— none —'}</span>
        </div>
        <div class="settings-row">
          <span class="label">Setting</span>
          <span class="value">${esc(profile.setting || 'surprise')}</span>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Narrator voice</div>
        ${renderVoicePickerGrid(state.voicePreset)}
        <p class="settings-footnote" style="margin-top:8px;">
          Tap ▶ to preview a voice. Voice change applies on the next "Read it to me."
          Each voice caches its own audio, so switching back is instant on stories you've already heard.
        </p>
      </div>

      <div class="settings-section">
        <div class="settings-section-label">Future controls</div>
        <div class="settings-row settings-disabled">
          <span class="label">Potty word mode <span class="settings-tag">soon</span></span>
          <span class="value">off</span>
        </div>
        <div class="settings-row settings-disabled">
          <span class="label">Save story <span class="settings-tag">soon</span></span>
          <span class="value">—</span>
        </div>
        <div class="settings-row settings-disabled">
          <span class="label">Story history <span class="settings-tag">soon</span></span>
          <span class="value">—</span>
        </div>
      </div>

      <div class="settings-section">
        <button class="settings-btn-danger" id="btn-clear-profile">
          Clear saved profile
        </button>
        <p class="settings-footnote">
          Name, age, sidekicks, setting, and potty mode are stored only on this device.
          Clearing them returns the app to first-time mode. No data leaves your device.
        </p>
      </div>
    </div>
  `;
  document.querySelector('.app').appendChild(overlay);

  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#settings-close').addEventListener('click', close);

  // v0.9.3 · b10 — wire voice picker through the shared helper so Parent
  // Settings + the story-screen modal share identical selection + preview
  // behavior. attachVoicePickerHandlers updates Profile + state when a card
  // is tapped and plays a short preset clip when the ▶ button is tapped.
  attachVoicePickerHandlers(overlay);

  overlay.querySelector('#btn-clear-profile').addEventListener('click', () => {
    if (!confirm('Clear all saved profile data?\n\nThis removes the saved name, age, sidekicks, and setting from this device. The current story (if any) stays on screen until you start a new one.')) return;
    Profile.clear();
    // Mirror in-memory state so the next render reflects the cleared profile.
    state.name = '';
    state.age = null;
    state.sidekicks = [];
    state.setting = 'surprise';
    state.pottyMode = false;
    state.voicePreset = VOICE_PRESET_DEFAULT;  // v0.9.3 · b8 — reset voice to default on clear
    state.welcomeStep = 'name';
    close();
    goTo('welcome');
  });
}

document.getElementById('settings-gear').addEventListener('click', showParentSettings);

/* ================================================================
   AGE TIERS
   ================================================================ */
function tierFor(age) {
  if (age <= 3)  return 'tot';
  if (age <= 5)  return 'little';
  if (age <= 7)  return 'kid';
  if (age <= 10) return 'big';
  return 'tween';
}


/* v0.9.3 · b23 — HIGH_IMPACT round marker.
   Notion Build Idea: 36813aa1-d4db-8147-84a8-eb888c5c6900.

   Rounds that feed engine "punchline" roles (chant / payoff_word, rendered
   with [y:...] yellow highlight tokens) are marked highImpact:true here.
   For freetext rounds we ALSO swap the per-prompt `examples` array with
   3 tier-appropriate entries drawn live from ABSURD_WORD_BANK so the
   hint chips a kid sees are absurd-flavored (priming "stinky bananas"
   over "Zap"). Original FREE_TEXT_ROUNDS entries are never mutated —
   we return a new object every session. The chosen sound tap round
   (SOUND_HOT_OPTS) is already absurd by construction; tagging it
   highImpact lets the QA Section 17 audit verify the contract end-to-end. */
function applyHighImpact(round, tier) {
  if (!round) return round;
  const out = { ...round, highImpact: true };
  if (out.type === 'freetext') {
    const fresh = (typeof absurdHintsForTier === 'function') ? absurdHintsForTier(tier) : null;
    if (fresh && fresh.length) out.examples = fresh;
  }
  return out;
}

function buildRounds(age) {
  const tier = tierFor(age);
  const plan = ROUND_PLAN[tier];

  // v2.10.1 — when a non-"surprise" setting is locked (Diner / Mall / Beach /
  // etc.), the engine already uses setting.place as the location and silently
  // discards any user-picked `place` word. That broke the picked-word coverage
  // promise: the child picked "volcano" but read a mall story. Fix: skip the
  // `place` round entirely when the setting is locked so the child doesn't
  // pick a word that vanishes. Defect Log entry from v2.8.0 UAT rescore.
  const settingLocked = !!(state.setting && state.setting !== 'surprise');
  const effectivePlan = settingLocked ? plan.filter(cat => cat !== 'place') : plan;

  // Randomly pick 2 options from each round's pool of 6
  // v0.9.3 · b3 — attach fullPool to each round so the shuffle 🎲 button can re-roll
  // by sampling fresh options from the same pool (excluding the currently-shown 2).
  const binaryRounds = effectivePlan
    .map(cat => WORD_BANK[tier].find(r => r.cat === cat))
    .filter(Boolean)
    .map(round => {
      const shuffled = [...round.options].sort(() => Math.random() - 0.5);
      return { ...round, options: shuffled.slice(0, 2), fullPool: round.options };
    });

  // v0.9.3 · b2 — Selection Joy Pass Phase 1: little + kid sessions get a TAP-BY-DEFAULT
  // silly-sound round in place of the prior freetext-by-default round. Live testing showed
  // ages 4-7 type slowly on phones and the freetext round broke the picker's tap-rhythm.
  // The chosen sound still feeds the same picks.freeword slot the engine reads — story-side
  // unchanged. Kid sessions get an additional "or type your own ✏️" escape hatch button
  // beneath the two sound cards (see renderWords). Little sessions don't get the escape
  // hatch (4-5 can't reliably type). See docs/versioning.md, Selection Joy Pass Build Idea.
  function buildSoundRound() {
    const shuffled = [...SOUND_HOT_OPTS].sort(() => Math.random() - 0.5);
    // v0.9.3 · b23 — sound tap round feeds the `chant` HIGH_IMPACT role.
    // Both options come from SOUND_HOT_OPTS (BABOOM/WHAMMY/...) so the
    // "both choices must come from the Absurd Word Bank" contract holds
    // — SOUND_HOT_OPTS is the binary-round counterpart to ABSURD_WORD_BANK
    // and is enumerated as a high-impact-eligible pool by QA Section 17.
    return applyHighImpact({
      cat: 'freeword',          // engine reads picks.freeword same as the old freetext slot
      label: 'Pick a silly sound',
      options: shuffled.slice(0, 2),
      fullPool: SOUND_HOT_OPTS, // v0.9.3 · b3 — shuffle 🎲 re-roll source
    }, tier);
  }
  // v1.19.2 — little tier gets one freeword round (Codex QA finding #2). Goofy Shorts: Little
  // Edition templates repeat the freeword as a shoutable spell — without this round, FW_SAFE
  // was falling back to FLABBADOO/KAPOW/etc. and the kid's own word was never invited.
  if (tier === 'little') {
    const ft = [buildSoundRound()];
    // v2.4.6 — little tier weather round: WORD_BANK.little has a 12-option weather pool but
    // ROUND_PLAN never used it. ~30% of sessions now swap the creature round for weather so
    // it's a swappable variant instead of always-on (kid + creature variety still primary).
    const rounds = [...binaryRounds.slice(0, 3), ...ft, ...binaryRounds.slice(3)];
    if (Math.random() < 0.3) {
      const weatherRound = (WORD_BANK.little || []).find(r => r.cat === 'weather');
      if (weatherRound) {
        const shuffled = [...weatherRound.options].sort(() => Math.random() - 0.5);
        // v0.9.3 · b3 — attach fullPool for shuffle re-roll
        const swappable = { ...weatherRound, options: shuffled.slice(0, 2), fullPool: weatherRound.options };
        const creatureIdx = rounds.findIndex(r => r && r.cat === 'creature');
        if (creatureIdx >= 0) rounds[creatureIdx] = swappable;
      }
    }
    return rounds;
  }
  if (tier === 'kid') {
    // v0.9.3 · b2 — kid sound round carries the original freetext prompt as escapeHatchTo
    // so renderWords() can show a "type your own ✏️" button beneath the cards. Tapping the
    // hatch swaps state.rounds[idx] to the freetext round and re-renders. Default flow = zero
    // typing friction; escape hatch preserves the creativity door for kids who want it.
    const ftPool   = FREE_TEXT_ROUNDS.kid;
    // v0.9.3 · b23 — escape-hatch freetext round also feeds the chant HIGH_IMPACT slot,
    // so its examples get the absurd-hint swap. Without this, tapping the hatch would
    // surface generic example chips and undo the b23 priming.
    const ftRound  = applyHighImpact(ftPool[Math.floor(Math.random() * ftPool.length)], tier);
    const sound    = buildSoundRound();
    sound.escapeHatchTo = ftRound;
    // v0.9.3 · b2 — Potty Mode flow simplified: sound is now universal at kid tier so Potty
    // Mode only adds the body round on top. Was: pottyMode added BOTH body + sound (10 total
    // rounds). Now: pottyMode adds body only (9 total rounds); the sound round is already in
    // the slot the freetext round used to occupy. Net effect: pottyMode = +1 round (was +2).
    if (state.pottyMode) {
      const bodyShuffled = [...BODY_HOT_OPTS].sort(() => Math.random() - 0.5).slice(0, 2);
      // v0.9.3 · b3 — attach fullPool so shuffle works on the body round too
      const bodyRound    = { cat: 'body', label: 'Pick a silly body word', options: bodyShuffled, fullPool: BODY_HOT_OPTS };
      return [...binaryRounds.slice(0, 4), sound, bodyRound, ...binaryRounds.slice(4)];
    }
    return [...binaryRounds.slice(0, 4), sound, ...binaryRounds.slice(4)];
  }
  if (tier === 'big') {
    const pool = [...FREE_TEXT_ROUNDS.big].sort(() => Math.random() - 0.5);
    // v0.9.3 · b23 — both freetext rounds feed HIGH_IMPACT slots (chant + payoff_word).
    // Wrap with applyHighImpact so examples are absurd-tier hints, not whatever the
    // original prompt defined statically.
    const ft1 = applyHighImpact(pool.find(p => p.cat === 'freeword')  || pool[0], tier);
    const ft2 = applyHighImpact(pool.find(p => p.cat === 'freeword2' && p !== ft1) || pool[1], tier);
    return [
      ...binaryRounds.slice(0, 4),
      ft1,
      ...binaryRounds.slice(4, 5),
      ft2,
      ...binaryRounds.slice(5),
    ];
  }
  if (tier === 'tween') {
    const pool = [...FREE_TEXT_ROUNDS.tween].sort(() => Math.random() - 0.5);
    // v0.9.3 · b23 — same HIGH_IMPACT treatment as big tier.
    const ft1 = applyHighImpact(pool.find(p => p.cat === 'freeword')  || pool[0], tier);
    const ft2 = applyHighImpact(pool.find(p => p.cat === 'freeword2' && p !== ft1) || pool[1], tier);
    return [
      ...binaryRounds.slice(0, 4),
      ft1,
      ...binaryRounds.slice(4, 5),
      ft2,
      ...binaryRounds.slice(5),
    ];
  }
  return binaryRounds;
}

/* ================================================================
   STORY BUILDER
   ================================================================ */
function capitalize(s) {
  if (!s) return '';
  return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

/* Tokens: [name:X] [c:X] [y:X] — rendered as highlighted spans */
function buildStory(name, picks, age) {
  // v1.20.0 — v2 engine entry point (behind feature flag).
  // v1.22.0 extended to kid/big/tween. v1.23.0 added tot + little — v2 now covers all 5 tiers.
  // v2.0.0 made v2 the default.
  // v2.1.0 — inject state.setting into picks so the v2 engine can lock the place slot.
  // v2.5.0 — experimental v3 path. When ?engine=v3 (or nt_engine_v3 stored = '1'),
  // try generateStoryV3 first. v3 returns null for tot/little; falls through to v2.
  // v2.6.2 — pass storyMode through to the engine so cozy_end / landing beats can
  // pick from 'bedtime' (default, sleep imagery) or 'anytime' (daytime walk-home) pools.
  // v0.9.3 · b9 — Setting 2.0: resolve the flavor to a concrete setting object
  // (with a randomly-picked hidden place) BEFORE handing off to the engine. The
  // engine expects the legacy V2_SETTINGS shape ({id,place,visitorBias,objectBias});
  // resolveSetting() synthesizes that shape from SETTING_FLAVORS so the engine
  // doesn't need to know about flavors at all. Per-session randomness in
  // hiddenPlaces means a kid locking "Food Place" gets diner one session,
  // bakery the next, ice cream truck after that.
  const resolvedSetting  = resolveSetting(state.setting || SETTING_FLAVOR_DEFAULT);
  const picksWithSetting = {
    ...picks,
    setting:   resolvedSetting,
    storyMode: state.storyMode || 'bedtime',
  };

  // v3.0.0 — v3 is the UNIFIED ENGINE for all ages 2-13. The v2.9.0 router preferred
  // v3 only for ages 6+; v2.10.0 added tot/little-v3 blueprints; v3.0.0 flips the
  // last switch — every age now tries v3 first. v2 is retained as a silent fallback
  // for one release (v3.0.0) so any latent v3 issue can be rolled back without a
  // redeploy. v3.0.1 (next release) will delete the v2 codepath entirely once
  // production traffic confirms v3 is stable. legacy/engine-v2.js holds a snapshot
  // for rollback.
  //
  // The ?engine=v2 / ?engine=v1 flags still work as testing overrides.
  const preferV3 = (typeof generateStoryV3 === 'function');
  if (preferV3) {
    try {
      const v3Result = generateStoryV3(name, picksWithSetting, age);
      if (v3Result && v3Result.title && Array.isArray(v3Result.paragraphs) && v3Result.paragraphs.length > 0) {
        return v3Result;
      }
    } catch (err) {
      try { console.warn('[engine-v3] fallback to v2:', err); } catch {}
    }
  }

  // Silent fallback to v1 if generateStoryV2 returns null/throws for any reason.
  if (isEngineV2Enabled() && typeof generateStoryV2 === 'function') {
    try {
      const v2Result = generateStoryV2(name, picksWithSetting, age);
      if (v2Result && v2Result.title && Array.isArray(v2Result.paragraphs) && v2Result.paragraphs.length > 0) {
        return v2Result;
      }
    } catch (err) {
      // Log but don't surface to user — fall through to v1.
      try { console.warn('[engine-v2] fallback to v1:', err); } catch {}
    }
  }

  // v2.9.0 — reaching this point means v3 returned null AND v2 returned null/threw.
  // The v1 template fallback is deprecated and scheduled for v3.0.0 removal. Log once
  // per page-load so any production fire is visible in DevTools.
  warnV1DeprecationOnce('v2 and v3 both returned null at age=' + age);

  const t   = tierFor(age);
  const N   = name || 'Friend';
  const get = (k, fb = '') => (picks[k] && picks[k].w) || fb;

  const PET  = get('pet', 'puppy');
  const COL  = get('color', 'blue');
  const FOOD = get('food', 'cake');
  const PLC  = get('place', 'park');
  const SKY  = get('sky', 'sun');
  const CRE  = get('creature', 'frog');
  const MOV  = get('move', 'hopped');
  // Verb forms — used by templates that need base ("loved to hop") or gerund ("set off hopping")
  // instead of the default past tense ("they hopped").
  const moveBase   = past => (VERB_FORMS[past] && VERB_FORMS[past].base)   || past;
  const moveGerund = past => (VERB_FORMS[past] && VERB_FORMS[past].gerund) || past;
  const MOV_BASE   = moveBase(MOV);
  const MOV_GERUND = moveGerund(MOV);
  const MOD  = get('mood', 'silly');
  const WX   = get('weather', 'sunny');
  const FW   = get('freeword', '');
  const FW2  = get('freeword2', '');
  // Subtype tells templates how to route the freeword: shout (default), smell, name, dance, word.
  // Falls back to 'shout' for legacy picks that didn't carry a subtype.
  const FW_SUBTYPE = (picks.freeword && picks.freeword.subtype) || 'shout';

  // Fix article agreement in templated noun phrases. One pass that handles BOTH
  // single-token ("a [c:tacos]") and multi-token ("a [c:electric blue] [c:tacos]") cases.
  //
  // Algorithm per matched "[Aa] [token1] [token2] ... [tokenN]":
  //   1. If LAST token is plural-looking (ends in -s, not a singular-s exception) → "some"
  //      Plural overrides vowel because "some" works regardless of the next sound.
  //   2. Else if FIRST token starts with a vowel → "an"
  //   3. Else leave "a"/"A" alone.
  //
  // NOT_PLURAL_RE catches singular nouns ending in -s (octopus, bus) and adjectives ending
  // in -ous (mysterious, curious, ridiculous). Mass nouns ending in -s (cheese? no — gas, etc.)
  // are explicitly whitelisted. Whitelist "bonkers" because it's an adj that ends in -ers.
  const NOT_PLURAL_RE = /\b(?:cheese|sushi|broth|juice|tea|jelly|jam|soup|stew|cereal|granola|sauce|honey|gas|ice|rice|bread|toast|bonkers)\b|(?:ous|us|ss)$/i;
  const TOKEN_RE      = /\[(?:name|c|y):([^\]]+)\]/g;
  const fixArticles = s => s.replace(
    /\b([Aa])((?:\s+\[(?:name|c|y):[^\]]+\])+)/g,
    (match, art, tokensRaw) => {
      const tokens = [];
      let m;
      TOKEN_RE.lastIndex = 0;
      while ((m = TOKEN_RE.exec(tokensRaw)) !== null) tokens.push(m[1]);
      if (tokens.length === 0) return match;
      const lastWord  = tokens[tokens.length - 1];
      const firstWord = tokens[0];
      // Plural test first (highest priority).
      if (/s$/i.test(lastWord) && !NOT_PLURAL_RE.test(lastWord)) {
        return (art === 'A' ? 'Some' : 'some') + tokensRaw;
      }
      // Vowel test on first word in the phrase.
      if (/^[aeiouAEIOU]/.test(firstWord)) {
        return (art === 'A' ? 'An' : 'an') + tokensRaw;
      }
      return match;
    }
  );

  const rawPick = arr => arr[Math.floor(Math.random() * arr.length)];
  // Per-tier paragraph caps — long templates get trimmed so bedtime stories stay short.
  // Keep first 2 (setup) + last (LIMIT-2) (climax → resolution → closer). The previous formula
  // (first 4 + last 1) cut load-bearing climax paragraphs and left dangling references.
  // v1.18.0 — kid tier dropped to 4 paragraphs (Goofy Shorts: punchy, bedtime-friendly,
  // sidekick-driven). v1.19.0 — little tier joined kid at 4 paragraphs (Goofy Shorts Phase 2
  // after Story Test Log Entry 001 revealed little templates were failing on humor + substance).
  const PARAGRAPH_LIMIT = { tot: 5, little: 4, kid: 4, big: 6, tween: 6 }[t];
  const trimToLimit = (story) => {
    if (!PARAGRAPH_LIMIT || story.paragraphs.length <= PARAGRAPH_LIMIT) return story;
    const ps = story.paragraphs;
    const keepEnd = PARAGRAPH_LIMIT - 2;
    const trimmed = [...ps.slice(0, 2), ...ps.slice(-keepEnd)];
    return { title: story.title, paragraphs: trimmed };
  };

  // Body / sound vocabulary — user-picked rounds (potty mode) take precedence; otherwise auto-pick.
  // Computed up front so tier asides can reference them.
  const pickedBody  = get('body',  '');
  const pickedSound = get('sound', '');
  const BODY  = pickedBody  || rawPick(state.pottyMode ? BODY_HOT  : BODY_PG);
  const BODY2 = rawPick(state.pottyMode ? BODY_HOT  : BODY_PG);
  const SOUND = pickedSound || rawPick(state.pottyMode ? SOUND_HOT : SOUND_PG);

  // Mad Libs-style auto-injected vocabulary (Codex peer review #15). Picked once per story
  // for use in kid-tier templates AND in the tier-aware aside bank.
  const OBJ = rawPick(OBJECTS);
  const ADV = rawPick(ADVERBS);
  const NUM = rawPick(NUMBERS);
  const LIQ = rawPick(LIQUIDS);
  const JOB = rawPick(JOBS);
  // Story-specific motif — Codex callback system. Picked once per story and referenced
  // across multiple paragraphs in escalating contexts (setup → violation → payoff).
  const RULE = rawPick(RULES);

  // v1.18.0 Goofy Shorts vocabulary — kid-tier silly adjective + silly noun combos.
  // v1.19.1 — SK is no longer a fabricated name fallback. If the user added sidekicks, SK_OPEN
  // and SK_MID both resolve to a [name:Real] token (auto-capitalized chip). If not, they fall
  // back to a common-noun phrase ("Their pal" sentence-start, "their pal" mid-sentence) via the
  // [c:...] chip styling. NO INVENTED NAMES — Defect Log "Phantom character name" fix.
  // FW_SAFE coerces the freeword to a non-empty shoutable string so kid/little templates can
  // repeat it as a spell/chant without a guard.
  const SADJ   = rawPick(SILLY_ADJ);
  const STHING = rawPick(SILLY_NOUN);
  const hasUserSK = Array.isArray(state.sidekicks) && state.sidekicks.length > 0;
  const SK_NAME   = hasUserSK ? rawPick(state.sidekicks) : null;
  // SK_OPEN — sentence-start form (capitalized).
  // SK_MID  — mid-sentence form (lowercase when fallback).
  // Title-position form uses SK_TITLE (capitalized fallback "Their Pal").
  const SK_OPEN  = SK_NAME ? `[name:${SK_NAME}]` : `[c:Their pal]`;
  const SK_MID   = SK_NAME ? `[name:${SK_NAME}]` : `[c:their pal]`;
  const SK_TITLE = SK_NAME ? SK_NAME : `Their Pal`;
  const FW_SAFE = FW || rawPick(['KAPOW', 'ZINGO', 'WOMBO', 'FLABBADOO', 'BAZINKLE', 'YOINKO', 'SNORBLE', 'FLOOBA']);

  // pick auto-corrects articles, trims to length, injects a tier-appropriate aside,
  // and adds a sidekick cameo (60% of the time when sidekicks exist).
  // v1.18.0: kid tier skips both aside + cameo injection. v1.19.0: little tier joins kid
  // in skipping — Story Test Log Entry 001 traced the failing register directly to the
  // little aside bank ("the wind agreed politely") and the throwaway cameo style.
  // Goofy Shorts templates handle sidekick + closer inline.
  const SKIP_INJECTIONS = t === 'kid' || t === 'little';
  const pick = arr => {
    const r = rawPick(arr);
    if (r && typeof r === 'object' && Array.isArray(r.paragraphs)) {
      let story = { title: fixArticles(r.title), paragraphs: r.paragraphs.map(fixArticles) };
      story = trimToLimit(story);
      if (!SKIP_INJECTIONS) {
        story = injectTierAside(story);
        story = injectSidekick(story);
      }
      return story;
    }
    return r;
  };

  // Tier-aware aside injection — Codex review #12. Different joke logic per age tier.
  // Tot: gentle/repetition. Little: tiny-world whimsy. Kid: Mad Libs token mix. Big: bureaucratic
  // mock-serious. Tween: deadpan internet-voice. Adds one aside to a middle paragraph.
  const TIER_ASIDES = {
    tot: [
      ` Boop!`,
      ` Heehee.`,
      ` That was silly.`,
      ` Everybody blinked twice.`,
      ` Even the sun smiled.`,
    ],
    little: [
      ` Heehee.`,
      ` Nobody knew why!`,
      ` Everybody clapped, just because.`,
      ` The wind agreed politely.`,
      ` A small flower nodded along.`,
    ],
    kid: [
      ` (Nearby: ${rawPick(SILLY_THINGS)}.)`,
      ` (Plus ${OBJ}, obviously.)`,
      ` (Carrying ${NUM} of them, somehow.)`,
      ` (Smelled distinctly of ${LIQ}.)`,
      ` (${JOB.charAt(0).toUpperCase() + JOB.slice(1)} took notes.)`,
      ` (Everyone agreed: ${ADV}.)`,
    ],
    big: [
      ` A stamp appeared. Nobody had requested one.`,
      ` This was technically against policy.`,
      ` There was a form for this, which made it worse.`,
      ` The hallway filed a complaint.`,
      ` Procedurally, this was incorrect.`,
    ],
    tween: [
      ` Nobody had asked.`,
      ` The vending machine had feedback. None of it constructive.`,
      ` This was, somehow, a vibe.`,
      ` Iconic.`,
      ` Plus, like, seventeen group chats lost it.`,
    ],
  };
  const injectTierAside = (story) => {
    const bank = TIER_ASIDES[t];
    if (!bank || bank.length === 0) return story;
    const aside = rawPick(bank);
    const targetIdx = 1 + Math.floor(Math.random() * 2);
    const updated = story.paragraphs.slice();
    updated[targetIdx] = updated[targetIdx] + aside;
    return { title: story.title, paragraphs: updated };
  };

  // Sidekick cameo — one random sibling/friend lands a brief cameo line. ~60% frequency so it
  // feels earned rather than canned (Codex #5 feedback: was 100%, felt grafted on).
  const injectSidekick = (story) => {
    const sks = Array.isArray(state.sidekicks) ? state.sidekicks : [];
    if (sks.length === 0) return story;
    if (Math.random() > 0.6) return story;
    const sk = rawPick(sks);
    const cameos = [
      ` (Plus [name:${sk}].)`,
      ` [name:${sk}] showed up too.`,
      ` [name:${sk}] called dibs on leftovers.`,
      ` "I called it," said [name:${sk}].`,
      ` [name:${sk}] was right there too.`,
    ];
    const cameo = rawPick(cameos);
    const targetIdx = Math.min(4, Math.max(2, Math.floor(story.paragraphs.length / 2)));
    const updated = story.paragraphs.slice();
    updated[targetIdx] = updated[targetIdx] + cameo;
    return { title: story.title, paragraphs: updated };
  };

  if (t === 'tot') {
    // v2.4.5 — Story Test Log Entries 004/005/006 fixes for v1 fallback tot templates.
    // Rules enforced: escalation arc, word-repetition cap (≤3 per word), MOV slots
    // only used where past-tense reads naturally, no hardcoded reaction lines,
    // punchline lands in the final paragraph as a callback.
    return pick([
      // 1. The COLor PET Day — fixes Entry 006 (no more "went MOV, MOV, and one more time MOV").
      // MOV now slots as the main verb in its sentence, and the callback ending repeats the
      // central reversal (PET ate BACKWARD) instead of stacking MOV three times.
      {
        title: `${N} and the ${capitalize(COL)} ${capitalize(PET)}`,
        paragraphs: [
          `One day, [name:${N}] went to the [y:${PLC}] with a [c:${COL}] [c:${PET}].`,
          `The [c:${PET}] said HI! Then it said HI again! Then it hid behind a bush and yelled BOO! [name:${N}] giggled.`,
          `They sat under the big [c:${SKY}] and shared [y:${FOOD}]. The [c:${PET}] ate it BACKWARD. [name:${N}] tried that too.`,
          `Then they [c:${MOV}] home together. The [c:${PET}] was still chewing BACKWARD.`,
        ],
      },
      {
        title: `${N}'s ${capitalize(PET)} Day`,
        paragraphs: [
          `[name:${N}] found a [c:${PET}] at the [y:${PLC}]. It was wearing a tiny [c:${COL}] hat!`,
          `The [c:${PET}] loved to [c:${MOV_BASE}]. And to [c:${MOV_BASE}] AGAIN. And SOMETIMES it [c:${MOV}] sideways!`,
          `They shared [y:${FOOD}] under the [c:${SKY}]. The [c:${PET}] tried to share with the [c:${SKY}] too. The [c:${SKY}] was confused.`,
          `Then the [c:${PET}] did a silly little dance. [name:${N}] joined in. So did a passing bug!`,
          `"Again!" said [name:${N}]. So they did. And again. And one more time.`,
        ],
      },
      // 3. The Day the FOOD Got Loud — fixes Rule 2 (BOOP appeared 6+ times unbounded)
      // and Rule 4 (no real callback). Now BOOP is capped at 3 instances total, with
      // a final reversal — the FOOD whispers, not shouts, as the punchline.
      {
        title: `The Day the ${capitalize(FOOD)} Got Loud`,
        paragraphs: [
          `One day at the [y:${PLC}], [name:${N}] heard a tiny noise. It was the [c:${FOOD}]! It said "BOOP!"`,
          `[name:${N}] said BOOP back. The [c:${FOOD}] got LOUDER. A [c:${PET}] heard it and ran over very fast.`,
          `"BOOP BOOP BOOP!" said the [c:${PET}]. [name:${N}] laughed. The [c:${FOOD}] turned [c:${COL}] from all the excitement.`,
          `Then the [c:${FOOD}] said, very quietly, "boop." Tiny tiny. [name:${N}] whispered "boop" back. Best secret.`,
        ],
      },
      {
        title: `${N} and the Upside-Down ${capitalize(PET)}`,
        paragraphs: [
          `[name:${N}] saw a [c:${PET}] standing upside down at the [y:${PLC}]!`,
          `"Are you okay?" asked [name:${N}]. The [c:${PET}] said, "YES! The world is more interesting this way!"`,
          `So [name:${N}] tried it. WHOOPS. The [c:${SKY}] was on the bottom! The grass was on top!`,
          `They shared a piece of [y:${FOOD}] from upside down. The crumbs fell UP!`,
          `When they stood right-side-up again, everything felt extra wiggly. They [c:${MOV}] home laughing. 🌟`,
        ],
      },
      // 5. The Bouncing SKY — fixes Entry 004 (BOING 7+ uncapped) + Entry 005
      // (hardcoded "Skies don't usually do that!") + Entry 004 plural grammar
      // ("ate banana"). Now BOING appears 3 times total with an escalation arc,
      // the reaction line is dynamic, and the FOOD is shared not bare-singularly eaten.
      {
        title: `The Bouncing ${capitalize(SKY)}`,
        paragraphs: [
          `[name:${N}] looked up. The [c:${SKY}] was BOUNCING! BOING! BOING! Right across the sky!`,
          `A [c:${PET}] saw it too. The [c:${PET}] started to [c:${MOV_BASE}] in time. [name:${N}] joined in. Soon everybody was [c:${MOV_GERUND}].`,
          `The [c:${SKY}] bounced one BIG BOING and landed gently in [name:${N}]'s lap. It was warm. It was [c:${COL}]. It was tired.`,
          `They all shared a piece of [y:${FOOD}] under the quiet [c:${SKY}]. No more BOING. Just nibbles.`,
        ],
      },
      {
        title: `${N}'s ${capitalize(PET)} Says Everything Wrong`,
        paragraphs: [
          `[name:${N}]'s [c:${PET}] said "HELLO" when it meant "GOODBYE."`,
          `It said "YUM" when it meant "PHEW!" And it called shoes "snacks." Uh oh.`,
          `They went to the [y:${PLC}] together, all mixed up and very silly.`,
          `The [c:${PET}] pointed at the [c:${SKY}] and said "FLOOR." It pointed at the [c:${FOOD}] and said "[c:${COL}]." Nothing matched!`,
          `[name:${N}] laughed so hard they got the hiccups. Hic! Hic! Hic! Even the [c:${PET}] got the hiccups.`,
        ],
      },
      {
        title: `The Big Silly Sneeze`,
        paragraphs: [
          `Something tickled [name:${N}]'s nose. Uh oh!`,
          `"AH... AH... AH-CHOO!" A huge sneeze! It blew the [c:${COL}] hat right off!`,
          `The hat zoomed all the way to the [y:${PLC}]. A [c:${PET}] caught it on its head and looked very fancy.`,
          `"BLESS YOU!" said the [c:${PET}] — even though it was a [c:${PET}]. They walked back together to find the [c:${SKY}].`,
          `They ate [y:${FOOD}] and tried not to sneeze. Mostly. The [c:${PET}] sneezed twice. So did [name:${N}]. Best sneeze day ever. 🌟`,
        ],
      },
      // 8. The Mystery Bonk — patches Rule 3 plural grammar ("I throw [FOOD]" reads
      // wrong for singular foods like banana). Now uses articleText so it renders
      // "I throw a banana" / "I throw an apple" naturally.
      {
        title: `${N} and the Mystery Bonk`,

/* Parse token markup to HTML.
   v1.19.2 — every token's captured text now goes through esc() at render time. Previously the
   renderer trusted callers to pre-escape user input ("user input is already escaped before
   going into tokens"). That contract was violated for state.name in body paragraphs (only the
   title path called esc()), which let an attacker inject HTML via the name field (Codex QA
   finding #1, High severity). Escaping inside the renderer makes parseStoryLine safe regardless
   of what reaches the token — input strip, future call sites, or legacy localStorage values. */
/* v0.9.3 · b4 — "highlighted = something the kid picked." User-reported defect:
   v3 templates wrap engine-chosen mcguffin / obstacle / locked-setting slots in
   `[c:X]` and `[y:X]` tokens, which rendered identical to user-picked words. Result:
   a kid sees "sleepy megaphone" highlighted in their story and assumes they picked
   it. False ownership signal. Breaks the implicit coverage promise.

   Fix: at render time, cross-check each token's bracketed text against the actual
   state.picks (kid taps), state.name, and state.sidekicks. Tokens whose text doesn't
   match a real pick render as plain text (no chip). Engine-chosen prose blends into
   the narrative; kid-picked words still pop.

   Also collapses `[y:X]` to the same `.pop` orange style as `[c:X]` — the prior
   yellow-chip-box treatment was a designed "this is the setting" visual emphasis
   but in practice read as inconsistent. One highlight style, one meaning:
   "you picked this." */
function isPickedToken(lc, pickedSet) {
  if (pickedSet.has(lc)) return true;
  for (const p of pickedSet) {
    if (!p) continue;
    // Plural tolerance: pick="pizza" matches token="pizzas" and vice versa.
    if (lc === p + 's'  || lc === p + 'es') return true;
    if (p  === lc + 's' || p  === lc + 'es') return true;
    // Multi-word pick (e.g. "sleepy gecko") or multi-word token — match if any
    // whole word overlaps. Anchored on whitespace boundaries so "cat" doesn't
    // accidentally light up inside "scattered".
    if (p.includes(' ') || lc.includes(' ')) {
      const tokenWords = lc.split(/\s+/).filter(Boolean);
      const pickWords  = p.split(/\s+/).filter(Boolean);
      if (tokenWords.some(t => pickWords.includes(t))) return true;
    }
  }
  return false;
}
function parseStoryLine(line) {
  const picks     = (typeof state !== 'undefined' && state.picks) || {};
  const pickedSet = new Set();
  for (const cat in picks) {
    const p = picks[cat];
    if (p && p.w) pickedSet.add(String(p.w).toLowerCase().trim());
  }
  const kidName   = ((typeof state !== 'undefined' && state.name) || '').toLowerCase().trim();
  const sidekicks = new Set(((typeof state !== 'undefined' && state.sidekicks) || [])
    .map(s => String(s).toLowerCase().trim()).filter(Boolean));

  return line.replace(/\[(name|c|y):([^\]]+)\]/g, (_, kind, text) => {
    const safe = esc(text);
    const lc   = text.toLowerCase().trim();
    if (kind === 'name') {
      // Name chip only when the token matches the kid OR a real sidekick. Fallback
      // tokens like "their pal" (per v2.2.5 no-phantom-names rule) render plain.
      if (lc === kidName || sidekicks.has(lc)) {
        return `<span class="pop pop--name">${safe}</span>`;
      }
      return safe;
    }
    // c or y: both treated the same after the b4 collapse — highlighted only when
    // the bracketed text matches a real kid pick. Engine-chosen slots (locked
    // setting, mcguffin, false_suspect, chants/payoff words, etc.) render plain.
    if (isPickedToken(lc, pickedSet)) {
      return `<span class="pop">${safe}</span>`;
    }
    return safe;
  });
}

function storyToPlainText(story) {
  const strip = s => s.replace(/\[(?:name|c|y):([^\]]+)\]/g, '$1');
  return story.title + '. ' + story.paragraphs.map(strip).join(' ');
}

/* v0.9.3 · b10 — shared voice picker grid. Used by Parent Settings + the
   story-screen "Change narrator" modal. The grid renders 4 preset cards;
   each card has a small ▶ preview button that plays a short voice-specific
   clip without changing the selection. Tapping the card body selects the
   preset (Profile.saveVoicePreset + state.voicePreset). Cards are
   role="radio" / aria-checked so screen readers announce the choice. */
function renderVoicePickerGrid(selectedKey, opts) {
  opts = opts || {};
  return `
    <div class="voice-preset-grid" role="radiogroup" aria-label="Narrator voice preset">
      ${VOICE_PRESETS.map(p => `
        <div
          class="voice-preset${selectedKey === p.key ? ' is-selected' : ''}"
          data-preset="${esc(p.key)}"
          role="radio"
          tabindex="0"
          aria-checked="${selectedKey === p.key ? 'true' : 'false'}"
        >
          <button
            class="voice-preset-preview"
            data-preview="${esc(p.key)}"
            aria-label="Preview ${esc(p.label)} voice"
            type="button"
          >▶</button>
          <span class="voice-preset-label">${esc(p.label)}</span>
          <span class="voice-preset-tagline">${esc(p.tagline)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

/* Wire selection + preview clicks on a voice-picker grid that is now in the DOM.
   opts.onSelect(presetKey) — called after state.voicePreset + Profile update.
   Used by Parent Settings and the story-screen "Change narrator" modal so they
   share identical interaction behavior. */
function attachVoicePickerHandlers(root, opts) {
  opts = opts || {};
  const cards    = root.querySelectorAll('.voice-preset');
  const previews = root.querySelectorAll('.voice-preset-preview');

  cards.forEach(card => {
    const key = card.dataset.preset;
    if (!VOICE_PRESET_KEYS.includes(key)) return;
    const select = () => {
      state.voicePreset = key;
      Profile.saveVoicePreset(key);
      cards.forEach(c => {
        const sel = c.dataset.preset === key;
        c.classList.toggle('is-selected', sel);
        c.setAttribute('aria-checked', sel ? 'true' : 'false');
      });
      if (typeof opts.onSelect === 'function') opts.onSelect(key);
    };
    card.addEventListener('click', e => {
      // Don't trigger selection when the preview button inside is clicked.
      if (e.target.closest('.voice-preset-preview')) return;
      select();
    });
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); }
    });
  });

  previews.forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const key = btn.dataset.preview;
      if (!VOICE_PRESET_KEYS.includes(key)) return;
      // Reset every preview button to idle, then show loading on the active one.
      previews.forEach(b => { b.classList.remove('is-loading','is-playing'); b.textContent = '▶'; });
      btn.classList.add('is-loading');
      btn.textContent = '…';
      TTSManager.previewVoice(key)
        .then(() => {
          btn.classList.remove('is-loading');
          btn.classList.add('is-playing');
          btn.textContent = '⏸';
        })
        .catch(() => {
          btn.classList.remove('is-loading');
          btn.textContent = '▶';
        });
    });
  });
}
