         viewports. SE behavior preserved (auto margins collapse when no
         leftover space exists). Tile + Surprise sizes nudged up. -->
    <div class="stack grow">
      <div class="setting-step-inner">
        <div>
          <h1 class="display display--compact" style="text-align:center">
            What kind of <span style="color:var(--orange-dark)">place?</span>
          </h1>
          <p class="lede lede--compact" style="text-align:center;margin-top:6px">
            Pick a flavor — or let us surprise you.
          </p>
        </div>
        <div class="setting-grid setting-grid--flavors">
          ${SETTING_FLAVORS.map(f => `
            <button
              class="setting-tile${state.setting === f.key ? ' is-selected' : ''}${f.key === 'surprise' ? ' setting-tile--surprise' : ''}"
              data-setting="${esc(f.key)}"
              aria-label="${esc(f.label)}"
            >
              <span class="setting-emoji">${f.emoji}</span>
              <span class="setting-label">${esc(f.label)}</span>
            </button>
          `).join('')}
        </div>
        <div class="setting-note">
          ${(() => {
            const cur = SETTING_FLAVORS.find(f => f.key === state.setting);
            return cur ? esc(cur.note) : '';
          })()}
        </div>
      </div>
      <div class="footer">
        <button class="btn" id="btn-setting-go">
          Next →
        </button>
      </div>
    </div>
  ` : step === 'storyMode' ? `
    <!-- v2.6.2 — story-mode picker (bedtime vs anytime) -->
    <div class="stack gap-20 grow">
      <div>
        <h1 class="display" style="text-align:center">
          When is<br>
          <span style="color:var(--orange-dark)">this story for?</span>
        </h1>
        <p class="lede" style="text-align:center;margin-top:10px">
          Tap one. Bedtime stories end with sleep. Anytime stories end with a wave home.
        </p>
      </div>
      <div class="story-mode-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 6px">
        <button
          class="setting-tile${state.storyMode === 'bedtime' ? ' is-selected' : ''}"
          data-story-mode="bedtime"
          aria-label="Bedtime story">
          <span class="setting-emoji">🌙</span>
          <span class="setting-label">Bedtime</span>
        </button>
        <button
          class="setting-tile${state.storyMode === 'anytime' ? ' is-selected' : ''}"
          data-story-mode="anytime"
          aria-label="Anytime story">
          <span class="setting-emoji">☀️</span>
          <span class="setting-label">Anytime</span>
        </button>
      </div>
      <div class="setting-note">
        ${state.storyMode === 'anytime'
          ? "Anytime: the story ends with the cast heading off to whatever's next."
          : "Bedtime: the story ends cozy, with goodnight."}
      </div>
      <div class="footer">
        <button class="btn" id="btn-story-mode-go">
          Let's go! ✨
        </button>
      </div>
    </div>
  ` : ''}
</div>`;
}

/* ---- Screen 2: Words ---- */
function renderWords() {
  const rounds = state.rounds;
  const idx    = state.roundIdx;
  const round  = rounds[idx];
  const tier   = tierFor(state.age);
  const showEmoji = tier === 'tot' || tier === 'little';

  const progressDots = rounds.map((_, i) => {
    let cls = 'progress-dot';
    if (i < idx) cls += ' is-done';
    if (i === idx) cls += ' is-current';
    return `<div class="${cls}"></div>`;
  }).join('');

  let roundContent = '';

  if (round.type === 'freetext') {
    roundContent = `
      <div class="freetext-wrap" id="freetext-wrap">
        <input
          class="freetext-input"
          id="input-freetext"
          type="text"
          placeholder="Type anything…"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="words"
          maxlength="20"
        />
        <div class="freetext-hints">
          <span class="hint-label">e.g.</span>
          ${round.examples.map(ex => `
            <button class="hint-chip" data-hint="${esc(ex)}">${esc(ex)}</button>
          `).join('')}
        </div>
        <div class="footer">
          <button class="btn" id="btn-freetext-submit" disabled>
            That's my word! →
          </button>
        </div>
      </div>`;
  } else {
    const wordClass = (w) => {
      const len = w.length;
      if (len <= 4)  return 'word-text word-text--lg';
      if (len >= 11) return 'word-text word-text--sm';
      return 'word-text';
    };

    // v0.9.3 · b3 — shuffle 🎲 button rendered when the round has a fullPool ≥ 4
    // options and the session shuffle budget isn't exhausted. fullPool ≥ 4 ensures
    // we can produce 2 fresh options that don't match the current 2.
    const shufflesRemaining = MAX_SHUFFLES - (state.shufflesUsed || 0);
    const showShuffle = (round.fullPool && round.fullPool.length >= 4) && (shufflesRemaining > 0);
    roundContent = `
      <div class="pair-wrap" id="pair-wrap">
        ${round.options.map((opt, i) => `
          <button
            class="word-card is-bouncing"
            data-side="${i}"
            id="card-${i}"
          >
            <div class="word-emoji${showEmoji ? '' : ' word-emoji--sm'}">${opt.e}</div>
            <div class="${wordClass(opt.w)}">${esc(opt.w)}</div>
          </button>
        `).join('')}
      </div>
      ${showShuffle ? `
        <div class="shuffle-wrap">
          <button class="shuffle-btn" id="btn-shuffle" aria-label="Show me different choices (${shufflesRemaining} left)">
            <span class="shuffle-emoji">🎲</span>
            <span>Show me different ones</span>
            <span class="shuffle-count">×${shufflesRemaining}</span>
          </button>
        </div>
      ` : ''}
      ${round.escapeHatchTo ? `
        <button class="escape-hatch-btn" id="btn-escape-hatch" aria-label="Type your own word instead">
          or type your own ✏️
        </button>
      ` : ''}`;
  }

  return `
<div class="screen" id="screen-words">
  <div class="screen-head">
    ${renderLogo()}
    <div class="pill">${esc(state.name || 'You')} · ${state.age}</div>
  </div>

  <div class="progress" aria-label="Round ${idx + 1} of ${rounds.length}">
    ${progressDots}
  </div>

  <div class="step-label">
    Round <strong>${idx + 1}</strong> of <strong>${rounds.length}</strong>
  </div>

  <p class="q-label">
    ${esc(round.label)}<br>
    <span style="font-size:16px;color:var(--ink-soft)">
      ${round.type === 'freetext' ? 'type your answer' : 'tap your favorite'}
    </span>
  </p>

  ${roundContent}
</div>`;
}

/* ---- Screen 3: Story ---- */
function renderStory() {
  const story  = state.story;
  const spk    = state.speaking;

  /* v2.2.4 — title was using a homemade alternating-color word-splitter that escaped
     each word and never called parseStoryLine. Result: v2 stories produced titles like
     [name:Livi] and the Library Card Problem and the [name:Livi] token rendered literally.
     Now run the title through parseStoryLine (same path the body uses) so [name:X]/[c:X]/
     [y:X] tokens become proper chip spans. Visual variety comes from the chips themselves. */
  const titleHtml = parseStoryLine(story.title);

  const bodyHtml = story.paragraphs.map(p =>
    `<p>${parseStoryLine(p)}</p>`
  ).join('');

  return `
<div class="screen screen--cream" id="screen-story">
  <div class="screen-head" style="position:relative;z-index:1">
    ${renderLogo()}
    <button
      class="speak-pill${spk ? ' is-speaking' : ''}"
      id="btn-speak-pill"
      aria-label="${spk ? 'Stop reading' : 'Read story aloud'}"
    >
      <span class="speak-pill-icon">${spk ? '⏸' : '🔊'}</span>
      <span class="speak-pill-label">${spk ? 'Stop' : 'Speak'}</span>
      ${spk ? `<span class="speak-waves"><span></span><span></span><span></span><span></span></span>` : ''}
    </button>
  </div>

  <div class="story-stack">
    <div class="story-paper">
      <h2 class="story-title">${titleHtml}</h2>
      <div class="story-body">${bodyHtml}</div>
      <p class="story-end">✦ The End ✦</p>
    </div>

    <div class="story-toolbar">
      ${(() => {
        // v0.9.3 · b10 — story-screen narrator row. Settings is the permanent
        // home for the preference, but users think about voice choice right
        // here at "Read it to me" time. Compact line; tap "Change" → modal.
        const cur = VOICE_PRESETS.find(p => p.key === state.voicePreset) || VOICE_PRESETS[0];
        return `
          <div class="narrator-row">
            <span class="narrator-row-label">Narrator: <strong>${esc(cur.label)}</strong></span>
            <button class="narrator-row-change" id="btn-narrator-change" type="button" aria-label="Change narrator voice">
              Change
            </button>
          </div>
        `;
      })()}
      <div class="story-toolbar-row">
        <button class="btn btn--ghost btn--small" id="btn-read-myself">📖 Read It Myself</button>
        ${spk
          ? `<button class="btn btn--yellow btn--small" id="btn-tts-stop">⏸ Stop Reading</button>`
          : `<button class="btn btn--small" id="btn-tts-speak">🔊 Read It To Me</button>`
        }
      </div>
      <button class="btn btn--yellow" id="btn-play-again">✨ Play Again</button>
    </div>
  </div>
</div>`;
}

/* ================================================================
   TRANSITIONS
   ================================================================ */
const wrap = document.getElementById('screen-wrap');

function goTo(screenName) {
  const prev = wrap.querySelector('.screen');
  if (prev) prev.classList.add('is-exiting');

  // render new screen hidden
  const tmp = document.createElement('div');
  if (screenName === 'welcome') tmp.innerHTML = renderWelcome();
  else if (screenName === 'words') tmp.innerHTML = renderWords();
  else if (screenName === 'story') { state.story = buildStory(state.name, state.picks, state.age); tmp.innerHTML = renderStory(); }

  const next = tmp.firstElementChild;
  next.classList.add('is-hidden');
  wrap.appendChild(next);

  // animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      next.classList.remove('is-hidden');
      if (prev) {
        setTimeout(() => prev.remove(), 600);
      }
    });
  });

  state.screen = screenName;
  attachHandlers(screenName, next);

  // Focus friendly: auto-focus name input on desktop
  if (screenName === 'welcome' && state.welcomeStep === 'name') {
    const inp = next.querySelector('#input-name');
    if (inp && window.matchMedia('(min-width: 480px)').matches) {
      setTimeout(() => inp.focus(), 300);
    }
  }
  if (screenName === 'words' && state.rounds[state.roundIdx]?.type === 'freetext') {
    const inp = next.querySelector('#input-freetext');
    if (inp) setTimeout(() => inp.focus(), 400);
  }
}

/* Re-render current screen in place (no transition) */
function rerender() {
  const existing = wrap.querySelector('.screen');
  const tmp = document.createElement('div');
  if (state.screen === 'welcome') tmp.innerHTML = renderWelcome();
  else if (state.screen === 'words') tmp.innerHTML = renderWords();
  else if (state.screen === 'story') tmp.innerHTML = renderStory();

  const next = tmp.firstElementChild;
  if (existing) wrap.replaceChild(next, existing);
  else wrap.appendChild(next);

  attachHandlers(state.screen, next);
}

/* ================================================================
   EVENT HANDLERS
   ================================================================ */
function attachHandlers(screenName, el) {
  if (screenName === 'welcome') attachWelcomeHandlers(el);
  else if (screenName === 'words') attachWordsHandlers(el);
  else if (screenName === 'story') attachStoryHandlers(el);
}

function attachWelcomeHandlers(el) {
  const inp = el.querySelector('#input-name');
  const btnNext = el.querySelector('#btn-name-next');
  const btnBack = el.querySelector('#btn-back');
  const btnAgeNext = el.querySelector('#btn-age-next');
  const ageTiles = el.querySelectorAll('.age-tile');
  const pottyToggle = el.querySelector('#toggle-potty');
  const skInput = el.querySelector('#input-sidekick');
  const btnSkAdd = el.querySelector('#btn-sidekick-add');
  const btnSkNext = el.querySelector('#btn-sidekicks-next');     // v2.1.0 (was btn-sidekicks-go)
  const skChipXs = el.querySelectorAll('.sidekick-chip-x');
  const settingTiles = el.querySelectorAll('.setting-tile');     // v2.1.0
  const btnSettingGo = el.querySelector('#btn-setting-go');      // v2.1.0

  if (pottyToggle) {
    pottyToggle.addEventListener('change', () => {
      state.pottyMode = pottyToggle.checked;
      Profile.savePotty(state.pottyMode);
      const hint = el.querySelector('.potty-hint');
      if (hint) hint.textContent = state.pottyMode ? '— ON 💨' : '(potty humor)';
    });
  }

  if (inp) {
    inp.addEventListener('input', () => {
      // v1.19.2 — strip HTML-significant chars on input to match sidekick sanitization.
      // Defense-in-depth: parseStoryLine() also escapes at render time so even if a name
      // somehow bypasses this strip (e.g. legacy localStorage value), the renderer is safe.
      // v2.2.0 — persistence routed through Profile module instead of raw localStorage.
      state.name = inp.value.slice(0, 14).replace(/[<>&"]/g, '');
      Profile.saveName(state.name);
      if (btnNext) btnNext.disabled = !state.name.trim();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && state.name.trim()) advanceToAge();
    });
  }

  // Chip-X to clear a saved name and return to the empty input.
  const btnNameClear = el.querySelector('#btn-name-clear');
  if (btnNameClear) {
    btnNameClear.addEventListener('click', () => {
      state.name = '';
      Profile.saveName('');
      rerender();
    });
  }

  if (btnNext) btnNext.addEventListener('click', () => {
    if (state.name.trim()) advanceToAge();
  });

  if (btnBack) btnBack.addEventListener('click', () => {
    // v2.1.0 — back chain extended: setting → sidekicks → age → name
    const back = { storyMode: 'setting', setting: 'sidekicks', sidekicks: 'age', age: 'name' };
    state.welcomeStep = back[state.welcomeStep] || 'name';
    rerender();
  });

  ageTiles.forEach(tile => {
    tile.addEventListener('click', () => {
      if (tile.dataset.locked === 'true') {
        showPinModal(parseInt(tile.dataset.age, 10));
        return;
      }
      state.age = parseInt(tile.dataset.age, 10);
      // v2.2.0 — persist age so returning users skip past this step.
      Profile.saveAge(state.age);
      ageTiles.forEach(t => t.classList.remove('is-selected'));
      tile.classList.add('is-selected');
      if (btnAgeNext) btnAgeNext.disabled = false;
    });
  });

  if (btnAgeNext) btnAgeNext.addEventListener('click', () => {
    if (state.age) advanceToSidekicks();
  });

  // Sidekick step
  const addSidekick = () => {
    if (!skInput) return;
    const v = skInput.value.trim().slice(0, 14).replace(/[<>&"]/g, '');
    if (!v || state.sidekicks.length >= 3) return;
    if (state.sidekicks.some(s => s.toLowerCase() === v.toLowerCase())) { skInput.value = ''; return; }
    state.sidekicks = [...state.sidekicks, v];
    Profile.saveSidekicks(state.sidekicks);   // v2.2.0
    rerender();
  };

  if (skInput) {
    skInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addSidekick(); }
    });
    setTimeout(() => { try { skInput.focus(); } catch {} }, 250);
  }
  if (btnSkAdd) btnSkAdd.addEventListener('click', addSidekick);

  skChipXs.forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.skIdx, 10);
      state.sidekicks = state.sidekicks.filter((_, idx) => idx !== i);
      Profile.saveSidekicks(state.sidekicks);   // v2.2.0
      rerender();
    });
  });

  // v2.1.0 — sidekicks → setting (if v2 engine) → words; v1 mode skips the setting step.
  if (btnSkNext) btnSkNext.addEventListener('click', () => {
    if (!state.age) return;
    if (isEngineV2Enabled()) advanceToSetting();
    else startWords();
  });

  // v2.1.0 — Setting tile clicks. v2.2.0 — persist selection so returning users
  // see their previous setting pre-selected on the setting screen.
  settingTiles.forEach(tile => {
    tile.addEventListener('click', () => {
      // v0.9.3 · b9 — validate the click target against the flavor allowlist.
      const key = tile.dataset.setting;
      if (!SETTING_FLAVOR_KEYS.includes(key)) return;
      state.setting = key;
      Profile.saveSetting(state.setting);
      settingTiles.forEach(t => t.classList.remove('is-selected'));
      tile.classList.add('is-selected');
      // Update note text live
      const note = el.querySelector('.setting-note');
      const cur = SETTING_FLAVORS.find(f => f.key === state.setting);
      if (note && cur) note.textContent = cur.note;
    });
  });

  if (btnSettingGo) btnSettingGo.addEventListener('click', () => {
    if (state.age) advanceToStoryMode();
  });

  // v2.6.2 — story-mode step (bedtime / anytime). Tiles update state.storyMode + persist.
  const storyModeTiles = el.querySelectorAll('[data-story-mode]');
  storyModeTiles.forEach(tile => {
    tile.addEventListener('click', () => {
      state.storyMode = tile.dataset.storyMode;
      Profile.saveStoryMode(state.storyMode);
      storyModeTiles.forEach(t => t.classList.remove('is-selected'));
      tile.classList.add('is-selected');
      // live-update the note text under the tiles
      const note = el.querySelector('.story-mode-grid + .setting-note');
      if (note) {
        note.textContent = state.storyMode === 'anytime'
          ? "Anytime: the story ends with the cast heading off to whatever's next."
          : "Bedtime: the story ends cozy, with goodnight.";
      }
    });
  });
  const btnStoryModeGo = el.querySelector('#btn-story-mode-go');
  if (btnStoryModeGo) btnStoryModeGo.addEventListener('click', () => {
    if (state.age) startWords();
  });
}

function advanceToAge() {
  state.welcomeStep = 'age';
  rerender();
}

function advanceToSidekicks() {
  state.welcomeStep = 'sidekicks';
  rerender();
}

function advanceToSetting() {
  state.welcomeStep = 'setting';
  rerender();
}

function advanceToStoryMode() {
  state.welcomeStep = 'storyMode';
  rerender();
}

function startWords() {
  state.rounds        = buildRounds(state.age);
  state.roundIdx      = 0;
  state.picks         = {};
  state.shufflesUsed  = 0;   // v0.9.3 · b3 — reset shuffle counter at session start
  state.wordAdvancing = false; // v0.9.3 · b14 — fresh picker session: clear any stale rapid-tap guard
  goTo('words');
}

function attachWordsHandlers(el) {
  const round = state.rounds[state.roundIdx];

  if (round.type === 'freetext') {
    const inp    = el.querySelector('#input-freetext');
    const btn    = el.querySelector('#btn-freetext-submit');
    const hints  = el.querySelectorAll('.hint-chip');

    const syncBtn = () => {
      if (btn) btn.disabled = !(inp && inp.value.trim());
    };

    if (inp) {
      inp.addEventListener('input', syncBtn);
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && inp.value.trim()) submitFreeText(inp.value.trim());
      });
    }

    hints.forEach(h => {
      h.addEventListener('click', () => {
        if (inp) { inp.value = h.dataset.hint; syncBtn(); inp.focus(); }
      });
    });

    if (btn) btn.addEventListener('click', () => {
      if (inp && inp.value.trim()) submitFreeText(inp.value.trim());
    });

  } else {
    const cards = el.querySelectorAll('.word-card');
    cards.forEach((card, i) => {
      card.addEventListener('click', () => pickWord(i, el));
    });
    // v0.9.3 · b2 — escape hatch on the kid sound round. When present, tapping swaps
    // the current sound tap round for its original freetext prompt and re-renders.
    const hatch = el.querySelector('#btn-escape-hatch');
    if (hatch) {
      hatch.addEventListener('click', () => {
        const r = state.rounds[state.roundIdx];
        if (r && r.escapeHatchTo) {
          state.rounds[state.roundIdx] = r.escapeHatchTo;
          goTo('words');
        }
      });
    }
    // v0.9.3 · b3 — shuffle 🎲 button: re-roll the 2 cards from the same fullPool,
    // excluding the currently-shown options when the pool is large enough. Caps at
    // MAX_SHUFFLES per session. Cards fade out + in for tactile feedback.
    const shuffleBtn = el.querySelector('#btn-shuffle');
    if (shuffleBtn) {
      shuffleBtn.addEventListener('click', () => {
        const r = state.rounds[state.roundIdx];
        if (!r || !r.fullPool || state.shufflesUsed >= MAX_SHUFFLES) return;
        const currentKeys = new Set(r.options.map(o => o.w));
        const eligible = r.fullPool.filter(o => !currentKeys.has(o.w));
        // Fallback: if eligible is too small (pool < 4), just re-shuffle from full pool.
        const source = eligible.length >= 2 ? eligible : r.fullPool;
        const shuffled = [...source].sort(() => Math.random() - 0.5);
        r.options = shuffled.slice(0, 2);
        state.shufflesUsed += 1;
        // Play the fade animation, then re-render so the new cards land with the
        // bounce-in entrance already wired on .word-card.
        const pair = el.querySelector('#pair-wrap');
        if (pair) pair.classList.add('is-rerolling');
        setTimeout(() => goTo('words'), 200);
      });
    }
  }
}

function submitFreeText(value) {
  const round = state.rounds[state.roundIdx];
  // sanitize: strip any HTML-like chars, enforce 20 char max
  const clean = value.replace(/[<>&"]/g, '').slice(0, 20).trim();
  if (!clean) return;
  // Propagate the prompt's subtype so buildStory can route the freeword semantically
  // ("smell" picks become "smelled like X", "name" picks become "named X", etc.).
  advanceRound(round.cat, { w: clean, e: '', subtype: round.subtype || 'shout' });
}

function pickWord(side, el) {
  // v0.9.3 · b14 — rapid multi-tap guard. The picked card runs a 650ms
  // burst/pop animation before advanceRound() fires. Without a guard, a
  // fast double-tap (or a kid mashing both cards in quick succession)
  // could schedule TWO advanceRound calls — the second would advance an
  // extra round with a stale pick. Guard: short-circuit if wordAdvancing
  // is already true; flip it on at pick time; reset in advanceRound.
  if (state.wordAdvancing) return;
  state.wordAdvancing = true;

  const round = state.rounds[state.roundIdx];
  const cards = el.querySelectorAll('.word-card');

  cards.forEach(c => c.classList.remove('is-bouncing'));
  // Belt-and-suspenders: disable pointer events on every card the moment
  // a selection lands so the OS-level click handler doesn't even fire a
  // second pickWord. The state guard above is the primary defense; this
  // also prevents the visual flicker of the other card going into hover.
  cards.forEach(c => { c.style.pointerEvents = 'none'; });
  cards[side].classList.add('is-picked');
  cards[1 - side].classList.add('is-faded');

  // burst stars
  spawnBursts(cards[side]);

  setTimeout(() => {
    advanceRound(round.cat, round.options[side]);
  }, 650);
}

function spawnBursts(card) {
  const chars = ['⭐','✨','💫','🌟'];
  for (let i = 0; i < 6; i++) {
    const b = document.createElement('span');
    b.className = 'burst';
    b.textContent = chars[Math.floor(Math.random() * chars.length)];
    // v0.9.3 · b14 — purely decorative sparkle characters. Hide from screen
    // readers so they don't get spliced into the parent .word-card's
    // accessible name (which already announces the picked word + emoji).
    b.setAttribute('aria-hidden', 'true');
    b.setAttribute('role', 'presentation');
    const dx = (Math.random() - 0.5) * 120;
    const dy = -40 - Math.random() * 60;
    b.style.setProperty('--bx', dx + 'px');
    b.style.setProperty('--by', dy + 'px');
    card.appendChild(b);
    setTimeout(() => b.remove(), 800);
  }
}

function advanceRound(cat, chosen) {
  state.picks[cat] = chosen;
  // v0.9.3 · b14 — clear the rapid-tap guard now that we're committing the
  // pick and rendering the next round. The new word-card DOM is fresh, so
  // pointer-events resets naturally via re-render.
  state.wordAdvancing = false;
  const total = state.rounds.length;

  if (state.roundIdx + 1 < total) {
    state.roundIdx++;
    goTo('words');
  } else {
    goTo('story');
  }
}

/* ---- Karaoke: wrap every story word in .kw spans with sequential data-wi indices ---- */
function wrapStoryWords() {
  const titleEl = document.querySelector('.story-title');
  const bodyEl  = document.querySelector('.story-body');
  if (!bodyEl) return [];
  const words = [];
  let wi = 0;
  function processRoot(root) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    const textNodes = [];
    let node;
    while ((node = walker.nextNode())) textNodes.push(node);
    for (const node of textNodes) {
      const frag = document.createDocumentFragment();
      node.textContent.split(/(\s+)/).forEach(part => {
        if (!part) return;
        if (/^\s+$/.test(part)) {
          frag.appendChild(document.createTextNode(part));
        } else if (/[a-zA-Z0-9]/.test(part)) {
          const span = document.createElement('span');
          span.className = 'kw';
          span.dataset.wi = wi++;
          span.textContent = part;
          frag.appendChild(span);
          words.push(part);
        } else {
          frag.appendChild(document.createTextNode(part));
        }
      });
      node.parentNode.replaceChild(frag, node);
    }
  }
  const endEl = document.querySelector('.story-end');
  if (titleEl) processRoot(titleEl);
  processRoot(bodyEl);
  if (endEl)   processRoot(endEl);
  return words;
}

/* ---- TTSManager: ElevenLabs API + IndexedDB audio+alignment cache ---- */
const TTSManager = (() => {
  const DB_NAME = 'noddytales-tts';
  const DB_VER  = 2;
  const STORE   = 'audio-v2';   // stores { audio: Blob, alignment: object }
  let db          = null;
  let audio       = null;
  let controller  = null;
  let wordTimings = null;
  let rafId       = null;
  // v2.4.4 — auto-scroll state. The karaoke loop calls maybeAutoScroll(el) when a new
  // word lights up; it scrolls only when the word is in the bottom 30% of the viewport
  // and the user has not manually scrolled in the last 2.5s (so re-reading isn't fought).
  let lastUserScrollAt = 0;
  let lastAutoScrollAt = 0;
  let scrollListenerInstalled = false;

  // ElevenLabs alignment is character-level. Convert to word-level by walking the TTS text
  // and pairing each word's first/last char with the alignment start/end times. Filter
  // pure-punctuation tokens so timings match wrapStoryWords' word indexing exactly.
  function buildAlignmentTimings(text, alignment) {
    if (!alignment || !Array.isArray(alignment.character_start_times_seconds)) return null;
    const starts = alignment.character_start_times_seconds;
    const ends   = alignment.character_end_times_seconds;
    if (!starts.length || !ends.length) return null;
    const timings = [];
    const wordRegex = /\S+/g;
    let m;
    while ((m = wordRegex.exec(text)) !== null) {
      if (!/[a-zA-Z0-9]/.test(m[0])) continue;
      const startChar = m.index;
      const endChar   = startChar + m[0].length - 1;
      const start     = starts[startChar];
      const end       = ends[Math.min(endChar, ends.length - 1)];
      if (typeof start !== 'number' || typeof end !== 'number') continue;
      timings.push({ start, end });
    }
    return timings.length ? timings : null;
  }

  // Fallback when alignment is missing (legacy cache, API failure) — proportional char-count.
  function buildProportionalTimings(words, duration) {
    const lens  = words.map(w => Math.max(1, w.replace(/\W/g, '').length));
    const total = lens.reduce((s, l) => s + l, 0);
    let t = 0;
    return lens.map(len => {
      const d = (len / total) * duration;
      const entry = { start: t, end: t + d };
      t += d;
      return entry;
    });
  }

  // v2.4.4 — install a one-time scroll/touch/wheel listener that marks the user as
  // "in control" for 2.5s so auto-scroll backs off while the user is re-reading.
  // Auto-scroll moves the page itself, so a programmatic scroll fires the listener too;
  // we filter those out by comparing against lastAutoScrollAt with a small grace window.
  function installUserScrollListener() {
    if (scrollListenerInstalled) return;
    scrollListenerInstalled = true;
    const onUserScroll = () => {
      // Programmatic smooth-scroll fires "scroll" events too. If we triggered a scroll
      // within the last 700ms (≈ smooth-scroll duration), treat this as our own scroll.
      if (Date.now() - lastAutoScrollAt < 700) return;
      lastUserScrollAt = Date.now();
    };
    // wheel + touchmove are real user intent. scroll alone fires from anything.
    window.addEventListener('wheel',     onUserScroll, { passive: true });
    window.addEventListener('touchmove', onUserScroll, { passive: true });
  }

  // v2.4.4 — when a new word lights up, scroll it into view if it's drifting off
  // the bottom of the visible viewport. Centers the word so a few lines of upcoming
  // text are visible (gives the reader/listener context).
  function maybeAutoScroll(el) {
    if (!el) return;
    // Respect manual scrolls for 2.5s.
    if (Date.now() - lastUserScrollAt < 2500) return;
    const rect = el.getBoundingClientRect();
    const vh   = window.innerHeight || document.documentElement.clientHeight;
    // Scroll when the lit word is below 65% of the viewport (entering the bottom
    // third) or has already gone off-screen below.
    if (rect.bottom < vh * 0.65 && rect.top > 0) return;
    lastAutoScrollAt = Date.now();
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  /* v2.6.2 — karaoke lookahead offset.
     User reported the highlight is "consistently one word behind" the spoken audio.
     Root cause: HTMLMediaElement.currentTime under-reports the actual playback
     position on most browsers (~150-300ms depending on platform — worse on iOS,
     even worse over Bluetooth). The karaoke loop tracks currentTime, so the
     highlight ends up trailing what the user actually hears.
     Fix: bump the lookup time forward by KARAOKE_LEAD_MS. This way the highlight
     matches what the user is hearing right now, not what the audio buffer has
     queued. 220ms tuned to roughly the audible-vs-currentTime gap on iOS Safari +
     wired audio; mobile users with Bluetooth headphones may need a higher value
     but 220ms is a safe default that doesn't visibly race ahead on desktop. */
  const KARAOKE_LEAD_MS = 220;

  function startKaraokeRAF() {
    stopKaraokeRAF();
    installUserScrollListener();
    // Reset manual-scroll state at the start of playback so the very first word can
    // scroll into view if the user has scrolled the story off-screen before pressing Speak.
    lastUserScrollAt = 0;
    let lastIdx = -1;
    // v1.19.1 — Defect Log "Read-aloud out of sync" fix.
    // Two improvements over the previous loop:
    //  1) Pre-cache .kw[data-wi] node references once at start so each frame is O(1) DOM
    //     access instead of a fresh querySelector per tick (was running 60x/sec).
    //  2) Inter-word continuity: when audio time falls into a gap between word[i].end and
    //     word[i+1].start, KEEP the last lit word lit (previously the highlight blanked,
    //     which the user perceives as "audio is ahead of text"). New behaviour: find the
    //     last word whose .start <= t and keep that one lit until the next word truly begins.
    const kwNodes = Array.from(document.querySelectorAll('.kw'));
    function tick() {
      if (!audio || !wordTimings) return;
      // v2.6.2 — apply lookahead offset so highlight matches what user hears, not the
      // buffer-position currentTime reports. See KARAOKE_LEAD_MS docs above.
      const t  = audio.currentTime + (KARAOKE_LEAD_MS / 1000);
      const wt = wordTimings;
      let idx  = -1;
      // Primary pass: find the word currently being spoken (t inside [start, end)).
      for (let i = 0; i < wt.length; i++) {
        if (t >= wt[i].start && t < wt[i].end) { idx = i; break; }
      }
      // Continuity pass: if we're past the start of any word but in an inter-word gap,
      // keep the most-recently-started word lit. Walk backwards for early exit.
      if (idx === -1 && wt.length) {
        for (let i = wt.length - 1; i >= 0; i--) {
          if (t >= wt[i].start) { idx = i; break; }
        }
      }
      if (idx !== lastIdx) {
        if (lastIdx >= 0 && kwNodes[lastIdx]) kwNodes[lastIdx].classList.remove('is-lit');
        if (idx     >= 0 && kwNodes[idx]) {
          kwNodes[idx].classList.add('is-lit');
          // v2.4.4 — keep the current word visible. Only scrolls when it drifts to
          // the bottom of the viewport AND the user hasn't manually scrolled recently.
          maybeAutoScroll(kwNodes[idx]);
        }
        lastIdx = idx;
      }
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  function stopKaraokeRAF() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function clearHighlights() {
    document.querySelectorAll('.kw.is-lit').forEach(el => el.classList.remove('is-lit'));
  }

  function openDB() {
    if (db) return Promise.resolve(db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE);
        // Old v1 store 'audio-cache' is left alone; its raw-blob entries are unused under v2.
      };
      req.onsuccess = e => { db = e.target.result; resolve(db); };
      req.onerror   = () => reject(req.error);
    });
  }

  async function getCached(key) {
    try {
      return await new Promise((res, rej) => {
        const r = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
        r.onsuccess = () => res(r.result || null);
        r.onerror   = () => rej(r.error);
      });
    } catch { return null; }
  }

  async function putCached(key, value) {
    try {
      await new Promise((res, rej) => {
        const r = db.transaction(STORE, 'readwrite').objectStore(STORE).put(value, key);
        r.onsuccess = () => res();
        r.onerror   = () => rej(r.error);
      });
    } catch {}
  }

  // Base64 → Blob (audio/mpeg). Async-decode via fetch is the cleanest cross-browser path.
  async function base64ToBlob(b64, type = 'audio/mpeg') {
    const r = await fetch(`data:${type};base64,${b64}`);
    return await r.blob();
  }

  /* v0.9.3 · b8 — cache key includes voice preset so switching narrators
     does NOT replay cached audio from a different voice.
     v0.9.3 · b22 — cache key now ALSO prefixed by VOICE_CACHE_VERSION
     (currently 'v2'). Bumping that constant orphans every cached blob keyed
     by an older version — fixes the recurring "all previews are George" bug
     where pre-b17 cached preview blobs replayed George audio forever even
     after the resolver chain was fixed. Key shape:
       <VERSION>:<voicePreset>|sha256(text)   e.g. "v2:cozy|f1a2b3c4d5e6f7a8"
     Pre-b22 unversioned entries become orphans on first request per
     (voice, story) pair. Browser GC's them via IndexedDB quota policy. */
  async function hashKey(voicePreset, text) {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    const hex  = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
    const safe = VOICE_PRESET_KEYS.includes(voicePreset) ? voicePreset : VOICE_PRESET_DEFAULT;
    return `${VOICE_CACHE_VERSION}:${safe}|${hex}`;
  }

  /* v0.9.3 · b10 — preview cache key. Separate namespace ("preview:") from
     story keys, one entry per preset.
     v0.9.3 · b22 — now also includes VOICE_CACHE_VERSION so a cache version
     bump invalidates preview blobs alongside story blobs. Key shape:
       preview:<VERSION>:<preset>   e.g. "preview:v2:sunny" */
  function previewKey(voicePreset) {
    const safe = VOICE_PRESET_KEYS.includes(voicePreset) ? voicePreset : VOICE_PRESET_DEFAULT;
    return `preview:${VOICE_CACHE_VERSION}:${safe}`;
  }

  function setLoading(on) {
    const pill     = document.querySelector('#btn-speak-pill');
    const btnSpeak = document.querySelector('#btn-tts-speak');
    if (pill)     { pill.disabled     = on; if (on) pill.textContent = '⏳'; }
    if (btnSpeak) { btnSpeak.disabled = on; if (on) btnSpeak.textContent = 'Loading…'; }
  }

  async function speak(story) {
    stop();
    const strip = s => s.replace(/\[(?:name|c|y):([^\]]+)\]/g, '$1');

    // v2.2.3 — TTS name scrub REMOVED.
    // Earlier v2.2.1 scrubbed the child's real name from the /api/tts request body
    // ("Cole" → "Friend") for privacy. User feedback: the audio narrator then called
    // the kid "Friend" while the screen showed their real name — confusing mismatch.
    // The brief explicitly directs: visible story and read-aloud should BOTH use the
    // child's entered name. The privacy concern is acceptable per the user since the
    // first name alone is low-PII and the audio experience matters more.
    const body = strip(story.title) + '.\n\n' + story.paragraphs.map(strip).join('\n\n');

    // v1.19.3 "Theeee... end." dramatic closer (see v1.19.3 release notes for the rationale).
    const text = body + '\n\nTheeee... end.';
    // v0.9.3 · b8 — snapshot the voice preset at request time so a user switching
    // mid-fetch doesn't poison the cache entry for the in-flight request.
    const voicePreset = (state && VOICE_PRESET_KEYS.includes(state.voicePreset)) ? state.voicePreset : VOICE_PRESET_DEFAULT;
    try {
      setLoading(true);
      await openDB();
      const key  = await hashKey(voicePreset, text);
      let cached = await getCached(key);
      let audioBlob, alignment;

      if (cached && cached.audio) {
        // v2 cache hit — already has both audio + alignment
        audioBlob = cached.audio;
        alignment = cached.alignment;
      } else {
        controller = new AbortController();
        const res  = await fetch('/api/tts', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          // v0.9.3 · b8 — include voicePreset so the proxy can select the matching
          // server-side voice ID. Client never sees raw voice IDs. Unknown presets
          // are 400'd by the proxy; the client-side allowlist also blocks them above.
          body:    JSON.stringify({ text, voicePreset }),
          signal:  controller.signal,
        });
        if (!res.ok) throw new Error('api-error');
        const data = await res.json();
        audioBlob = await base64ToBlob(data.audioBase64, 'audio/mpeg');
        alignment = data.alignment;
        await putCached(key, { audio: audioBlob, alignment });
      }

      const url = URL.createObjectURL(audioBlob);
      audio = new Audio(url);

      // Prefer real alignment timings; fall back to proportional if missing.
      const alignTimings = buildAlignmentTimings(text, alignment);
      let wordArr = null;
      audio.onloadedmetadata = () => {
        if (alignTimings) {
          wordTimings = alignTimings;
        } else if (wordArr && wordArr.length > 0 && audio.duration) {
          wordTimings = buildProportionalTimings(wordArr, audio.duration);
        }
      };
      audio.onplay  = () => { if (wordTimings) startKaraokeRAF(); };
      audio.onended = () => { stopKaraokeRAF(); clearHighlights(); state.speaking = false; rerender(); URL.revokeObjectURL(url); };
      audio.onerror = () => { stopKaraokeRAF(); state.speaking = false; rerender(); URL.revokeObjectURL(url); };

      setLoading(false);
      state.speaking = true;
      rerender();

      wordArr = wrapStoryWords();
      if (alignTimings) {
        wordTimings = alignTimings;
      } else if (audio.readyState >= 1 && audio.duration && wordArr.length > 0) {
        wordTimings = buildProportionalTimings(wordArr, audio.duration);
      }

      audio.play().catch(() => { state.speaking = false; rerender(); });
    } catch (e) {
      if (e.name === 'AbortError') return;
      setLoading(false);
      state.speaking = false;
      rerender();
    }
  }

  function stop() {
    stopKaraokeRAF();
    clearHighlights();
    if (controller) { try { controller.abort(); } catch {} controller = null; }
    if (audio)      { try { audio.pause();        } catch {} audio      = null; }
    wordTimings = null;
  }

  /* v0.9.3 · b10 — short voice preview. Plays the per-preset previewText through
     the same /api/tts route. Uses a SEPARATE cache key namespace ("preview:<preset>")
     so previews never collide with story cache entries. Stops any running preview
     OR story playback before starting (single audio at a time). Returns a Promise
     that resolves when audio.play() starts so the caller can flip the button to
     a playing/loaded state. */
  async function previewVoice(voicePreset) {
    stop();
    const preset = VOICE_PRESET_KEYS.includes(voicePreset) ? voicePreset : VOICE_PRESET_DEFAULT;
    const def = VOICE_PRESETS.find(p => p.key === preset);
    if (!def || !def.previewText) throw new Error('no previewText for preset');
    await openDB();
    const key = previewKey(preset);
    let cached = null;
    try { cached = await getCached(key); } catch {}
    let audioBlob;
    if (cached && cached.audio) {
      audioBlob = cached.audio;
    } else {
      controller = new AbortController();
      const res  = await fetch('/api/tts', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text: def.previewText, voicePreset: preset }),
        signal:  controller.signal,
      });
      if (!res.ok) throw new Error('preview api error ' + res.status);
      const data = await res.json();
      audioBlob = await base64ToBlob(data.audioBase64, 'audio/mpeg');
      // v0.9.3 · b22 — cache the response metadata (voicePreset, voiceSource,
      // voiceConfigVersion, voiceSignature) alongside the blob so subsequent
      // cache-hit previews can still surface routing info to qaVoicePreviews
      // without re-hitting the network. The metadata is small (~80 bytes)
      // and helps DevTools verify that 4 cached previews represent 4 distinct
      // voices.
      const meta = {
        voicePreset:        data.voicePreset,
        voiceSource:        data.voiceSource,
        voiceConfigVersion: data.voiceConfigVersion,
        voiceSignature:     data.voiceSignature,
      };
      try { await putCached(key, { audio: audioBlob, alignment: null, meta }); } catch {}
    }
    const url = URL.createObjectURL(audioBlob);
    audio = new Audio(url);
    audio.onended = () => { audio = null; URL.revokeObjectURL(url); };
    audio.onerror = () => { audio = null; URL.revokeObjectURL(url); };
    await audio.play();
  }

  /* v0.9.3 · b22 — Cache-aware metadata probe for window.qaVoicePreviews.
     Returns { preset, cacheKey, fromCache, meta } where `meta` is
     { voicePreset, voiceSource, voiceConfigVersion, voiceSignature } from
     either the cached blob (if previously fetched) or a fresh /api/tts call.
     Does NOT play audio. Does NOT pollute the playback state machine. */
  async function probePreviewMeta(voicePreset) {
    const preset = VOICE_PRESET_KEYS.includes(voicePreset) ? voicePreset : VOICE_PRESET_DEFAULT;
    const def = VOICE_PRESETS.find(p => p.key === preset);
    if (!def || !def.previewText) throw new Error('no previewText for preset');
    await openDB();
    const key = previewKey(preset);
    let cached = null;
    try { cached = await getCached(key); } catch {}
    if (cached && cached.meta) {
      return { preset, cacheKey: key, fromCache: true, meta: cached.meta };
    }
    // Cache miss OR cache-hit-without-meta (pre-b22 entry). Either way, fetch
    // fresh so we get the signature. We still store the metadata back so the
    // next probe is instant.
    const res = await fetch('/api/tts', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text: def.previewText, voicePreset: preset }),
    });
    if (!res.ok) throw new Error('probe api error ' + res.status);
    const data = await res.json();
    const meta = {
      voicePreset:        data.voicePreset,
      voiceSource:        data.voiceSource,
      voiceConfigVersion: data.voiceConfigVersion,
      voiceSignature:     data.voiceSignature,
    };
    // Write back so the user-facing previewVoice() path benefits too. Only
    // store audio if we had to refetch a missing blob (cache-hit-without-meta
    // case keeps the existing blob).
    try {
      const audioBlob = await base64ToBlob(data.audioBase64, 'audio/mpeg');
      const existing  = cached && cached.audio ? cached : { alignment: null };
      await putCached(key, { audio: existing.audio || audioBlob, alignment: null, meta });
    } catch {}
    return { preset, cacheKey: key, fromCache: false, meta };
  }

  return { speak, stop, previewVoice, probePreviewMeta };
})();

/* v0.9.3 · b22 — Dev helper: window.qaVoicePreviews()
   Fetches metadata for all 4 voice previews and reports whether they
   resolve to 4 distinct voiceSignatures. Does not auto-play audio. Run in
   the browser console after a fresh deploy to verify routing + cache
   separation without manual A/B audio comparison.

   Returns: { rows, allDistinct, cacheVersion, signatures }
*/
window.qaVoicePreviews = async function() {
  if (typeof VOICE_PRESET_KEYS === 'undefined') {
    console.warn('[qaVoicePreviews] VOICE_PRESET_KEYS not defined; is content.js loaded?');
    return null;
  }
  const rows = [];
  for (const preset of VOICE_PRESET_KEYS) {
    try {
      const probe = await TTSManager.probePreviewMeta(preset);
      rows.push({
        preset,
        cacheKey:           probe.cacheKey,
        fromCache:          probe.fromCache,
        voicePreset:        probe.meta.voicePreset,
        voiceSource:        probe.meta.voiceSource,
        voiceConfigVersion: probe.meta.voiceConfigVersion,
        voiceSignature:     probe.meta.voiceSignature,
      });
    } catch (e) {
      rows.push({ preset, error: String(e && e.message || e) });
    }
  }
  const sigs        = rows.filter(r => r.voiceSignature).map(r => r.voiceSignature);
  const allDistinct = new Set(sigs).size === sigs.length && sigs.length === VOICE_PRESET_KEYS.length;
  const cacheVer    = (typeof VOICE_CACHE_VERSION !== 'undefined') ? VOICE_CACHE_VERSION : '(unknown)';
  console.table(rows);
  console.log(`[qaVoicePreviews] cacheVersion=${cacheVer}`);
  console.log(`[qaVoicePreviews] all ${VOICE_PRESET_KEYS.length} signatures distinct?`, allDistinct);
  if (!allDistinct) {
    const counts = {};
    for (const s of sigs) counts[s] = (counts[s] || 0) + 1;
    const dupes = Object.entries(counts).filter(([_, n]) => n >= 2);
    for (const [sig, n] of dupes) {
      const presets = rows.filter(r => r.voiceSignature === sig).map(r => r.preset);
      console.warn(`[qaVoicePreviews] ${n} presets share voiceSignature=${sig}: [${presets.join(', ')}]. Check Vercel env vars or VOICE_MAP defaults.`);
    }
  }
  return { rows, allDistinct, cacheVersion: cacheVer, signatures: sigs };
};

function attachStoryHandlers(el) {
  const pill        = el.querySelector('#btn-speak-pill');
  const btnSpeak    = el.querySelector('#btn-tts-speak');
  const btnStop     = el.querySelector('#btn-tts-stop');
  const btnReadSelf = el.querySelector('#btn-read-myself');
  const btnAgain    = el.querySelector('#btn-play-again');
  const btnNarrator = el.querySelector('#btn-narrator-change');

  const startSpeak = () => TTSManager.speak(state.story);
  const stopSpeak  = () => { TTSManager.stop(); state.speaking = false; rerender(); };

  if (pill) pill.addEventListener('click', () => state.speaking ? stopSpeak() : startSpeak());
  if (btnSpeak) btnSpeak.addEventListener('click', startSpeak);
  if (btnStop)  btnStop.addEventListener('click', stopSpeak);

  if (btnReadSelf) {
    btnReadSelf.addEventListener('click', () => {
      el.querySelector('.story-paper').scrollIntoView({ behavior: 'smooth' });
    });
  }

  if (btnAgain) btnAgain.addEventListener('click', resetApp);

  // v0.9.3 · b10 — Change narrator from the story screen. Opens a bottom-sheet
  // modal containing the same 4-preset grid used in Settings. Selecting a voice
  // updates Profile + state and refreshes the narrator row label inline (no
  // story-screen reflow). Switching mid-playback does NOT interrupt the current
  // audio — the new voice applies on the next tap of "Read it to me."
  if (btnNarrator) btnNarrator.addEventListener('click', showNarratorModal);
}

function showNarratorModal() {
  if (document.querySelector('.narrator-modal-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'narrator-modal-overlay';
  overlay.innerHTML = `
    <div class="narrator-modal" role="dialog" aria-modal="true" aria-label="Choose narrator">
      <div class="narrator-modal-head">
        <h2 class="narrator-modal-title">Narrator voice</h2>
        <button class="whatsnew-close" id="narrator-modal-close" aria-label="Close">×</button>
      </div>
      ${renderVoicePickerGrid(state.voicePreset)}
      <p class="settings-footnote" style="margin-top:8px;">
        Voice change applies on the next "Read it to me." Tap ▶ to preview a voice first.
      </p>
    </div>
  `;
  document.querySelector('.app').appendChild(overlay);
  const close = () => { TTSManager.stop(); overlay.remove(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#narrator-modal-close').addEventListener('click', close);
  attachVoicePickerHandlers(overlay, {
    onSelect: (key) => {
      const cur = VOICE_PRESETS.find(p => p.key === key);
      // Refresh the in-place narrator-row label so the user sees their pick
      // confirmed on the story screen without a full reflow.
      const lbl = document.querySelector('.narrator-row-label strong');
      if (lbl && cur) lbl.textContent = cur.label;
    },
  });
}

function resetApp() {
  // v1.18.1 — keep state.name across "Start over" so the user can roll multiple stories
  // quickly without re-typing the kid's name. If a name is saved we skip directly to the
  // age step. User can tap "← back" to edit or clear via the chip X.
  // v2.1.0 — state.setting also persists across "Start over" so a parent picking a setting
  // for the kid doesn't have to re-pick it every story.
  TTSManager.stop();
  state.screen       = 'welcome';
  state.welcomeStep  = state.name.trim() ? 'age' : 'name';
  state.age          = null;
  state.teenUnlocked = false;
  state.picks        = {};
  state.rounds       = [];
  state.roundIdx     = 0;
  state.shufflesUsed  = 0;   // v0.9.3 · b3 — reset shuffle counter when returning to welcome
  state.wordAdvancing = false; // v0.9.3 · b14 — also clear the rapid-tap guard
  state.speaking     = false;
  state.story        = null;
  goTo('welcome');
}

/* ================================================================
   PIN MODAL — parental gate for tween tier (ages 11–13)
   PIN lives in localStorage; unlock status is session-only (state.teenUnlocked).
   ================================================================ */
function showPinModal(targetAge) {
  document.querySelector('.pin-overlay')?.remove();

  const hasPIN = !!localStorage.getItem('nt_pin');
  const isNew  = !hasPIN;

  const overlay = document.createElement('div');
  overlay.className = 'pin-overlay';
  overlay.innerHTML = `
    <div class="pin-modal">
      <h3>${isNew ? '🔒 Set a Parent PIN' : '🔒 Parent PIN Required'}</h3>
      <p>${isNew
        ? "Teen stories (ages 11–13) need a parent PIN. Choose 4 digits — you'll only need to do this once."
        : 'Teen stories are for ages 11–13. Enter your parent PIN to unlock.'
      }</p>
      <input class="pin-input" id="pin-input" type="password" inputmode="numeric"
        pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
      ${isNew ? `<input class="pin-input" id="pin-confirm" type="password" inputmode="numeric"
        pattern="[0-9]*" maxlength="4" placeholder="Confirm PIN" autocomplete="off">` : ''}
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-actions">
        <button class="btn btn--ghost" id="pin-cancel">Cancel</button>
        <button class="btn" id="pin-submit" disabled>${isNew ? 'Set PIN & Unlock' : 'Unlock'}</button>
      </div>
    </div>
  `;

  document.getElementById('root').appendChild(overlay);

  const inp     = overlay.querySelector('#pin-input');
  const confirm = overlay.querySelector('#pin-confirm');
  const submit  = overlay.querySelector('#pin-submit');
  const errEl   = overlay.querySelector('#pin-error');

  const syncSubmit = () => {
    if (isNew) {
      submit.disabled = !(inp.value.length === 4 && confirm && confirm.value.length === 4);
    } else {
      submit.disabled = inp.value.length !== 4;
    }
  };

  inp.addEventListener('input', syncSubmit);
  if (confirm) confirm.addEventListener('input', syncSubmit);

  // Auto-advance to confirm field after 4 digits
  if (confirm) {
    inp.addEventListener('input', () => { if (inp.value.length === 4) confirm.focus(); });
  }

  overlay.querySelector('#pin-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#pin-submit').addEventListener('click', () => {
    errEl.textContent = '';
    if (isNew) {
      if (inp.value.length !== 4 || !/^\d{4}$/.test(inp.value)) {
        errEl.textContent = 'PIN must be exactly 4 digits.';
        return;
      }
      if (inp.value !== confirm.value) {
        errEl.textContent = "PINs don't match. Try again.";
        confirm.value = '';
        inp.focus();
        return;
      }
      localStorage.setItem('nt_pin', inp.value);
      state.teenUnlocked = true;
      state.age = targetAge;
      overlay.remove();
      rerender();
    } else {
      if (inp.value === localStorage.getItem('nt_pin')) {
        state.teenUnlocked = true;
        state.age = targetAge;
        overlay.remove();
        rerender();
      } else {
        errEl.textContent = 'Incorrect PIN. Try again.';
        inp.value = '';
        syncSubmit();
        inp.focus();
      }
    }
  });

  setTimeout(() => inp.focus(), 120);
}

/* ================================================================
   BOOT
   ================================================================ */
goTo('welcome');
</script>
</body>
</html>
