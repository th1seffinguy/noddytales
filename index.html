                <span>${esc(sk)}</span>
                <button class="sidekick-chip-x" data-sk-idx="${i}" aria-label="Remove">×</button>
              </span>
            `).join('')
        }
      </div>
      <div class="footer">
        <button class="btn" id="btn-sidekicks-go">
          ${state.sidekicks.length === 0 ? 'Skip & start ✨' : "Let's go! ✨"}
        </button>
      </div>
    </div>
  `}
</div>`;
}

/* ---- Screen 2: Words ---- */
function renderWords() {
  const rounds = state.rounds;
  const idx    = state.roundIdx;
  const round  = rounds[idx];
  const tier   = tierFor(state.age);
  const showEmoji = tier === 'tot' || tier === 'little';

  const progressDots = rounds.map((_, i) => {
    let cls = 'progress-dot';
    if (i < idx) cls += ' is-done';
    if (i === idx) cls += ' is-current';
    return `<div class="${cls}"></div>`;
  }).join('');

  let roundContent = '';

  if (round.type === 'freetext') {
    roundContent = `
      <div class="freetext-wrap" id="freetext-wrap">
        <input
          class="freetext-input"
          id="input-freetext"
          type="text"
          placeholder="Type anything…"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="words"
          maxlength="20"
        />
        <div class="freetext-hints">
          <span class="hint-label">e.g.</span>
          ${round.examples.map(ex => `
            <button class="hint-chip" data-hint="${esc(ex)}">${esc(ex)}</button>
          `).join('')}
        </div>
        <div class="footer">
          <button class="btn" id="btn-freetext-submit" disabled>
            That's my word! →
          </button>
        </div>
      </div>`;
  } else {
    const wordClass = (w) => {
      const len = w.length;
      if (len <= 4)  return 'word-text word-text--lg';
      if (len >= 11) return 'word-text word-text--sm';
      return 'word-text';
    };

    roundContent = `
      <div class="pair-wrap" id="pair-wrap">
        ${round.options.map((opt, i) => `
          <button
            class="word-card is-bouncing"
            data-side="${i}"
            id="card-${i}"
          >
            <div class="word-emoji${showEmoji ? '' : ' word-emoji--sm'}">${opt.e}</div>
            <div class="${wordClass(opt.w)}">${esc(opt.w)}</div>
          </button>
        `).join('')}
      </div>`;
  }

  return `
<div class="screen" id="screen-words">
  <div class="screen-head">
    ${renderLogo()}
    <div class="pill">${esc(state.name || 'You')} · ${state.age}</div>
  </div>

  <div class="progress" aria-label="Round ${idx + 1} of ${rounds.length}">
    ${progressDots}
  </div>

  <div class="step-label">
    Round <strong>${idx + 1}</strong> of <strong>${rounds.length}</strong>
  </div>

  <p class="q-label">
    ${esc(round.label)}<br>
    <span style="font-size:16px;color:var(--ink-soft)">
      ${round.type === 'freetext' ? 'type your answer' : 'tap your favorite'}
    </span>
  </p>

  ${roundContent}
</div>`;
}

/* ---- Screen 3: Story ---- */
function renderStory() {
  const story  = state.story;
  const spk    = state.speaking;

  /* Colorize title words alternating orange/ink */
  const titleHtml = story.title.split(' ').map((w, i) =>
    `<span style="color:${i % 4 === 0 ? 'var(--orange-dark)' : 'var(--ink)'}">${esc(w)} </span>`
  ).join('');

  const bodyHtml = story.paragraphs.map(p =>
    `<p>${parseStoryLine(p)}</p>`
  ).join('');

  return `
<div class="screen screen--cream" id="screen-story">
  <div class="screen-head" style="position:relative;z-index:1">
    ${renderLogo()}
    <button
      class="speak-pill${spk ? ' is-speaking' : ''}"
      id="btn-speak-pill"
      aria-label="${spk ? 'Stop reading' : 'Read story aloud'}"
    >
      <span class="speak-pill-icon">${spk ? '⏸' : '🔊'}</span>
      <span class="speak-pill-label">${spk ? 'Stop' : 'Speak'}</span>
      ${spk ? `<span class="speak-waves"><span></span><span></span><span></span><span></span></span>` : ''}
    </button>
  </div>

  <div class="story-stack">
    <div class="story-paper">
      <h2 class="story-title">${titleHtml}</h2>
      <div class="story-body">${bodyHtml}</div>
      <p class="story-end">✦ The End ✦</p>
    </div>

    <div class="story-toolbar">
      <div class="story-toolbar-row">
        <button class="btn btn--ghost btn--small" id="btn-read-myself">📖 Read It Myself</button>
        ${spk
          ? `<button class="btn btn--yellow btn--small" id="btn-tts-stop">⏸ Stop Reading</button>`
          : `<button class="btn btn--small" id="btn-tts-speak">🔊 Read It To Me</button>`
        }
      </div>
      <button class="btn btn--yellow" id="btn-play-again">✨ Play Again</button>
    </div>
  </div>
</div>`;
}

/* ================================================================
   TRANSITIONS
   ================================================================ */
const wrap = document.getElementById('screen-wrap');

function goTo(screenName) {
  const prev = wrap.querySelector('.screen');
  if (prev) prev.classList.add('is-exiting');

  // render new screen hidden
  const tmp = document.createElement('div');
  if (screenName === 'welcome') tmp.innerHTML = renderWelcome();
  else if (screenName === 'words') tmp.innerHTML = renderWords();
  else if (screenName === 'story') { state.story = buildStory(state.name, state.picks, state.age); tmp.innerHTML = renderStory(); }

  const next = tmp.firstElementChild;
  next.classList.add('is-hidden');
  wrap.appendChild(next);

  // animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      next.classList.remove('is-hidden');
      if (prev) {
        setTimeout(() => prev.remove(), 600);
      }
    });
  });

  state.screen = screenName;
  attachHandlers(screenName, next);

  // Focus friendly: auto-focus name input on desktop
  if (screenName === 'welcome' && state.welcomeStep === 'name') {
    const inp = next.querySelector('#input-name');
    if (inp && window.matchMedia('(min-width: 480px)').matches) {
      setTimeout(() => inp.focus(), 300);
    }
  }
  if (screenName === 'words' && state.rounds[state.roundIdx]?.type === 'freetext') {
    const inp = next.querySelector('#input-freetext');
    if (inp) setTimeout(() => inp.focus(), 400);
  }
}

/* Re-render current screen in place (no transition) */
function rerender() {
  const existing = wrap.querySelector('.screen');
  const tmp = document.createElement('div');
  if (state.screen === 'welcome') tmp.innerHTML = renderWelcome();
  else if (state.screen === 'words') tmp.innerHTML = renderWords();
  else if (state.screen === 'story') tmp.innerHTML = renderStory();

  const next = tmp.firstElementChild;
  if (existing) wrap.replaceChild(next, existing);
  else wrap.appendChild(next);

  attachHandlers(state.screen, next);
}

/* ================================================================
   EVENT HANDLERS
   ================================================================ */
function attachHandlers(screenName, el) {
  if (screenName === 'welcome') attachWelcomeHandlers(el);
  else if (screenName === 'words') attachWordsHandlers(el);
  else if (screenName === 'story') attachStoryHandlers(el);
}

function attachWelcomeHandlers(el) {
  const inp = el.querySelector('#input-name');
  const btnNext = el.querySelector('#btn-name-next');
  const btnBack = el.querySelector('#btn-back');
  const btnAgeNext = el.querySelector('#btn-age-next');
  const ageTiles = el.querySelectorAll('.age-tile');
  const pottyToggle = el.querySelector('#toggle-potty');
  const skInput = el.querySelector('#input-sidekick');
  const btnSkAdd = el.querySelector('#btn-sidekick-add');
  const btnSkGo = el.querySelector('#btn-sidekicks-go');
  const skChipXs = el.querySelectorAll('.sidekick-chip-x');

  if (pottyToggle) {
    pottyToggle.addEventListener('change', () => {
      state.pottyMode = pottyToggle.checked;
      localStorage.setItem('nt_potty_mode', state.pottyMode ? '1' : '0');
      const hint = el.querySelector('.potty-hint');
      if (hint) hint.textContent = state.pottyMode ? '— ON 💨' : '(potty humor)';
    });
  }

  if (inp) {
    inp.addEventListener('input', () => {
      state.name = inp.value.slice(0, 14);
      if (btnNext) btnNext.disabled = !state.name.trim();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && state.name.trim()) advanceToAge();
    });
  }

  if (btnNext) btnNext.addEventListener('click', () => {
    if (state.name.trim()) advanceToAge();
  });

  if (btnBack) btnBack.addEventListener('click', () => {
    // Back from age → name, back from sidekicks → age
    state.welcomeStep = state.welcomeStep === 'sidekicks' ? 'age' : 'name';
    rerender();
  });

  ageTiles.forEach(tile => {
    tile.addEventListener('click', () => {
      if (tile.dataset.locked === 'true') {
        showPinModal(parseInt(tile.dataset.age, 10));
        return;
      }
      state.age = parseInt(tile.dataset.age, 10);
      ageTiles.forEach(t => t.classList.remove('is-selected'));
      tile.classList.add('is-selected');
      if (btnAgeNext) btnAgeNext.disabled = false;
    });
  });

  if (btnAgeNext) btnAgeNext.addEventListener('click', () => {
    if (state.age) advanceToSidekicks();
  });

  // Sidekick step
  const addSidekick = () => {
    if (!skInput) return;
    const v = skInput.value.trim().slice(0, 14).replace(/[<>&"]/g, '');
    if (!v || state.sidekicks.length >= 3) return;
    if (state.sidekicks.some(s => s.toLowerCase() === v.toLowerCase())) { skInput.value = ''; return; }
    state.sidekicks = [...state.sidekicks, v];
    localStorage.setItem('nt_sidekicks', JSON.stringify(state.sidekicks));
    rerender();
  };

  if (skInput) {
    skInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addSidekick(); }
    });
    setTimeout(() => { try { skInput.focus(); } catch {} }, 250);
  }
  if (btnSkAdd) btnSkAdd.addEventListener('click', addSidekick);

  skChipXs.forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.skIdx, 10);
      state.sidekicks = state.sidekicks.filter((_, idx) => idx !== i);
      localStorage.setItem('nt_sidekicks', JSON.stringify(state.sidekicks));
      rerender();
    });
  });

  if (btnSkGo) btnSkGo.addEventListener('click', () => {
    if (state.age) startWords();
  });
}

function advanceToAge() {
  state.welcomeStep = 'age';
  rerender();
}

function advanceToSidekicks() {
  state.welcomeStep = 'sidekicks';
  rerender();
}

function startWords() {
  state.rounds   = buildRounds(state.age);
  state.roundIdx = 0;
  state.picks    = {};
  goTo('words');
}

function attachWordsHandlers(el) {
  const round = state.rounds[state.roundIdx];

  if (round.type === 'freetext') {
    const inp    = el.querySelector('#input-freetext');
    const btn    = el.querySelector('#btn-freetext-submit');
    const hints  = el.querySelectorAll('.hint-chip');

    const syncBtn = () => {
      if (btn) btn.disabled = !(inp && inp.value.trim());
    };

    if (inp) {
      inp.addEventListener('input', syncBtn);
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && inp.value.trim()) submitFreeText(inp.value.trim());
      });
    }

    hints.forEach(h => {
      h.addEventListener('click', () => {
        if (inp) { inp.value = h.dataset.hint; syncBtn(); inp.focus(); }
      });
    });

    if (btn) btn.addEventListener('click', () => {
      if (inp && inp.value.trim()) submitFreeText(inp.value.trim());
    });

  } else {
    const cards = el.querySelectorAll('.word-card');
    cards.forEach((card, i) => {
      card.addEventListener('click', () => pickWord(i, el));
    });
  }
}

function submitFreeText(value) {
  const round = state.rounds[state.roundIdx];
  // sanitize: strip any HTML-like chars, enforce 20 char max
  const clean = value.replace(/[<>&"]/g, '').slice(0, 20).trim();
  if (!clean) return;
  // Propagate the prompt's subtype so buildStory can route the freeword semantically
  // ("smell" picks become "smelled like X", "name" picks become "named X", etc.).
  advanceRound(round.cat, { w: clean, e: '', subtype: round.subtype || 'shout' });
}

function pickWord(side, el) {
  const round = state.rounds[state.roundIdx];
  const cards = el.querySelectorAll('.word-card');

  cards.forEach(c => c.classList.remove('is-bouncing'));
  cards[side].classList.add('is-picked');
  cards[1 - side].classList.add('is-faded');

  // burst stars
  spawnBursts(cards[side]);

  setTimeout(() => {
    advanceRound(round.cat, round.options[side]);
  }, 650);
}

function spawnBursts(card) {
  const chars = ['⭐','✨','💫','🌟'];
  for (let i = 0; i < 6; i++) {
    const b = document.createElement('span');
    b.className = 'burst';
    b.textContent = chars[Math.floor(Math.random() * chars.length)];
    const dx = (Math.random() - 0.5) * 120;
    const dy = -40 - Math.random() * 60;
    b.style.setProperty('--bx', dx + 'px');
    b.style.setProperty('--by', dy + 'px');
    card.appendChild(b);
    setTimeout(() => b.remove(), 800);
  }
}

function advanceRound(cat, chosen) {
  state.picks[cat] = chosen;
  const total = state.rounds.length;

  if (state.roundIdx + 1 < total) {
    state.roundIdx++;
    goTo('words');
  } else {
    goTo('story');
  }
}

/* ---- Karaoke: wrap every story word in .kw spans with sequential data-wi indices ---- */
function wrapStoryWords() {
  const titleEl = document.querySelector('.story-title');
  const bodyEl  = document.querySelector('.story-body');
  if (!bodyEl) return [];
  const words = [];
  let wi = 0;
  function processRoot(root) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    const textNodes = [];
    let node;
    while ((node = walker.nextNode())) textNodes.push(node);
    for (const node of textNodes) {
      const frag = document.createDocumentFragment();
      node.textContent.split(/(\s+)/).forEach(part => {
        if (!part) return;
        if (/^\s+$/.test(part)) {
          frag.appendChild(document.createTextNode(part));
        } else if (/[a-zA-Z0-9]/.test(part)) {
          const span = document.createElement('span');
          span.className = 'kw';
          span.dataset.wi = wi++;
          span.textContent = part;
          frag.appendChild(span);
          words.push(part);
        } else {
          frag.appendChild(document.createTextNode(part));
        }
      });
      node.parentNode.replaceChild(frag, node);
    }
  }
  const endEl = document.querySelector('.story-end');
  if (titleEl) processRoot(titleEl);
  processRoot(bodyEl);
  if (endEl)   processRoot(endEl);
  return words;
}

/* ---- TTSManager: ElevenLabs API + IndexedDB audio+alignment cache ---- */
const TTSManager = (() => {
  const DB_NAME = 'noddytales-tts';
  const DB_VER  = 2;
  const STORE   = 'audio-v2';   // stores { audio: Blob, alignment: object }
  let db          = null;
  let audio       = null;
  let controller  = null;
  let wordTimings = null;
  let rafId       = null;

  // ElevenLabs alignment is character-level. Convert to word-level by walking the TTS text
  // and pairing each word's first/last char with the alignment start/end times. Filter
  // pure-punctuation tokens so timings match wrapStoryWords' word indexing exactly.
  function buildAlignmentTimings(text, alignment) {
    if (!alignment || !Array.isArray(alignment.character_start_times_seconds)) return null;
    const starts = alignment.character_start_times_seconds;
    const ends   = alignment.character_end_times_seconds;
    if (!starts.length || !ends.length) return null;
    const timings = [];
    const wordRegex = /\S+/g;
    let m;
    while ((m = wordRegex.exec(text)) !== null) {
      if (!/[a-zA-Z0-9]/.test(m[0])) continue;
      const startChar = m.index;
      const endChar   = startChar + m[0].length - 1;
      const start     = starts[startChar];
      const end       = ends[Math.min(endChar, ends.length - 1)];
      if (typeof start !== 'number' || typeof end !== 'number') continue;
      timings.push({ start, end });
    }
    return timings.length ? timings : null;
  }

  // Fallback when alignment is missing (legacy cache, API failure) — proportional char-count.
  function buildProportionalTimings(words, duration) {
    const lens  = words.map(w => Math.max(1, w.replace(/\W/g, '').length));
    const total = lens.reduce((s, l) => s + l, 0);
    let t = 0;
    return lens.map(len => {
      const d = (len / total) * duration;
      const entry = { start: t, end: t + d };
      t += d;
      return entry;
    });
  }

  function startKaraokeRAF() {
    stopKaraokeRAF();
    let lastIdx = -1;
    function tick() {
      if (!audio || !wordTimings) return;
      const t  = audio.currentTime;
      const wt = wordTimings;
      let idx  = -1;
      for (let i = 0; i < wt.length; i++) {
        if (t >= wt[i].start && t < wt[i].end) { idx = i; break; }
      }
      if (idx === -1 && wt.length && t >= wt[wt.length - 1].end) idx = wt.length - 1;
      if (idx !== lastIdx) {
        if (lastIdx >= 0) document.querySelector(`.kw[data-wi="${lastIdx}"]`)?.classList.remove('is-lit');
        if (idx     >= 0) document.querySelector(`.kw[data-wi="${idx}"]`)?.classList.add('is-lit');
        lastIdx = idx;
      }
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  function stopKaraokeRAF() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function clearHighlights() {
    document.querySelectorAll('.kw.is-lit').forEach(el => el.classList.remove('is-lit'));
  }

  function openDB() {
    if (db) return Promise.resolve(db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE);
        // Old v1 store 'audio-cache' is left alone; its raw-blob entries are unused under v2.
      };
      req.onsuccess = e => { db = e.target.result; resolve(db); };
      req.onerror   = () => reject(req.error);
    });
  }

  async function getCached(key) {
    try {
      return await new Promise((res, rej) => {
        const r = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
        r.onsuccess = () => res(r.result || null);
        r.onerror   = () => rej(r.error);
      });
    } catch { return null; }
  }

  async function putCached(key, value) {
    try {
      await new Promise((res, rej) => {
        const r = db.transaction(STORE, 'readwrite').objectStore(STORE).put(value, key);
        r.onsuccess = () => res();
        r.onerror   = () => rej(r.error);
      });
    } catch {}
  }

  // Base64 → Blob (audio/mpeg). Async-decode via fetch is the cleanest cross-browser path.
  async function base64ToBlob(b64, type = 'audio/mpeg') {
    const r = await fetch(`data:${type};base64,${b64}`);
    return await r.blob();
  }

  async function hashKey(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
  }

  function setLoading(on) {
    const pill     = document.querySelector('#btn-speak-pill');
    const btnSpeak = document.querySelector('#btn-tts-speak');
    if (pill)     { pill.disabled     = on; if (on) pill.textContent = '⏳'; }
    if (btnSpeak) { btnSpeak.disabled = on; if (on) btnSpeak.textContent = 'Loading…'; }
  }

  async function speak(story) {
    stop();
    const strip = s => s.replace(/\[(?:name|c|y):([^\]]+)\]/g, '$1');
    // "Theeeeeeeeeeeee... End." — repeated vowels tell ElevenLabs to elongate the "ee" sound,
    // ellipsis adds a beat of silence, period gives final-sentence finality. ~3 seconds total
    // for a dramatic closer. The rendered DOM still shows clean "The End" (karaoke maps by word
    // index, so the elongated "Theeeeeeeeeeeee..." TTS word stays mapped to the DOM "The" span,
    // which keeps the highlight lit for the full elongation).
    const text  = strip(story.title) + '.\n\n' + story.paragraphs.map(strip).join('\n\n') + '\n\nTheeeeeeeeeeeee... End.';
    try {
      setLoading(true);
      await openDB();
      const key  = await hashKey(text);
      let cached = await getCached(key);
      let audioBlob, alignment;

      if (cached && cached.audio) {
        // v2 cache hit — already has both audio + alignment
        audioBlob = cached.audio;
        alignment = cached.alignment;
      } else {
        controller = new AbortController();
        const res  = await fetch('/api/tts', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ text }),
          signal:  controller.signal,
        });
        if (!res.ok) throw new Error('api-error');
        const data = await res.json();
        audioBlob = await base64ToBlob(data.audioBase64, 'audio/mpeg');
        alignment = data.alignment;
        await putCached(key, { audio: audioBlob, alignment });
      }

      const url = URL.createObjectURL(audioBlob);
      audio = new Audio(url);

      // Prefer real alignment timings; fall back to proportional if missing.
      const alignTimings = buildAlignmentTimings(text, alignment);
      let wordArr = null;
      audio.onloadedmetadata = () => {
        if (alignTimings) {
          wordTimings = alignTimings;
        } else if (wordArr && wordArr.length > 0 && audio.duration) {
          wordTimings = buildProportionalTimings(wordArr, audio.duration);
        }
      };
      audio.onplay  = () => { if (wordTimings) startKaraokeRAF(); };
      audio.onended = () => { stopKaraokeRAF(); clearHighlights(); state.speaking = false; rerender(); URL.revokeObjectURL(url); };
      audio.onerror = () => { stopKaraokeRAF(); state.speaking = false; rerender(); URL.revokeObjectURL(url); };

      setLoading(false);
      state.speaking = true;
      rerender();

      wordArr = wrapStoryWords();
      if (alignTimings) {
        wordTimings = alignTimings;
      } else if (audio.readyState >= 1 && audio.duration && wordArr.length > 0) {
        wordTimings = buildProportionalTimings(wordArr, audio.duration);
      }

      audio.play().catch(() => { state.speaking = false; rerender(); });
    } catch (e) {
      if (e.name === 'AbortError') return;
      setLoading(false);
      state.speaking = false;
      rerender();
    }
  }

  function stop() {
    stopKaraokeRAF();
    clearHighlights();
    if (controller) { try { controller.abort(); } catch {} controller = null; }
    if (audio)      { try { audio.pause();        } catch {} audio      = null; }
    wordTimings = null;
  }

  return { speak, stop };
})();

function attachStoryHandlers(el) {
  const pill        = el.querySelector('#btn-speak-pill');
  const btnSpeak    = el.querySelector('#btn-tts-speak');
  const btnStop     = el.querySelector('#btn-tts-stop');
  const btnReadSelf = el.querySelector('#btn-read-myself');
  const btnAgain    = el.querySelector('#btn-play-again');

  const startSpeak = () => TTSManager.speak(state.story);
  const stopSpeak  = () => { TTSManager.stop(); state.speaking = false; rerender(); };

  if (pill) pill.addEventListener('click', () => state.speaking ? stopSpeak() : startSpeak());
  if (btnSpeak) btnSpeak.addEventListener('click', startSpeak);
  if (btnStop)  btnStop.addEventListener('click', stopSpeak);

  if (btnReadSelf) {
    btnReadSelf.addEventListener('click', () => {
      el.querySelector('.story-paper').scrollIntoView({ behavior: 'smooth' });
    });
  }

  if (btnAgain) btnAgain.addEventListener('click', resetApp);
}

function resetApp() {
  TTSManager.stop();
  state.screen       = 'welcome';
  state.welcomeStep  = 'name';
  state.name         = '';
  state.age          = null;
  state.teenUnlocked = false;
  state.picks        = {};
  state.rounds       = [];
  state.roundIdx     = 0;
  state.speaking     = false;
  state.story        = null;
  goTo('welcome');
}

/* ================================================================
   PIN MODAL — parental gate for tween tier (ages 11–13)
   PIN lives in localStorage; unlock status is session-only (state.teenUnlocked).
   ================================================================ */
function showPinModal(targetAge) {
  document.querySelector('.pin-overlay')?.remove();

  const hasPIN = !!localStorage.getItem('nt_pin');
  const isNew  = !hasPIN;

  const overlay = document.createElement('div');
  overlay.className = 'pin-overlay';
  overlay.innerHTML = `
    <div class="pin-modal">
      <h3>${isNew ? '🔒 Set a Parent PIN' : '🔒 Parent PIN Required'}</h3>
      <p>${isNew
        ? "Teen stories (ages 11–13) need a parent PIN. Choose 4 digits — you'll only need to do this once."
        : 'Teen stories are for ages 11–13. Enter your parent PIN to unlock.'
      }</p>
      <input class="pin-input" id="pin-input" type="password" inputmode="numeric"
        pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
      ${isNew ? `<input class="pin-input" id="pin-confirm" type="password" inputmode="numeric"
        pattern="[0-9]*" maxlength="4" placeholder="Confirm PIN" autocomplete="off">` : ''}
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-actions">
        <button class="btn btn--ghost" id="pin-cancel">Cancel</button>
        <button class="btn" id="pin-submit" disabled>${isNew ? 'Set PIN & Unlock' : 'Unlock'}</button>
      </div>
    </div>
  `;

  document.getElementById('root').appendChild(overlay);

  const inp     = overlay.querySelector('#pin-input');
  const confirm = overlay.querySelector('#pin-confirm');
  const submit  = overlay.querySelector('#pin-submit');
  const errEl   = overlay.querySelector('#pin-error');

  const syncSubmit = () => {
    if (isNew) {
      submit.disabled = !(inp.value.length === 4 && confirm && confirm.value.length === 4);
    } else {
      submit.disabled = inp.value.length !== 4;
    }
  };

  inp.addEventListener('input', syncSubmit);
  if (confirm) confirm.addEventListener('input', syncSubmit);

  // Auto-advance to confirm field after 4 digits
  if (confirm) {
    inp.addEventListener('input', () => { if (inp.value.length === 4) confirm.focus(); });
  }

  overlay.querySelector('#pin-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#pin-submit').addEventListener('click', () => {
    errEl.textContent = '';
    if (isNew) {
      if (inp.value.length !== 4 || !/^\d{4}$/.test(inp.value)) {
        errEl.textContent = 'PIN must be exactly 4 digits.';
        return;
      }
      if (inp.value !== confirm.value) {
        errEl.textContent = "PINs don't match. Try again.";
        confirm.value = '';
        inp.focus();
        return;
      }
      localStorage.setItem('nt_pin', inp.value);
      state.teenUnlocked = true;
      state.age = targetAge;
      overlay.remove();
      rerender();
    } else {
      if (inp.value === localStorage.getItem('nt_pin')) {
        state.teenUnlocked = true;
        state.age = targetAge;
        overlay.remove();
        rerender();
      } else {
        errEl.textContent = 'Incorrect PIN. Try again.';
        inp.value = '';
        syncSubmit();
        inp.focus();
      }
    }
  });

  setTimeout(() => inp.focus(), 120);
}

/* ================================================================
   BOOT
   ================================================================ */
goTo('welcome');
</script>
