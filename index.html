    detail: 'User reviewed the full picker map after b13 and flagged that visible word/emoji mismatches make the app feel cheaper — kids read the image first. This release does a coordinated pass across all 5 tiers. PART 1 — MISMATCH FIXES (~20 modifications): tot food strawberries 🍓 (was jam) + peas 🫛 (native peapod); tot sky stars 🌌 (was "high bubbles"); little pet duckling 🦆 (was 🐥, avoids chick visual collision) + koala 🐨 (replaces guinea pig 🐀 since no Unicode for guinea pig); kid pet eagle 🦅 (was falcon — emoji IS an eagle) + beaver 🦫 (was capybara) + goldfish 🐠 (was axolotl); kid food quesadilla 🫓 (was nachos — emoji is flatbread); kid place tower 🗼 (was lighthouse — emoji is Tokyo Tower); kid creature stone giant 🗿 + fire bird 🔥 (was phoenix; chose word-side fix since the new Unicode 15.1 phoenix 🐦‍🔥 isn\'t universally supported on older iOS/Android still in field) + talking horse 🐎 (was centaur; more age-6 friendly); kid mood puzzled 🧩 (was professionally confused) + super happy 😄 (was jubilant); big pet "overly formal otter 🦦" (was ferret — no ferret emoji); big food haunted tea 🫖 + ancient snack bar 🍫 + official pie 🥧 (avoids 🍮 collision with existing overconfident pudding); big color wildly pleasant blue 🔵; big move duplicate "shuffled with purpose" → marched stubbornly 🥾; tween pet koala 🐨 (was quokka) + sleepy croc 🐊 (was sleepy gecko); tween food mystery snack bag 🛍️ + vending machine pretzels 🥨 + cafeteria fries 🍟 (was 🥔); tween creature "unreasonably tall goose 🪿" (was pigeon); BODY_HOT_OPTS snot rocket 🚀; SOUND_HOT_OPTS ZAP! ⚡ + WHAMMY! 💫 (avoids collision). PART 2 — ADDITIONS (~30 new picker options, prioritizing kid/big/tween replay variety): kid pet +raccoon/+goose; kid food +fried chicken/+smoothie/+warm croissant (chose words matching emojis, not user\'s "chicken nuggets 🍗" which is poultry leg, or "cinnamon roll 🥐" which is croissant); kid place +arcade/+pizza shop/+water park/+movie theater; kid creature +sock monster/+tiny wizard/+backpack troll; kid mood +curious/+worried; big pet +tiny horse; big food +emergency burrito/+courtroom cupcake/+mystery smoothie; big place +school office/+mini golf course/+roller rink/+science museum; big creature +tiny judge/+confused mascot; big move +posed dramatically/+slid heroically/+stared bravely; tween pet +judgy cat; tween food +gas station taquitos/+leftover pasta; tween place +mall elevator/+empty movie theater/+forgotten hallway (renamed "mall escalator" → "mall elevator" because 🛗 IS an elevator); tween creature +algorithm ghost 🧠/+expired mascot 🪦/+vending machine oracle 🥠/+cafeteria cryptid 👽; tween mood +quietly panicking/+deeply over it/+weirdly optimistic/+minorly iconic. PART 3 — v2 ENGINE SAFETY: pre-b15 mapPickToWord silently replaced unmatched picker words with random V2_WORDS rich-words. With ~20 renames + ~30 new words, every new picker word would have dropped from v2 fallback stories. Updated both mapPickToWord instances to CLONE a random rich-word\'s traits/actions/sounds but OVERRIDE text + id with the picker word — narrative richness preserved AND the kid\'s picked word now actually appears in the body. v3 default path was already safe (reads picker word directly). ACCEPTANCE: scripts/qa-current.js all 23 gates green; v2 matrix Section 1 went from 271 misses (renames broke v2 fallback) → 0 misses after the mapPickToWord fix. Section 11 emoji uniqueness still 0 collisions across all rounds + SOUND_HOT_OPTS + BODY_HOT_OPTS. APP_VERSION stays v0.9.3; BUILD_NUMBER 14 → 15; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b15.' },
  { v: 'v0.9.3 · b14', title: 'QA hardening — rapid-tap guard on word cards + burst-spark a11y + 320×568 fit + README sync',
    detail: 'Four small hardening fixes after the b9-b13 wave. (1) RAPID-TAP GUARD: pickWord() runs a 650ms burst/pop animation before advanceRound() fires. Without a guard, a fast double-tap (or a kid mashing both cards) could schedule TWO advanceRound calls — the second would advance an extra round with a stale pick. Fix: new state.wordAdvancing flag; pickWord short-circuits if already true; reset in advanceRound(). Belt-and-suspenders: every word-card gets `pointer-events: none` the moment a selection lands so the OS-level click handler also stops firing. Initialized false in global state + reset on startWords() + reset on backToWelcome(). (2) BURST-SPARK A11Y: spawnBursts() creates decorative sparkle characters (⭐✨💫🌟) inside the picked card. Without aria-hidden they get spliced into the parent .word-card\'s accessible name — screen readers would read "Pizza star sparkle shooting-star sparkle". Added aria-hidden="true" + role="presentation" to every burst span. The word-card still announces its own picked word + emoji. (3) 320×568 FIT: b12 fit 375×667, 390×844, 430×932 but iPhone SE 1st gen (320×568) still required slight scroll on the Setting 2.0 step. New @media (max-height: 600px) block tightens further only on very short viewports — modern phones (667-932px) unaffected. Trims: tile min-height 60→50, Surprise 68→54, emoji 26→22 / 32→26, label 13→12 / 16→14, gap 10→6, h1 28→24, lede 14→12, setting-note 12→11. Total step now budgets ~520px content height at 320×568. (4) README SYNC: README versioning section still cited BUILD_NUMBER (8) — 6 builds stale. Bumped to (14) with the full b1-b14 sequence summary. NOTE ON VERSION NUMBER: this release was originally requested as b13 in the prompt, but b13 was already taken by the prior turn\'s animal-emoji audit (commit 51b1696). This QA hardening pass ships as b14 to preserve a monotonic sequence; all the spec\'s "bump to 13" language was treated as "bump to next available". ACCEPTANCE: scripts/qa-current.js all 23 gates green (no engine/picker/token logic touched). Inline <script> syntax check clean. APP_VERSION stays v0.9.3; BUILD_NUMBER 13 → 14; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b14.' },
  { v: 'v0.9.3 · b13', title: 'Animal-emoji audit — removed kid.pet "red panda 🦝" (raccoon emoji caught by parent); tween.pet "red panda 🦊" → "panda 🐼"',
    detail: 'Parent screenshot caught kid.pet "red panda" rendering with a 🦝 raccoon emoji. The mismatch was introduced in v3.0.1 when the within-round emoji-uniqueness gate forced "red panda" off 🦊 (which it shared with fennec fox) and onto 🦝 — semantic accuracy lost to break the collision. Fix: removed "red panda" from kid.pet entirely. Regular "panda 🐼" is already in the pool, so removing the duplicate-ish wrong-emoji entry was the cleanest move. Pool drops from 24 → 23, still well above the 2 cards shown per session. Same audit pass also fixed tween.pet "red panda 🦊" (fox) by replacing it with regular "panda 🐼" (tween had no regular panda; pool count unchanged at 18). OTHER ANIMAL-EMOJI MISMATCHES surfaced in the audit but NOT auto-fixed (user is reviewing for follow-up decisions): tween.pet "sleepy gecko 🐊" (crocodile), tween.creature "unreasonably tall pigeon 🪿" (goose), tween.pet + big.pet ferret 🦦 (otter, no ferret emoji in Unicode), big.pet "theatrical moth 🦋" (butterfly, no moth emoji), kid.pet axolotl 🐠 / lynx 🐱, tween.pet axolotl 🫧 / quokka 🐨 / tardigrade 🦠 / tiny possum 🐾 — all stuck on Unicode limitations or pending user review. ACCEPTANCE: scripts/qa-current.js all 23 gates green (Section 11 emoji-uniqueness still 0 collisions; no engine/picker/data touched beyond the WORD_BANK entries). APP_VERSION stays v0.9.3; BUILD_NUMBER 12 → 13; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b13.' },
  { v: 'v0.9.3 · b12', title: 'Setting 2.0 step — vertically center the cluster on tall phones; chunkier tiles; rainbow no longer clipped',
    detail: 'Three small polish fixes layered on top of b11\'s mobile-compact pass, all from a real-device screenshot on iPhone 16 Pro Max (430×932). (1) VERTICAL CENTERING: b11 anchored content to the top of the canvas while the footer pinned to the bottom via margin-top: auto. On a Pro Max viewport that left ~400px of empty space between the setting-note and the Next button. New `.setting-step-inner` wrapper around the header + grid + note uses `margin: auto 0` so leftover canvas distributes EQUALLY above + below the content cluster — content vertically centers within the available space, footer stays pinned. On iPhone SE where content fills the canvas, the auto margins collapse to 0 and the layout is unchanged. (2) CHUNKIER TILES: standard tile min-height 52 → 60, Surprise 56 → 68, emoji 24 → 26 (Surprise 28 → 32), label 12.5 → 13 (Surprise 15 → 16), tile padding 4px 12px → 6px 14px, grid gap 8 → 10. All still well under iPhone SE\'s vertical budget. (3) RAINBOW NO LONGER CLIPPED: the welcome screen\'s `.deco--2` (🌈) was positioned at `left: 6%` which placed its bounding box right at the left edge — at peak rotate(-4deg) of the float animation it visibly clipped against the screen\'s overflow-x:hidden boundary. Moved to `left: 10%` so the full emoji sits inside the safe area through the entire animation cycle. Affects every welcome substep (name / age / sidekicks / setting / storyMode). ACCEPTANCE: scripts/qa-current.js all 23 gates green (no engine/picker/data touched). APP_VERSION stays v0.9.3; BUILD_NUMBER 11 → 12; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b12.' },
  { v: 'v0.9.3 · b11', title: '"What kind of place?" step — mobile-compact so the whole step fits without scrolling on iPhone SE',
    detail: 'User feedback: the b9 Setting 2.0 flavor picker required scrolling on mobile to reach the Next button. Root cause: b9 inherited `.setting-tile { aspect-ratio: 1 }` from the v2.1.0 exact-setting grid. At 375px viewport each square tile rendered ~165px tall; the full 8-tile grid alone consumed ~800px, well past iPhone SE\'s ~617px usable canvas. CSS-only fix in this release. CHANGES: (1) Killed `aspect-ratio: 1` on .setting-grid--flavors tiles. Tiles flatten to row-style (emoji-left, label-right) with `min-height: 52px` — well above Apple HIG\'s 44px minimum tap target. (2) Surprise Me keeps its full-width prominence but drops from 92px → 56px min-height; emoji 36px → 28px; label 16px → 15px. (3) Grid gap 12px → 8px on mobile (kept 12px on ≥540px). (4) Emoji 30px → 24px on standard tiles. Label 13px → 12.5px line-height 1.2. (5) Tile padding 6px → 4px 12px to match the new row layout. (6) New `.display--compact` modifier (28px, letter-spacing -0.3px) on the step h1; new `.lede--compact` modifier (14px) on the subtitle. Single-line h1 "What kind of place?" (no `<br>` split). Shorter lede copy "Pick a flavor — or let us surprise you." (7) Stack gap-20 → gap-12 between step children. (8) `.setting-note` font 13px → 12px, min-height 18px → 14px, margin-top 8px → 4px. SCOPE: all rule changes live UNDER `.setting-grid--flavors`, NOT base `.setting-tile`, so the storyMode picker (bedtime/anytime) and any other consumer of `.setting-tile` are unaffected. Same for `.display--compact` / `.lede--compact` — modifier-only, applied only on the setting step. VIEWPORT MATH: full step now budgets to ~590-600px content height on iPhone SE 2nd gen (375×667), within the ~617px usable canvas after Safari URL bar. Modern iPhone (390×844) and tablets (≥540px breakpoint switches to 4-column grid + 36px h1) get airier original layout. NO ENGINE / PICKER / DATA CHANGES. ACCEPTANCE: scripts/qa-current.js all 23 gates green (unchanged from b10). APP_VERSION stays v0.9.3; BUILD_NUMBER 10 → 11; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b11.' },
  { v: 'v0.9.3 · b10', title: 'Narrator selector on the story screen + voice preview clips',
    detail: 'Refinement of the b8 voice selector MVP. b8 shipped the picker inside Parent Settings, which works but turned out to be too hidden — users think about voice choice at the moment they tap "Read it to me," not before. b10 keeps Settings as the permanent home for the preference and adds two complementary surfaces: an in-context narrator row on the story screen + per-voice preview clips. STORY-SCREEN NARRATOR ROW: compact line above Read-it-to-me controls reading "Narrator: <Label>  Change". Tap Change → bottom-sheet modal (centered on wider viewports) containing the same 4-preset grid from Settings. Selecting a voice updates Profile + state and refreshes the narrator-row label inline. Switching mid-playback does NOT interrupt the current audio — the new voice applies on the next "Read it to me" tap. VOICE PREVIEW CLIPS: each preset card (Settings AND story-screen modal) has a small ▶ button in the corner. Tap plays a short voice-specific clip: Sunny "Hi, I\'m Sunny. I can\'t wait to read your story." / Cozy Bedtime "Hi, I\'m Cozy Bedtime. I\'ll read this nice and gently." / Big Adventure "Hi, I\'m Big Adventure. Let\'s make this story sound epic." / Silly Cartoon "Hi, I\'m Silly Cartoon. This is going to get ridiculous." Loading state on the button while audio fetches; switches to ⏸ while playing. Starting a new preview stops any running preview OR story playback (single audio at a time). CACHE DISCIPLINE: preview audio uses a SEPARATE IndexedDB cache key namespace ("preview:<preset>") so it never collides with story cache ("<preset>|sha256(text)"). Replaying the same preview is instant; story replay cache untouched. Section 16 enforces zero overlap. API: previews call the same /api/tts endpoint with { text: previewText, voicePreset }; no new endpoint, no new allowlist work. b8\'s server-side validation (unknown preset → 400, raw voice IDs rejected) covers previews automatically. SHARED HELPERS: extracted renderVoicePickerGrid + attachVoicePickerHandlers so Settings and the story-screen modal use IDENTICAL markup + interaction. NEW QA SECTION 16: 12 unit cases — every preset has a non-empty previewText, previewText length ≤ 80 chars (cost control), every preview key starts with "preview:", preview keys distinct, no story-key/preview-key collision, "preview" reserved (cannot be a preset key). All 12 pass. ACCEPTANCE: scripts/qa-current.js all 23 gates green (22 prior + 12-case Section 16). APP_VERSION stays v0.9.3; BUILD_NUMBER 9 → 10; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b10. NO NEW VERCEL ENV VARS — previews re-use the 4 from b8 (ELEVENLABS_VOICE_SUNNY / COZY / ADVENTURE / SILLY), each still falling back to ELEVENLABS_VOICE_ID when unset. NO CELEBRITY / LICENSED-CHARACTER REFERENCES anywhere.' },
  { v: 'v0.9.3 · b9', title: 'Setting 2.0 — broad story-flavor categories replace the exact-setting grid; hidden place variety underneath',
    detail: 'User feedback: the original 9-tile exact-setting grid (Diner / Mall / Football Game / Grocery Store / Zoo / Bus / etc.) made the app feel limited because the visible list WAS the full list of places the engine supports. Setting 2.0 keeps the grounding benefits of settings but repositions them as broad "story flavor" categories with hidden specific-place variety underneath. NEW: 8 visible categories — Surprise Me (default + visually prominent, spans full row), At Home, At School, Outside, Food Place, Animal Place, On the Go, Somewhere Weird. Each non-surprise category holds a HIDDEN pool of 8 specific places (e.g. At Home → bedroom/kitchen/living room/backyard/blanket fort/garage/bathtub/hallway). The engine randomly picks one specific place per session — locking "Food Place" gets diner one session, bakery the next, ice cream truck the one after. 64 hidden places + Surprise random = the kid never sees the same exact place often. Step copy softened from "Where should the story happen?" → "What kind of place?" / "Pick a story flavor — or let us surprise you." DATA MODEL: new SETTING_FLAVORS array in src/content.js (each entry: key/label/emoji/note/hiddenPlaces/visitorBias/objectBias). New resolveSetting(key) returns a fully-realized object compatible with the legacy V2_SETTINGS shape; engine code consumes it unchanged. New migrateLegacySetting(value) maps old exact keys (diner→food_place, grocery_store→food_place, football_game→at_school, school→at_school, backyard→at_home, zoo→animal_place, bus→on_the_go, mall→surprise, unknown→surprise) so saved nt_setting values from pre-b9 don\'t break. ENGINE: buildStory in index.html resolves the flavor BEFORE handing picks.setting to the engine, so the per-session hidden place is fixed at story-build time. engine-v2.js getSetting() routes flavor keys through resolveSetting; the v2 + v3 generation paths prefer the already-resolved picks.setting when present and only re-fetch via getSetting for legacy callsites. The broad category label NEVER appears in story prose — only the resolved specific place (e.g. "the pizza shop") does. UI: 2-column grid on mobile, 4-column on wider viewports. Surprise Me spans the full width at top with 36px emoji + 16px label for visual prominence. Other 7 tiles use the existing setting-tile design (cream square with emoji + label). New CSS `.setting-grid--flavors` + `.setting-tile--surprise`. NEW QA SECTION 15: 5 sub-gates × 8 flavors × 20 reps each (160 stories total). Verifies (a) every flavor generates non-null stories, (b) the resolved hidden place appears in story body, (c) the broad category label never leaks into prose, (d) resolveSetting returns the legacy V2_SETTINGS shape, (e) migrateLegacySetting maps 12 legacy-key cases correctly. All 5 sub-gates green. ACCEPTANCE: scripts/qa-current.js all 22 gates green (17 prior + 5 new). APP_VERSION stays v0.9.3; BUILD_NUMBER 8 → 9; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b9. NOT IN THIS RELEASE: per-place visual previews, expanded hidden pools (>8 per category), mixing categories, setting-tagged WORD_BANK options (Phase 2 of Selection Joy Pass).' },
  { v: 'v0.9.3 · b8', title: 'Narrator Voice Selector MVP — pick Sunny / Cozy Bedtime / Big Adventure / Silly Cartoon in Parent Settings + README drift cleanup',
    detail: 'Two changes in one release. PART 1 — README DRIFT CLEANUP: README still listed BUILD_NUMBER as 1 / badge as b1 (stale by 7 builds); age-tier table still described kid as "1 free-text round" even though Phase 1 (b2) converted little + kid to a silly-sound tap round with an escape hatch at kid; the engine-eligibility column still said "v3 engine eligible" though v3 has been the default since v3.0.0. Updated the table to reflect current picker behavior, the badge example to v0.9.3 · b8, and the engine row to v3 default. PART 2 — NARRATOR VOICE SELECTOR MVP: Parent Settings now has a 2-column grid of 4 narrator presets — Sunny (warm + bright, daytime; default), Cozy Bedtime (soft + slow), Big Adventure (bold + energetic), Silly Cartoon (playful + bouncy). Selection persists per device as `nt_voice_preset`. The selected preset is sent to /api/tts as `{ text, voicePreset }` and is also baked into the IndexedDB cache key (`${preset}|${sha256(text)}`), so switching voices does not replay cached audio from a different voice. SERVER ALLOWLIST: api/tts.js was rewritten with a four-key VOICE_MAP. Unknown presets are rejected 400. Each preset maps to an env var (ELEVENLABS_VOICE_SUNNY / ELEVENLABS_VOICE_COZY / ELEVENLABS_VOICE_ADVENTURE / ELEVENLABS_VOICE_SILLY) that falls back to ELEVENLABS_VOICE_ID when unset — so a fresh Vercel deploy with only the existing env vars still produces audio (every preset uses the default voice but with distinct voice_settings tunings). Per-preset voice_settings vary stability + style so the same fallback voice can still convey different narrator moods. The browser NEVER sees raw ElevenLabs voice IDs; arbitrary IDs submitted as a preset are 400d. /with-timestamps endpoint preserved → karaoke highlighting unaffected. GUARDRAILS: no celebrity / licensed-character names anywhere — all four labels are original archetypes. NEW QA SECTION 14: 10 unit cases on api/tts.js resolveVoice() and the cache-key shape — known presets resolve correctly, unknown rejected 400, raw voice IDs rejected, fallback to ELEVENLABS_VOICE_ID works, per-preset styles differ, cache keys differ by preset, every client preset has a server allowlist entry. All 10 pass. ACCEPTANCE: scripts/qa-current.js all 17 gates green. APP_VERSION stays v0.9.3; BUILD_NUMBER 7 → 8; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b8. NEW VERCEL ENV VARS (optional; missing = use ELEVENLABS_VOICE_ID): ELEVENLABS_VOICE_SUNNY, ELEVENLABS_VOICE_COZY, ELEVENLABS_VOICE_ADVENTURE, ELEVENLABS_VOICE_SILLY.' },
  { v: 'v0.9.3 · b7', title: 'QA cleanup — brand-kit asset packaging + stale engine-v2 header doc-drift',
    detail: 'Two non-functional cleanups caught by a Codex QA sweep. (1) BRAND-KIT ASSET PACKAGING: public/brand/index.html (the standalone brand-kit page; not the live app) referenced 7 missing asset files: banner-wide.svg, icon-16.png, icon-32.png, icon-64.png, icon-256.png, icon-square-512.png, icon-square-1024.png. Each was a broken <img>/<a download> in the kit\'s preview grids. Fix: copied banner-wide.svg from the design package; resized icon-BN4c-1024.png via sips to produce icon-{16,32,64}.png and icon-square-{512,1024}.png; copied native icon-BN4c-256.png to icon-256.png. Cross-check confirms all 22 brand/index.html asset refs now resolve to existing files. The "Square (full-bleed)" section in the brand kit now visually duplicates the App Icon section since both are BN4c (per b5 unification + user instruction to source from current BN4c assets); the references resolve cleanly which is the gate. Live app icon refs (index.html <head> link tags, manifest.json, renderLogo()) are unchanged — they were already correct since b5/b6. (2) ENGINE-V2 HEADER DOC-DRIFT: src/engine-v2.js opened with a 24-line header from the original v2.0 Phase 1 prototype days. The text described the engine as "disabled by default", "activate with ?engine=v2 URL param", "kid tier only", "Segment A of the v2.0 build". All four claims have been wrong since v2.0.0+ — the engine is production default for all ages 2-13, ?engine=v2 is unused (v3 is the default), and the v2 phase plan was completed and superseded by v3.0.0\'s unified engine. Rewrote the header to describe the current state: production-default story engine, v2+v3 coexist in one file, v3 routes first with v2 fallback, v2 deletion is queued for engine-v3.1.0. Includes a pointer to docs/versioning.md for the three-tier versioning policy. ZERO runtime/code changes — engine functions, slot construction, beat pools, and the version constant (ENGINE_V2_VERSION = v3.0.3) all unchanged. ACCEPTANCE: scripts/qa-current.js all 16 gates green. Section 8 (inline <script> syntax) clean. APP_VERSION stays v0.9.3; BUILD_NUMBER 6 → 7; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b7.' },
  { v: 'v0.9.3 · b6', title: 'In-app brand mark swap — BN4d → BN4c (sage was blending with the cream/sage app background)',
    detail: 'User-reported low-contrast issue from b5: BN4d (cream N + orange spine on a sage gradient) blended too closely with the app\'s cream + sage backdrop, making the top-left brand mark visually weak. Switching the in-app mark + browser-tab favicon to BN4c — solid orange ground with cream N and sage diagonal book-spine — so the icon pops against the cream story screen and the sage welcome screen. The home-screen app icon was already BN4c since b5; this release aligns the in-app mark + favicon to match. ASSET CHANGES: public/brand/favicon.svg ← icon-BN4c.svg; public/brand/favicon-{16,32,48}.png ← resized from icon-BN4c-1024.png via sips. App icons (icon.svg + icon-N.png) are unchanged (still BN4c). renderLogo() + manifest.json + <head> link tags reference filenames that now all point at BN4c artwork — no wiring changes needed. The .logo-mark wrapper cleanup from b5 (transparent box, no yellow plate, no forced circle clip) still applies — BN4c\'s designed rounded-square corners render natively at 36px. ACCEPTANCE: scripts/qa-current.js all 16 gates green (asset swap is non-functional). APP_VERSION stays v0.9.3; BUILD_NUMBER 5 → 6; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b6. BN4d artwork is no longer used anywhere in production but its files remain in the design package for any future variant rotation.' },
  { v: 'v0.9.3 · b5', title: 'Brand icon refresh — BN4c app icon (sage spine) + BN4d in-app mark (sage background)',
    detail: 'Implemented the two new brand variants from the design package. BN4c — "sage spine" — solid orange ground with cream N and a sage diagonal book-spine, smallest sparkle, no backing. Used as the app icon everywhere a home-screen / PWA install / browser-tab favicon renders. BN4d — "sage background" — cream N with orange spine on a sage gradient, the mirror palette of BN4c. Used as the in-app brand mark in the top-left of every screen. ASSET REPLACEMENTS (public/brand/): icon.svg + icon-square.svg ← icon-BN4c.svg; icon-1024.png ← icon-BN4c-1024.png; icon-120.png ← icon-BN4c-120.png; icon-{76,152,180,192,512}.png resized via sips from icon-BN4c-1024.png so every size is BN4c. favicon.svg ← icon-BN4d.svg; favicon-{16,32,48}.png resized via sips from icon-BN4d-1024.png. HTML / MANIFEST WIRING: no structural changes — index.html <head> already references favicon.svg + favicon-{16,32,48}.png + icon-180.png; manifest.json already references icon-192.png + icon-512.png; renderLogo() already references favicon.svg. Existing references pick up the new artwork automatically. RENDER FIX: the prior logo-mark CSS wrapped the favicon inside a 36px yellow circular plate with an inset shadow + a 24px circle-clipped img — a "glyph on plate" treatment designed for the old simple favicon. BN4d is a full app-icon-style mark with its own designed rounded-square corners and sage gradient; that doesn\'t want a yellow plate around it. Drop the yellow background, the shadow, and the forced 50% border-radius on the img. .logo-mark wrapper becomes a transparent 36×36 box; img fills it at native shape. ACCEPTANCE: scripts/qa-current.js all 16 gates green (asset replacement doesn\'t touch engine / picker / token logic). Inline <script> syntax check green. APP_VERSION stays v0.9.3; BUILD_NUMBER 4 → 5; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b5. Manual: home-screen install on iOS / Android should now show the orange BN4c tile; the in-app top-left mark on every screen should show the sage BN4d roundsquare.' },
  { v: 'v0.9.3 · b4', title: 'Highlight defect fix — only kid-picked words get highlighted; yellow chip retired',
    detail: 'User-reported visual defect from a real screenshot. Story showed "forest" with a yellow box AND "sleepy megaphone" in orange text as if both were picked words — but the parent had locked setting=forest (not a kid tap) and "sleepy megaphone" was an engine-chosen mcguffin. Kid had no way to tell which highlighted words they actually picked. Breaks the implicit coverage promise that "highlighted = something I tapped." THE DIAGNOSIS: parseStoryLine ran the engine\'s [c:X] / [y:X] / [name:X] tokens through CSS classes regardless of whether X matched a real pick. v3 templates wrap mcguffin/obstacle/false_suspect/locked-setting in [c:X] same as user picks. [y:X] was reserved for setting in v3 templates and rendered as a yellow chip box — a designed "this is where the story takes place" emphasis that in practice read as inconsistent. THE FIX (Fix A2 + B2 from diagnosis): parseStoryLine now cross-checks each token against state.picks (kid taps), state.name, and state.sidekicks. Tokens whose bracketed text doesn\'t match a real pick render as PLAIN TEXT (no chip). Engine-chosen prose blends into the narrative; kid-picked words still pop. Matching is case-insensitive with plural tolerance (pick="pizza" matches token="pizzas" and vice versa) and word-boundary substring for multi-word picks ("sleepy gecko" matches a token containing "gecko"). Also collapses [y:X] to the same orange .pop class as [c:X] — one highlight style, one meaning: "you picked this." The yellow chip CSS is commented (not deleted) so a future "single-most-important-word" treatment can revive it without renderer rework. NEW QA SECTION 13: highlight-only-picks unit test. Runs parseStoryLine against controlled state with known picks. Verifies (a) matched [c:X] tokens become .pop chips, (b) matched [name:X] tokens become .pop--name chips, (c) engine-chosen tokens render plain text, (d) [y:X] no longer emits .pop--yellow class anywhere. WHAT THIS DOESN\'T FIX: engine choosing thematically-wrong objects (megaphone in a forest) — that\'s Phase 8 (setting-themed prop pools). Stories too long — separate content sprint. ACCEPTANCE: scripts/qa-current.js all 16 gates green. v3 matrix 960 stories + v3 tot/little 240 stories still 0 nulls / 0 unresolved / all picks in body + highlighted (the gate measures picked-word coverage which is unchanged — kid picks still highlight). APP_VERSION stays v0.9.3; BUILD_NUMBER 3 → 4; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b4.' },
  { v: 'v0.9.3 · b3', title: 'Selection Joy Pass Phase 4 — shuffle 🎲 button ("Show me different ones") on every tap round',
    detail: 'Phase 4 of the Selection Joy Pass. Adds a small 🎲 "Show me different ones" button beneath every tap round. Tapping it re-rolls the 2 cards from the same option pool, excluding the currently-shown 2 when possible. Limited to 2 uses per session (configurable via MAX_SHUFFLES constant) so it stays a special move rather than a re-roll-forever escape hatch. Counter badge shows remaining uses ("×2", "×1") and the button disables when exhausted. The cards fade-out + slide-in over 320ms when shuffle is tapped for tactile feedback. CHANGES: (1) buildRounds() now attaches a fullPool property to every tap round (the complete 12-24-option pool the 2 cards were sampled from). Works for: standard WORD_BANK rounds (pet, color, food, place, creature, move, mood, sky), the universal sound tap round (SOUND_HOT_OPTS), the little tier weather swap, and the Potty Word Mode body round (BODY_HOT_OPTS). Freetext rounds are excluded — no shuffle on text input. (2) New state.shufflesUsed counter, initialized to 0 in the global state object AND reset to 0 in startWords() (per session) AND backToWelcome() (defensive). (3) Constant MAX_SHUFFLES = 2 — tunable. (4) renderWords() conditionally renders the shuffle button only when round.fullPool.length >= 4 AND shufflesRemaining > 0. Pool ≥ 4 ensures we can always produce 2 fresh options not in the current set. (5) attachWordsHandlers() wires the shuffle button: collects current option keys, filters fullPool to eligible (non-current) options, samples 2, replaces round.options, increments counter, triggers fade animation, re-renders the round. Falls back to a full-pool reshuffle if eligible set is too small (currently impossible since smallest pool is 12). (6) New CSS for .shuffle-btn (pill style matching the .hint-chip aesthetic) + .shuffle-count badge + .is-rerolling fade animation. (7) NEW QA Section 12 simulates 100 shuffles across every distinct tap round (every tier × cat combination plus SOUND_HOT_OPTS + BODY_HOT_OPTS) and confirms 0% of re-rolls produce a duplicate of the previous 2 options. Pool sizes verified ≥ 4 across the board. ACCEPTANCE: scripts/qa-current.js all 15 gates green. Round-shape smoke test still passes 5/5 cases. APP_VERSION stays v0.9.3 (no maturity bump); BUILD_NUMBER 2 → 3; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b3.' },
  { v: 'v0.9.3 · b2', title: 'Selection Joy Pass Phase 1 — silly-sound tap round (little + kid) + "type your own" escape hatch (kid)',
    detail: 'Live testing with kids showed the picker is the most enjoyable part of the app and the kid-tier (ages 6-7) free-text round broke that tap-rhythm — typing is slow on a phone and many 6-year-olds can\'t reliably spell silly sounds. This release converts the freetext-by-default round to a tap-by-default silly-sound round at little (4-5) and kid (6-7) tiers. CHANGES: (1) New buildSoundRound() helper in buildRounds() draws 2 random options from SOUND_HOT_OPTS (12 cartoon sounds: BABOOM!, WHAMMY!, CRASH!, TOOT!, ZAP!, SPLAT!, CLANG!, SMASH!, BONK!, WHOOSH!, BWAHAHA!, KAFOOM! — all distinct emojis). The picked sound feeds the same picks.freeword slot the engine reads, so story-side rendering is unchanged. (2) Little tier: 1 freetext round → 1 sound tap round. No escape hatch (ages 4-5 can\'t reliably type). (3) Kid tier: 1 freetext round → 1 sound tap round + small "or type your own ✏️" escape-hatch button under the two cards. Tapping it swaps the round for the original freetext prompt and re-renders. Zero-friction default; creative agency preserved for kids who want it. (4) SOUND_HOT_OPTS comment updated — pool is now the universal silly-sound pool, not Potty-Word-Mode-only. Name kept for grep-history; QA Section 11 emoji-uniqueness still enforces all 12 distinct. (5) Potty Word Mode simplification: was injecting body + sound rounds (+2). Now sound is universal so Potty Mode only adds the body round (+1). Net Potty Mode session: 9 rounds (was 10). Body round content unchanged. (6) Big + tween unchanged in this phase. Phase 7 will drop big from 2 → 1 freetext alongside the object round addition. NOT IN THIS RELEASE (Selection Joy Pass Phases 2-8, queued): setting-specific bias, sub-spot tap round when setting locked, shuffle 🎲 button, wild card mechanic, visual polish (bigger emoji + tap sound + haptic), object round, mood-at-little, seasonal food rotation. ACCEPTANCE: scripts/qa-current.js all 12 gates green. SOUND_HOT_OPTS emoji uniqueness verified by extended Section 11 coverage. Picker-flow smoke test: little + kid + (kid + Potty Mode) sessions all produce well-formed round sequences with picks.freeword populated. Engine slot construction unchanged. APP_VERSION stays v0.9.3 (no product-maturity bump); BUILD_NUMBER 1 → 2; ENGINE_V2_VERSION stays v3.0.3. Badge reads v0.9.3 · b2.' },
  { v: 'v0.9.3', title: 'Versioning policy adoption — three independent identifiers (build 1, engine v3.0.3)',
    detail: 'Between 2026-05-20 and 2026-05-21 the user-facing version inflated from v3.0.0 → v3.0.3 in 36 hours — one architectural milestone plus four UX hotfixes. Treating every fix as a semver patch signaled "we\'re at v3" when the product is still pre-App-Store, mid-QA, mid-content-trim. Also forced the queued "delete v2 codepath" Build Idea to be renumbered five times. NEW POLICY (see docs/versioning.md): three independent identifiers. APP_VERSION = user-facing product maturity, v0.9.x = late beta, v1.0.0 reserved for App Store launch — bumps only on real product milestones. ENGINE_V2_VERSION = internal engine architecture lineage, stays v3.0.3 here, bumps when v2 deletion lands (→ v3.1.0). BUILD_NUMBER = integer that increments every release to main, shown in the badge as "v0.9.3 · b1". FILES CHANGED: src/content.js APP_VERSION v3.0.3 → v0.9.3 + new BUILD_NUMBER = 1 constant + policy header comment. index.html badge render IIFE now shows product + build instead of just the engine version. docs/versioning.md new file documenting the policy in full (problem statement, three-identifier table, increment rules, display matrix, examples, migration plan, open questions). README.md new Versioning section pointing at the doc. CHANGELOG.md header rewritten + new v0.9.3 entry with four-part format (build N, engine vA.B.C). Historical v3.0.0–v3.0.3 entries unchanged. VISIBLE CHANGE: badge reads "v0.9.3 · b1" instead of "v3.0.3" for anyone with the app open at deploy — intentional one-time confusion cost paid before more patches accumulate. BUILD IDEA RENAMING: queued v2-deletion Build Idea (previously v3.0.4 after five renumbers) becomes "v0.9.x build N — Delete v2 codepath (engine v3.1.0)". Build number lands at merge time; engine bumps to v3.1.0 (architecture change, not product milestone). ACCEPTANCE: scripts/qa-current.js all 12 gates green (no engine/content changes, matches v3.0.3 results). APP_VERSION → v0.9.3 / BUILD_NUMBER → 1 / ENGINE_V2_VERSION stays v3.0.3.' },
  { v: 'v3.0.3', title: 'Picker UX hotfix bundle — banshee→yeti, suspiciously polite→polite, chaotic sounds cleanup',
    detail: 'Three picker UX defects reported simultaneously by parent screenshots. All kid-tier (6-7) word/content choices that were too advanced or inappropriate. Bundled into one release. The "delete v2 codepath" Build Idea renumbered FIFTH time (was v3.0.3, now v3.0.4) — each renumber is because user-reported UX defects keep preempting architectural hygiene. Correct sequence: ship user-visible fixes immediately, return to deletion when no UX defect is open. FIX 1 BANSHEE→YETI: parent feedback "kids dont know what banshee is and the image doesnt make sense". 🌬️ wind didn\'t read as creature. Flagged in v3.0.2 notes; now user-confirmed. src/content.js kid.creature renamed banshee→yeti emoji 🌬️→🦣. src/engine-v2.js V2_WORDS.visitors entry renamed with new traits (snowy/huge/surprisingly gentle), actions (stomped softly through the snow, offered a warm mitten, left enormous footprints behind), sounds (low rumble/soft growl/quiet huff). Yeti universally known by 6-year-olds from Frozen, Lego, kids\' books. FIX 2 SUSPICIOUSLY POLITE→POLITE: parent feedback "suspiciously polite is not good for 6 year old. should just be polite". Flagged in v3.0.2 notes. src/content.js kid.mood renamed. Top hat 🎩 emoji preserved. No V2_WORDS change (moods are free-string). FIX 3 CHAOTIC SOUNDS CLEANUP: parent feedback "re-assess the chaotic sounds. Parp, Pfffart. they just arent good words. go with Baboom! Whammy! Crash! Toot!". Potty Word Mode "Pick a chaotic sound" round was showing PARP + PFFFFART. Replaced 10 bathroom-style sounds (PFFFFART/BTHHHPP/FAAAARP/PARP/BLEEEEH/SQUOMP/PLOPP/TOOOT/SCHPLAT/GLOOP) with 10 cartoon action sounds (BABOOM!/WHAMMY!/CRASH!/TOOT!/ZAP!/SPLAT!/CLANG!/SMASH!/BONK!/WHOOSH!). Kept BWAHAHA + KAFOOM (already inoffensive Looney-Tunes register). All 12 emojis distinct (💥⚡🥁🎺💢💦🔔🔨👊🌬️😂🎆). Updated SOUND_HOT_OPTS (picker UI) AND SOUND_HOT (legacy v2 template sound pool — defense in depth until v3.0.4 deletes v2). BODY_HOT_OPTS (body-word pool) NOT changed — that\'s the literally-named "silly body word" pool, intentionally body-themed; parents opt in to that. ACCEPTANCE: scripts/qa-current.js all 12 gates green including Section 11 emoji-uniqueness. yeti/polite/BABOOM! verified flowing through engine 20/20 stories. APP_VERSION + ENGINE_V2_VERSION → v3.0.3. OTHER STILL-FLAGGED KID WORDS not user-reported yet: centaur (mythological), luminous teal + impossible green (abstract colors), jubilant (advanced), professionally confused (similar tier to fixed "suspiciously polite").' },
  { v: 'v3.0.2', title: 'Picker UX hotfix — "labyrinth" → "maze" + 🌀 cross-round meaning cleanup',
    detail: 'User-reported (second screenshot in 24 hours): kid-tier "Pick a location" round showed desert next to labyrinth. Two issues in one screenshot. PROBLEM 1: "labyrinth" is not age-appropriate for ages 6-7. Parent\'s literal feedback: "I dont know what it means and the image doesnt help." A 6-year-old reading independently doesn\'t know the word. Fix: renamed kid.place picker option labyrinth → maze. Maze is the age-appropriate synonym kids encounter in corn-maze outings, hedge-maze storybooks, puzzle books. V2_WORDS.places entry also renamed (id:labyrinth → id:maze, text:labyrinth → text:maze). The big-tier mossy labyrinth picker option is unchanged — at age 8-10 kids know the word and the deliberately-literary picker voice fits the tier. PROBLEM 2: 🌀 swirl emoji meant TWO different things across rounds. Audit showed 🌀 was used 6 times: tot.move spun, little.move twirled, kid.move spun, big.move meandered (all motion) — but ALSO kid.place labyrinth and tween.place weird stairwell (place/winding pattern). A kid playing through rounds sees 🌀 = spinning then 🌀 = labyrinth then 🌀 = stairwell. Mental model breaks. v3.0.1\'s emoji-uniqueness gate caught WITHIN-round collisions but missed CROSS-round semantic overload. Fix: kid.place labyrinth (now maze) gets 🧩 puzzle piece (intuitive maze visual). tween.place weird stairwell gets 🪜 ladder. After fix, 🌀 only ever means "motion/spinning" across the entire picker. ACCEPTANCE: all 11 QA gates green. 20-story test at kid tier with place=maze: "maze" appears in body text of 20/20 stories. APP_VERSION + ENGINE_V2_VERSION → v3.0.2. OTHER ADVANCED KID-TIER WORDS FLAGGED for future review (not fixed without user call): kid.creature banshee, centaur; kid.color luminous teal, impossible green; kid.mood jubilant. The originally-planned "delete v2 codepath" release is now renumbered THIRD TIME to v3.0.3.' },
  { v: 'v3.0.1', title: 'Critical UX fix — duplicate emojis in picker rounds + new permanent QA gate',
    detail: 'User-reported hotfix replaces the originally-planned v3.0.1 (delete v2 codepath), which is now requeued as v3.0.2. THE DEFECT: parent screenshot at noddytales.app — kid tier "Pick a snack" round showed two options "nachos" and "cheese puffs" both rendered with the same 🧀 cheese-wedge emoji. Two visually-identical cards, two different words. Audit across the entire WORD_BANK revealed 38 emoji collisions (40 individual words affected — some were 3-way collisions). Distribution: tot 1, little 4, kid 6, big 12, tween 15 (tween density highest because long descriptive picker words share limited emoji vocabulary). FIXES: 38 emoji replacements in src/content.js. For each collision: kept one option\'s existing emoji, assigned colliding option a distinct themed alternative. Sample fixes: nachos 🧀→🫓, red panda 🦊→🦝, hallway ghost 👻→🚪, zigzagged ⚡→🪃, cartwheeled 🤸→🛞, suspicious 🕵️→🤨, extra brave 🦁→🛡️, lunch wizard 🧙→🍱, retired wizard 🧙→🪄, deep crimson kept 🔴 / obviously red ❤️, recess orange 🍊→🟠, indoor water park 🌊→💦, sleepy gecko 🦎→🐊, gas station green 💚→⛽, emergency ramen 🍜→🥡, vending machine chips 🍟→🥨, cafeteria fries 🍟→🥔, bus stop 🚌→🚏, late bus 🚌→⏰, school cafeteria 🏫→🍱, vending machine goblin 🤖→🛒, unreasonably tall pigeon 🐦→🪿, emotionally buffering 📱→⏳, suspiciously calm 😌→🧘, catastrophically fine 🙂→🔥. NEW QA SECTION 11 emoji-uniqueness gate: walks every WORD_BANK[tier].rounds[].options array and fails the harness if any two options in the same round share an emoji. v3.0.1 result: 0 collisions across all 5 tiers. Prevents recurrence. Different rounds can still share emojis (a place round and a creature round can both use 🏫 — never shown together). ACCEPTANCE: scripts/qa-current.js all 11 gates green. Engine code unchanged. v2 fallback still healthy. APP_VERSION + ENGINE_V2_VERSION → v3.0.1. The v3.0.0 cutover sequence becomes: v3.0.0 (router flip) → v3.0.1 (THIS — emoji uniqueness) → v3.0.2 (delete v2 codepath, queued) → v3.0.x content sprint (Stories-too-long).' },
  { v: 'v3.0.0', title: 'Unified Engine — v3 is the default for every age 2-13',
    detail: 'The architectural promise the v3.0 roadmap was built on. The age gate is gone. Every story request — tot, little, kid, big, tween — now flows through the role-based v3 engine. The journey: v2.7.x stability, v2.8.0 content depth, v2.9.0 v3-default-for-6+, v2.10.0 tot/little-v3 blueprints, v2.10.1 setting/place UX fix, v2.10.2 parent-trust + QA hardening. This release flips the last switch. ROUTER CHANGE: buildStory() in index.html and generateStoryRouted() in src/engine-v2.js drop the `age >= 6` gate. Every age tries v3 first. The ?engine=v2 / ?engine=v1 URL flags still work as testing overrides; they no longer matter for production routing. VERIFIED ROUTER BEHAVIOR (160-story test, no flags): ages 2-5 route to v3 tot/little blueprints (4 paragraphs), ages 6-12 route to v3 kid/big/tween blueprints (6 paragraphs). 100% v3. ROLLBACK SAFETY PRESERVED: v2 stays in code as silent fallback for v3.0.0. If v3 returns null for any reason, buildStory() and generateStoryRouted() fall through to v2. Verified with null-injection test: when generateStoryV3 stubbed to null, v2 catches 30/30 attempts across ages 2/6/12. WHY NOT DELETE v2 IN v3.0.0: smallest safe cutover. The router flip is the user-facing change. Once verified in production, deleting ~1,500 lines of v2 code is just hygiene. v3.0.1 deletes v2 once that confidence is earned. legacy/engine-v2.js snapshot preserved for full-revert rollback. DOCUMENTATION: docs/tot-little-v3-design.md stale note about the place/setting defect updated — v2.10.1 fixed it. STORY-LENGTH DEFECT: explicitly deferred to v3.0.x content sprint. Trimming v2 beats now wastes effort since v3.0.1 deletes v2. Section 10 advisory metric (added v2.10.2) measures the baseline. NOT IN v3.0.0: Apple Parental Gate, iOS native packaging, App Store metadata, mobile/audio/parent/privacy UAT signoff, narrator voice selector, Potty Word Mode UX, freemium/paywall, structured story parts. All queued in Build Ideas / project hub. ACCEPTANCE: scripts/qa-current.js all 10 gates green (v2 matrix proves fallback is healthy, v3 matrix passes 960/960 + 240/240 tot/little). 160-story router test 100% v3 routing. 30-story rollback test 100% v2 catch. APP_VERSION + ENGINE_V2_VERSION → v3.0.0. PATH FORWARD: v3.0.1 deletes V2_BEATS/V2_BLUEPRINTS/generateStoryV2/generateStoryV1, renames src/engine-v2.js → src/engine.js, rewrites QA for v3-only. Then v3.0.x content sprint trims story length against the unified engine. Real-kid playtest gates the App Store sprint.' },
  { v: 'v2.10.2', title: 'Defect-cleanup — Critical parent-trust fix + tween anytime flake fix + 2 new QA gates',
    detail: 'Pre-v3.0.0 defect cleanup pass. CRITICAL FIX: the picker round "Invent a battle cry for a tiny knight" surfaced "STABBY-STAB!" and "EAT MY BOOT!" as visible example suggestions to children ages 6-7. Parent-trust catastrophe. Replaced with "TO THE CASTLE!" and "FOR HONOR!". Also caught "floorstab" → "ouch-mageddon" in big-tier lego-pain word; "possibly playing dead" → "possibly playing possum" possum trait (the real idiom); "demanded juice instead of blood" → "demanded juice and a quiet corner" discount-vampire action. NEW QA GATE Section 9 BLOCKED-WORD SCAN: scans every string literal in src/content.js and src/engine-v2.js for stab|knife|weapon|blood|kill|murder|dead|gun|bullet and fails if any are found. Comments stripped first to avoid false-positives on changelog text. Would have caught STABBY-STAB at first QA run if it had existed. 0 hits in v2.10.2 after the fixes. TWEEN AGE-12 ANYTIME GATE FLAKE FIXED: was failing 1-in-5 runs with bedtime-words 7/60 vs ≤6/60 threshold. Root cause: BEDTIME_RX matched "sleepy" anywhere including chosen creature traits ("sleepy gecko") in P2/P3. Two-part fix: (1) endingAudit now scans only the FINAL paragraph not the entire body. (2) Removed bare sleep/sleepy/asleep from BEDTIME_RX — replaced with stricter ending phrases (fell asleep, going to sleep, time to sleep, going to bed, sweet dreams, tucked in). goodnight + bedtime retained. Result: 5 consecutive runs at tween age 12 anytime = 0/60 bedtime-word hits. Stable. NEW QA GATE Section 10 SENTENCE-COUNT REPORT (advisory): the open Stories-too-long defect proposed hard caps per tier (tot 3-4, little 5-6, kid 7-8, big 9-11, tween 10-12). v2.10.2 ships the metric so distribution is visible. Baseline: tot/little median ~20, kid/big/tween median ~26 sentences — 2-7x over proposed caps. Real defect but the engine-side trimming is a separate content sprint. STALE-ARCHITECTURE DEFECTS CLOSED Wont Fix: "The End annunciation sounds robotic" (proposed Web Speech API fix; ElevenLabs replaced Web Speech in v1.5.0). "Word highlight one word behind" (proposed apostrophe-tokenization fix on charIndex boundary events; NoddyTales uses ElevenLabs char-timestamps + KARAOKE_LEAD_MS=220ms lookahead per v2.6.2). Both architecturally superseded. ACCEPTANCE: scripts/qa-current.js all 10 gates green. Tween anytime stable across 5 runs. Blocked-word scan: 0 hits. APP_VERSION + ENGINE_V2_VERSION → v2.10.2. Open defect count drops from 5 to 1 (Stories-too-long, with baseline attached).' },
  { v: 'v2.10.1', title: 'UX fix — skip the place round when setting is locked',
    detail: 'Closes the last open Defect Log entry from the v2.8.0 UAT rescore. THE DEFECT: when a non-surprise setting was locked (Diner / Mall / Beach / Football / School / Backyard / Grocery / Zoo / Bus), the engine already used setting.place as the story\'s location and silently discarded any user-picked place word. Picked-word coverage promise broken — child picked "volcano" but read a mall story; "volcano" never appeared in the body. THE FIX: buildRounds() in index.html now filters the place category out of the round plan when state.setting is locked. The child is no longer asked to pick a word that the engine throws away. const settingLocked = !!(state.setting && state.setting !== "surprise"); const effectivePlan = settingLocked ? plan.filter(cat => cat !== "place") : plan; When setting is surprise (default), all rounds run as before including the place round. The freetext-round insertion logic in kid/big/tween still produces well-formed round sequences after place is filtered out — the slice(0,4) front + slice(4) back math works on the now-smaller plan. Round count drops by 1 in locked-setting flows (kid: 8→7, tween: 9→8). Engine slot construction unchanged: setting.place continues to win over picks.place regardless of round inclusion. ACCEPTANCE: scripts/qa-current.js all 9 gates green including Section 8 inline-script syntax (which validates the buildRounds edit parses cleanly). 600 v2 + 240 v3 tot/little stories all pass with 0 misses since engine-side slot resolution was already protected against undefined picks.place. Kid-agency ratio held at 0.96. APP_VERSION + ENGINE_V2_VERSION → v2.10.1. DEFECT LOG STATUS: this closes the last open Open defect. Repo is at a 100%-clean baseline going into v2.10.0 real-kid playtest and the eventual v3.0.0 cutover.' },
  { v: 'v2.10.0', title: 'tot/little-v3 beat authoring — v3.0.0 critical path',
    detail: 'Implements docs/tot-little-v3-design.md. Adds 4 new V3_BLUEPRINTS and ~36 new V3_BEATS so the v3 engine can generate stories for ages 2-5 with the same role-based architecture used for kid/big/tween. v2 tot/little beats remain in code as fallback through v2.10.0 — v3.0.0 deletes them. NEW BLUEPRINTS: tot_wonder_v3 (food as wonder), tot_sky_v3 (sky as wonder), little_quest_v3 (object as wonder), little_food_v3 (food as wonder). 3-role contract: protagonist (always = kid) / ally (companion pick) / wonder_object. Optional flavor roles: visual_signature (color), signature_action (move), pressure (weather for little). All blueprints share a 3-stage / 4-paragraph arc — silly_repeat fires twice per story (P2 + P3), gated by new in-story beat-dedup so paragraphs use different beats. ~36 NEW V3_BEATS — 5 tot setup, 8 tot silly_repeat, 5 tot cozy_end (3 bedtime + 2 anytime), 5 little setup, 8 little silly_repeat, 5 little cozy_end (3 bedtime + 2 anytime). Beats are tier-only (no blueprintId) so two blueprints per tier share the same pool. wonder_object resolves per blueprint roleMap — same beat line works for food, sky, or object. Voice register: action-driven (Cole spots, picks up, grabs, points, holds, carries, leads, builds, decides). Inherits kid-agency lift from v2.8.0. ENGINE CHANGES: removed the if (tier === tot or little) return null early-exit; added a sky slot to v3 slot construction; added in-story beat dedup to pickStageBeat so silly_repeat firing twice doesn\'t pick the same beat; extended storyMode filter so tl_cozy_end respects bedtime/anytime. NEW QA GATE Section 3b: 4 blueprints × tier-appropriate ages × 30 stories = 240 stories. Gates: 0 nulls / 0 unresolved / 4-paragraph arc / ally in body / wonder in body (where deterministic). v2.10.0 measured 0/240 on all 5 gates. ROUTING UNCHANGED: buildStory() still routes only ages 6+ through v3 by default. v3 tot/little reachable in production via ?engine=v3 flag for testing. v3.0.0 flips the router and deletes v2. Audit pack at docs/story-quality-audit-v2.10.0.md — ages 2-5 now route through v3, showing Cole driving every paragraph. APP_VERSION + ENGINE_V2_VERSION → v2.10.0. All 9 QA gates green. Real-kid playtest of v2.10.0 ages 2-5 (visit /?engine=v3) is the gate to v3.0.0.' },
  { v: 'v2.9.1', title: 'Cosmetic patch — 4 v2 defects from v2.8.0 UAT rescore',
    detail: 'Four pre-existing v2 cosmetic defects surfaced in the v2.8.0 UAT manual rescore are now fixed. Bundling them into v2.9.1 leaves v3.0.0 with no v2 cosmetic debt to inherit. (1) TOT TITLES AUTO-FILLED CREATURE: the v2 universal title pool had "${kid} vs the ${visitor}" / "The Day ${kid} Met ${visitor}" / "How ${kid} Met ${visitor}" patterns. Tot tier has no creature round so the engine auto-filled visitor from the setting bias — producing absurd titles like "Cole vs the Group Chat" on a bird story. Same auto-fill bug for object. Fix: filter the universal title pool to exclude visitor-referencing patterns when picks.creature wasn\'t user-picked, and exclude the "${object} Problem" pattern when picks.object wasn\'t user-picked. (2) {kid.lc} RENDERED "cole\'s pocket" LOWERCASE: the v2.8.0 li_silly_action_3 beat used {kid.lc}\'s pocket which resolved to "cole\'s pocket" lowercase mid-sentence. Fix: switched to {kid.name}\'s pocket. (3) {sky.text} LOWERCASE IN EXCLAMATION: to_repeat_sky rendered \'"snowflake!" said Cole\' — exclamations should sentence-case. Fix: switched the tokens inside the quote to {sky.cap}. (4) "TINY HAT" TITLE-CONTENT MISMATCH: gentle_quest recipe had a title "The ${companion} with the Tiny Hat" that referenced a detail only present when li_comp1 fired in P2. Fix: replaced the pattern with "${kid} and the ${food}" which works for any beat sequence. DEFERRED: the fifth UAT defect (place slot dropped when setting is locked) is a Medium UX issue requiring picker-flow or engine changes — too big for a cosmetic patch. Open in Defect Log for post-v2.9.0 work. ACCEPTANCE: 700-story targeted verification — 0/700 hits on the four pre-fix bad patterns. scripts/qa-current.js all 8 gates green. Kid-agency ratio held at 0.96. APP_VERSION + ENGINE_V2_VERSION → v2.9.1.' },
  { v: 'v2.9.0', title: 'v3 Default for ages 6-13 — router flip (architectural)',
    detail: 'Second milestone of the v3.0 roadmap. The v3 role-based engine becomes the default for ages 6 and up. v2 stays in code as a runtime fallback throughout v2.9.0 so a v3 issue can be rolled back without redeploy. NO content changes. NO new beats. ROUTER FLIP: Before v2.9.0, v3 was opt-in only — users had to visit ?engine=v3 to reach it. After v2.9.0, ages 6+ try generateStoryV3 first; v2 only fires if v3 returns null (unfulfillable blueprint or unexpected slot issue). Ages 2-5 continue to use v2 because generateStoryV3 still early-exits to null below age 6 — that closes in v3.0.0 with tot/little-v3. The ?engine=v3 flag still works but is now an override, not a gate — it forces v3 attempts at all ages for testing. EDITS: buildStory() in index.html changed if (isEngineV3Enabled()) to if (age >= 6 || isEngineV3Enabled()). generateStoryRouted() in src/engine-v2.js got the same age-based default for any caller that imports the module directly. Rollback: one-line revert of either gate. V1 DEPRECATION: the v1 template-substitution fallback (retired as default in v2.0.0, kept as a hard fallback) now emits a one-time console.warn when it fires, with the triggering age and a note that v1 is scheduled for v3.0.0 removal. Module-scope flag gates the warning to one fire per page load. No behavior change — purely observability. NEW DESIGN DOC: docs/tot-little-v3-design.md describes the simplified 3-role contract (protagonist always = kid, ally = companion, wonder_object = food/sky/object) for tot/little stages (setup → silly_repeat → cozy_end → 4 paragraphs). v3.0.0 implements this; v2.9.0 just lands the spec. ACCEPTANCE: scripts/qa-current.js all 8 gates green. v2 matrix still passes 600/600 even though v2 is now mostly a fallback. v3 matrix passes 960/960 as the new default path. Router-behavior test confirmed 20/20 ages 6+ get 6-paragraph v3 output, 20/20 ages 2-5 get 4-paragraph v2 output. Audit pack regenerated at docs/story-quality-audit-v2.9.0.md. APP_VERSION + ENGINE_V2_VERSION → v2.9.0.' },
  { v: 'v2.8.0', title: 'Story Quality Pass — kid agency 2-5, tween voice, 2 new QA gates',
    detail: 'First milestone of the v3.0 roadmap. Content + QA only. No router changes, no architecture changes. v2 stays default for all tiers. TOT/LITTLE KID-AGENCY PASS: v2.7.1 UAT scored ages 2-5 at 2.2-2.6 on kid agency because Cole was usually the observer. Added 15 action-driven beats where Cole is the subject of an action verb. Tot (7 new): Cole runs outside and spots the companion, Cole picks up the food and holds it up, Cole grabs the companion\'s paw, Cole pulls out a tiny hat, Cole points up at the sky and finds it first, Cole picks up the companion for a goodnight hug. Little (8 new): Cole packs food and heads out with a plan, Cole grabs the companion by the paw and runs, Cole spots an object and claims it, Cole climbs a rock and waves at a creature, Cole pulls food out of a pocket, Cole builds a pillow fort. Replaced 2 existing passive lines: to_intro2 "Cole heard a sound" → "Cole spotted X across the room. Cole ran right over." li_comp2 "Cole giggled" twice → "Cole grabbed the companion\'s paw. Again! Cole clapped along." TWEEN VOICE PASS: v2.7.1 UAT scored tween (age 12) at 4.0 across the board — passing but voice felt thin vs age 10. Added 16 tween-only V3_BEATS (4 per blueprint). lost_snack_v3: mental-screenshot attempt, group-chat-energy escalation, filed-under-low-priority payoff, replayed-walking-back anytime landing. goal_spine_v3: committed-quietly setup, professionally-unhinged attempt, mentally-screenshotted escalation, win-logged payoff. show_wrong_v3: nobody-asked-doing-it-anyway setup, failed-exactly-on-cue attempt, going-viral-with-intent escalation, 40%-real-60%-ironic payoff. rule_loophole_v3: bare-minimum setup, reacting-is-rookie-behavior problem, located-loophole-within-seconds attempt, filed-under-small-wins payoff. Voice register: short sentences, deadpan delivery, screenshot/group-chat/replay-mentally/filed-for-later motifs. TWO NEW QA GATES: Section 5 extended — tween (age 12) anytime gets parity thresholds with age 9 (≤10% bedtime words, ≥60% anytime markers across 60 stories). Section 7 NEW — tot/little kid-agency action-verb gate: across 100 sampled tot+little stories, action verbs (spotted/picked/grabbed/decided/climbed/pulled/led/built) must outnumber reaction verbs (heard/giggled/loved/watched) at a ratio ≥ 0.65. v2.8.0 measured 309 action / 16 reaction = 0.95 ratio — well above the gate. ACCEPTANCE: all 8 gates pass. Audit pack regenerated at docs/story-quality-audit-v2.8.0.md. APP_VERSION + ENGINE_V2_VERSION → v2.8.0.' },
  { v: 'v2.7.3', title: 'Hotfix — "one HUGE waffles" grammar bug + new lint gate',
    detail: 'User-reported defect from a real generated story: "Then the pirate pulled out one HUGE waffles. Way too big to fit anywhere. Bigger than the pirate, even. Nobody knew where it had come from." The pl_wrong_1 v2 punchline beat at src/engine-v2.js:2735 hard-coded "one HUGE {food.text}" plus singular pronoun "it had come from". When the food slot resolved to a plural picker word (waffles, donuts, cookies, pancakes, tacos, etc.) the line rendered as broken English. Latent since v2.4.0 — only fires when kid/big v2 show_wrong randomly picks pl_wrong_1 AND a plural food. FIX: swapped to {food.articleText} which already pluralizes correctly across all food types: plural foods render "some waffles", singular count nouns render "a pizza"/"an apple", mass nouns with prefix render "a bowl of soup"/"a slice of cake"/"a piece of sushi", undivided mass nouns render "some popcorn"/"some spaghetti". The new line is also one sentence shorter so the punchline lands faster. New rendering for plural: "Then the pirate pulled out some waffles. HUGE. Way too big to fit anywhere. The pirate did not know where, either." Dropped the broken "Bigger than the visitor, even" and "Nobody knew where it had come from" sentences — both had the broken singular-comparative and singular-pronoun grammar. Punchline structure (HUGE thing appearing, deadpan reaction) is preserved. NEW REGRESSION GATE: scripts/qa-current.js Section 4 now scans 2,000 generated stories for "\\bone (HUGE|big|tiny) [plural-food]\\b" pattern. Confirms 0/2000 in v2.7.3 and will fail the build if this class of bug ever returns. Manual render test across 13 food types (waffles/donuts/cookies/pancakes/pizza/apple/cake/soup/ice cream/sushi/spaghetti/popcorn/grilled cheese) all produce grammatical English. QA: all 7 gates green. APP_VERSION + ENGINE_V2_VERSION → v2.7.3.' },
  { v: 'v2.7.2', title: 'Cosmetic patch — v3 title casing + audit script header',
    detail: 'Two Low-severity defects opened in the v2.7.1 UAT pass, both fixed in one small patch with no engine code-path changes. (1) v3 BLUEPRINT TITLE CASING: All four v3 titlePatterns arrays in src/engine-v2.js were rendering picked-word tokens ({mcguffin.text}, {false_suspect.text}, {obstacle.text}, {ally.text}, {prop.text}, {rule_imposer.text}, {setting.text}) in raw lowercase, producing titles like "Cole vs the witch" / "Cole and the cupcakes Mystery" / "The Loophole at the museum basement". The titleCase function shipped in v2.6.1 runs on the template skeleton but picked-word substitutions paste in AFTER token resolution so they were never capitalized. Fix: swap every picked-word token inside titlePatterns from .text to .titleText. The .titleText property already existed in the v3 renderer with a V2Grammar.titleCase fallback for any slot without an explicit titleText. Before/after with same picks: "Cole and the cupcakes Mystery" → "Cole and the Cupcakes Mystery"; "Cole vs the courtroom duck" → "Cole vs the Courtroom Duck"; "The Loophole at the museum basement" → "The Loophole at the Museum Basement"; "How Cole Outsmarted the courtroom duck" → "How Cole Outsmarted the Courtroom Duck"; "The ticket stub Broke But Cole Did Not" → "The Ticket Stub Broke But Cole Did Not". Small words (vs, the, at, etc.) still stay lowercase mid-title per the existing rule. (2) AUDIT SCRIPT DYNAMIC HEADER: scripts/audit-stories.js previously hard-coded "# Story Quality Audit — v2.7.0 baseline" regardless of which release was being audited. Now reads APP_VERSION from src/content.js at runtime and emits the current version. Cosmetic-only; audit content was always correct. QA: scripts/qa-current.js all 6 sections green (600 v2 + 960 v3 + 2,000-story lint + storyMode regression + inline-script syntax). Sanity check on 16 sample v3 titles across all four blueprints with deliberately lowercase picks confirmed correct title casing.' },
  { v: 'v2.7.1', title: 'Cleanup + hardening — docs refreshed, QA harness now catches blank-screen class of bug',
    detail: 'No new story features. Pure hygiene release closing the gaps that hurt us in v2.6.2 and removed friction for any future build. (1) Inline <script> syntax gate: scripts/qa-current.js now parses every inline <script> block in index.html via new Function — the v2.6.2 broken-ternary bug that produced a blank green screen for every visitor would have been caught before push. Cheap, fast, gates on errors === 0. (2) QA harness renamed scripts/qa-v261.js → scripts/qa-current.js. Name no longer ties to a stale release. Header rewritten to reflect that this is the single acceptance harness, not a v2.6.1 artifact. CLAUDE.md project-instructions updated accordingly. (3) README.md fully refreshed to current state: ages 2-13 (was 2-10), 5 tiers including tween, settings + storyMode steps, ElevenLabs TTS via Vercel proxy, IndexedDB cache, localStorage profile, v2/v3 engine layering, current QA harness command, live noddytales.app domain, folder structure including api/ + scripts/ + docs/. Old README claimed Web Speech API and "custom domain pending purchase" — both stale by months. (4) docs/v3-role-blueprints.md: removed stale "v2.5.0 ships one blueprint" status, removed quest_v3 forward-reference from the original migration plan (never shipped, never on roadmap), updated to v2.7.0 outcomes including concrete goal slot, vivid disaster props, specific loophole rules, funnier guilty-ally reveals, bodyHasHighlight fix. Added "next likely v3 work" section flagging tween voice pass as the most probable next move. (5) Audit doc polish: docs/story-quality-audit-v2.7.0-post.md title corrected from "baseline" to "post-change audit" so pre.md vs post.md are visibly distinct. (6) Acceptance: full QA harness clean — 600 v2 + 960 v3 stories all gates passed, 2,000-story grammar lint clean, storyMode regression clean, new inline-script syntax gate confirms all blocks in index.html parse without errors.' },
  { v: 'v2.7.0', title: 'Story Quality Pass — v3 ages 6-13 measurably stronger',
    detail: 'Pure content/template work. No new UI. Goal: make generated stories funnier, more substantial, more clearly driven by the kid\'s selections. PHASE 1: new audit script scripts/audit-stories.js generated 30 stories (5 each at ages 2/4/6/8/10/12) and surfaced 10 quality issues. PHASE 2 — v3 blueprint improvements: (a) goal_spine_v3 now states a CONCRETE goal in every story — new v3 goal slot mirrors v2\'s pickGoal (30 phrases like "win the silly race" / "find the way home"). Setup names the goal, problem references it, payoff cashes it: "It worked. Cole found the way home despite the troll." Title patterns use goal.titleText for full title-case ("The Day Cole Won the Silly Race"). (b) lost_snack_v3 — 3 new funnier guilty-ally reveals (burp gives them away, eyes-on-the-ceiling, fake-leaf alibi). (c) show_wrong_v3 — 3 new visually-silly prop disasters with kid-readable physical comedy. (d) rule_loophole_v3 — 3 new absurd-but-specific rules ("food can only be touched on Tuesdays" / "no eating food while standing" / "food must remain 3 feet from any protagonist"). PHASE 3 — optional slots are now load-bearing: color is a visible clue (smudge on the floor, signal flag), mood shapes the kid\'s approach ("Cole walked up in full dramatic mode. Just dramatic. The obstacle had not prepared for dramatic"), bodyHasHighlight bugfix ensures all chosen words always land as highlight tokens. PHASE 4 — QA: 600 v2 + 960 v3 stories all pass with 0 nulls / 0 unresolved / 100% picked-word highlight coverage; 2,000-story grammar lint clean; storyMode regression clean. Eyeball quality pass: 3 of 4 v3 blueprints show clear substance + choice-integration improvement (+1 each on humor/substance/choice/rereadability for kid and big tiers). Tot/little intentionally stable per spec. Pre and post audit packs saved to docs/story-quality-audit-v2.7.0-{pre,post}.md.' },
  { v: 'v2.6.3', title: 'HOTFIX — restore welcome screen after v2.6.2 ternary bug',
    detail: 'v2.6.2 shipped with a broken renderWelcome ternary chain. The storyMode UI block was appended AFTER the setting block which was itself the implicit ELSE branch of the ternary. JS parser threw "Missing } in template expression", the inline script never executed, no handlers attached, app rendered as a blank green screen with only the settings cog visible (and the cog itself was non-functional because its click handler depends on the same script block). Fix: one-line edit converting the setting block from implicit ELSE to explicit `step === \'setting\' ?` branch, with storyMode as the new branch. QA harness still passes all gates. Follow-up: next release adds inline-script syntax check to the QA harness so this regression class cannot ship again.' },
  { v: 'v2.6.2', title: 'Karaoke alignment + Bedtime/Anytime story mode',
    detail: 'Two playtest issues addressed. (1) READ IT TO ME karaoke highlight was "one word behind" the spoken audio. Root cause: HTMLMediaElement.currentTime under-reports actual playback position by 150-300ms on most browsers (worse on iOS, much worse over Bluetooth). Fix: KARAOKE_LEAD_MS = 220ms lookahead applied at lookup time so the highlight resolves to where audio WILL be in ~220ms, matching what the listener hears. Single-line tunable; raise to 350-400 if Bluetooth users still see lag. (2) Stories always ended with sleep imagery — tonally wrong for daytime play. New welcome step asks "When is this story for? Bedtime or Anytime?" Bedtime keeps current cozy-end beats (goodnight, fell asleep). Anytime swaps in day-ending close (walking home, onto the next, tomorrow). Persists per device in Profile (nt_story_mode). Engine wiring: ending beats now carry a mode tag (\'bedtime\' default / \'anytime\') and eligibleFor filters by picks.storyMode. v3 pickStageBeat applies the same filter to its landing stage. Authored ~20 anytime variants: 2 tot, 2 little, 4 kid/big, 3 tween, 8 v3 (one kid/big + one tween per blueprint × 4 blueprints). QA: 600 v2 stories matrix, 60/60 sky and weather golden tests, 960 v3 stories across blueprints/ages — all pass. New section 5 in qa-v261.js confirms anytime mode drops to 0/60 bedtime words and rises to 60/60 day-ending markers.' },
  { v: 'v2.6.1', title: 'QA patch — 4 bugs closed + repeatable Node QA harness',
    detail: 'Focused QA patch for 4 issues caught by Codex audit, plus scripts/qa-v261.js as a repeatable acceptance harness. (1) show_wrong_v3 dropped chosen creature for tween ages 11-13: tween escalation beat didn\'t reference obstacle. Rewrote v3_sw_escalation_tween to require + reference obstacle (2 variants) and added obstacle to v3 FLAVOR_CALLBACKS as safety net. (2) Plural-article bug "a donuts flew through the window": 8 templates rewrote to use {food.articleText} / {mcguffin.articleText} instead of hardcoded "a {food.text}". 2,000-story lint now finds 0 occurrences of "a donuts/cookies/waffles/pancakes/..." patterns. (3) "Rescue A Stuck Friend" title casing: titleCase now keeps a/an/the/of/in/on/at/to/for/by/with/and/or/but/vs/from/as/if/nor lowercase unless first or last word. (4) Doc drift: docs/v3-role-blueprints.md status updated from "v2.5.0 ships one blueprint" to v2.6.x ships all 4; RELEASE_NOTES v2.2.1 TTS privacy claim amended with a "REMOVED in v2.2.3" suffix so readers know audio narrator now speaks the real name. Final QA: 600 v2 stories (age matrix) — 0 nulls / 0 unresolved / 0 missing required-slot mentions. 60/60 sky=moon@age2 + weather=stormy@age4 body + highlight. 960 v3 stories across 4 blueprints × ages 6-13 — 0 nulls, 0 unresolved, 6-paragraph arc every time, all 9 golden picks in body + highlighted in every story. 2,000-story grammar lint — 0 plural article errors, 0 awkward " A " titles. All acceptance gates passed.' },
  { v: 'v2.6.0', title: 'v3 blueprint variety — 4 role-based blueprints, same shapes as v2',
    detail: 'v2.5.0 shipped one v3 blueprint (lost_snack_v3). v2.6.0 expands v3 to four: goal_spine_v3 (kid declares a goal, hits an obstacle, the move drives through), show_wrong_v3 (kid + ally prepare a show, the prop breaks, kid improvises with signature_action and chant), rule_loophole_v3 (visitor imposes an absurd rule blocking the mcguffin; kid uses the loophole_tool + signature_action to win), plus the existing lost_snack_v3. Each blueprint declares its own role map (e.g. show_wrong\'s prop=object, rule_loophole\'s rule_imposer=visitor) and stage progression. Engine improvements: beats now carry a blueprintId tag so they scope to their blueprint; existing lost_snack beats tagged accordingly so they don\'t bleed; blueprint validation derives required roles dynamically from stages instead of a hardcoded list; object added to v3 slot construction (random pick from V2_WORDS.objects since picker has no object round); flavor callbacks extended with mood_throughline and mcguffin so any blueprint where those roles aren\'t natively load-bearing still surfaces them. Acceptance (golden picks Cole/parrot/donuts/jungle/dinosaur/rainbow/bounced/silly/KABLAM/BOINGO, 30 samples each, age 6): all 4 blueprints hit 0 nulls, 0 unresolved tokens, 30/30 six-paragraph arc, 30/30 kid agency, and 100% body coverage for every selected word. Random-pick distribution across 200 stories: 62/52/52/34 — roughly even. v2 regression: 60 stories ages 2-13 with random picks, 0 nulls, 0 unresolved tokens. qaWordMapping still 366/366 mapped. v2 stays default; v3 still opt-in via ?engine=v3.' },
  { v: 'v2.5.0', title: 'Strict QA + tot sky + tween move + v3 experimental engine behind flag',
    detail: 'Closes the v2.4.7 audit follow-ups and opens the v3 phase. (A) qaSelectableCoverage() rewritten to report body, titleOnly, highlighted, nulls, unresolvedTokens, avgBodyCoverage, minBodyCoverage, and worstOptions separately. Title matches no longer count as coverage — body is the gate metric. qaWordMapping() relabeled as pool-mapping audit only. (B) Tot sky wired as a real v2 slot. picks.sky.w now reads into the engine, 4 new tot beats reference {sky.text} (intro/silly_meet/silly_repeat/cozy_end variants), coverage callback added, highlight tokens wrap the chosen sky word. 50/50 body + 50/50 highlight for moon@age2 AND kite@age3. (C) Tween move went from 56% to 88% body coverage average with 6 new load-bearing beats — the chosen move now causes the vending machine reset, defeats the rule sign, drives the investigation, climaxes the show. (D) Honest QA reporting: body coverage thresholds 100% for required slots, 80%+ for color/mood/move, 85%+ tween move. titleOnly = 0% across all categories. (E) v3 experimental engine landed behind ?engine=v3. lost_snack_v3 blueprint runs: protagonist/ally/mcguffin/setting/false_suspect required; signature_action/visual_signature/mood_throughline/chant/payoff_word optional. 6-stage arc (setup → problem → attempt → escalation → payoff → landing). Role-based beat library; tokens emitted directly during render. v2 stays default; v3 falls back to v2 on any failure. New qaV3Blueprint() helper. Golden test (Cole/parrot/donuts/jungle/dinosaur/rainbow/bounced/silly/KABLAM/BOINGO, 30 samples, age 6): 100% body coverage for all 10 expected roles, 0 nulls, 0 unresolved tokens, 30/30 6-paragraph arc, 30/30 kid agency.' },
  { v: 'v2.4.7', title: 'Selection coverage repairs + qaSelectableCoverage + v3 design doc',
    detail: 'v2.4.6 audit follow-up. Three regressions closed: (1) WEATHER is now a real v2 slot. v2.4.6 added a 30% little-tier weather round but generateStoryV2 never read picks.weather. Now wired end-to-end: slot read, 2 new weather-aware little-tier beats, coverage callback, highlight token. Acceptance: 50/50 mention + 50/50 highlight for weather=stormy at age 4. (2) "cub" picker label was mapping by ID to v2 entry text "bear cub" — story rendered "bear cub" while picker said "cub". Renamed picker option to "bear cub" so label = story exactly. (3) Colors expanded to 18 per tier (tot/little/big/tween were at 12; kid already at 18). New colors are concrete and story-usable — tot: black, gray, sky blue, lime green, sunshine yellow, apple red; little: mint green, sky blue, peach, cherry red, sandy tan, leafy green; big: forgotten gray, lunchbox yellow, cafeteria green, gym sock white, recess orange, permission slip blue; tween: bleached denim, mall food court orange, parking lot gray, highlighter pink, gas station green, late bus yellow. New QA helper: window.qaSelectableCoverage() reports mapped/read/covered separately across every category — caught all three regressions and confirms 100% coverage for pet/food/place/creature/weather, 84-97% for color/move/mood. Also lands: docs/v3-role-blueprints.md design doc for the next major version (role-based plot blueprints where every selected word gets a plot role before generation — protagonist/ally/obstacle/mcguffin/chant/signature_action — with a 5-step migration plan v2.5.0 → v3.0.0).' },
  { v: 'v2.4.6', title: 'Picker → V2_WORDS 100% mapping + picker expansion',
    detail: 'Audit revealed generateStoryV2\'s mapPickToWord was matching picker selections against V2_WORDS by exact text/id, and 58% of picker words (145/252) had no v2 entry — on a miss the engine silently replaced the user\'s choice with a random rich word, so selected pet/food/place/creature could just vanish from stories. v2.4.6 closes the gap entirely and expands the picker. Three deliverables: (1) New window.qaWordMapping() dev helper compares WORD_BANK[tier][cat].options[].w against the appropriate V2_WORDS pool (companions / visitors / places / foods) across all 5 tiers and reports missing words. (2) ~225 new v2 rich-word entries authored — backfill for currently-listed picker words plus matching entries for the picker expansion. Every picker word now has an exact-text match in v2; zero silent replacements possible. (3) Picker expanded per spec: tot/little/big/tween 12→18 per category, kid 18→24 per category. Net 366/366 picker→v2 mapping (100%, up from 42%). Little tier weather round (12-option pool that existed but was never used) wired into buildRounds() as a 30% swap for the creature round. Two grammar fixes caught in the same pass: "a orange tint" / "a iridescent tint" rewritten to "turned orange by then" (drops the broken indefinite article), and "half a umbrella" → "half an umbrella" via articleText. Acceptance: 0 broken articles across 240 stories, 0 nulls, 0 unresolved tokens, 0 duplicate picker options. Emoji remains the default visual; image assets deferred to v2.5.x.' },
  { v: 'v2.4.5', title: 'Story Test Log closure — v1 fallback tot templates hardened',
    detail: 'Story Test Log audit (entries 001–006, May 2026 playtest with Cole age 2–5) confirmed three v1 tot defects were still open in the fallback engine. Entry 004: BOING/BOOP repetition cap + "ate banana" bare-singular grammar. Entry 005: hardcoded "Skies don\'t usually do that!" filler that repeated verbatim across every Bouncing SKY story. Entry 006: "Then they went rolled, rolled, and one more time rolled!" verb-noun POS conflict — MOV pool is all past-tense verbs but the template wrapped them in "went X" producing broken grammar. v2 engine (live default since v2.0.0) already addresses these structurally; this release sterilizes the v1 fallback so the same bugs cannot fire when ?engine=v1 is set or v2 returns null. Six reusable rules distilled from the v1.18.0 / v1.19.0 / v2.3.x fixes and applied: escalation arc, word repetition cap ≤3 (tot/little) or ≤4 (kid+), past-tense verbs only slot as main verb, punchline callbacks the central image in the final paragraph, name in every paragraph for tot/little, zero hardcoded full-sentence reactions. 4 tot templates rewritten (Rainbow Duck, Loud Food, Bouncing SKY, Mystery Bonk). 4 tot templates left alone (already passing). Kid + Little tiers verified to pass — no rewrites. Regression check confirms all four bug patterns eliminated.' },
  { v: 'v2.4.4', title: 'Karaoke auto-scroll — follow the read-aloud without scrolling',
    detail: 'Playtest feedback: during Speak playback, the karaoke highlight would roll off the bottom of the screen and the reader had to manually scroll to keep following along. v2.4.4 hooks auto-scroll into the existing word-change moment. When a new word lights up, the engine checks if it has drifted into the bottom 35% of the viewport — if so, it smooth-scrolls the word into view (centered, with upcoming text visible below). The spoken word now stays near the middle of the screen without any manual interaction. Respects user override: a one-time wheel + touchmove listener marks the user as in-control for 2.5s after a manual scroll, so re-reading a sentence works normally without auto-scroll fighting back. Programmatic smooth-scrolls get a 700ms grace window so they don\'t self-trigger the user-scroll guard. Implementation lives entirely in TTSManager — no DOM structure changes, no impact on cached audio alignment.' },
  { v: 'v2.4.3', title: 'Reading-level recalibration — drop tween-vocab from the 8-10 tier',
