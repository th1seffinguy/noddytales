<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NoddyTales — Silly Stories Just For You</title>

<!-- Brand icons -->
<link rel="icon" href="public/brand/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="48x48" href="public/brand/favicon-48.png">
<link rel="icon" type="image/png" sizes="32x32" href="public/brand/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="public/brand/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="public/brand/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NoddyTales">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#A8D5A2">
<meta property="og:image" content="public/brand/banner-og.svg">
<meta property="og:title" content="NoddyTales — Silly Stories Just For You">
<meta property="og:description" content="Make a silly personalised story in under 2 minutes.">

<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:        #A8D5A2;
    --sage-dark:   #7CB876;
    --orange:      #F4A261;
    --orange-dark: #E08A45;
    --cream:       #FFF8EE;
    --cream-deep:  #FDEFD4;
    --yellow:      #FFD166;
    --yellow-dark: #F2B838;
    --ink:         #3D3528;
    --ink-soft:    #6B5E48;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    background: var(--sage);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.45) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,209,102,0.35) 0, transparent 42%),
      radial-gradient(circle at 50% 50%, rgba(168,213,162,1) 0, var(--sage) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .app {
    position: relative;
    width: 100%;
    max-width: 440px;
    height: 100vh;
    min-height: 600px;
    background: var(--sage);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 480px) {
    body { padding: 24px; }
    .app {
      height: min(900px, calc(100vh - 48px));
      border-radius: 44px;
      box-shadow:
        0 30px 60px rgba(61,53,40,0.25),
        0 0 0 12px rgba(255,255,255,0.6),
        0 0 0 14px rgba(61,53,40,0.08);
    }
  }

  /* ---- Screens ---- */
  .screen-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 32px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    transition: transform 0.55s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.4s ease;
    background: var(--sage);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.45) 0, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(255,209,102,0.35) 0, transparent 42%);
  }
  .screen.is-hidden  { transform: translateX(110%);  opacity: 0; pointer-events: none; }
  .screen.is-exiting { transform: translateX(-12%);  opacity: 0; pointer-events: none; }

  .screen--cream {
    background: var(--cream);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(244,162,97,0.12) 0, transparent 32%),
      radial-gradient(circle at 92% 88%, rgba(168,213,162,0.18) 0, transparent 36%);
  }

  /* ---- Type ---- */
  h1, h2, h3 { font-family: 'Fredoka', sans-serif; font-weight: 600; margin: 0; }
  .display {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-wrap: balance;
  }
  .display--mega { font-size: 48px; }
  .lede { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 18px; color: var(--ink-soft); }

  /* ---- Logo ---- */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--yellow);
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 22px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08), 0 4px 0 var(--yellow-dark);
  }

  /* ---- Buttons ---- */
  .btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    border: none;
    cursor: pointer;
    background: var(--orange);
    color: white;
    border-radius: 28px;
    padding: 20px 28px;
    min-height: 68px;
    width: 100%;
    box-shadow: 0 6px 0 var(--orange-dark), 0 10px 20px rgba(224,138,69,0.25);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    letter-spacing: 0.2px;
  }
  .btn:active:not(:disabled) {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--orange-dark), 0 4px 10px rgba(224,138,69,0.25);
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn--yellow {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.25);
  }
  .btn--yellow:active:not(:disabled) {
    box-shadow: 0 2px 0 var(--yellow-dark), 0 4px 10px rgba(242,184,56,0.25);
  }
  .btn--ghost {
    background: white;
    color: var(--ink);
    box-shadow: 0 6px 0 rgba(61,53,40,0.12), 0 10px 20px rgba(0,0,0,0.06);
  }
  .btn--ghost:active:not(:disabled) {
    box-shadow: 0 2px 0 rgba(61,53,40,0.12), 0 4px 10px rgba(0,0,0,0.06);
  }
  .btn--small { font-size: 17px; padding: 14px 20px; min-height: 52px; border-radius: 22px; }

  /* ---- Name input ---- */
  .name-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 34px;
    text-align: center;
    background: var(--cream);
    border: 4px solid white;
    border-radius: 28px;
    padding: 22px 16px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 6px 0 rgba(61,53,40,0.08), inset 0 2px 4px rgba(0,0,0,0.04);
    letter-spacing: 1px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .name-input::placeholder { color: rgba(107,94,72,0.4); font-weight: 600; }
  .name-input:focus { border-color: var(--yellow); transform: translateY(-2px); }

  /* ---- Age grid ---- */
  .age-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .age-tile {
    aspect-ratio: 1;
    border: none;
    border-radius: 24px;
    background: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 38px;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 0 rgba(61,53,40,0.10), 0 10px 20px rgba(0,0,0,0.05);
    transition: transform 0.15s ease, background 0.2s, color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .age-tile::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 16px;
    background: var(--tile-accent, var(--cream-deep));
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .age-tile > span { position: relative; z-index: 1; }
  .age-tile:active { transform: translateY(3px) scale(0.97); }
  .age-tile.is-selected {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--yellow-dark), 0 10px 20px rgba(242,184,56,0.35);
    transform: translateY(-2px) rotate(-2deg);
  }
  .age-tile.is-selected::before { background: white; opacity: 0.35; }
  .age-tile.is-locked { opacity: 0.8; }
  .tile-lock {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 13px;
    z-index: 2;
    opacity: 0.7;
  }

  /* Potty mode toggle (age-select screen) */
  .potty-toggle {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 16px;
    background: rgba(255,255,255,0.55);
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .potty-toggle:active { background: rgba(255,255,255,0.7); }
  .potty-toggle input { position: absolute; opacity: 0; pointer-events: none; }
  .potty-track {
    flex-shrink: 0;
    width: 46px; height: 26px;
    background: rgba(61,53,40,0.18);
    border-radius: 13px;
    position: relative;
    transition: background 0.2s;
  }
  .potty-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 4px rgba(61,53,40,0.25);
    transition: transform 0.2s cubic-bezier(0.4, 1.5, 0.6, 1);
  }
  .potty-toggle input:checked ~ .potty-track { background: var(--orange); }
  .potty-toggle input:checked ~ .potty-track .potty-thumb { transform: translateX(20px); }
  .potty-label {
    font-size: 15px; font-weight: 700; color: var(--ink);
    line-height: 1.2;
  }
  .potty-hint {
    display: block;
    font-size: 12px; font-weight: 600; color: var(--ink-soft);
    margin-top: 2px;
  }

  /* Sidekick step — friends/siblings picker */
  .sidekick-input-row {
    display: flex; gap: 10px; align-items: stretch;
  }
  .sidekick-input {
    flex: 1;
    font-family: 'Fredoka', sans-serif;
    font-size: 18px; font-weight: 500;
    padding: 14px 18px;
    border-radius: 18px;
    border: 3px solid rgba(61,53,40,0.12);
    background: white;
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .sidekick-input:focus { border-color: var(--orange); }
  .sidekick-input:disabled { opacity: 0.5; }
  .sidekick-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 48px;
    padding: 12px;
    background: rgba(255,255,255,0.45);
    border-radius: 14px;
  }
  .sidekick-empty {
    width: 100%; text-align: center;
    font-size: 14px; color: var(--ink-soft);
    font-style: italic;
    padding: 6px 0;
  }
  .sidekick-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 6px 6px 6px 14px;
    border-radius: 999px;
    box-shadow: 0 2px 4px rgba(61,53,40,0.12);
  }
  .sidekick-chip-x {
    width: 22px; height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    color: white;
    font-size: 16px; font-weight: 700;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .sidekick-chip-x:hover { background: rgba(255,255,255,0.6); }

  /* PIN modal overlay */
  .pin-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pin-modal {
    background: var(--cream);
    border-radius: 28px;
    padding: 32px 24px 28px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 24px 48px rgba(61,53,40,0.28);
  }
  .pin-modal h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--ink);
  }
  .pin-modal p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    line-height: 1.5;
  }
  .pin-input {
    width: 100%;
    font-size: 28px;
    font-family: 'Fredoka', sans-serif;
    text-align: center;
    letter-spacing: 10px;
    border: 3px solid var(--cream-deep);
    border-radius: 16px;
    padding: 10px 12px;
    background: white;
    color: var(--ink);
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .pin-input:focus { border-color: var(--orange); }
  .pin-error { color: #d04040; font-size: 13px; min-height: 18px; margin-bottom: 10px; }
  .pin-actions { display: flex; gap: 10px; }
  .pin-actions .btn { flex: 1; }

  /* Version badge — tap to open the What's New panel */
  #version-badge {
    position: absolute;
    bottom: 7px;
    right: 12px;
    font-size: 10px;
    color: rgba(61,53,40,0.28);
    font-family: 'Nunito', sans-serif;
    z-index: 50;
    letter-spacing: 0.4px;
    user-select: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #version-badge:hover { color: rgba(61,53,40,0.6); background: rgba(255,255,255,0.4); }

  /* What's New overlay */
  .whatsnew-overlay {
    position: absolute;
    inset: 0;
    background: rgba(61,53,40,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease-out;
  }
  .whatsnew-card {
    background: var(--cream);
    border-radius: 24px;
    max-width: 380px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    padding: 24px 24px 20px;
    box-shadow: 0 20px 60px rgba(61,53,40,0.35);
  }
  .whatsnew-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .whatsnew-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--ink);
    margin: 0;
  }
  .whatsnew-close {
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    background: rgba(61,53,40,0.1);
    color: var(--ink);
    font-size: 18px; font-weight: 700;
    cursor: pointer;
    line-height: 1;
  }
  .whatsnew-entry { margin-bottom: 18px; }
  .whatsnew-entry:last-child { margin-bottom: 0; }
  .whatsnew-version {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--orange-dark);
    margin-bottom: 4px;
  }
  .whatsnew-summary {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; color: var(--ink);
    line-height: 1.5;
    margin: 0 0 6px 0;
    font-weight: 600;
  }
  .whatsnew-detail {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.45;
    margin: 0;
  }
  .whatsnew-link {
    display: inline-block;
    font-size: 12px; color: var(--ink-soft);
    text-decoration: none;
    border-top: 1px solid rgba(61,53,40,0.1);
    padding-top: 12px;
    margin-top: 12px;
    width: 100%;
    text-align: center;
  }
  .whatsnew-link:hover { color: var(--orange-dark); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ---- Word cards ---- */
  .pair-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1;
    max-height: 480px;
  }
  .word-card {
    border: none;
    border-radius: 32px;
    background: var(--orange);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px 12px;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--orange-dark), 0 16px 32px rgba(224,138,69,0.3);
    position: relative;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s;
    animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .word-card:nth-child(2) {
    animation-delay: 0.1s;
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 0 8px 0 var(--yellow-dark), 0 16px 32px rgba(242,184,56,0.3);
  }
  .word-card::before {
    content: "";
    position: absolute;
    top: -30%; left: -30%;
    width: 160%; height: 60%;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    pointer-events: none;
  }
  .word-card.is-bouncing { animation: cardBounce 1.4s ease-in-out infinite; }
  .word-card:nth-child(2).is-bouncing { animation-delay: 0.2s; }
  .word-card:active { transform: translateY(4px) scale(0.97); }
  .word-card.is-picked { animation: pickedPop 0.5s ease-out forwards; }
  .word-card.is-faded { opacity: 0.3; transform: scale(0.92); }

  .word-emoji { font-size: 72px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
  .word-emoji--sm { font-size: 56px; opacity: 0.85; }
  .word-text { font-size: 28px; line-height: 1; text-align: center; letter-spacing: 0.3px; }
  .word-text--lg { font-size: 32px; }
  .word-text--sm { font-size: 22px; }

  @keyframes cardEnter {
    from { transform: translateY(40px) scale(0.85); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes cardBounce {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%       { transform: translateY(-8px) rotate(1deg); }
  }
  @keyframes pickedPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12) rotate(-3deg); }
    100% { transform: scale(1.05) rotate(0); }
  }

  /* ---- Free-text round ---- */
  .freetext-wrap {
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex: 1;
    animation: cardEnter 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }
  .freetext-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 36px;
    text-align: center;
    background: white;
    border: 4px solid rgba(255,255,255,0.6);
    border-radius: 28px;
    padding: 24px 16px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 8px 0 rgba(61,53,40,0.08), inset 0 2px 4px rgba(0,0,0,0.03);
    letter-spacing: 1px;
    transition: border-color 0.2s, transform 0.2s;
    caret-color: var(--orange-dark);
  }
  .freetext-input::placeholder { color: rgba(107,94,72,0.35); font-size: 28px; }
  .freetext-input:focus { border-color: var(--yellow); transform: translateY(-2px); }
  .freetext-hints {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .hint-label {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    opacity: 0.7;
    letter-spacing: 0.3px;
  }
  .hint-chip {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    background: rgba(255,255,255,0.55);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    border: none;
    transition: background 0.15s, transform 0.12s;
    box-shadow: 0 2px 0 rgba(61,53,40,0.08);
  }
  .hint-chip:active { transform: translateY(2px); }
  .hint-chip:hover { background: rgba(255,255,255,0.8); }

  /* ---- Progress dots ---- */
  .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .progress-dot {
    height: 10px;
    flex: 1;
    border-radius: 5px;
    background: rgba(255,255,255,0.5);
    transition: background 0.4s, transform 0.4s;
  }
  .progress-dot.is-done    { background: var(--yellow); }
  .progress-dot.is-current { background: white; transform: scaleY(1.6); }

  /* ---- Story screen ---- */
  .story-stack { display: flex; flex-direction: column; flex: 1; gap: 18px; position: relative; z-index: 1; }
  .story-paper {
    background: white;
    border-radius: 32px;
    padding: 28px 24px;
    flex: 1;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(61,53,40,0.10), inset 0 0 0 4px var(--cream-deep);
    background-image:
      linear-gradient(white 0 100%),
      repeating-linear-gradient(to bottom, transparent 0 35px, rgba(244,162,97,0.08) 35px 36px);
    background-blend-mode: normal, normal;
  }
  .story-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.1;
    margin: 0 0 16px 0;
    color: var(--ink);
    text-wrap: balance;
  }
  .story-body {

  /* Karaoke word highlighting — visible "this is the word being read" indicator with bounce. */
  .kw {
    display: inline-block;

    padding: 0 4px;

  @keyframes kwBounce {

  .story-toolbar { display: flex; flex-direction: column; gap: 12px; }

  /* ---- Speak pill ---- */

  <div class="screen-wrap" id="screen-wrap"></div>
  <div id="version-badge"></div>

<script src="src/content.js"></script>
<script>
/* ================================================================
   NODDYTALES — Vanilla JS app
   ================================================================ */

if (typeof WORD_BANK === 'undefined') throw new Error('content.js must load before index.html script');

/* ---- HTML escape (prevent XSS from name input) ---- */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---- App state ---- */
function loadSidekicks() {
  try { return JSON.parse(localStorage.getItem('nt_sidekicks') || '[]').slice(0, 3); }
  catch { return []; }
}
const state = {
  screen: 'welcome',         // welcome | words | story
  welcomeStep: 'name',       // name | age | sidekicks
  name: '',
  age: null,
  teenUnlocked: false,       // never persisted — resets to false on every page load
  picks: {},                 // category => { w, e }
  rounds: [],
  roundIdx: 0,
  speaking: false,
  story: null,               // cached buildStory() result — set once on goTo('story'), reused on rerender
  pottyMode: localStorage.getItem('nt_potty_mode') === '1',  // persists across sessions
  sidekicks: loadSidekicks(), // siblings / friends — persist across sessions, max 3
};

// Wire version badge — tap to surface the What's New panel
document.getElementById('version-badge').textContent = typeof APP_VERSION !== 'undefined' ? APP_VERSION : '';

/* In-app release notes — kept in sync with CHANGELOG.md.
   Showing the latest 5 entries keeps the modal scannable; full history lives on GitHub. */
const RELEASE_NOTES = [
  { v: 'v1.16.2', title: 'Dramatic "The End" closer',
    detail: 'The narrator now stretches "The" for ~2.5 seconds with a pause before landing "End" — proper bedtime-story finality instead of a quick read.' },
  { v: 'v1.16.1', title: 'Logo fix + little tier emoji cleanup',
    detail: 'The book in the app icon was sitting flush with the bottom border (4px margin out of 1024). Lifted and scaled the book group so it floats with proper breathing room. Also fixed turtle/rabbit duplicates in little tier creature pool.' },
  { v: 'v1.16.0', title: 'Callback motif tracking',
    detail: 'Stories that feel authored: a recurring "rule" is set up in P1, violated in P3, and paid off in P5. New "The Time [Name] Broke a Rule" template uses one of 12 absurd rules (no soup after moonrise, three hops before any door, etc.) as a callback woven through the whole story.' },
  { v: 'v1.15.0', title: 'Semantically-routed freetext',
    detail: 'Freetext prompts now carry a type: shout, smell, name, dance, or word. Smell prompts can yield a story where your word is used as a literal smell. Name prompts can yield a story where it’s the name of a creature. Two new kid templates demonstrate the routing.' },
  { v: 'v1.14.1', title: 'Grammar hardening (verb tense + adjective+plural)',
    detail: 'Codex re-review caught three real bugs in v1.13: "loved to hopped" (need base verb), "set off speed-ran" (need gerund), "an electric blue tacos" (article only saw first token). Added a verb-forms lookup so templates can pull base/gerund/past as needed. fixArticles now reads the whole noun phrase and detects plural on the last token, vowel on the first.' },
  { v: 'v1.14.0', title: 'Karaoke highlighting that actually works',
    detail: 'The follow-along word highlight is now obvious (orange pill + bounce animation) and accurate (synced to real ElevenLabs character timestamps, not estimated). Cached audio rebuilds once after deploy then plays instantly.' },
  { v: 'v1.13.0', title: 'Tier-aware joke logic + plural-article fix',
    detail: 'Each age tier now has its own aside flavor — tot gets "Boop!", big gets "There was a form for this, which made it worse.", tween gets "Nobody had asked." Sidekick cameos dropped to ~60% so they feel earned. Plural foods like "a tacos" now auto-convert to "some tacos".' },
  { v: 'v1.12.0', title: 'Mad Libs comedy categories (Codex peer review)',
    detail: 'Five new auto-injected pools — objects, adverbs, numbers, liquids, fake jobs. Two new kid templates showcase the lift: "Wrong [Liquid] Delivery" and "[Name] Becomes a [Job] by Accident". Existing templates surface the new vocabulary via enriched asides.' },
  { v: 'v1.11.2', title: 'Bug pass from Codex peer review',
    detail: '8 surgical fixes: literal [PET] token, regression in paragraph trimming, pre-articled tween creatures, wrong-tense move pools in tot/little, broken big/tween move phrases, body parts removed from BODY pool, non-food removed from big food.' },
  { v: 'v1.11.1', title: 'Shorter stories across all tiers',
    detail: 'Bedtime stories were running too long (60+ seconds). Tighter templates plus a per-tier paragraph cap brought little −29%, kid −16%, big −31%, tween −24%.' },
  { v: 'v1.11.0', title: 'Bigger word library + always-on silliness',
    detail: 'Kid tier expanded 12 → 18 options per round (octopus, pancakes, planetarium, professionally confused, etc.). Every kid story now also injects a random absurd object — no toggle required.' },

function showWhatsNew() {
  if (document.querySelector('.whatsnew-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'whatsnew-overlay';
  overlay.innerHTML = `
    <div class="whatsnew-card">
      <div class="whatsnew-head">
        <h2 class="whatsnew-title">What's New ✨</h2>
        <button class="whatsnew-close" id="whatsnew-close" aria-label="Close">×</button>
      </div>
      ${RELEASE_NOTES.map(n => `
        <div class="whatsnew-entry">

      <a class="whatsnew-link" href="https://github.com/th1seffinguy/noddytales/blob/main/CHANGELOG.md" target="_blank" rel="noopener">

document.getElementById('version-badge').addEventListener('click', showWhatsNew);

/* ================================================================
   AGE TIERS
   ================================================================ */
function tierFor(age) {
  if (age <= 3)  return 'tot';
  if (age <= 5)  return 'little';
  if (age <= 7)  return 'kid';
  if (age <= 10) return 'big';
  return 'tween';
}


function buildRounds(age) {
  const tier = tierFor(age);
  const plan = ROUND_PLAN[tier];

  // Randomly pick 2 options from each round's pool of 6
  const binaryRounds = plan
    .map(cat => WORD_BANK[tier].find(r => r.cat === cat))
    .filter(Boolean)
    .map(round => {
      const shuffled = [...round.options].sort(() => Math.random() - 0.5);
      return { ...round, options: shuffled.slice(0, 2) };
    });

  if (tier === 'kid') {
    const pool = FREE_TEXT_ROUNDS.kid;
    const ft = [pool[Math.floor(Math.random() * pool.length)]];
    // When potty mode is ON, surface 2 extra picker rounds so the toggle has a visible effect
    // on the selection flow — pick a body word + pick a silly sound, drawn from the HOT pools.
    if (state.pottyMode) {
      const bodyShuffled  = [...BODY_HOT_OPTS].sort(() => Math.random() - 0.5).slice(0, 2);
      const soundShuffled = [...SOUND_HOT_OPTS].sort(() => Math.random() - 0.5).slice(0, 2);
      const bodyRound  = { cat: 'body',  label: 'Pick a silly body word', options: bodyShuffled };
      const soundRound = { cat: 'sound', label: 'Pick a chaotic sound',   options: soundShuffled };
      return [...binaryRounds.slice(0, 4), ...ft, bodyRound, ...binaryRounds.slice(4), soundRound];
    }
    return [...binaryRounds.slice(0, 4), ...ft, ...binaryRounds.slice(4)];
  }
  if (tier === 'big') {
    const pool = [...FREE_TEXT_ROUNDS.big].sort(() => Math.random() - 0.5);
    const ft1 = pool.find(p => p.cat === 'freeword') || pool[0];
    const ft2 = pool.find(p => p.cat === 'freeword2' && p !== ft1) || pool[1];
    return [
      ...binaryRounds.slice(0, 4),
      ft1,
      ...binaryRounds.slice(4, 5),
      ft2,
      ...binaryRounds.slice(5),
    ];
  }
  if (tier === 'tween') {
    const pool = [...FREE_TEXT_ROUNDS.tween].sort(() => Math.random() - 0.5);
    const ft1 = pool.find(p => p.cat === 'freeword') || pool[0];
    const ft2 = pool.find(p => p.cat === 'freeword2' && p !== ft1) || pool[1];
    return [
      ...binaryRounds.slice(0, 4),
      ft1,
      ...binaryRounds.slice(4, 5),
      ft2,
      ...binaryRounds.slice(5),
    ];
  }
  return binaryRounds;
}

/* ================================================================
   STORY BUILDER
   ================================================================ */
function capitalize(s) {
  if (!s) return '';
  return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

/* Tokens: [name:X] [c:X] [y:X] — rendered as highlighted spans */
function buildStory(name, picks, age) {
  const t   = tierFor(age);
  const N   = name || 'Friend';
  const get = (k, fb = '') => (picks[k] && picks[k].w) || fb;

  const PET  = get('pet', 'puppy');
  const COL  = get('color', 'blue');
  const FOOD = get('food', 'cake');
  const PLC  = get('place', 'park');
  const SKY  = get('sky', 'sun');
  const CRE  = get('creature', 'frog');
  const MOV  = get('move', 'hopped');
  // Verb forms — used by templates that need base ("loved to hop") or gerund ("set off hopping")
  // instead of the default past tense ("they hopped").
  const moveBase   = past => (VERB_FORMS[past] && VERB_FORMS[past].base)   || past;
  const moveGerund = past => (VERB_FORMS[past] && VERB_FORMS[past].gerund) || past;
  const MOV_BASE   = moveBase(MOV);
  const MOV_GERUND = moveGerund(MOV);
  const MOD  = get('mood', 'silly');
  const WX   = get('weather', 'sunny');
  const FW   = get('freeword', '');
  const FW2  = get('freeword2', '');
  // Subtype tells templates how to route the freeword: shout (default), smell, name, dance, word.
  // Falls back to 'shout' for legacy picks that didn't carry a subtype.
  const FW_SUBTYPE = (picks.freeword && picks.freeword.subtype) || 'shout';

  // Fix article agreement in templated noun phrases. One pass that handles BOTH
  // single-token ("a [c:tacos]") and multi-token ("a [c:electric blue] [c:tacos]") cases.
  //
  // Algorithm per matched "[Aa] [token1] [token2] ... [tokenN]":
  //   1. If LAST token is plural-looking (ends in -s, not a singular-s exception) → "some"
  //      Plural overrides vowel because "some" works regardless of the next sound.
  //   2. Else if FIRST token starts with a vowel → "an"
  //   3. Else leave "a"/"A" alone.
  //
  // NOT_PLURAL_RE catches singular nouns ending in -s (octopus, bus) and adjectives ending
  // in -ous (mysterious, curious, ridiculous). Mass nouns ending in -s (cheese? no — gas, etc.)
  // are explicitly whitelisted. Whitelist "bonkers" because it's an adj that ends in -ers.
  const NOT_PLURAL_RE = /\b(?:cheese|sushi|broth|juice|tea|jelly|jam|soup|stew|cereal|granola|sauce|honey|gas|ice|rice|bread|toast|bonkers)\b|(?:ous|us|ss)$/i;
  const TOKEN_RE      = /\[(?:name|c|y):([^\]]+)\]/g;
  const fixArticles = s => s.replace(
    /\b([Aa])((?:\s+\[(?:name|c|y):[^\]]+\])+)/g,
    (match, art, tokensRaw) => {
      const tokens = [];
      let m;
      TOKEN_RE.lastIndex = 0;
      while ((m = TOKEN_RE.exec(tokensRaw)) !== null) tokens.push(m[1]);
      if (tokens.length === 0) return match;
      const lastWord  = tokens[tokens.length - 1];
      const firstWord = tokens[0];
      // Plural test first (highest priority).
      if (/s$/i.test(lastWord) && !NOT_PLURAL_RE.test(lastWord)) {
        return (art === 'A' ? 'Some' : 'some') + tokensRaw;
      }
      // Vowel test on first word in the phrase.
      if (/^[aeiouAEIOU]/.test(firstWord)) {
        return (art === 'A' ? 'An' : 'an') + tokensRaw;
      }
      return match;
    }
  );

  const rawPick = arr => arr[Math.floor(Math.random() * arr.length)];
  // Per-tier paragraph caps — long templates get trimmed so bedtime stories stay short.
  // Keep first 2 (setup) + last (LIMIT-2) (climax → resolution → closer). The previous formula
  // (first 4 + last 1) cut load-bearing climax paragraphs and left dangling references.
  const PARAGRAPH_LIMIT = { tot: 5, little: 5, kid: 5, big: 6, tween: 6 }[t];
  const trimToLimit = (story) => {
    if (!PARAGRAPH_LIMIT || story.paragraphs.length <= PARAGRAPH_LIMIT) return story;
    const ps = story.paragraphs;
    const keepEnd = PARAGRAPH_LIMIT - 2;
    const trimmed = [...ps.slice(0, 2), ...ps.slice(-keepEnd)];
    return { title: story.title, paragraphs: trimmed };
  };

  // Body / sound vocabulary — user-picked rounds (potty mode) take precedence; otherwise auto-pick.
  // Computed up front so tier asides can reference them.
  const pickedBody  = get('body',  '');
  const pickedSound = get('sound', '');
  const BODY  = pickedBody  || rawPick(state.pottyMode ? BODY_HOT  : BODY_PG);
  const BODY2 = rawPick(state.pottyMode ? BODY_HOT  : BODY_PG);
  const SOUND = pickedSound || rawPick(state.pottyMode ? SOUND_HOT : SOUND_PG);

  // Mad Libs-style auto-injected vocabulary (Codex peer review #15). Picked once per story
  // for use in kid-tier templates AND in the tier-aware aside bank.
  const OBJ = rawPick(OBJECTS);
  const ADV = rawPick(ADVERBS);
  const NUM = rawPick(NUMBERS);
  const LIQ = rawPick(LIQUIDS);
  const JOB = rawPick(JOBS);
  // Story-specific motif — Codex callback system. Picked once per story and referenced
  // across multiple paragraphs in escalating contexts (setup → violation → payoff).
  const RULE = rawPick(RULES);

  // pick auto-corrects articles, trims to length, injects a tier-appropriate aside,
  // and adds a sidekick cameo (60% of the time when sidekicks exist).
  const pick = arr => {
    const r = rawPick(arr);
    if (r && typeof r === 'object' && Array.isArray(r.paragraphs)) {
      let story = { title: fixArticles(r.title), paragraphs: r.paragraphs.map(fixArticles) };
      story = trimToLimit(story);
      story = injectTierAside(story);
      story = injectSidekick(story);
      return story;
    }
    return r;
  };

  // Tier-aware aside injection — Codex review #12. Different joke logic per age tier.
  // Tot: gentle/repetition. Little: tiny-world whimsy. Kid: Mad Libs token mix. Big: bureaucratic
  // mock-serious. Tween: deadpan internet-voice. Adds one aside to a middle paragraph.
  const TIER_ASIDES = {
    tot: [
      ` Boop!`,
      ` Heehee.`,
      ` That was silly.`,
      ` Everybody blinked twice.`,
      ` Even the sun smiled.`,
    ],
    little: [
      ` Heehee.`,
      ` Nobody knew why!`,
      ` Everybody clapped, just because.`,
      ` The wind agreed politely.`,
      ` A small flower nodded along.`,
    ],
    kid: [
      ` (Nearby: ${rawPick(SILLY_THINGS)}.)`,
      ` (Plus ${OBJ}, obviously.)`,
      ` (Carrying ${NUM} of them, somehow.)`,
      ` (Smelled distinctly of ${LIQ}.)`,
      ` (${JOB.charAt(0).toUpperCase() + JOB.slice(1)} took notes.)`,
      ` (Everyone agreed: ${ADV}.)`,
    ],
    big: [
      ` A stamp appeared. Nobody had requested one.`,
      ` This was technically against policy.`,
      ` There was a form for this, which made it worse.`,
      ` The hallway filed a complaint.`,
      ` Procedurally, this was incorrect.`,
    ],
    tween: [
      ` Nobody had asked.`,
      ` The vending machine had feedback. None of it constructive.`,
      ` This was, somehow, a vibe.`,
      ` Iconic.`,
      ` Plus, like, seventeen group chats lost it.`,
    ],
  };
  const injectTierAside = (story) => {
    const bank = TIER_ASIDES[t];
    if (!bank || bank.length === 0) return story;
    const aside = rawPick(bank);
    const targetIdx = 1 + Math.floor(Math.random() * 2);
    const updated = story.paragraphs.slice();
    updated[targetIdx] = updated[targetIdx] + aside;
    return { title: story.title, paragraphs: updated };
  };

  // Sidekick cameo — one random sibling/friend lands a brief cameo line. ~60% frequency so it
  // feels earned rather than canned (Codex #5 feedback: was 100%, felt grafted on).
  const injectSidekick = (story) => {
    const sks = Array.isArray(state.sidekicks) ? state.sidekicks : [];
    if (sks.length === 0) return story;
    if (Math.random() > 0.6) return story;
    const sk = rawPick(sks);
    const cameos = [
      ` (Plus [name:${sk}].)`,
      ` [name:${sk}] showed up too.`,
      ` [name:${sk}] called dibs on leftovers.`,
      ` "I called it," said [name:${sk}].`,
      ` [name:${sk}] was right there too.`,
    ];
    const cameo = rawPick(cameos);
    const targetIdx = Math.min(4, Math.max(2, Math.floor(story.paragraphs.length / 2)));
    const updated = story.paragraphs.slice();

          `At the source: a [c:${CRE}] holding a [c:${OBJ}] and an apologetic look. "I can explain," it said. "It's [y:${FW}] season."`,
          `[name:${N}] accepted a complimentary [y:${FOOD}] (faintly [y:${FW}]-flavored) and headed home. Some smells, it turns out, are seasonal. Best Tuesday on record.`,
        ],
      },
      // 12. The Legendary [Name] — only fires when FW subtype is 'name'
      {
        tags: ['name'],
        title: `The Legendary ${capitalize(FW || 'Friend')}`,
        paragraphs: [
          `[name:${N}] discovered, against all odds, a [c:${CRE}] with no name. This was a problem. Naming was tradition.`,
          `A [c:${PET}] suggested they consult an oracle. The oracle turned out to be a [c:${OBJ}] under the porch. It was [c:${ADV}] unhelpful.`,
          `After [c:${NUM}] possible names and considerable debate, [name:${N}] declared the [c:${CRE}]'s name to be [y:${FW}]. The [c:${CRE}] tried it on. It fit perfectly.`,
          `News spread. Other [c:${CRE}]s came looking for [y:${FW}], who was — let's be honest — kind of famous now.`,
          `By bedtime, the legend of [y:${FW}] had reached the [y:${PLC}]. There was a parade. Plenty of [y:${FOOD}]. The unmistakable smell of victory.`,
        ],
      },
      // 13. The Time [Name] Broke a Rule — callback motif (RULE referenced 3x across story)
      // Codex callback system: setup (P1) → violation (P3) → payoff (P5).
      {
        title: `The Time ${capitalize(N)} Broke a Rule`,
        paragraphs: [
          `Every kid at the [y:${PLC}] knew the rules. There was one in particular nobody ever questioned: "${RULE}." A sign said it. The grown-ups said it. Even the [c:${CRE}]s said it.`,
          `[name:${N}] [c:${MOV}] past the sign on a perfectly ordinary morning. A [c:${PET}] followed [c:${ADV}], whispering, "Are you sure about this?" [name:${N}] was not sure. They kept walking.`,
          `Then [name:${N}] did it. Right there. In broad daylight. They broke the rule. A passing [c:${CRE}] gasped. "[y:${RULE}]," it whispered, horrified. "You... you BROKE it?"`,
          `Consequences arrived immediately. A [c:${OBJ}] fell out of a tree. The sky briefly turned [c:${COL}]. The [c:${PET}] did a [c:${BODY}] in solidarity.`,
          `At bedtime, [name:${N}] confessed to the universe. The universe whispered back: "Honestly? ${RULE.charAt(0).toUpperCase() + RULE.slice(1)} was a stupid rule. Don't tell anyone I said that." Best Tuesday on record.`,
        ],
      },
    ].filter(tpl => !tpl.tags || tpl.tags.includes(FW_SUBTYPE)));
  }

  /* tween */
  if (t === 'tween') {
    const fwT  = FW  ? `[name:${N}] had one thing going for them: the word "[c:${FW}]". They didn't know what to do with it. This is how most good stories start.` : '';
    const fw2T = FW2 ? `There was a note. It said: "[y:${FW2}]." No context. No signature. Obviously this was fine.` : '';
    const fwT2 = FW  ? `At some point, [name:${N}] said "[c:${FW}]" out loud. The ${CRE} stopped. The ${PET} stopped. The whole ${PLC} briefly reconsidered itself.` : '';
    const fw2T2= FW2 ? `Someone had tagged the wall: "[y:${FW2}]." Below it, in smaller writing: "we tried to warn you."` : '';
    const fwT3 = FW  ? `[name:${N}] typed "[c:${FW}]" into the group chat. Seventeen people reacted. Nobody explained why.` : '';
    const fw2T3= FW2 ? `The password turned out to be "[y:${FW2}]". Of course it was.` : '';
    return pick([
      {
        title: `${capitalize(N)} and the Very ${capitalize(MOD)} Day`,
        paragraphs: [
          `Nobody warned [name:${N}] about the ${PLC}.`,
          `The [c:${CRE}] was already there, looking [c:${MOD}] and eating [y:${FOOD}]. The [c:${PET}] had claimed an entire corner and refused to elaborate.`,
          fwT,
          `[name:${N}] ${MOV} and considered the options. There were three. All of them were bad. They picked the [c:${COL}] one.`,
          `The [c:${CRE}] nodded slowly. "Bold," it said. It did not sound like a compliment.`,
          fw2T,
          `By the end, the [c:${PET}] had eaten half the [y:${FOOD}], the ${PLC} was technically on fire (in a metaphorical sense), and [name:${N}] had somehow gained a reputation.`,
          `It was not the reputation they wanted. It was better.`,
        ].filter(Boolean),
      },
      {
        title: `${capitalize(N)}: A Story That Got Out of Hand`,
        paragraphs: [
          `The [c:${CRE}] sent a message. All it said was: meet me at the [y:${PLC}]. Bring [y:${FOOD}].`,
          `[name:${N}] arrived. The [c:${PET}] was also there. No one had invited the [c:${PET}]. The [c:${PET}] had invited itself, which, honestly, tracked.`,
          `Things were [c:${MOD}]. The vibe was [c:${COL}].`,
          fwT2,
          `[name:${N}] ${MOV}. The situation called for a plan. The plan was: eat the [y:${FOOD}], stall until something made sense.`,
          fw2T2,
          `The [c:${CRE}] looked almost impressed. "You've done this before," it said. [name:${N}] had not done this before. They simply looked like someone who had.`,
          `The [c:${PET}] ${MOV} in solidarity. Everything remained unexplained. It always would.`,
        ].filter(Boolean),
      },
      {
        title: `The [c:${COL}] Problem Nobody Asked For`,
        paragraphs: [
          `It started normally. [name:${N}] showed up to the [y:${PLC}], expecting nothing. The universe had other plans.`,
          `A [c:${CRE}] was blocking the entrance, [c:${MOD}], holding [y:${FOOD}] like it was evidence. The [c:${PET}] stood nearby refusing to make eye contact with anyone.`,
          fwT3,
          `[name:${N}] ${MOV}. "Okay," they said. This was not a plan. It became a plan anyway.`,
          fw2T3,
          `The [c:${COL}] thing in the corner turned out to be relevant. If you have to ask, you weren't paying attention.`,
          `[name:${N}] walked out of the [y:${PLC}] with the [c:${PET}], a lingering sense of achievement, and the knowledge that the [c:${CRE}] still owed them. It always would.`,
        ].filter(Boolean),
      },
      {
        title: `${capitalize(N)} Hits Send By Accident`,
        paragraphs: [
          `[name:${N}] sent the wrong thing in the group chat. The group chat went silent. This was bad.`,
          `Within minutes, the [c:${CRE}] arrived at the [y:${PLC}] holding a screenshot like it was evidence in a trial.`,
          `The [c:${PET}] just shook its head, [c:${MOD}] beyond words. "Bold," it said. It was not a compliment.`,
          fwT,
          `[name:${N}] ${MOV}. There was no defending it. There was, however, [y:${FOOD}] on the counter, which helped considerably.`,
          fw2T,
          `The [c:${PET}] weighed in eventually: "Honestly, the caption did some heavy lifting. Could've been worse."`,
          `It did get worse, briefly, around Thursday. By Friday it was somebody else's turn. It always is.`,
        ].filter(Boolean),
      },
      {
        title: `Project Due in Forty Minutes`,
        paragraphs: [
          `The project was due in forty minutes. [name:${N}] had opened the document approximately three times.`,
          `A [c:${PET}] hovered nearby in solidarity, [c:${MOD}] and useless. The [c:${CRE}] was in the kitchen eating [y:${FOOD}] with great commitment.`,
          fwT2,
          `They [c:${MOV}] back and forth across the [y:${PLC}] in increasingly elaborate ways, mistaking motion for progress.`,
          `The [c:${COL}] folder on the desktop turned out to contain a draft from last term. It was, somehow, exactly the right shape for this assignment.`,
          fw2T2,
          `The ${CRE} pronounced the whole thing iconic. The ${PET} fell asleep. [name:${N}] did not cry. It was a triumph.`,
        ].filter(Boolean),
      },
      {
        title: `The Group Project From ${capitalize(COL)} Hell`,
        paragraphs: [
          `It started, like most group projects, with [name:${N}] being the only one who'd done the reading.`,
          `The [c:${CRE}] showed up to the [y:${PLC}] forty minutes late, [c:${MOD}] and holding a single sad [c:${COL}] sticky note.`,
          `The [c:${PET}] had "ideas." The ideas were "vibes." The deadline did not care for vibes.`,
          fwT3,
          `They [c:${MOV}] through the slides with a kind of doomed enthusiasm, occasionally taking turns being [c:${MOD}].`,
          fw2T3,
          `The [c:${CRE}] took credit for the introduction, which they had not written. The [c:${PET}] took credit for the bibliography, which did not exist.`,
          `They got a B+. [name:${N}] got an A. The ${CRE} sent a heart emoji. It was over.`,
        ].filter(Boolean),
      },
      {
        title: `The Group Chat Has Lost The Plot`,
        paragraphs: [
          `The group chat had been losing the plot for forty-eight hours and showed absolutely no signs of stopping.`,
          `The [c:${PET}] kept posting cryptic emoji combos. The [c:${CRE}] had renamed the chat three times in the last hour. Current title: "wifi cathedral ✨".`,
          `[name:${N}] arrived at the [y:${PLC}] for what had been described, very vaguely, as "vibes."`,
          fwT,
          `The [c:${CRE}] held up a phone. A meme was already in motion. It was [c:${COL}], slightly cursed, and made absolutely no logical sense.`,
          fw2T,
          `[name:${N}] [c:${MOV}] and contributed exactly one extremely confident take, which was promptly turned into a screenshot collage with seven different filters.`,
          `By dinner the chat had become a small, beloved religion. [y:${FOOD}] was served. [name:${N}] received seventeen new heart reactions, two of which were [c:${MOD}]. The plot remained, definitively, lost.`,
        ].filter(Boolean),
      },
      {
        title: `The Vending Machine Is Sentient Now`,
        paragraphs: [
          `The vending machine at the [y:${PLC}] had developed opinions overnight. This was, frankly, unwelcome.`,

          `A [c:${CRE}] strolled up, slotted a coin in, and the machine replied in bold caps: "TRY SOMETHING NEW. YOUR USUAL IS, FRANKLY, A BIT PREDICTABLE."`,
          fwT2,
          `[name:${N}] [c:${MOV}] over, fed it a dollar, and asked it directly what it wanted. The display flickered, then read: "i would simply like to be appreciated."`,
          fw2T2,
          `[name:${N}] paused, then wrote "thanks for the snacks" on a sticky note and pressed it to the glass. The machine glowed faintly [c:${COL}], which is vending-machine for "you're welcome."`,
          `[name:${N}] left with the snack the machine had recommended. It was, infuriatingly, exactly the right snack. The ${PET} now visits the machine every afternoon to chat. The machine seems happier.`,
        ].filter(Boolean),
      },

  }

  /* big */
  const fwLine   = FW  ? `"[c:${FW}]!" said the ${PET}, which [name:${N}] later realized was not actually a word but somehow explained everything.` : '';
  const fw2Line  = FW2 ? `There was a sign on the wall that read: "[y:${FW2}]." No one knew what it meant. Everyone agreed it was correct.` : '';
  const fwLine2  = FW  ? `The ${PET} said "[c:${FW}]" once, very quietly. The room went still. Then someone started clapping.` : '';
  const fw2Line2 = FW2 ? `Carved into the wall, in ancient handwriting, were the words: "[y:${FW2}]." Below it: "We tried to warn you."` : '';
  const fwLine3  = FW  ? `[name:${N}] wrote "[c:${FW}]" in the visitors' book. The archivist read it and immediately requested a copy.` : '';
  const fw2Line3 = FW2 ? `The final door had a keypad. The correct answer turned out to be "[y:${FW2}]." How anyone knew this remained unclear.` : '';

  return pick([
    {
      title: `The ${capitalize(MOD === 'absolutely bonkers' ? 'Bonkers' : 'Mysterious')} Tale of ${capitalize(N)} and the ${capitalize(CRE)}`,

        `"You're late," said the ${PET}, who clearly knew things. "The ${CRE} has been pacing for twenty minutes, and frankly, it's getting awkward."`,
        `Sure enough, a [c:${CRE}] [c:${MOV}] right past them, leaving a trail of crumbs that smelled distinctly of [y:${FOOD}]. [name:${N}] decided, against all reasonable advice, to follow.`,
        fw2Line,
        `What happened next was [c:${MOD}] — even by the standards of a place where Tuesdays misbehave. There were puzzles, riddles, and at one point an extremely polite avalanche of socks.`,
        `By the time [name:${N}] tumbled back through the cupboard door, the ${PET} had been promoted to general, the ${CRE} had taken up watercolors, and the whole ${PLC} had agreed that today, finally, was the right kind of Tuesday.`,
      ].filter(Boolean),
    },
    {
      title: `${capitalize(N)} and the ${capitalize(PET)}'s Unreasonable ${capitalize(PLC)}`,
      paragraphs: [
        `The [c:${PET}] arrived on a [c:${MOD}] afternoon with a single instruction: follow the [c:${COL}] trail.`,
        `[name:${N}] had questions. The ${PET} had no time for them. They set off [c:${MOV_GERUND}] into the [y:${PLC}] regardless.`,
        fwLine2,
        `"The [c:${CRE}] will explain everything," said the ${PET}. The ${CRE} explained nothing. It did, however, offer [y:${FOOD}], which helped considerably.`,
        fw2Line2,
        `[name:${N}] pieced it together slowly: the ${PLC} had rules. The rules were [c:${MOD}]. The ${PET} had broken six of them before breakfast.`,
        `Nobody was punished. There was, in fact, an award. [name:${N}] accepted it on behalf of everyone and tried not to look too pleased.`,
      ].filter(Boolean),
    },
    {
      title: `The ${capitalize(CRE)}, the ${capitalize(FOOD)}, and the Entirely ${capitalize(MOD)} ${capitalize(N)}`,
      paragraphs: [
        `It began, as these things often do, with someone who should not have opened a door opening a door.`,
        `[name:${N}] stepped through into a [y:${PLC}] that smelled of [y:${FOOD}] and old decisions. A [c:${CRE}] regarded them with an expression of [c:${MOD}] resignation.`,
        fwLine3,
        `"You've come for the [c:${COL}] thing," said the ${CRE}. It wasn't a question. The [c:${PET}] standing beside it nodded once, gravely.`,

        fw2Line3,
        `They [c:${MOV}] back the way they'd come, the ${PET} carrying the ${COL} thing, the ${CRE} carrying the ${FOOD}, and [name:${N}] carrying the distinct impression that this would happen again.`,
        `It did. It was better the second time.`,
      ].filter(Boolean),
    },
    {
      title: `${capitalize(N)} Receives a Letter They Did Not Order`,

        `[name:${N}] was, in fact, late. The [c:${CRE}] was [c:${MOD}] about it, but in the kind of forgiving way a mountain is forgiving.`,
        fwLine,
        `A [c:${PET}] arrived halfway through, announced its presence with great formality, and then refused to elaborate on the matter.`,
        `They [c:${MOV}] through the ${PLC}, which had clearly been waiting for them with some patience.`,
        fw2Line,
        `At the end of the evening, [name:${N}] could not recall most of the details — but the ${PET} had been right. About all of it.`,
        `The letter, it turned out, had been written by [name:${N}]. It had simply taken some time to arrive.`,
      ].filter(Boolean),
    },
    {
      title: `The ${capitalize(CRE)} Who Misplaced Tuesday`,
      paragraphs: [
        `A [c:${CRE}] burst into the [y:${PLC}] and announced, with [c:${MOD}] urgency, that Tuesday had gone missing.`,
        `[name:${N}] pointed out, gently, that it was in fact Tuesday. The ${CRE} sniffed. "Not this one. The other one."`,
        `A [c:${PET}] dropped from a beam overhead, brushed itself off, and declared the investigation officially open for business.`,
        fwLine2,
        `They [c:${MOV}] through the ${PLC} in increasingly improbable directions. Tuesday remained absent, possibly on principle.`,
        fw2Line2,
        `[name:${N}] eventually found Tuesday in the third drawer of a forgotten desk, looking embarrassed and slightly creased.`,
        `The ${CRE} was deeply pleased. The ${PET} took credit. [name:${N}] ate the [y:${FOOD}], which had also been missing, and decided not to ask.`,
      ].filter(Boolean),
    },
    {

      paragraphs: [
        `The errand was simple: walk to the [y:${PLC}], collect the [y:${FOOD}], return home. The errand did not stay simple.`,

        fwLine3,
        `A small [c:${PET}] tugged at [name:${N}]'s sleeve and offered an unfamiliar word as though it might help. It did, sort of.`,
        `They [c:${MOV}] through corridors that should not have existed, past murals that watched politely.`,
        fw2Line3,
        `[name:${N}] retrieved the ${FOOD} eventually. It was excellent. The ${CRE} was nowhere to be seen.`,
        `The ${PET} returned home with [name:${N}] and quietly took up residence on the windowsill. It has been there ever since.`,
      ].filter(Boolean),
    },
    {
      title: `The Day the ${capitalize(PLC)} Had Too Many Doors`,
      paragraphs: [
        `The [y:${PLC}] had three doors yesterday. Today it had forty-one. Nobody could explain this.`,
        `[name:${N}] noticed this immediately. The [c:${PET}] noticed and then pretended not to, which was its preferred coping strategy.`,
        `"Has anyone counted them?" asked a [c:${CRE}] [c:${MOV}] past. It was the kind of question one was supposed to ignore. They ignored it.`,
        fwLine,
        `They opened door seventeen. Behind it was a much smaller door. Behind THAT door was a [c:${COL}] sandwich. The sandwich said nothing, because sandwiches don't.`,
        `"We are clearly not solving this through doors," declared the [c:${PET}]. The ${CRE} agreed enthusiastically and then opened three more doors anyway.`,
        fw2Line,
        `By dinner the ${PLC} had only seven doors again. Nobody admitted to anything. The [c:${COL}] [y:${FOOD}] from inside the sandwich was, however, mysteriously served at every meal that week. It was excellent.`,
      ].filter(Boolean),
    },
    {
      title: `The ${capitalize(PET)} Who Demanded Documentation`,
      paragraphs: [
        `The [c:${PET}] arrived holding a clipboard. This was new and slightly alarming.`,
        `"I'll need to see your paperwork," it announced to [name:${N}] at eight in the morning, in [name:${N}]'s own kitchen, before coffee.`,
        `[name:${N}] did not have paperwork. The ${PET} sighed in the manner of someone deeply familiar with this exact disappointment.`,
        `They [c:${MOV}] to the [y:${PLC}], where a [c:${CRE}] was running an officially unauthorised office out of a wheelbarrow.`,
        fwLine2,
        `The ${CRE} stamped one form, lost another, produced a third nobody had filled out, and demanded a signature from someone not present.`,
        fw2Line2,
        `The [c:${PET}] reviewed everything for [c:${MOD}] minutes, then declared [name:${N}] "essentially compliant." Nobody knew what they had been compliant about.`,
        `The [c:${PET}] put its clipboard away and finally ate some [y:${FOOD}], which apparently had been the goal all along.`,
      ].filter(Boolean),
    },
  ]);
}

/* Parse token markup to HTML (safe — user input is already escaped before going into tokens) */
function parseStoryLine(line) {
  return line.replace(/\[(name|c|y):([^\]]+)\]/g, (_, kind, text) => {
    if (kind === 'name') return `<span class="pop pop--name">${text}</span>`;
    if (kind === 'c')    return `<span class="pop">${text}</span>`;
    if (kind === 'y')    return `<span class="pop pop--yellow">${text}</span>`;
    return text;
  });
}

function storyToPlainText(story) {
  const strip = s => s.replace(/\[(?:name|c|y):([^\]]+)\]/g, '$1');
  return story.title + '. ' + story.paragraphs.map(strip).join(' ');
}
